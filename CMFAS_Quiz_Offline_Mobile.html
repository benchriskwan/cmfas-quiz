// --------------------------------------------------------------------------- helpers
const STORAGE_KEY = "cmfas-trainer-v3";
function eqSet(a, b) {
  if (!a || a.length !== b.length) return false;
  const s = new Set(a);
  return b.every(x => s.has(x));
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2, "0")}`;
}
function moduleStandaloneCount(m) {
  return m.topics.reduce((n, t) => n + t.questions.length, 0);
}
function moduleCaseQCount(m) {
  return m.cases.reduce((n, c) => n + c.questions.length, 0);
}

// =========================================================================== APP
function App() {
  const [moduleKey, setModuleKey] = useState(null);
  const [view, setView] = useState("modules");
  const [store, setStore] = useState({}); // { M6:{code:pct,...,mockBest}, M6A:{...} }
  const [, setLoaded] = useState(false);

  // run flow (chapters + cases)
  const [run, setRun] = useState(null);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState([]);
  const [submitted, setSubmitted] = useState(false);
  const [correctCount, setCorrectCount] = useState(0);

  // mock flow
  const [mockQs, setMockQs] = useState([]);
  const [mockAns, setMockAns] = useState({});
  const [mockFlags, setMockFlags] = useState({});
  const [mockIdx, setMockIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [mockPass, setMockPass] = useState(0);
  const [mockDone, setMockDone] = useState(false);
  useEffect(() => {
    (async () => {
      try {
        const res = await appStorage.get(STORAGE_KEY);
        if (res && res.value) setStore(JSON.parse(res.value));
      } catch (e) {
        /* fresh */
      } finally {
        setLoaded(true);
      }
    })();
  }, []);
  async function persist(next) {
    setStore(next);
    try {
      await appStorage.set(STORAGE_KEY, JSON.stringify(next));
    } catch (e) {
      /* session-only */
    }
  }
  const mod = moduleKey ? MODULES[moduleKey] : null;
  const theme = mod ? {
    accent: mod.accent,
    soft: mod.soft
  } : {
    accent: "#0E7490",
    soft: "#ECFEFF"
  };
  const modStore = moduleKey && store[moduleKey] || {};
  function saveScore(codeKey, pct) {
    const prev = modStore[codeKey] ?? 0;
    if (pct > prev) persist({
      ...store,
      [moduleKey]: {
        ...modStore,
        [codeKey]: pct
      }
    });
  }
  const chaptersPassed = mod ? mod.topics.filter(t => (modStore[t.code] ?? 0) >= 70).length : 0;
  const readiness = mod ? Math.round(chaptersPassed / mod.topics.length * 100) : 0;
  function pickModule(k) {
    setModuleKey(k);
    setView("home");
  }

  // ---- run ----
  function startRun(kind, idx) {
    const src = kind === "chapter" ? mod.topics[idx] : mod.cases[idx];
    setRun({
      kind,
      idx,
      code: kind === "chapter" ? src.code : `CS${idx + 1}`,
      title: src.name || src.title,
      scenario: src.scenario || null,
      questions: src.questions
    });
    setQIdx(0);
    setSelected([]);
    setSubmitted(false);
    setCorrectCount(0);
    setView("run");
  }
  function toggle(i) {
    if (submitted) return;
    const q = run.questions[qIdx];
    if (q.type === "mcq") setSelected([i]);else setSelected(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]);
  }
  function check() {
    if (selected.length === 0) return;
    if (eqSet(selected, run.questions[qIdx].correct)) setCorrectCount(c => c + 1);
    setSubmitted(true);
  }
  function nextQ() {
    if (qIdx + 1 < run.questions.length) {
      setQIdx(qIdx + 1);
      setSelected([]);
      setSubmitted(false);
    } else {
      const pct = Math.round(correctCount / run.questions.length * 100);
      saveScore(run.kind === "chapter" ? run.code : `case${run.idx}`, pct);
      setView("runresult");
    }
