y Multiplier = Total Assets / Equity (the leverage factor)","First two terms multiply to ROA; ROE = ROA × Equity Multiplier"]},{"t":"diagram","kind":"flow","title":"DuPont decomposition of ROE","steps":[{"label":"Net Profit Margin","sub":"Net Income / Sales"},{"label":"× Asset Turnover","sub":"Sales / Assets"},{"label":"× Equity Multiplier","sub":"Assets / Equity"},{"label":"= ROE","sub":"return on equity"}]},{"t":"h","text":"Quality of Financial Statements & Earnings"},{"t":"p","text":"'Quality' refers to the **reliability** of statements — they should reflect economic reality and not rely on self-serving accounting. The most telling test is the transparency of accounts and treatment of losses when conditions are POOR, not when business is rosy. **Good quality earnings are realistic and repeatable.**"},{"t":"key","title":"Signs of high-quality statements","points":["Lower use of debt than the industry (less financial risk, spare credit lines).","Higher liquidity than competitors.","Assets carried BELOW market value (conservative).","Reluctance to capitalise intangibles; costs expensed rather than deferred.","Funds set aside for plant replacement/upgrades.","Conservative revenue recognition and adequate provisioning.","Absence of off-balance-sheet activities.","Discipline in core business; avoiding speculative finance.","Realistic recognition of bad debts.","Steady, sustainable, repeatable revenue and earnings growth."]},{"t":"h","text":"Comparative & Trend Analysis"},{"t":"p","text":"Beyond industry comparison, **trend analysis** studies past performance over time. Because business cycles affect all firms, analysis should cover **at least one full cycle** (often 5-10 years); otherwise a firm at the crest of a cycle can look strong just before it turns down."},{"t":"h","text":"Limitations of Ratio Analysis"},{"t":"list","ordered":false,"items":["Different accounting policies require adjustment for comparability.","Consolidated group accounts make individual-company performance hard to isolate.","Year-end figures may be unrepresentative (e.g. inventory drawn down abnormally low).","Special situations (e.g. R&D for new products) may temporarily depress profitability.","Inflation and economic conditions distort trend analysis.","Footnotes must be read for the full picture.","Comparison firms must be similar in sector and size.","Ratios can be artificially manipulated (e.g. high ROE from reducing equity in prior years) — review prior years.","Only meaningful over time and against peers/benchmarks.","Hard to apply to emerging business models with few tangible assets, where value rests on brand or founder."]}],"newQuestions":[{"type":"mcq","q":"A company reports net income of $80m, sales of $1,000m, total assets of $2,000m and shareholders' equity of $500m. Using the DuPont identity, what is its ROE?","options":["4.0%","8.0%","16.0%","40.0%"],"correct":[2],"explain":"DuPont ROE = NPM (80/1000 = 8%) × Asset Turnover (1000/2000 = 0.5) × Equity Multiplier (2000/500 = 4) = 16%. Equivalently Net Income/Equity = 80/500 = 16%."},{"type":"mcq","q":"A firm has current assets of $900m (of which inventory is $300m), and current liabilities of $500m. What is its quick (acid-test) ratio?","options":["1.20","1.80","0.60","2.40"],"correct":[0],"explain":"Quick ratio excludes inventory: (900 − 300)/500 = 600/500 = 1.20. The 1.80 trap is the current ratio (900/500)."},{"type":"mcq","q":"A company has EBIT of $450m and interest expense of $150m. Depreciation and amortisation total $300m. What is its EBITDA interest coverage?","options":["3.0x","2.0x","5.0x","1.5x"],"correct":[2],"explain":"EBITDA = EBIT + D&A = 450 + 300 = 750. EBITDA interest coverage = 750/150 = 5.0x. The 3.0x trap is plain EBIT coverage (450/150)."},{"type":"mcq","q":"Net income available to common shareholders is $240m and the weighted average number of shares is 600m. There are also convertible bonds and options that, if fully exercised, would add 200m shares. What is the fully diluted EPS?","options":["$0.40","$0.30","$0.48","$0.24"],"correct":[1],"explain":"Diluted EPS = 240 / (600 + 200) = 240/800 = $0.30. Basic EPS would be 240/600 = $0.40, the trap. Dilution always lowers EPS."},{"type":"mcq","q":"A share trades at $48. The company's basic EPS is $4.00 and its book value per share is $20. What is its P/E ratio?","options":["2.4x","12.0x","9.6x","0.083x"],"correct":[1],"explain":"P/E = Price / EPS = 48/4 = 12.0x. The 2.4x trap is the price-to-book ratio (48/20)."},{"type":"mcq","q":"A company's gross profit is $360m on sales of $1,200m, and operating expenses (SG&A) are $120m, giving EBIT of $240m. What is the operating profit margin?","options":["30%","20%","10%","50%"],"correct":[1],"explain":"Operating profit margin = EBIT/Sales = 240/1200 = 20%. The 30% trap is the gross margin (360/1200)."},{"type":"mcq","q":"Sales are $2,000m. Total assets were $1,800m at the start of the year and $2,200m at the end. What is the total asset turnover?","options":["0.91x","1.11x","1.00x","0.50x"],"correct":[2],"explain":"Average total assets = (1800 + 2200)/2 = 2000. Turnover = Sales/Average Assets = 2000/2000 = 1.00x. The chapter specifies AVERAGE assets, not year-end."},{"type":"mcq","q":"Which statement best describes treasury stock?","options":["Shares a company holds as an investment in other listed companies","The portion of a company's own stock that it has bought back and 'retired'","Government bonds held in the firm's treasury department","Newly authorised but unissued share capital"],"correct":[1],"explain":"Treasury stock is the firm's own repurchased shares; buybacks give remaining shareholders a larger share of earnings and dividends."},{"type":"mcq","q":"Which item is added back when deriving cash flow from operating activities from pre-tax profit?","options":["Proceeds from a rights issue","Capital expenditure on new aircraft","Depreciation and amortisation","Dividends paid to shareholders"],"correct":[2],"explain":"Depreciation and amortisation are non-cash expenses added back to profit. A rights issue and dividends are financing items; capex is an investing item."},{"type":"mcq","q":"A current ratio was 1.50 (current assets $300m, current liabilities $200m). The firm then takes on an equal $100m increase in both current assets and current liabilities. What happens to the current ratio?","options":["It stays at 1.50","It falls toward 1.0 (to about 1.33)","It rises above 1.50","It becomes exactly 1.00"],"correct":[1],"explain":"An equal dollar increase to numerator and denominator pulls a ratio toward 1; since it was >1 it falls: 400/300 = 1.33. (If it had been <1 it would rise.)"},{"type":"mcq","q":"A company has total borrowings of $600m, total liabilities of $900m, total assets of $1,500m and shareholders' equity of $600m. What is its debt-to-equity (gearing) ratio?","options":["1.50","1.00","0.60","0.40"],"correct":[1],"explain":"Gearing = Total Debt / Equity = 600/600 = 1.00. Note debt here means borrowings ($600m), not total liabilities ($900m, which is the 1.50 trap)."},{"type":"mcq","q":"A firm's accounts receivable averaged $200m over the year on sales of $2,920m. What is the average collection period?","options":["25 days","14.6 days","73 days","36.5 days"],"correct":[0],"explain":"Collection period = Average AR / (Sales/365) = 200 / (2920/365) = 200/8 = 25 days. Equivalently 365 / (2920/200) = 365/14.6 = 25 days."},{"type":"mcq","q":"A goodwill write-down is charged directly against equity reserves. All else equal, what is the likely effect on ROA and ROE in SUBSEQUENT years?","options":["Both fall because assets are impaired","Both rise because the denominators (assets and equity) are lower","ROA rises but ROE falls","Neither changes since it is non-cash"],"correct":[1],"explain":"The write-down removes asset value and reduces equity, lowering both denominators; with little operational change, future ROA and ROE appear HIGHER — a manipulation flag."},{"type":"mcq","q":"Which company would the quick ratio be LEAST meaningful for?","options":["A jewellery retailer","A supermarket chain","A bank / financial institution","A car manufacturer"],"correct":[2],"explain":"Banks and financial institutions hold no inventory, so the quick ratio (which differs from the current ratio only by excluding inventory) adds little. Supermarkets/retailers/manufacturers all hold inventory."},{"type":"mcq","q":"In the fixed charge coverage ratio, why is the preferred dividend divided by (1 − tax rate)?","options":["Because preferred dividends are tax deductible","Because preferred dividends are paid out of after-tax earnings and must be grossed up to a pre-tax basis","To convert it into a per-share figure","Because preferred shareholders rank behind bondholders"],"correct":[1],"explain":"Interest and lease payments are pre-tax, but preferred dividends are paid from after-tax earnings, so they are grossed up by 1/(1 − tax rate) to be comparable in the numerator's pre-tax terms."},{"type":"mrq","q":"Select ALL ratios that use an AVERAGE (start + end)/2 figure in their denominator per this chapter.","options":["Total asset turnover","Current ratio","Return on equity","Receivables turnover"],"correct":[0,2,3],"explain":"Asset turnover (average total assets), ROE (average common equity) and receivables turnover (average AR) use averages because the numerator spans the period. The current ratio uses point-in-time balance-sheet figures."},{"type":"mrq","q":"Select ALL items that are classified as cash flows from FINANCING activities.","options":["Proceeds from issuing shares and bonds","Dividends paid to shareholders","Capital expenditure on equipment","Repayment of borrowings"],"correct":[0,1,3],"explain":"Issuing shares/bonds (inflow), dividends paid (outflow) and repayment of borrowings (outflow) are financing activities. Capital expenditure is an investing activity."},{"type":"mrq","q":"Select ALL recognised signs of HIGH-QUALITY financial statements and earnings.","options":["Conservative revenue recognition and adequate provisioning","Carrying assets below market value","Reliance on extensive off-balance-sheet activities","Steady, repeatable earnings growth from existing businesses"],"correct":[0,1,3],"explain":"Conservatism, understated assets and repeatable earnings signal quality. Extensive off-balance-sheet activity is a NEGATIVE — quality statements avoid it."},{"type":"mrq","q":"Select ALL true limitations of ratio analysis highlighted in the chapter.","options":["Ratios can be artificially manipulated, e.g. high ROE from reducing equity in prior years","Year-end figures may be unrepresentative of the rest of the year","A single ratio in isolation fully describes a firm's health","Emerging business models with few tangible assets are hard to analyse with ratios"],"correct":[0,1,3],"explain":"Manipulation, unrepresentative year-end figures and difficulty with asset-light emerging models are all stated limitations. Ratios in isolation are explicitly called meaningless, so the third option is false."},{"type":"mrq","q":"A firm reports a NEGATIVE interest coverage ratio. Which statements are correct?","options":["It indicates the firm made a trading loss (negative EBIT)","A ratio of −1 is automatically less risky than −3","The absolute size of interest/financing charges affects the ratio's magnitude","Analysts should investigate the reasons behind the ratio rather than over-interpret it"],"correct":[0,2,3],"explain":"A negative ratio reflects a loss; the denominator (interest charges) influences its size, so a −1 firm with higher charges is not necessarily safer than a −3 firm. The chapter warns against over-interpreting negative coverage ratios."}]},"06":{"notes":[{"t":"h","text":"6.1 Introduction & Share Ownership"},{"t":"p","text":"**Equity** (shares) represents **ownership rights** in a corporation, letting investors participate in the company's performance. Returns come from **dividends** (paid at management's discretion) plus **capital gains** (price appreciation). If the business does poorly, dividends shrink or stop and shareholders face **capital loss** — in the worst case the share price falls to zero."},{"t":"p","text":"Original owners list a company (via IPO) to **share ownership risk**, **monetise/realise value**, **raise new capital**, **professionalise management**, and **redeploy funds**. Through a well-planned IPO, founders can retain control (e.g., sell a 49% stake, keep 51%) while partially cashing out. Growth businesses (high-tech, biotech) often IPO to fund growth."},{"t":"def","term":"IPO (Initial Public Offering)","def":"The first sale of a company's shares to the public on an exchange, used to raise capital, monetise existing ownership, and broaden the shareholder base."},{"t":"h","text":"6.2.2 Types of Shares"},{"t":"p","text":"In Singapore there are traditionally two types of listed shares: **ordinary (common) shares with voting rights** and **preference shares with non-voting rights**. Typically **one ordinary share = one vote**."},{"t":"p","text":"Since **June 2018, SGX allows dual-class shares (DCS)** — multiple-vote shares in addition to ordinary shares — to let founders raise large funding yet retain control. **Safeguards:** extra votes cannot be used on matters with founder/minority conflicts of interest, and each multiple-vote share carries a **maximum of 10 votes** to prevent founder entrenchment."},{"t":"key","title":"Dual-class examples","points":["Berkshire Hathaway: Class A converts to 1,500 Class B; Class B has 1/200th the voting power of Class A","Alphabet (Google): Class A = 1 vote, Class B = 10 votes (not traded, held by founders/insiders), Class C = no vote","Class A trades at a premium over non-voting Class C"]},{"t":"h","text":"6.2.3 Ordinary (Common) Shareholders"},{"t":"list","ordered":false,"items":["**Gain on profits/price/dividends** — but ordinary dividends are at management's discretion and are NOT a right or guaranteed.","**Voting rights** — vote on major decisions (electing directors, issuing new shares); more shares = more voting power.","**Right to information** — to be informed of major events and decisions affecting the company.","**Residual claimants** — in liquidation, paid LAST, only after all creditors (bondholders, suppliers, employees, deferred taxes).","**Limited liability** — the most a shareholder can lose is the original investment; not personally liable for company obligations."]},{"t":"key","title":"Two key ordinary-share features (exam favourite)","points":["**Residual claim** — last to be paid in liquidation","**Limited liability** — losses capped at the original investment"]},{"t":"h","text":"6.2.4 Preference Shares"},{"t":"def","term":"Preference share","def":"Legally an equity security but treated as a HYBRID because it resembles both equity (infinite life, pays dividends) and fixed income (dividend fixed/specified in advance, like a bond's coupon)."},{"t":"p","text":"A preference share has an **infinite life** and pays a **fixed dividend** (stated as a dollar amount or % of par). The income stream resembles a bond but continues indefinitely unless **called or retired**. Unlike a bond, the issuer **can skip the dividend** if earnings are insufficient — and this does **NOT trigger a default**."},{"t":"sub","text":"Risk ranking"},{"t":"p","text":"Preference shares are **less risky than ordinary shares** (preferred dividends are paid first) but **riskier than bonds** (bondholders are paid first in liquidation). Preference shareholders have **no voting rights, except in financial distress**."},{"t":"key","title":"Why “preferred”","points":["**Redemption priority** over ordinary shares in liquidation","**Dividend priority** — preferred dividends paid before ordinary dividends"]},{"t":"sub","text":"Features of preference shares"},{"t":"table","headers":["Feature","What it does"],"rows":[["Cumulative","Any past UNPAID preferred dividends (arrears) must be cleared before ANY ordinary dividend is paid. Protects the holder; today most preference shares are non-cumulative."],["Callable","Issuer can redeem at a stated price, usually only after several years (often ~5). Lets the issuer refinance if rates fall. Initial call price set ABOVE par (premium). Callable shares carry a HIGHER yield than non-callable."],["Participating","Allows extra dividends when earnings are high. Attractive but uncommon."],["Convertible","Holder may exchange the preference share for a set number of ordinary shares (issuer has effectively sold an option). LOWERS the yield; exercised when ordinary prices appreciate. Uncommon."]]},{"t":"diagram","kind":"compare","title":"Ordinary vs Preference Shares","colA":"Ordinary shares","colB":"Preference shares","rows":[["Voting rights (1 share = 1 vote)","No vote (except in financial distress)"],["Dividends discretionary, variable","Dividend fixed / specified in advance"],["Last in liquidation (residual claim)","Priority over ordinary in liquidation"],["Dividend not guaranteed; no default risk to firm","Skipped dividend = no default (unlike bond interest)"],["Pure equity","Hybrid (equity + fixed-income features)"]]},{"t":"h","text":"6.2.5 Rights, Bonus, Stock Split & Reverse Split"},{"t":"def","term":"Rights issue","def":"An injection of NEW capital via new shares offered FIRST to existing shareholders at a specified (usually discounted) price, in proportion to holdings, to prevent dilution of profit and voting interest."},{"t":"p","text":"Rights may be **renounceable** (tradable) or **non-renounceable** (not transferable). Companies may now issue pro-rata renounceable rights of **up to 100% of share capital** (raised from the old 50% limit). If a holder declines, others may take up the rights. In a rights issue the company lodges an **Offer Information Statement (OIS)**, not a full prospectus."},{"t":"formula","name":"Theoretical ex-rights price (TERP)","expr":"TERP = (Old market cap + New capital raised) ÷ Total shares after issue","where":["Old market cap = old price × old shares","New capital raised = new shares × subscription price","Total shares = old shares + new shares"]},{"t":"key","title":"Worked example — Dragonfly Ltd (1-for-3 rights)","points":["Before: 300m shares × $2.00 = $600m market cap","Issue: 100m new shares at $1.90 → raises $190m","New market cap = $600m + $190m = $790m; new shares = 400m","TERP = $790m ÷ 400m = **$1.975**","Weighted-avg shares for EPS = (300m×9 + 400m×3)/12 = 325m","Revised EPS = ($0.11 × 300m)/325m ≈ **$0.1015**"]},{"t":"def","term":"Bonus issue","def":"New shares issued to existing holders with NO new capital raised — a signalling exercise after good performance. Price is adjusted DOWN more sharply than a rights issue because no cash comes in."},{"t":"p","text":"Dragonfly 1-for-3 **bonus** issue (no new money): theoretical ex-bonus price = $600m ÷ 400m = **$1.50** — a sharper drop than the rights-issue TERP of $1.975."},{"t":"def","term":"Stock split","def":"Splits each share into more shares (e.g., 2-for-1) to make the unit price more affordable for retail investors. NO capital raised; market cap unchanged. (OCBC did a 2-for-1 split in 2005.)"},{"t":"def","term":"Reverse stock split","def":"Combines several shares into one (e.g., 1-for-10) to lift a low price — e.g., out of “penny stock” territory (US SEC: below $5/share) so institutions can hold it. Citigroup did a 1-for-10 reverse split in 2011 ($4.52 → $44.16)."},{"t":"diagram","kind":"compare","title":"Rights Issue vs Bonus Issue","colA":"Rights issue","colB":"Bonus issue","rows":[["NEW capital raised","NO new capital"],["Shareholders pay the subscription price","Shares given free"],["May be renounceable / non-renounceable","Not applicable"],["Price drops modestly (cash injected)","Price drops more sharply (no cash)"],["Dragonfly TERP ≈ $1.975","Dragonfly ex-bonus ≈ $1.50"]]},{"t":"diagram","kind":"flow","title":"Rights issue process","steps":[{"label":"Announce","sub":"new shares, ratio & price"},{"label":"Offer existing holders","sub":"pro-rata, may renounce"},{"label":"Subscribe / trade rights","sub":"pay subscription price"},{"label":"New capital in","sub":"shares allotted; price re-bases to TERP"}]},{"t":"h","text":"6.3 Choice of Equities (Investment Styles)"},{"t":"def","term":"Blue-chip","def":"Large, financially strong conglomerates with stable, mature businesses and a long consistent earnings record; pay steady dividends in good and bad years. Suit conservative investors seeking safety/stability. (e.g., DBS, OCBC, UOB, SIA; 3M, P&G, Apple, Microsoft.)"},{"t":"def","term":"High-growth company","def":"New-economy firm with high double-digit (>~20% p.a.) growth. Stage 1: high sales but negative profits (e.g., early Tesla, Twitter). Stage 2: high sales AND earnings (e.g., Amazon, Alibaba, Nvidia). Carry HIGH P/E, are high-beta, pay small/no dividends (earnings retained for expansion)."},{"t":"def","term":"Income stock (high dividend yield)","def":"Mature firms with large cash flows paying high dividends — sought by retirees, pension/endowment/trust funds. High yields give price support in corrections. Drawbacks: low growth, possible dilutive rights issues (some REITs), dividends only sustainable while earnings hold."},{"t":"def","term":"Cyclical stock","def":"Earnings/prices are highly sensitive to the business cycle — strong in booms, weak in downturns (e.g., autos GM/Ford; in Singapore/HK property and banks; in Taiwan/Korea tech/electronics)."},{"t":"def","term":"Defensive stock","def":"Earnings withstand downturns — necessities like pharmaceuticals, food, utilities, transport (e.g., Nestlé, Coca-Cola). Less volatile than cyclical/growth shares; favoured before a recession, especially with a reasonable yield."},{"t":"sub","text":"International equities — ways to participate"},{"t":"list","ordered":false,"items":["**Direct investment** — buy foreign shares directly; complicated by withholding taxes, transaction costs, foreign-ownership limits.","**Depositary Receipts (DRs)** — indirect ownership of foreign shares without going to the foreign exchange.","**ETFs** — replicate a broad index (STI, S&P 500); investor takes the index's market risk.","**Dual-listed shares** — listed at home plus another jurisdiction; enhances liquidity and extends trading hours."]},{"t":"h","text":"6.4 Equity Market Indices"},{"t":"p","text":"An index tracks the overall market. Three weighting schemes: **value-weighted**, **price-weighted**, and **un-/equal-weighted**."},{"t":"sub","text":"Value-weighted series"},{"t":"p","text":"Weight = market value (shares outstanding × price). High-cap shares move the index more. **Automatically adjusts for bonus/rights issues and other capital changes** (a price fall is offset by more shares, so market cap is unchanged). Examples: **S&P 500** (top 500 by market cap, ~75% of US market) and **STI** (replaced the price-weighted Straits Times Industrial Index)."},{"t":"formula","name":"New value-weighted index value","expr":"New index = (Current total market value ÷ Base value) × Beginning index value","where":["Base value = total market value at the base date","Beginning index value = usually 100"]},{"t":"key","title":"Worked example","points":["Day 1 total MV = $64,000,000 = index 100 (base)","Day 2 total MV = $67,000,000","New index = (67,000,000 / 64,000,000) × 100 = **105**"]},{"t":"sub","text":"Price-weighted series"},{"t":"p","text":"Arithmetic average of prices (sum ÷ number of shares). A **high-priced share carries more weight**. The **divisor must be adjusted** for capital changes; a **stock split reduces a share's weight** even though market cap is unchanged. Example: **Dow Jones Industrial Average (DJIA)** — 30 blue chips; criticised as non-representative."},{"t":"sub","text":"Un-/equal-weighted series"},{"t":"p","text":"All shares carry equal weight regardless of price or market cap; a $2 share matters as much as a $10 share. Changes use arithmetic or geometric average of % price changes. Example: **Value Line Composite Average** (equal-weighted geometric)."},{"t":"h","text":"6.5 Valuation Approaches"},{"t":"p","text":"Three families of equity valuation:"},{"t":"list","ordered":true,"items":["**Net Asset Value** — Book Value, Revised Net Asset Value (RNAV), Liquidation/Salvage value.","**Absolute valuation (Discounted Cash Flow)** — discount future cash flows/dividends to present value: Constant-growth DDM, Multi-stage DDM, Discounted Free Cash Flow.","**Relative valuation** — compare multiples vs history and peers, from a shareholder perspective (P/E, P/B, dividend yield) or a firm perspective (EV/Sales, EV/EBITDA, EV/Cash Flow)."]},{"t":"h","text":"6.6 Net Asset Valuation"},{"t":"def","term":"Book value of equity","def":"Total assets minus total liabilities per the balance sheet (also = accumulated retained earnings). Book value per share = book value ÷ shares outstanding. Often the FLOOR value in bad times if equity is not wiped out."},{"t":"def","term":"Liquidation (salvage) value","def":"Value if the company is wound up and assets/businesses sold quickly to repay creditors; sale prices (and the residual to equity) can be MUCH lower than book or market value."},{"t":"def","term":"Revised Net Asset Value (RNAV)","def":"Book values restated to current market values (assets AND, where relevant, liabilities) between reporting dates — widely used for property companies whose land/property is revalued by independent consultants. RNAV per share derived like book value per share."},{"t":"h","text":"6.7 Discounted Cash Flow (DCF) Approach"},{"t":"p","text":"Built on the **time value of money**: future cash is worth less than cash today. The module focuses on **Free Cash Flow to Firm (FCFF)** discounted at the **WACC**. Note: for CM-EIP, representatives must EXPLAIN the process and variables but are not asked to compute the full fair value."},{"t":"list","ordered":true,"items":["Calculate the **WACC** (weighted cost of equity + cost of debt).","Estimate **FCFF** over a predictable period (~10 years).","Estimate the **Terminal Value (TV)** at year 10 (all cash flows thereafter).","Discount FCFF + TV to today → **Enterprise Value**.","Subtract market value of **net debt and preference shares** → market value of equity.","Divide by shares outstanding → **intrinsic (fair) value per share**."]},{"t":"formula","name":"Cost of equity (CAPM)","expr":"R = Rf + β × (Rm − Rf)","where":["R = required return / cost of equity","Rf = risk-free rate (10-yr Treasury / SGS)","Rm = required market return","Rm − Rf = equity market risk premium","β = sensitivity of the stock to the market"]},{"t":"key","title":"CAPM example — P&G","points":["Rf = 2.33%, Rm = 9.28% (7.36% price return + 1.92% dividend yield), β = 0.68","R = 2.33% + 0.68 × (9.28% − 2.33%) = **7.06% ≈ 7%**"]},{"t":"formula","name":"WACC","expr":"WACC = (1−t)×Rdebt×[D/(D+E)] + Requity×[E/(D+E)]","where":["t = effective tax rate","Rdebt = cost of debt","Requity = cost of equity","D = market value of debt","E = market value of equity (market cap)"]},{"t":"formula","name":"Terminal Value (TV)","expr":"TV at year 10 = E(FCFF₁₁) ÷ (WACC − gc)","where":["E(FCFF₁₁) = first-year terminal cash flow","gc = terminal (perpetual) growth rate","Requires WACC > gc; then discount TV back 10 years"]},{"t":"p","text":"If market price is well **below** intrinsic value → undervalued → **buy**; well **above** → overvalued → **sell**. **Criticism:** results depend heavily on assumptions, especially the **terminal value**, which swings widely with small changes in WACC and gc (“fudging” risk)."},{"t":"h","text":"Dividend Discount Models (DDM)"},{"t":"p","text":"DDM values a share as the present value of all expected future dividends. Used mainly for companies with **very high dividend payouts (DPS/EPS > ~80%)** such as tobacco stocks (e.g., British American Tobacco) and **REITs** (which must pay out ~90% of distributable income and have predictable earnings)."},{"t":"formula","name":"Zero-growth (no-growth) DDM","expr":"P₀ = D ÷ r","where":["P₀ = fair value today","D = constant dividend per share (perpetuity)","r = required rate of return"]},{"t":"formula","name":"Constant-growth (Gordon Growth) DDM","expr":"P₀ = D₁ ÷ (r − g)   where D₁ = D₀ × (1 + g)","where":["D₁ = next year's expected dividend","D₀ = most recent dividend just paid","r = required return","g = constant dividend growth rate (must be < r)"]},{"t":"formula","name":"Required return implied by DDM","expr":"r = (D₁ ÷ P₀) + g","where":["D₁ ÷ P₀ = expected dividend yield","g = dividend growth (capital-gain) component","Rearranged from the constant-growth DDM"]},{"t":"p","text":"**Multi-stage DDM:** discount each high-growth-period dividend individually, then add the present value of a constant-growth terminal value (Gordon) at the end of the high-growth phase. Used when growth is not constant; seldom used day-to-day for ordinary valuation."},{"t":"key","title":"DDM worked example (constant growth)","points":["D₀ = $1.00 just paid, g = 5%, r = 10%","D₁ = $1.00 × 1.05 = $1.05","P₀ = $1.05 / (0.10 − 0.05) = **$21.00**","If price were $15, r = ($1.05/$15) + 5% = 7% + 5% = **12%**"]},{"t":"h","text":"6.8 Relative Valuation Ratios"},{"t":"p","text":"Relative valuation compares **multiples** against a company's own **history** and against **peers** — not simply picking the lowest number. A perpetual premium/discount can be justified by stronger/weaker earnings prospects or asset quality. Use multiple ratios together."},{"t":"sub","text":"Price-Earnings (P/E) ratio"},{"t":"formula","name":"P/E ratio","expr":"P/E = Market price per share ÷ EPS","where":["Trailing P/E = price ÷ last 4 quarters' EPS (“current P/E”)","Leading/prospective P/E = price ÷ consensus next-year EPS"]},{"t":"key","title":"What moves the P/E","points":["Growth stocks command HIGHER P/E (e.g., tech/biotech); mature/defensive lower (utilities, tobacco)","Low transparency/predictability of earnings → lower P/E","Impending events / uneven growth / market inefficiency (illiquidity) distort P/E","Bear markets → lower P/E (a likely floor); bull markets → higher P/E","Shiller's CAPE > 30x signals overvaluation (1929, 2000 dot-com)","INVERSE relationship with interest rates: rates up → P/E down"]},{"t":"table","headers":["P/E advantages","P/E disadvantages"],"rows":[["Intuitive; easy to compare across companies/sectors","Ignores debt (shareholder view only); can't use with negative earnings"],["Widely published (trailing P/E)","Affected by capital structure & accounting differences; earnings volatile/lumpy; forecasts inaccurate; doesn't separate value from growth"]]},{"t":"sub","text":"Price-Earnings Growth (PEG) ratio"},{"t":"formula","name":"PEG ratio","expr":"PEG = P/E ÷ (% annual EPS growth)","where":["Controls for growth so high-P/E growth stocks can be compared","Rule of thumb: PEG < 1 = attractive (undervalued), but rare and often higher-risk"]},{"t":"sub","text":"Price-to-Book Value (P/BV) ratio & ROE"},{"t":"formula","name":"P/BV ratio","expr":"P/BV = Market price per share ÷ Book value per share","where":["Best for asset-heavy firms: banks, insurers, property companies/REITs","Can mislead if market value of assets differs from book (e.g., non-performing loans)"]},{"t":"formula","name":"Justified P/BV from ROE (Gordon-consistent)","expr":"P/BV = (ROE − g) ÷ (r − g)","where":["ROE = return on equity","r = required return (cost of equity)","g = sustainable growth rate","If ROE > r the share is worth MORE than book (P/BV > 1); if ROE = r then P/BV = 1"]},{"t":"key","title":"Justified P/BV example","points":["ROE = 15%, r = 10%, g = 4%","P/BV = (0.15 − 0.04) / (0.10 − 0.04) = 0.11/0.06 = **1.83x**","Because ROE (15%) > required return (10%), the stock justifiably trades ABOVE book."]},{"t":"p","text":"**Hidden reserves** (e.g., understated land at book, or unneeded provisions not written back) understate book value, so the true P/BV is lower — making the company more likely undervalued. **RNAV** restates assets/liabilities to market; **P/RNAV** = price ÷ RNAV per share."},{"t":"table","headers":["P/BV advantages","P/BV disadvantages"],"rows":[["Book value cumulative & usually positive (unlike EPS); more stable","Poor for intangible-heavy firms (patents, R&D)"],["Well suited to asset-heavy firms (banks, insurers, property)","Validity depends on provisioning transparency; book may be over/understated"]]},{"t":"sub","text":"Price-to-Sales & EV/Sales"},{"t":"formula","name":"P/Sales ratio","expr":"P/Sales = Market price per share ÷ Sales per share","where":["Useful when earnings are low/zero/negative (some tech/biotech)","Flawed: numerator (price) = equity only but sales come from debt + equity — inconsistent"]},{"t":"p","text":"**EV/Sales** is more consistent: both EV and sales relate to the whole firm (debt + equity). Sales are less manipulable and always positive, but high sales ≠ profit, and recognition practices vary."},{"t":"sub","text":"EV/Cash Flow"},{"t":"formula","name":"EV/Cash Flow ratio","expr":"EV/CF = (Market cap + Debt + Preferred shares − Cash) ÷ Cash flow from operations","where":["Cash flow less manipulable than earnings; lower ratio = more cash generated per unit of capital","Choice of cash flow (operating/investing/financing) affects comparisons"]},{"t":"key","title":"EV/CF example — Fulton Corp","points":["Price $18 × 1,000m shares = $18,000m market cap","+ Debt $400m + Preferred $10m − Cash $8,000m","EV = $10,410m; Operating cash flow = $2,210m","EV/CF = 10,410 / 2,210 ≈ **4.71x**"]},{"t":"sub","text":"EV/EBITDA"},{"t":"formula","name":"EV/EBITDA (enterprise multiple)","expr":"EV/EBITDA = (Mkt cap + Debt + Preferred + Minorities + Pension − Associates − Cash) ÷ EBITDA","where":["EBITDA = Earnings Before Interest, Taxes, Depreciation & Amortisation","A firm-value measure; lower = less capital deployed per unit of cash earnings"]},{"t":"key","title":"Why EV/EBITDA is favoured","points":["EBITDA is close to cash earnings (adds back D&A); a firm-value concept (adds back interest)","Less affected by working-capital swings than operating cash flow; easier to forecast","EV captures debt, so it allows fair comparison across DIFFERENT capital structures","CANNOT be manipulated by changing capital structure (unlike P/E)"]},{"t":"diagram","kind":"matrix","title":"Relative valuation ratios by perspective","cols":["Shareholder perspective (uses Price)","Firm perspective (uses EV)"],"rows":[{"label":"Earnings-based","cells":["P/E, PEG","EV/EBITDA"]},{"label":"Sales / cash-based","cells":["P/Sales, Dividend yield","EV/Sales, EV/Cash Flow"]},{"label":"Asset-based","cells":["P/BV, P/RNAV","EV/Assets"]}]},{"t":"sub","text":"Absolute vs relative valuation"},{"t":"diagram","kind":"compare","title":"Absolute (DCF) vs Relative valuation","colA":"Absolute (DCF)","colB":"Relative (multiples)","rows":[["Ties value to the firm's own cash flows","Compares against peers"],["Widely accepted; flexible on growth","Easy, intuitive, quick"],["Heavily dependent on terminal value (WACC & g sensitivity)","Influenced by market sentiment/cycles"],["Needs WACC > growth rate","Needs a comparable peer set"]]},{"t":"sub","text":"Dividend yield, cash per share, strategic/break-up & earnings yield"},{"t":"formula","name":"Dividend yield","expr":"Dividend yield = (Dividend per share ÷ Market price per share) × 100","where":["Income component of return; e.g., $0.10 / $2.00 = 5%","High dependable yields give price support in corrections"]},{"t":"formula","name":"Payout & retention ratios","expr":"Payout = DPS ÷ EPS;   Retention = 1 − Payout","where":["Payout = % of earnings paid as dividends","Retention = % kept for reinvestment"]},{"t":"p","text":"**Yield compression:** as price rises, dividend yield falls (e.g., 3c dividend at 9.7% yield on 31c → if target yield 7.5%, implied price = 3c/7.5% = 40c). **Cash per share:** cash-rich firms can pay big dividends / be takeover targets; netting idle cash lowers the effective P/E paid. **Strategic value** > offer price → prices may rise; **break-up value** = sum of parts exceeds going-concern value. **Earnings yield = E/P = 1/(P/E)**, compared to bond yields (the **yield gap**) to judge over/under-valuation."},{"t":"h","text":"6.9 Initial Public Offerings (IPOs)"},{"t":"p","text":"SGX **Mainboard** has quantitative listing requirements; **Catalist** (secondary board) has no quantitative requirements and is supervised by a **sponsor** (corporate-finance/M&A professionals). The issuer engages a **lead manager/sponsor** (earns management fees) and **underwriters** (earn underwriting fees, buy any unsubscribed shares); lawyers draft the **prospectus**, accountants audit financials. Once SGX approves, the prospectus is lodged on MAS **OPERA**."},{"t":"p","text":"IPOs use two tranches: a **private placement** tranche (institutional/accredited — usually the larger portion) and a smaller, widely distributed **public retail** tranche. Public offer is open ≥ 2 market days; over-subscription is balloted; trading starts T+2 (“ready” basis)."},{"t":"key","title":"IPO risks to watch","points":["**Vendor share sales** — issuer selling its OWN holdings (possible bad-outlook signal); look for a **lock-up/moratorium**","**Deferred shares / share options** pre-IPO can DILUTE EPS when exercised","**Over-allotment / Greenshoe** option — lets underwriters stabilise the price by buying back; not all IPOs have it","**Claw-back** — re-allocates shares from institutional to retail if institutional take-up is weak (a warning sign)"]},{"t":"p","text":"Evaluate the prospectus: underwriters, business model/competition, **use of proceeds** (debt repayment or buying out owners is a red flag), management track record, financial analysis (watch over-rapid sales, inventory growing faster than sales, falling free cash flow, aggressive acquisitions), and the **lock-up period**. Later capital raising uses **secondary offerings** (e.g., rights issue with an **OIS**, or compliance placement)."},{"t":"p","text":"**IPO valuation** uses DCF and relative methods. Example — Q-Star Pharmaceuticals: apply the lowest peer EV/Sales, EV/EBITDA, EV/Assets multiples, take a 20% discount, derive EV, subtract debt, divide by post-issue shares → target price range **$12.67–$21.33**."},{"t":"h","text":"6.11 Depositary Receipts (DRs)"},{"t":"def","term":"Depositary Receipt (DR)","def":"An equity security trading in the investor's HOME market that represents an underlying share in a FOREIGN issuer's home market — overcoming cross-border settlement, information and ownership-restriction barriers. Underlying shares sit with a custodian in the issuer's country."},{"t":"p","text":"Issuer benefits: broader/diversified investor base (better liquidity), more visibility, flexible capital-raising. A **Non-Voting DR (NVDR)** carries no voting rights, enabling foreign investment where ownership is otherwise restricted."},{"t":"sub","text":"American Depositary Receipts (ADRs)"},{"t":"p","text":"Most common DR; a non-US company's share trading in the US (NYSE/NASDAQ/OTC) as if it were a US security. **Levels:** Level 1 (US OTC only, not exchange-listed), Level 2 (exchange-listed, no capital raised), Level 3 (exchange-listed AND raises new capital). **Sponsored** Level 2/3 issued under a deposit agreement with the company; **unsponsored** issued by depositary banks without a formal agreement. **GDRs** (Global DRs) are issued offshore from the US (often London/Luxembourg)."},{"t":"key","title":"Risks of investing in DRs","points":["**Currency risk** — DR currency, share currency, investor's home currency","**Price risk** — underlying share moves; ADRs may trade at a PREMIUM due to home-market ownership limits","**Counterparty risk** — failure of the depositary bank/custodian","Surrendering **single-listed ADRs** leaves untraded, illiquid shares — inadvisable","Not all DRs have **two-way fungibility** (DR ↔ underlying share)"]}],"newQuestions":[{"type":"mcq","q":"Which TWO features are described as the most important characteristics of an ordinary share?","options":["Fixed dividend and call protection","Residual claim and limited liability","Voting rights and cumulative dividends","Convertibility and participation"],"correct":[1],"explain":"The chapter (and summary) state the two key features are residual claim (last paid in liquidation) and limited liability (losses capped at the original investment). Fixed dividends/call protection are preference-share traits."},{"type":"mcq","q":"A preference share is best described as a hybrid security because it:","options":["Carries full voting rights like ordinary shares","Has a finite maturity like a bond","Has an infinite life and pays dividends, yet pays a fixed amount like a bond","Must be converted into ordinary shares within five years"],"correct":[2],"explain":"It resembles equity (infinite life, pays dividends) and fixed income (fixed, pre-specified dividend). Preference shares are generally non-voting, have no fixed maturity, and conversion is an uncommon optional feature."},{"type":"mcq","q":"If a company skips (does not pay) its specified preference-share dividend because earnings are insufficient, the result is:","options":["An immediate event of default","No default — unlike bond interest, skipping the preferred dividend is not a default","Automatic conversion of the shares to ordinary shares","Forfeiture of the preference shareholders' redemption priority"],"correct":[1],"explain":"Unlike bond interest, an unpaid preference dividend does NOT trigger default. This is precisely why preference shares are riskier than bonds but less risky than ordinary shares."},{"type":"mrq","q":"Select all that apply: Which features can be attached to preference shares as described in the chapter?","options":["Cumulative","Callable","Participating","Convertible"],"correct":[0,1,2,3],"explain":"All four are named features: cumulative (arrears cleared first), callable (issuer can redeem), participating (extra dividends), and convertible (exchange for ordinary shares)."},{"type":"mcq","q":"A company has 300m shares trading at $2.00. It makes a 1-for-3 rights issue of 100m new shares at $1.90. What is the theoretical ex-rights price (TERP)?","options":["$1.50","$1.90","$1.975","$2.00"],"correct":[2],"explain":"Old cap $600m + new capital (100m × $1.90 = $190m) = $790m over 400m shares = $1.975. $1.50 is the bonus-issue result (no cash raised); $1.90 is the subscription price."},{"type":"mcq","q":"Using the same 300m shares at $2.00, a 1-for-3 BONUS issue (100m new shares) gives a theoretical ex-bonus price of:","options":["$1.50","$1.90","$1.975","$2.00"],"correct":[0],"explain":"A bonus issue raises no capital, so $600m market cap is spread over 400m shares = $1.50. The price falls more sharply than under a rights issue because no cash is injected."},{"type":"mcq","q":"Which corporate action raises NEW capital for the company?","options":["Bonus issue","Stock split","Rights issue","Reverse stock split"],"correct":[2],"explain":"Only a rights issue injects new capital (shareholders pay a subscription price). Bonus issues, stock splits, and reverse splits change share count/price but raise no money."},{"type":"mcq","q":"Citigroup carried out a 1-for-10 reverse stock split in 2011 mainly to:","options":["Raise additional equity capital","Lift its price out of “penny stock” territory so institutions could hold it","Reward shareholders after strong performance","Make shares more affordable to retail investors"],"correct":[1],"explain":"A reverse split lifts a low share price (Citi went from $4.52 to $44.16); the US SEC treats stocks under $5 as penny stocks, which many institutions are discouraged from owning. Making shares more affordable describes a normal split."},{"type":"mcq","q":"Under SGX's dual-class share framework (since June 2018), each multiple-vote share can carry a MAXIMUM of:","options":["5 votes","10 votes","20 votes","200 votes"],"correct":[1],"explain":"To prevent founder entrenchment, each multiple-vote share is capped at 10 votes; extra votes also cannot be used on matters with founder/minority conflicts of interest."},{"type":"mcq","q":"Which statement about a value-weighted index (e.g., STI, S&P 500) is correct?","options":["A high-priced share automatically carries the most weight","It automatically adjusts for bonus and rights issues","A stock split reduces a constituent's weight in the index","All shares carry equal weight regardless of size"],"correct":[1],"explain":"Value-weighting adjusts automatically for bonus/rights issues because market cap is unchanged (lower price offset by more shares). High-price weighting and split-driven weight loss describe a PRICE-weighted index; equal weighting describes an un-weighted index."},{"type":"mcq","q":"Day-1 total market value of an index is $64,000,000 (base = 100). On Day 2 total market value is $67,000,000. The new value-weighted index value is approximately:","options":["95","100","105","134"],"correct":[2],"explain":"New index = (67,000,000 / 64,000,000) × 100 = 1.05 × 100 = 105."},{"type":"mcq","q":"A stock just paid a dividend of $1.00 (D0). Dividends are expected to grow at 5% forever and the required return is 10%. Using the constant-growth (Gordon) DDM, the fair value is:","options":["$10.00","$20.00","$21.00","$22.05"],"correct":[2],"explain":"D1 = $1.00 × 1.05 = $1.05; P0 = D1 / (r − g) = $1.05 / (0.10 − 0.05) = $21.00. $20.00 wrongly uses D0; $22.05 wrongly grows D1 again."},{"type":"mcq","q":"A share trades at $25, is expected to pay a $1.25 dividend next year (D1), and dividends grow at 6%. Using the DDM, the implied required return r is:","options":["5%","6%","11%","17%"],"correct":[2],"explain":"r = (D1/P0) + g = (1.25/25) + 0.06 = 5% + 6% = 11%. The 5% is only the dividend-yield component; r adds the growth (capital-gain) component."},{"type":"mcq","q":"A bank has ROE = 15%, required return r = 10% and sustainable growth g = 4%. Its justified price-to-book ratio is approximately:","options":["0.55x","1.00x","1.83x","2.50x"],"correct":[2],"explain":"Justified P/BV = (ROE − g)/(r − g) = (0.15 − 0.04)/(0.10 − 0.04) = 0.11/0.06 ≈ 1.83x. Because ROE > r, the share is worth more than book, so P/BV > 1."},{"type":"mcq","q":"All else equal, when market interest rates RISE, P/E ratios tend to:","options":["Rise, because earnings rise faster","Stay constant, since P/E ignores rates","Fall, because price valuations fall more than earnings","Become negative"],"correct":[2],"explain":"There is an inverse relationship: higher rates raise required returns, and price valuations fall more than earnings, so P/E ratios decline."},{"type":"mcq","q":"Which valuation ratio is LEAST appropriate for a company currently reporting negative earnings?","options":["P/E ratio","P/Sales ratio","EV/Sales ratio","P/BV ratio"],"correct":[0],"explain":"P/E cannot be used with negative earnings. P/Sales, EV/Sales (positive sales) and P/BV (cumulative, usually positive book value) remain usable."},{"type":"mrq","q":"Select all that apply: Why is EV/EBITDA often preferred over the P/E ratio?","options":["EV captures the impact of debt, allowing comparison across different capital structures","It cannot be manipulated by changing capital structure","EBITDA is closer to cash earnings and less affected by working-capital swings","It is more intuitive than share price for retail investors"],"correct":[0,1,2],"explain":"EV/EBITDA reflects debt, is capital-structure-neutral, and uses near-cash EBITDA. It is actually LESS intuitive for retail investors than a simple share-price/P/E comparison — a stated disadvantage."},{"type":"mrq","q":"Select all that apply: Which are genuine risks of investing in Depositary Receipts (DRs)?","options":["Currency risk across the DR, the underlying share, and the home currency","Counterparty risk if the depositary bank or custodian fails","Guaranteed two-way fungibility for every DR","Illiquidity if a single-listed ADR is surrendered into untraded shares"],"correct":[0,1,3],"explain":"Currency, counterparty and single-listed-surrender illiquidity are all named risks. NOT all DRs have two-way fungibility, so guaranteed fungibility is false."},{"type":"mrq","q":"Select all that apply: Which are specific IPO risks that potential investors should watch for?","options":["Vendor share sales by the issuer (offloading its own holdings)","Pre-IPO deferred shares / share options that may dilute EPS","A claw-back that shifts shares from institutional to retail when institutional take-up is weak","A lock-up (moratorium) preventing the issuer from selling shares"],"correct":[0,1,2],"explain":"Vendor sales, dilutive deferred shares/options, and the claw-back are flagged risks/red flags. A lock-up is actually a POSITIVE safeguard — the issuer's expression of confidence — not a risk."},{"type":"mcq","q":"A company's profit is being analysed: EV/Cash Flow uses (Market cap + Debt + Preferred shares − Cash) divided by operating cash flow. For Fulton Corp: price $18 on 1,000m shares, debt $400m, preferred $10m, cash $8,000m, operating cash flow $2,210m. EV/CF is approximately:","options":["3.62x","4.71x","8.33x","12.6x"],"correct":[1],"explain":"EV = (18 × 1,000) + 400 + 10 − 8,000 = $10,410m; EV/CF = 10,410 / 2,210 ≈ 4.71x. Forgetting to subtract cash or mis-handling the items gives the trap values."}]},"07":{"notes":[{"t":"h","text":"7.1 Introduction & Cash"},{"t":"p","text":"This chapter covers three basic interest-bearing asset classes: **cash**, **money market instruments**, and **fixed-income instruments**. They form a risk/return ladder: cash is the safest but pays the lowest return; money market instruments pay more; fixed-income instruments span the widest range of tenures, risks and pay-off profiles."},{"t":"p","text":"Cash is a **non-volatile, safe asset class** but pays the lowest return. Holding excess cash carries **opportunity cost** and **loss of purchasing power** to inflation. For individuals, monies are allocated to: (1) consumption, (2) business reinvestment, (3) reserves for family needs/risks, and (4) excess cash."},{"t":"h","text":"7.2 Cash Deposits & Cash-Equivalents"},{"t":"p","text":"Savings and **time (fixed) deposits** are the most common cash-equivalents. Time deposits run for a set period (3, 6, 12, even 36 months); the longer the tenor, the higher the rate, but **premature withdrawal forfeits some interest**. They are low-risk but low-yield and are a poor inflation hedge."},{"t":"p","text":"**Foreign currency deposits** can offer higher interest but carry **exchange-rate risk**. A portion of assets in a stable/stronger currency aids diversification when the local currency persistently depreciates."},{"t":"sub","text":"Deposit Insurance (DI) Scheme — Singapore"},{"t":"p","text":"Introduced 1 April 2006; administered with the **Singapore Deposit Insurance Corporation (SDIC)**. All full banks and finance companies are members unless exempted by the MAS. It protects **small depositors** if a member fails."},{"t":"key","title":"DI coverage essentials","points":["Coverage limit raised to S$100,000 per depositor per member bank (effective 1 April 2024)","Only SGD-denominated deposits qualify (savings, fixed, current accounts; CPFIS/CPFRS/SRS monies; Murabaha)","CPF deposits (CPFIS & CPFRS) are aggregated and SEPARATELY insured up to S$100,000","NOT covered: foreign currency deposits, structured deposits, unit trusts, shares and other securities","Joint-account holders are separately insured for their share; multiple banks give separate cover per bank"]},{"t":"h","text":"7.3 Fixed-Income Securities"},{"t":"def","term":"Fixed-income security","def":"A debt instrument on which the issuer is obligated to pay the lender fixed payments at agreed intervals, with return of the principal at maturity. The investor takes on issuer (default) risk."},{"t":"p","text":"Issuers include governments (manage money supply, fund budgets), government-related bodies and corporations (fund capex, acquisitions, refinance maturing debt). One major classification by credit risk splits bonds into **investment-grade** and **high-yield (junk)** bonds."},{"t":"h","text":"7.4 Money Market Instruments"},{"t":"p","text":"Debt instruments issued by governments, financial institutions and corporations with **maturities of less than one year**. Low risk due to short maturity, but minimum denomination is usually large (about S$250,000+). Primary function: a pool of near-cash reserves for liquidity. They carry almost no principal risk but high **reinvestment risk** (frequent rollover)."},{"t":"def","term":"Liquidity","def":"The ability to convert an investment into cash quickly with little or no loss in value."},{"t":"list","ordered":false,"items":["**Treasury bills (T-bills)** — short-term government securities (≤1 year), sold at a discount; yield is the benchmark risk-free rate. “Risk-free” means no risk of default on interest/principal.","**Banker's acceptance** — facilitates international trade; a claim on the issuing bank; negotiable, issued at a discount.","**Certificate of deposit (CD)** — bank certificate stating a sum deposited, with a maturity date and interest rate (usually compounding), interest paid at maturity.","**Commercial paper** — short-dated UNSECURED promissory notes; only very strong-credit corporations can issue; sold at a discount.","**Repurchase agreement (repo)** — sale of an instrument with a commitment to buy it back later at a set price; effectively a collateralised short-term loan.","**Bills of exchange** — finance international trade; payable on sight/demand or after a period (a 'term bill', commonly 91 days); negotiable by endorsement and delivery."]},{"t":"h","text":"7.5 Bonds — Terminology"},{"t":"def","term":"Coupon bond","def":"A debt security on which the issuer makes regular interest payments (coupons) on specified dates and repays the principal at maturity."},{"t":"def","term":"Par (face) value","def":"The redemption value repaid at maturity. Usually $1,000. Distinct from market value, which moves with required yield."},{"t":"def","term":"Coupon","def":"The periodic interest payment. Coupon rate × par value = dollar coupon. Paid annually or semi-annually."},{"t":"p","text":"**Term-to-maturity** is the number of years remaining. **Term bonds** have one maturity date; **serial bonds** have a series of maturity dates. The longer the maturity, the more volatile the bond price. Maturity segments: money market (≤1 yr), medium-term notes (>1 to 10 yrs), long-term bonds (>10 yrs)."},{"t":"key","title":"Benefits vs drawbacks of bonds","points":["Benefits: principal preservation, steady current income, capital gains if credit improves or yields fall","Drawbacks: no inflation adjustment, price/capital loss if sold before maturity when rates rise, illiquidity in smaller secondary markets"]},{"t":"h","text":"7.6 Price Quotations"},{"t":"p","text":"**Discount securities** (≤1 yr, e.g. T-bills, commercial paper) are quoted on a bank discount basis. **Coupon securities** (>1 yr) are quoted as a percentage of par."},{"t":"formula","name":"Yield on a bank discount basis","expr":"Yd = (D / F) × (360 / t)","where":["Yd = annualised bank-discount yield","D = dollar discount = face value − price","F = face value","t = days to maturity"]},{"t":"p","text":"Example: a 90-day T-bill, face $100,000, price $98,000 → D = $2,000; Yd = (2,000/100,000)×(360/90) = 8.0%. Note: this understates true return because it uses face value, not the amount actually invested."},{"t":"p","text":"Price basis (par $1,000): a quote of 98.50 = $985; 95¾ = $957.50. US Treasuries are quoted in 1/32 (e.g. 90-24 means 90 24/32); corporate bonds in 1/8."},{"t":"sub","text":"Clean vs Dirty Price (Accrued Interest)"},{"t":"p","text":"All fixed-income securities trade on an **accrued interest basis**: the buyer pays the quoted (clean) price PLUS interest earned since the last coupon. Clean + accrued = **dirty (full) price**. Example: an 8% bond paying semi-annual coupons on 1 Jun / 1 Dec, sold 1 Sep → seller is owed accrued interest of $80 × 3/12 = $20."},{"t":"diagram","kind":"compare","title":"Clean vs Dirty Price","colA":"Clean price","colB":"Dirty (full) price","rows":[["Quoted/headline price","Price actually paid"],["Excludes accrued interest","Includes accrued interest"],["Buyer's reference","= Clean price + accrued interest"]]},{"t":"h","text":"7.7 Bond Markets"},{"t":"p","text":"The bond market divides into the **internal bond market** (domestic + foreign-issuer bonds issued locally, e.g. Singapore) and the **external bond market**, popularly the **Eurobond market**."},{"t":"def","term":"Eurobond","def":"A bond underwritten by an international syndicate, offered simultaneously in several countries, and issued outside the jurisdiction of any single country. Named by currency (USD = Eurodollar bond; JPY = Euroyen bond)."},{"t":"p","text":"**SGS** (T-bills and bonds) are issued not to fund spending (Singapore runs balanced budgets) but to: build a liquid benchmark yield curve, encourage an active secondary market, and attract issuers/investors. SGS bonds pay fixed semi-annual coupons (tenors 2–30 yrs); T-bills are zero-coupon discount issues. Min denomination S$1,000, bid via Primary Dealers."},{"t":"p","text":"**Singapore Savings Bonds (SSB):** fully government-backed, redeemable any month with no capital loss and no penalty; interest 'steps up' over time; min S$500, max S$200,000; held full 10 years returns the average 10-yr SGS yield; interest is tax-exempt."},{"t":"sub","text":"Primary vs Secondary markets"},{"t":"p","text":"**Primary market:** bonds first issued to the public; an investment bank/syndicate underwrites and distributes for fees. Non-retail issues use an offering memorandum (prospectus-exempt); retail issues need a prospectus (or an Offer Information Statement if already SGX-listed). Evaluate credit rating, secondary liquidity, **cross-default clauses**, and ranking of claims. **Secondary market:** exchange or OTC trading; benchmarks market values/yields and the **spread over government issues** of similar maturity."},{"t":"h","text":"7.8 Types of Bonds"},{"t":"list","ordered":false,"items":["**Floating-rate bonds** — coupon periodically reset to a benchmark plus spread (e.g. 100 bps over 6-month T-bill); match floating liabilities.","**Zero-coupon bonds** — no coupons; sold at deep discount; redeemed at par. No reinvestment risk if held to maturity; but high price volatility and possible call/liquidity issues.","**Convertible bonds** — convertible into the issuer's ordinary shares at the holder's option; lower yield (holder pays for the conversion privilege).","**Covered bonds** — highly rated, backed by bank assets; cheaper to issue than unsecured bonds.","**High-yield (junk) bonds** — rated below BBB; trade on creditworthiness.","**Deferred-coupon structures** — deferred-interest (deep discount, no interest 3–7 yrs), step-up, payment-in-kind (PIK).","**Perpetual bonds** — no maturity; higher coupon for indefinite holding; usually issuer-callable after 3–5 yrs; rank before equity in default; hit hardest when rates rise."]},{"t":"h","text":"7.9 Bond Features"},{"t":"diagram","title":"Embedded options: who holds the right?","cols":["Benefits issuer","Benefits investor"],"rows":[{"label":"Call provision","cells":["Issuer may redeem early (good if rates fall); pays higher yield to compensate investor","Investor loses high-coupon bond, faces reinvestment risk, capped upside"]},{"label":"Put provision","cells":["Issuer must repurchase at par on set dates; pays for it via lower yield","Investor can 'put' bond at par when rates rise; limits downside"]}],"kind":"matrix"},{"t":"p","text":"**Call price** is usually above par; the difference is the **call premium**, higher early in life and declining toward par near maturity. **Sinking-fund provision** requires retiring some debt yearly (open-market purchase if below par, or lottery call) to reduce credit risk; a **doubling option** lets the issuer retire twice the required amount."},{"t":"sub","text":"Security & ranking of claims"},{"t":"p","text":"A **bond trust deed** specifies the issuer's promises; a **trustee** protects bondholders. Failure to pay principal or interest is legal default. Bondholders rank ahead of ordinary and preferred shareholders. **Secured (senior) bonds** are backed by collateral (e.g. mortgage bonds by real estate); **debenture** = any debt security under the SFA 2001; **subordinated (junior) bonds** rank after secured/main creditors; **income bonds** are junior — interest may be omitted if earnings are low. Parental guarantees and credit insurance can enhance credit standing."},{"t":"h","text":"7.10 Asset & Mortgage-Backed Securities; CDOs"},{"t":"p","text":"**MBS** are created by pooling/securitising mortgages; **ABS** evolved from MBS and pool non-mortgage assets (auto loans, consumer loans, credit-card receivables, royalties). Defaulting subprime MBS (Freddie Mac, Fannie Mae) were at the root of the 2007 subprime crisis."},{"t":"def","term":"Collateralised Debt Obligation (CDO)","def":"A structure (by a bank/manager via an SPV) that pools cash-flow-generating assets (bonds = CBO; loans = CLO), repackaged and sold to investors. A type of ABS used to generate fees or arbitrage the spread between asset returns and rates paid to CDO investors. CDS were often attached as 'insurance'."},{"t":"h","text":"7.11 Credit Risk & Ratings"},{"t":"def","term":"Credit (default) risk","def":"The risk the issuer cannot make timely principal and interest payments. A change in PERCEIVED credit risk can hit a bond's value immediately, even without an actual default."},{"t":"p","text":"The three largest rating agencies are **Moody's**, **S&P** and **Fitch**. S&P long-term: AAA, AA, A, BBB are **investment grade**; BB and below are **non-investment grade / high-yield / junk**. AA to CCC may carry +/− modifiers. SD = selective default; D = default."},{"t":"table","headers":["Moody's","S&P","Fitch","Meaning"],"rows":[["Aaa","AAA","AAA","Extremely strong capacity (highest)"],["Aa","AA","AA","Very strong capacity"],["A","A","A","Strong, somewhat susceptible"],["Baa","BBB","BBB","Adequate — lowest investment grade"],["Ba","BB","BB","Less vulnerable near term (speculative)"],["B","B","B","More vulnerable than BB"],["Caa","CCC","CCC","Currently vulnerable"],["Ca","CC","CC","Highly vulnerable"],["C","D","D","In default"]]},{"t":"def","term":"Credit spread","def":"The yield difference (in basis points) between two bonds of the same maturity but different credit quality — the extra return for taking on default risk. As default risk rises, bond price falls and the spread widens. Spreads widen in crises, narrow when risk appetite improves."},{"t":"p","text":"**Unrated bonds** are not necessarily poor credit; some Asian issuers simply don't seek ratings. They offer higher yields for lower transparency. Poor credit can be mitigated by: sinking funds, pledging collateral, parental guarantees, repackaging into a CDO, or credit insurance / **credit default swaps (CDS)**."},{"t":"def","term":"Credit default swap (CDS)","def":"A credit derivative acting as insurance against debt default. The buyer pays a premium for protection; the seller receives premiums and pays a lump sum if the reference debt defaults. Transfers credit exposure without transferring the underlying bond."},{"t":"diagram","kind":"flow","title":"Credit Default Swap (CDS)","steps":[{"label":"CDS buyer","sub":"pays premium"},{"label":"CDS seller","sub":"receives premium"},{"label":"On default","sub":"seller pays lump sum"}]},{"t":"p","text":"**Credit red flags:** falling projected revenue, rising/sticky costs, restrictive regulation, persistently negative operating cash flow, and frequent departures of CEO/CFO/COO/CIO/board. **Distressed debt** priced below par can be a worthwhile investment if cash flows/asset values support recovery, but losses must ultimately be borne if recovery fails."},{"t":"h","text":"7.12 Other Sources of Risk"},{"t":"list","ordered":false,"items":["**Interest-rate (price/delta) risk** — inverse: rates up → prices down; matters if sold before maturity.","**Reinvestment risk** — coupons may be reinvested at lower rates; greater for higher coupons and longer holding periods.","**Timing/call risk** — callable bonds may be redeemed when rates fall; caps upside, uncertain cash flows.","**Inflation/purchasing-power risk** — unanticipated inflation erodes real return.","**Marketability/liquidity risk** — wider bid-offer spread = greater risk.","**Exchange-rate/currency risk** — foreign-currency bonds lose value if the foreign currency depreciates vs SGD.","**Volatility (vega) risk** — affects bonds with embedded options.","**Political/legal risk** — withholding taxes, capital controls.","**Event risk** — catastrophe, regulation, takeover → rating downgrade.","**Sector risk** — industry-wide decline; reduced by diversification."]},{"t":"p","text":"Interest-rate risk and reinvestment risk make **opposite predictions** about rate moves: a rate rise pushes the price down but lets coupons be reinvested at higher rates. These are not fully offsetting — reinvestment only slightly mitigates interest-rate risk."},{"t":"h","text":"7.13 Bond Valuation"},{"t":"p","text":"A bond's value is the **present value of its expected cash flows** (coupons + principal), discounted at the required market yield k."},{"t":"formula","name":"Bond price (semi-annual)","expr":"P = Σ [ Ct / (1 + k/2)^t ] + M / (1 + k/2)^(2n)","where":["P = price today","Ct = coupon for period t","M = maturity (par) value","n = years to maturity","k = required market yield; for semi-annual, halve k and double the periods"]},{"t":"p","text":"Example: 10-yr, 8% coupon, par $1,000, required yield 6% → annual coupons price = $1,147.20; semi-annual = $1,148.77. **Zero-coupon:** P = M / (1 + k/2)^(2n). Example: 15-yr zero, par $1,000, 9% → P = 1,000/(1.045)^30 = $267."},{"t":"h","text":"7.14–7.16 Price, Coupon & Yield Relationships"},{"t":"key","title":"Coupon vs market yield → price","points":["Coupon rate = market yield → bond trades at PAR","Coupon rate < market yield → bond trades at a DISCOUNT","Coupon rate > market yield → bond trades at a PREMIUM","Inverse price-yield relationship: yields up → prices down (and vice versa)"]},{"t":"diagram","kind":"bars","title":"Price-yield relationship (10-yr, 12% semi-annual bond)","unit":"% of par","data":[{"label":"Yield 10%","value":112.46,"note":"premium"},{"label":"Yield 12%","value":100.0,"note":"par"},{"label":"Yield 14%","value":89.41,"note":"discount"}]},{"t":"p","text":"**Maturity:** longer maturity → greater price sensitivity to rate changes. **Coupon:** for equal maturity, the LOWER-coupon bond is more sensitive to rising yields (more value in the long-dated principal). **Callable feature:** caps upside and adds reinvestment risk for the investor when rates fall."},{"t":"h","text":"7.17 Duration & Convexity"},{"t":"def","term":"Duration","def":"A LINEAR measure of a bond's approximate price sensitivity to small interest-rate changes (≤100 bps). All else equal, duration is HIGHER for lower coupons, lower yields and longer maturities."},{"t":"p","text":"**Modified duration** estimates the percentage price change for a small yield change: %ΔP ≈ − Modified Duration × Δy. Portfolio duration is the weighted-average duration of holdings."},{"t":"formula","name":"Price change via modified duration","expr":"%ΔP ≈ − Modified Duration × Δy","where":["%ΔP = approximate % change in price","Modified Duration = price sensitivity measure","Δy = change in yield (decimal); e.g. +0.01 for +100 bps"]},{"t":"def","term":"Convexity","def":"The curvature of the price-yield relationship (second derivative; rate of change of duration). With POSITIVE convexity, for large rate moves price appreciation exceeds price depreciation — favourable to the investor, so higher-convexity bonds command higher prices. Lower coupon = higher convexity; zero-coupon bonds have the highest."},{"t":"diagram","kind":"compare","title":"Rising vs falling rates: duration & convexity","colA":"More duration","colB":"More convexity","rows":[["Rates rising: price falls MORE","Rates rising: price falls SLOWER"],["Rates falling: price rises MORE","Rates falling: price rises FASTER"]]},{"t":"p","text":"**Strategy:** expecting rates to FALL → INCREASE portfolio duration (maximise upside); expecting rates to RISE → DECREASE duration. Regardless of direction, investors prefer GREATER convexity. **PVBP / PV01** = the change in portfolio present value for a one-basis-point move; a risk-management limit tool."},{"t":"h","text":"7.18 Time Path of a Bond"},{"t":"p","text":"Holding all else constant, a bond's price **converges to par** as maturity approaches (it is redeemed at par). So a **discount bond rises** toward par, a **premium bond declines** toward par, and a par bond stays at par."},{"t":"h","text":"7.19 Yield Measures"},{"t":"formula","name":"Current yield","expr":"Current Yield = Annual Interest Payment / Bond Price","where":["Annual interest = coupon rate × par","Bond price = current market price"]},{"t":"p","text":"Example: 6% coupon, par $1,000, price 115% ($1,150) → current yield = $60/$1,150 = 5.22%. Current yield ignores capital gain/loss and timing."},{"t":"def","term":"Yield-to-Maturity (YTM)","def":"The discount rate that makes the PV of all the bond's cash flows equal to its current price — the return earned if bought at that price and held to maturity. Accounts for coupon income AND capital gain/loss AND timing."},{"t":"p","text":"Market convention annualises a semi-annual YTM by **doubling** it (the **bond-equivalent yield**). The proper effective annual yield = (1 + semi-annual rate)² − 1. Example: semi-annual 3% → BEY 6%, but effective annual = (1.03)² − 1 = 6.09%."},{"t":"formula","name":"Approximate YTM","expr":"Approx YTM = [ Annual Interest ± Amortised Gain/Loss ] / [ (Current Price + Par)/2 ]","where":["Amortised gain/loss = (Par − Price)/years; add if discount, subtract if premium","Denominator = average of price and par"]},{"t":"p","text":"Example: price $1,148.80, par $1,000, 8% coupon, 10 yrs. Amortised loss = (1,148.80−1,000)/10 = $14.88/yr. Approx YTM = (80 − 14.88) / [(1,148.80+1,000)/2] = 65.12/1,074.40 = 6.06%."},{"t":"p","text":"YTM is realised ONLY if coupons are reinvested at the YTM AND the bond is held to maturity. **Reinvestment risk** is greater for longer maturities and higher coupons; a zero-coupon bond held to maturity has none. **Taxable Equivalent Yield (TEY) = Tax-Exempt Yield / (1 − marginal tax rate)**; e.g. 7% tax-exempt at 28% tax → 0.07/0.72 = 9.7%."},{"t":"h","text":"7.20 Term Structure of Interest Rates"},{"t":"p","text":"The relationship between YTM and term to maturity is the **term structure** / **yield curve**. Four shapes: **rising** (most common; signals expected higher future rates), **declining/inverted** (short-term yields exceed long; signals lower future rates), **humped** (intermediate yields highest), and **flat** (short = long)."},{"t":"diagram","kind":"cycle","title":"Four yield-curve shapes","stages":[{"label":"Rising","sub":"normal; rates expected up"},{"label":"Declining","sub":"inverted; rates expected down"},{"label":"Humped","sub":"intermediate highest"},{"label":"Flat","sub":"short = long"}]},{"t":"sub","text":"Theories of the term structure"},{"t":"list","ordered":true,"items":["**Expectations theory** — the curve reflects investors' interest-rate expectations. Expecting rates to rise → lenders lend short, borrowers borrow long → upward slope. Expecting rates to fall → downward slope. A 2-yr rate ≈ the geometric average of expected 1-yr rates (e.g. 6% then 8% → [(1.06)(1.08)]^½ − 1 = 7%).","**Liquidity preference theory** — the curve should always be upward-sloping; long bonds are more volatile/less liquid, so investors demand a higher yield (liquidity premium) to hold them.","**Market segmentation theory** — investors have maturity preferences set by their liabilities (life insurers want long, banks want short); yield in each maturity 'segment' is set by its own supply and demand."]},{"t":"h","text":"7.21 Analysis of Convertible Bonds"},{"t":"p","text":"A **convertible bond** gives the holder the right to convert into a set number of the issuer's ordinary shares. (An **exchangeable bond** converts into shares of a DIFFERENT company.) The conversion 'sweetener' lets the issuer pay a lower coupon. Treat it as a straight bond PLUS a call option on the shares."},{"t":"p","text":"Worked example (Genesis CB): par $1,000; coupon 4% semi-annual; conversion ratio 40; CB market price $1,100; share price $24; dividend $0.35/share; comparable straight-bond yield 8% → investment value $728."},{"t":"formula","name":"Conversion value","expr":"Conversion Value = Conversion Ratio × Market Share Price","where":["Conversion ratio = shares per bond (40)","Example: 40 × $24 = $960"]},{"t":"formula","name":"Conversion price & ratio","expr":"Conversion Ratio = Par / Conversion Price   ;   Conversion Price = Par / Conversion Ratio","where":["Par = $1,000","Genesis: conversion price = 1,000/40 = $25"]},{"t":"formula","name":"Conversion parity (breakeven) price","expr":"Conversion Parity Price = Market Price of CB / Conversion Ratio","where":["Genesis: 1,100/40 = $27.50","The share-price breakeven; above it, CB tracks the share"]},{"t":"formula","name":"Conversion premium","expr":"Premium ($) = Market Value of CB − Conversion Value ; Premium (%) = (Market Value − Conversion Value)/Conversion Value","where":["Genesis: $1,100 − $960 = $140","% = 140/960 = 14.6%"]},{"t":"p","text":"**Minimum value of a convertible** = the GREATER of its conversion value and investment value. Genesis: max($960, $728) = $960. If it sold below $960, arbitrageurs would buy, convert, and sell the shares for a profit."},{"t":"formula","name":"Breakeven (payback) time","expr":"Breakeven = Conversion Premium / (Bond Income − Dividend Income)","where":["Bond income = 4% × 1,000 = $40","Dividend income = 40 × $0.35 = $14","Genesis: 140 / (40−14) = 140/26 = 5.38 years (ignores time value)"]},{"t":"p","text":"**Downside risk = Premium over straight value = (Market Price / Investment Value) − 1**; Genesis: 1,100/728 − 1 = 51% (flawed because straight value shifts with the discount rate). Convertibles offer upside participation with downside protection: yield above the share's dividend yield but below a comparable plain-vanilla bond."}],"newQuestions":[{"type":"mcq","q":"Under the Singapore Deposit Insurance (DI) Scheme (effective 1 April 2024), what is the coverage limit per depositor per member bank?","options":["S$50,000","S$75,000","S$100,000","S$200,000"],"correct":[2],"explain":"The limit was raised to S$100,000 effective 1 April 2024 (from S$75,000). CPF monies are separately insured up to a further S$100,000."},{"type":"mrq","q":"Select all financial products that are NOT covered by the Singapore DI Scheme.","options":["Foreign currency deposits","SGD fixed deposit accounts","Structured deposits","Unit trusts and shares"],"correct":[0,2,3],"explain":"Only SGD-denominated deposits (savings, fixed, current, plus CPFIS/CPFRS/SRS and Murabaha) qualify. Foreign currency deposits, structured deposits, and securities such as unit trusts/shares are excluded."},{"type":"mcq","q":"Which money market instrument is an UNSECURED short-dated promissory note issuable only by very strong-credit corporations?","options":["Banker's acceptance","Commercial paper","Certificate of deposit","Treasury bill"],"correct":[1],"explain":"Commercial paper is unsecured, so only corporations with very strong credit ratings can issue it. A banker's acceptance is a claim on the issuing bank; a CD is backed by a bank deposit; a T-bill is government debt."},{"type":"mcq","q":"A 90-day T-bill with a face value of $100,000 is selling for $97,500. What is the yield on a bank discount basis (using a 360-day year)?","options":["2.50%","9.74%","10.00%","2.56%"],"correct":[2],"explain":"D = 100,000 − 97,500 = 2,500. Yd = (2,500/100,000) × (360/90) = 0.025 × 4 = 10.0%. Distractors use the wrong base (price) or omit annualisation."},{"type":"mcq","q":"A buyer purchases a bond between coupon dates. The price the buyer actually pays the seller is BEST described as the:","options":["Clean price","Dirty (full) price = clean price + accrued interest","Par value","Call price"],"correct":[1],"explain":"All fixed-income securities trade on an accrued-interest basis: the buyer pays the quoted (clean) price plus interest accrued since the last coupon, i.e. the dirty/full price."},{"type":"mcq","q":"An 8% coupon bond ($1,000 par) pays semi-annual coupons on 1 March and 1 September. If it is sold on 1 June, what accrued interest is owed to the seller?","options":["$10","$20","$40","$26.67"],"correct":[1],"explain":"Annual coupon = $80; 1 March to 1 June is 3 months. Accrued interest = $80 × 3/12 = $20."},{"type":"mcq","q":"A 10-year bond with a 6% coupon and $1,000 par is priced at $1,200. What is its current yield?","options":["6.00%","5.00%","7.20%","4.80%"],"correct":[1],"explain":"Current yield = annual interest / price = $60 / $1,200 = 5.00%. The 6% trap uses par, not market price."},{"type":"mcq","q":"A bond is trading at a DISCOUNT to par. This indicates that:","options":["The coupon rate equals the market yield","The coupon rate is lower than the market yield","The coupon rate is higher than the market yield","The bond has no coupon"],"correct":[1],"explain":"When the coupon rate is below the prevailing market yield, the price must fall below par to compensate investors with a higher effective yield — it sells at a discount."},{"type":"mcq","q":"Using the approximate-YTM formula, estimate the YTM of a 5-year, 7% coupon bond ($1,000 par) priced at $900.","options":["7.00%","9.74%","9.47%","8.04%"],"correct":[2],"explain":"Amortised gain = (1,000−900)/5 = $20/yr (added, since discount). Approx YTM = (70 + 20) / [(900+1,000)/2] = 90/950 = 9.47%."},{"type":"mcq","q":"A bond portfolio has a modified duration of 6. If market yields rise by 50 basis points, the approximate change in the portfolio's value is:","options":["+3.0%","−3.0%","−0.5%","+6.0%"],"correct":[1],"explain":"%ΔP ≈ −Modified Duration × Δy = −6 × 0.005 = −0.03 = −3.0%. Rising yields lower the price; the sign and magnitude both matter."},{"type":"mrq","q":"Select all factors that, all else equal, INCREASE a bond's duration.","options":["Lower coupon rate","Lower yield","Longer maturity","Higher coupon rate"],"correct":[0,1,2],"explain":"Duration is higher for lower coupons, lower yields, and longer maturities. A higher coupon REDUCES duration."},{"type":"mcq","q":"An investor expects interest rates to FALL. To maximise the portfolio's gain, the manager should:","options":["Decrease portfolio duration","Increase portfolio duration","Hold only floating-rate bonds","Sell all bonds with positive convexity"],"correct":[1],"explain":"Falling rates raise bond prices; a higher duration amplifies the price gain, so duration should be increased. (When rates are expected to rise, duration should be reduced.)"},{"type":"mcq","q":"Which statement about convexity is CORRECT?","options":["Higher coupon bonds have the highest convexity","Zero-coupon bonds have the highest convexity","Convexity is a linear measure of price change","Negative convexity favours the investor"],"correct":[1],"explain":"Lower coupon means higher convexity; zero-coupon bonds have the highest. Convexity captures curvature (not linear), and positive (not negative) convexity favours the investor."},{"type":"mcq","q":"Over time, holding all else constant, the price of a PREMIUM bond will:","options":["Rise further above par","Decline toward par","Stay constant above par","Fall below par then recover"],"correct":[1],"explain":"A bond is redeemed at par, so its price converges to par as maturity ap
