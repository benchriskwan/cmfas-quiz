tions":["A BLN sells a put on a bond with a strike; a CLN sells a CDS on a reference entity","A BLN payout depends on the bond price; a CLN payout depends on a credit event","A BLN investor may end up owning a bond even with no credit event","A CLN can be affected by credit downgrades and widening spreads but a BLN cannot"],"correct":[0,1,2],"explain":"A BLN embeds a short put on a bond (price-driven, can convert even without default), while a CLN sells a CDS (credit-event-driven). Option 4 is reversed - it is the BLN whose bond price reacts to downgrades and spreads."}]},"09":{"notes":[{"t":"h","text":"What Are Structured Funds?"},{"t":"p","text":"**Structured funds** are investment portfolios that combine financial instruments — equities, fixed income securities and/or **derivatives** — to achieve specific risk-return profiles or cost savings. While they typically combine securities and derivatives, a structured fund can also invest **only in derivatives** (e.g., a Total Return Swap)."},{"t":"def","term":"Structured fund","def":"A fund created through financial engineering that combines underlying securities (shares, bonds, notes, warrants, indices) with derivatives (options, forwards, swaps, CDOs/CDS) to deliver a targeted risk-return profile. Note: the term applies only for the purposes of the CM-SIP exam."},{"t":"p","text":"Funds offering some level of **capital preservation** aim to earn a market-linked return while protecting against a market decline. Crucially, **capital preservation is not a full guarantee**: it fails if the issuer becomes insolvent, so investors still bear **counterparty risk**."},{"t":"key","title":"Capital preservation — key conditions","points":["Usually a fixed-maturity scheme, typically more than 3 years","Capital is preserved only on 100% of capital invested LESS the upfront sales charge","Applies only if the investor holds to maturity","Limitations are disclosed in the prospectus","No full guarantee — issuer insolvency defeats preservation"]},{"t":"p","text":"Structured funds are governed by the **Code on Collective Investment Schemes (Code on CIS)** under the **Securities & Futures Act 2001 (SFA)**. They may only be managed by an asset management company holding a **Capital Markets Services (CMS) licence**. Fund managers owe a **fiduciary duty** to act in investors' best interests, including getting best execution. Structured funds must publish regular **NAVs** under the Code on CIS — structured notes and structured deposits need not."},{"t":"sub","text":"Two major types of structured funds"},{"t":"list","ordered":true,"items":["Based on **derivatives** (e.g., Total Return Swaps, Zero Plus Option strategy)","Based on **portfolio insurance** techniques (e.g., Constant Proportion Portfolio Insurance, CPPI)"]},{"t":"h","text":"Common Terminology"},{"t":"def","term":"Asset Allocation","def":"Dividing investments across asset kinds (equities, fixed income, money market, commodities, real estate) to optimise the risk/reward trade-off based on objectives, risk tolerance and horizon."},{"t":"def","term":"Assets under Management (AUM)","def":"Market value of assets a manager runs for investors. A measure of success; changes with capital appreciation/loss and inflows/outflows."},{"t":"def","term":"Closed-End Fund","def":"A publicly traded investment company that raises a fixed amount of capital via IPO, then lists and trades like a stock. Prices move with supply/demand and underlying values, so it can trade at a premium or discount to NAV."},{"t":"def","term":"Open-End Fund","def":"A fund with no restriction on shares issued; it continuously issues new shares and buys back shares when investors sell. Most mutual funds / unit trusts are open-ended."},{"t":"def","term":"Collective Investment Scheme (CIS)","def":"An arrangement letting investors pool assets to be professionally managed by an independent manager (defined in s.2(1) SFA)."},{"t":"def","term":"Cushion","def":"The portion of a fund's assets that can be exposed to risk without jeopardising the preservation feature. E.g., a SGD 100 fund needing SGD 80 to honour preservation has a SGD 20 cushion."},{"t":"def","term":"Multiplier","def":"In CPPI, the coefficient used to multiply the cushion to calculate the portfolio's risky-asset exposure. Multiplier = 1 / Crash Size."},{"t":"def","term":"NAV (Net Asset Value)","def":"The fund's price per share/unit = (total assets − liabilities) / number of shares outstanding."},{"t":"def","term":"Total Return Swap (TRS)","def":"A swap where one party pays a set rate (fixed or floating) and the other pays the total return of an underlying asset."},{"t":"def","term":"Total Expense Ratio (TER)","def":"Total costs of running a fund (management plus legal, audit, operational fees) divided by total assets; usually a percentage. Trading fees, interest and brokerage may be excluded."},{"t":"def","term":"Sharpe Ratio","def":"Risk-adjusted performance = (portfolio return − risk-free rate) / standard deviation of portfolio returns."},{"t":"def","term":"Value-at-Risk (VaR)","def":"A statistical estimate of potential loss over a time frame at a given probability; three variables — amount of loss, probability, time frame."},{"t":"def","term":"Drawdown","def":"The peak-to-trough reduction in a fund's assets over a period, usually quoted as the percentage between highest and lowest NAV."},{"t":"def","term":"Zero-Coupon Bond","def":"A fixed-income instrument paying no interest during its tenor; sold at a discount and redeemed at full face value at maturity."},{"t":"def","term":"UCITS","def":"Undertakings for the Collective Investment of Transferable Securities (first adopted 1986). A UCITS-compliant fund can be passported and freely marketed across the 30 EEA countries."},{"t":"def","term":"SICAV / Umbrella Fund","def":"SICAV is an open-ended investment company with variable capital (common in Luxembourg, Switzerland, etc.). An umbrella fund is one legal entity holding several distinct sub-funds traded individually; a SICAV is one such arrangement."},{"t":"def","term":"Trailer Fee","def":"Fee an asset manager pays a distributor/representative in lieu of ongoing investment advice and service to investors."},{"t":"h","text":"How Structured Funds Differ from Other Products"},{"t":"sub","text":"vs Traditional Funds"},{"t":"list","ordered":false,"items":["Most closed-end structured funds carry **fixed maturity dates** (e.g., 2-5 years) with assets distributed at maturity; traditional funds tend to be open-end and long-running","Structured funds **replicate the underlying or provide a synthetic return** via derivatives; allocation is **static or rule-based** and the view can be long, short or market-neutral","They carry a **wider variety of risks** (credit/counterparty, equity, FX, interest-rate, volatility, political, correlation). Counterparty risk is more present than in traditional mutual funds"]},{"t":"sub","text":"vs Trackers (index funds)"},{"t":"p","text":"Trackers simply replicate a benchmark. Structured funds can **deviate in allocation** to realise market views, carry **variable exposure** that adjusts systematically with markets, and make adjustments to deliver the promised **capital preservation and participation**."},{"t":"diagram","kind":"compare","title":"Structured Fund vs Tracker","colA":"Structured Fund","colB":"Tracker (Index Fund)","rows":[["Can deviate to express market views","Simply replicates benchmark"],["Variable, systematically adjusted exposure","Fixed full/sample replication"],["Aims at capital preservation + participation","Passive matching only"],["Higher fees; uses derivatives","Lower management expenses"]]},{"t":"h","text":"Components of a Structured Fund"},{"t":"p","text":"Four key set-up considerations: **Underlying assets & derivatives used**, **Maturity period**, **Payout structure**, and **Market outlook**."},{"t":"table","headers":["Component","Examples / Choices"],"rows":[["Underlying & derivatives","FX, bonds/credit, equities, commodities, interest rates, proprietary indices, real estate (+ derivatives)"],["Maturity","1 year; 2-5 years; >5 years; or no maturity (open-end)"],["Payout","Fixed/variable coupon; participative returns on the underlying; or a combination"],["Market outlook","Bullish, bearish or neutral — drives the strategy"]]},{"t":"p","text":"**Example:** an S&P 500 structured fund preserving 80% of principal invests 80% in fixed income (low chance of falling below principal) and the rest in **derivatives** exposed to the S&P 500. Investors gain as the index rises and are unlikely to lose more than 20% if it falls. Unlike structured deposits/notes (fees embedded in pricing), structured funds usually charge **separate** management and administration fees."},{"t":"h","text":"Structured Funds Using Derivatives"},{"t":"p","text":"Derivatives can fully replicate the price movement of an underlying. Funds with **indirect exposure** track the underlying synthetically rather than holding it directly. Derivatives may form 100% of the fund (e.g., TRS) or combine with assets to enhance returns and limit downside (e.g., Zero Plus Option)."},{"t":"sub","text":"Total Return Swap (TRS)"},{"t":"p","text":"A fund wanting the **Straits Times Index (STI)** total return could buy the 30 constituent shares or trade STI futures (both need active management). Alternatively it enters a TRS: it **receives the STI total return** on a notional, and **pays SIBOR + spread** (e.g., SIBOR + 30bps) — achieving index exposure at a 30bps cost."},{"t":"diagram","kind":"flow","title":"Total Return Swap structure","steps":[{"label":"Fund","sub":"pays SIBOR + spread"},{"label":"TRS","sub":"swap on notional"},{"label":"Bank","sub":"pays STI total return"}]},{"t":"sub","text":"Zero Plus Option Strategy"},{"t":"p","text":"To create a 10-year product preserving 100% of capital plus STI upside: invest ~80% in a **zero-coupon bond** (worth 80% of face today, projected to grow to 100% in 10 years — not guaranteed), and the remaining 20% in a **10-year STI call option**. If the call costs 25% and only 20% is available, the **participation rate = 20/25 = 80%**."},{"t":"formula","name":"Participation rate (Zero Plus Option)","expr":"Participation = Capital for option / Option price","where":["Capital for option = % of fund left after buying the zero-coupon bond","Option price = cost of the call as % of capital"]},{"t":"h","text":"Constant Proportion Portfolio Insurance (CPPI)"},{"t":"def","term":"CPPI","def":"A totally rule-based, non-discretionary trading strategy that continuously rebalances between performance (risky) assets and safe assets using a set formula, to ensure a minimum return (e.g., 80-100% of capital) at maturity while allowing participation in rising markets."},{"t":"p","text":"A CPPI product dynamically allocates between a **risk-free reserve asset** (e.g., a zero-coupon bond) and a **risky active asset** (equity index, equity fund or hedge fund). When risky assets fall, exposure is automatically cut in favour of fixed income, and vice versa. If no derivatives are used it is merely disciplined asset allocation — adding derivatives like **put options** limits downside and makes it a structured fund."},{"t":"sub","text":"How CPPI works — the mechanics"},{"t":"list","ordered":true,"items":["**Asset allocation** — rebalanced periodically (usually monthly). Cushion = total portfolio value − floor value","**Floor value** — changes over the life with term-to-maturity and yield curve; approaches 100% of principal as maturity nears","**Crash size** — the assumed worst one-period % drop in the risky asset","**Multiplier = 1 / Crash Size** — e.g., a 20% crash assumption gives multiplier 5","**Risky-asset allocation = Multiplier × Cushion**"]},{"t":"formula","name":"CPPI risky-asset exposure","expr":"Exposure = Multiplier × (Assets − Floor)","where":["Exposure = amount allocated to the risky asset","Multiplier = 1 / Crash Size","Assets = total portfolio value","Floor = floor (preservation) value","(Assets − Floor) = the Cushion"]},{"t":"p","text":"**Worked example:** cushion = 15%, multiplier = 5 → risky-asset allocation = 5 × 15% = **75%**. The remaining 25% sits in the safe asset."},{"t":"diagram","kind":"cycle","title":"CPPI rebalancing cycle","stages":[{"label":"Measure cushion","sub":"Assets − Floor"},{"label":"Compute exposure","sub":"Multiplier × Cushion"},{"label":"Rebalance","sub":"shift risky vs safe"},{"label":"Repeat","sub":"each interval"}]},{"t":"p","text":"To better secure principal, the manager may **buy insurance** from a bank to guarantee the principal at maturity, typically for ~1% p.a. If the portfolio drops to the floor, the **entire fund moves into the risk-free asset**, locking out future upside."},{"t":"sub","text":"Risks of CPPI"},{"t":"p","text":"CPPI assumes the underlying **appreciates over time, has low volatility and limited drawdown**. In a **range-bound (whipsaw) market** the rules force the manager to **buy high and sell low**. A prolonged sideways market raises the chance of hitting the floor (\"cash lock\"), forgoing later gains. CPPI products also have **high fees** (structuring, sales, guarantee, management) and **little secondary-market liquidity** — investors should expect to hold to maturity."},{"t":"sub","text":"Dynamic Proportion Portfolio Insurance (DPPI)"},{"t":"p","text":"DPPI (also Dynamic Portfolio Insurance, DPI) is like CPPI but the **multiplier is variable, not constant** — e.g., it floats within a band of 3-5× the cushion, starting at 4× and rebalancing back to 4× when it breaches the band."},{"t":"h","text":"Common Fund Structures"},{"t":"list","ordered":false,"items":["**Capital-preserving funds** — preserve a proportion, allocate the rest to risky assets or derivatives","**Formula funds** — final payout follows a pre-defined, rule-based formula; allocations known from the start; often track indices","**Capitalised (accumulating) funds** — dividends reinvested; **Distributing (income) funds** — dividends paid out periodically","**Indirect investment policy (swap-based) funds** — return linked to the underlying via derivatives rather than direct holding"]},{"t":"p","text":"Most popular structured funds use **equities** as the underlying; others use commodities or hybrids. A **high fixed coupon forces a low participation ratio** in the underlying, reducing variable payouts."},{"t":"h","text":"Roles: Fund Manager and Trustee"},{"t":"p","text":"The **fund manager** manages and invests assets per the investment objective and restrictions, prepares semi-annual/annual accounts and reports for the trustee, and handles **creation and redemption of units** — and is responsible for performance."},{"t":"p","text":"The **trustee** must be **independent** of the manager and protects unit holders' interests: acts in a fiduciary capacity, ensures the CIS follows objectives/restrictions, ensures proper records and audit, takes **legal ownership** of all CIS assets (held separately from the manager), informs **MAS within 3 business days** of any breach, and minimises mismanagement risk."},{"t":"key","title":"Reporting timelines","points":["Semi-annual reports: within 2 months of period end","Annual reports: within 3 months of period end","Breach notification to MAS: within 3 business days"]},{"t":"p","text":"**Conflicts of interest** arise when affiliated group entities act as swap counterparties or valuation agents without a fiduciary role. Mitigants include **Chinese walls**, separate reporting lines, and board oversight to resolve conflicts fairly."},{"t":"h","text":"Risk Management & Documentation"},{"t":"p","text":"A structured fund's risk is **financial, operational or legal**. Controls include operational checks (order assignment, execution-price control, settlement, valuation, reconciliation), financial techniques (**stress-testing, VaR, duration**, exposure/diversification limits), dedicated legal teams, an **independent trustee**, and **annual audits** of each entity (management company, investment manager, administrative agent, custodian)."},{"t":"list","ordered":false,"items":["**Prospectus** — detailed booklet: objectives, past performance, manager, fees, risks, subscription/realisation terms, conflicts of interest","**Product Highlights Sheet (PHS)** — summary of key features and risks","**Trust Deed** — legal document setting terms between investors, manager and trustee; the trustee acts as custodian and ensures compliance"]},{"t":"sub","text":"Investors and offers"},{"t":"p","text":"Both retail and institutional investors can subscribe; **restricted schemes** are offered only to accredited investors, other relevant persons, and those subscribing **SGD 200,000 or more per transaction**. A **retail offer requires a prospectus lodged/registered with MAS**; offers to accredited/institutional investors do **not** require a prospectus/information memorandum."},{"t":"h","text":"Exchange Traded Funds (ETFs)"},{"t":"def","term":"ETF","def":"An open-end investment fund that aims to replicate the performance of a published market index, listed and traded on a stock exchange so investors can buy/sell units intraday."},{"t":"p","text":"ETFs give diversified exposure to all constituents of an index without buying each asset. Beyond tracking, some track **volatility**, some track only **daily price movement**, and some are **leveraged (2-3x)** or **inverse**. The global ETF industry surpassed **USD 7.7 trillion in 2020**, with the **US ~70%** of AUM."},{"t":"sub","text":"Types of ETFs"},{"t":"list","ordered":false,"items":["Equity, Fixed Income, Cash, Currency, Commodities, Indices, Alternative Assets","**Exotic ETFs** — leveraged ETFs (aim to hold constant leverage, e.g., 2:1 or 3:1) and inverse/short/bear ETFs (replicate the index in the opposite direction to profit from declines)"]},{"t":"h","text":"ETF Replication: Physical vs Synthetic"},{"t":"p","text":"**Direct (physical / cash-based) replication** invests in the index's actual constituents — either **full replication** (all constituents in exact proportion) or **representative sampling** (a subset, used when some constituents are illiquid)."},{"t":"p","text":"**Synthetic replication** uses derivatives/OTC transactions instead of holding the assets: **derivative-embedded** (buys futures/options/P-notes from counterparties for the index performance) or **swap-based** (pays a fee or collateral performance to a counterparty in exchange for index performance)."},{"t":"diagram","kind":"compare","title":"Physical vs Synthetic ETF","colA":"Physical (Direct)","colB":"Synthetic","rows":[["Holds actual index constituents","Uses swaps/derivatives, no direct holding"],["Higher tracking error (generally)","Lower tracking error (generally)"],["Counterparty risk mainly via securities lending","Counterparty risk of swap dealer / derivative issuer"],["Dominant in the US","Dominant in Europe (post-UCITS III)"]]},{"t":"sub","text":"Counterparty exposure limit & collateral"},{"t":"p","text":"Under the **Code on CIS / UCITS**, net counterparty exposure is capped at **10% of NAV**. So investors risk losing at most ~10% of the fund's value on a counterparty default; the counterparty typically posts **collateral for the other 90%**, owned by the ETF's trustee. Under **UCITS III**, the swap's mark-to-market cannot exceed 10% of NAV on a daily basis (can be reduced below 10% voluntarily)."},{"t":"diagram","kind":"flow","title":"Swap-based (synthetic) ETF","steps":[{"label":"Investors","sub":"buy ETF units"},{"label":"ETF","sub":"pays collateral return"},{"label":"Swap counterparty","sub":"delivers index performance"}]},{"t":"sub","text":"Swap collateralisation structures"},{"t":"list","ordered":false,"items":["**Unfunded swap** — manager uses unit-sale proceeds to buy collateral held by a third-party custodian and pledged to the ETF; rebalanced daily so collateral is at least 90% of NAV","**Funded swap** — ETF transfers proceeds to the swap counterparty, who buys collateral placed with a third-party custodian and pledged to the ETF","**Funded + unfunded** — a combination of both; all aim to cap counterparty exposure at 10% of NAV"]},{"t":"h","text":"Leveraged & Inverse ETFs and the Daily-Rebalancing Effect"},{"t":"p","text":"Leveraged ETFs aim to deliver a **constant** multiple (e.g., 2x or 3x) of the index's **daily** return; inverse ETFs deliver a negative multiple (e.g., -1x, -2x) of the daily return. To keep leverage constant, the fund **rebalances exposure daily**. Over multiple days this causes **compounding / path dependency** — the multi-day return is generally NOT the simple multiple of the index's multi-day return, and the gap widens in volatile, choppy markets."},{"t":"diagram","kind":"cycle","title":"Daily rebalancing of a leveraged ETF","stages":[{"label":"Market moves","sub":"index changes"},{"label":"Leverage drifts","sub":"≠ target multiple"},{"label":"Rebalance daily","sub":"restore 2x/3x"},{"label":"Compound","sub":"path-dependent"}]},{"t":"p","text":"**Example of decay (volatility drag):** a 2x ETF on an index that rises 10% then falls 10%. Index: 100 → 110 → 99 (−1.0%). The 2x ETF: each day moves twice the daily %: +20% then −20% → 100 → 120 → 96 (**−4.0%**), worse than 2× the index's −1.0% (which would be −2.0%). Choppy markets erode leveraged/inverse ETF value even if the index ends roughly flat."},{"t":"diagram","kind":"bars","title":"Daily exposure per $100 invested","unit":"x","data":[{"label":"3x leveraged ETF","value":3,"note":"$300 exposure"},{"label":"2x leveraged ETF","value":2,"note":"$200 exposure"},{"label":"Standard ETF","value":1},{"label":"-1x inverse ETF","value":1,"note":"short $100"}]},{"t":"p","text":"**Market risk is severe** for these products: several inverse VIX ETNs/ETFs were shut down after VIX futures spiked over 100% in 2018; survivors' investors still lost at least 70% even after VIX returned to prior levels."},{"t":"h","text":"ETF Pricing, Valuation & Tracking Error"},{"t":"p","text":"**NAV** is calculated once at day's end; the **trading price** can differ — an ETF can trade at a **premium or discount** to NAV due to supply/demand, illiquid underlyings, restricted markets (e.g., China A-shares), or time-zone differences. Arbitrage by APs/market-makers normally keeps price close to NAV."},{"t":"def","term":"Tracking error","def":"The disparity in performance between an ETF and its underlying index."},{"t":"p","text":"Sources of tracking error: **transaction/swap costs, differing portfolio holdings, replication methodology, type of investment (e.g., futures roll / contango / backwardation), cash drag** (uninvested dividends), and **currency-hedging costs**."},{"t":"key","title":"Tracking error rules of thumb","points":["Generally LOWER for synthetic replication than physical (swap counterparty bears it)","Generally HIGHER for volatile benchmarks such as emerging markets","Widens if creation/redemption fails, pushing price to a premium/discount"]},{"t":"formula","name":"Tracking difference","expr":"Tracking difference = ETF return − Index return","where":["ETF return = total return of the ETF over the period","Index return = total return of the benchmark over the same period","A negative figure means the ETF underperformed (e.g., due to fees/TER)"]},{"t":"p","text":"The **TER** is an annual fee (% or bps) covering management, admin, licence and operational costs; it is accrued **daily** in the NAV and deducted on a running basis. As passive instruments, ETFs typically charge lower fees than active funds."},{"t":"h","text":"ETFs vs Related Products & Governance"},{"t":"p","text":"**ETNs** are debt securities issued by banks (typically senior, unsecured), not subject to fund diversification rules — investors bear the issuer's counterparty risk. **ETCs** are a special ETN backed by securities/physical assets (e.g., gold) used to gain commodity exposure under European rules. **VIX ETNs** roll VIX futures daily and can be very volatile, diverging from the spot VIX."},{"t":"p","text":"**ETFs vs mutual funds:** ETFs offer two liquidity sources — **primary** (creation/redemption via an Authorised Participant) and **secondary** (intraday exchange trading). Mutual funds trade only at end-of-day NAV. **Governance:** US ETFs launched under the **Investment Company Act of 1940** (SEC jurisdiction), mostly physical; European synthetic (swap-based) ETFs grew under **UCITS III** from 2001."},{"t":"sub","text":"Key ETF risks"},{"t":"list","ordered":false,"items":["**Market risk** — can force closure after extreme moves","**Tracking error**","**Premium/discount to NAV**","**FX risk** for foreign-currency exposures","**Liquidity risk** if market-makers default/withdraw","**Counterparty risk** — physical via securities lending; synthetic via swap dealers/derivative issuers; futures-based also bear basis and roll risk"]}],"newQuestions":[{"type":"mcq","q":"Which statement about the capital preservation feature of a structured fund is MOST accurate?","options":["It fully guarantees 100% of capital regardless of the issuer's solvency","It preserves 100% of capital invested less the upfront sales charge, only if held to maturity","It preserves capital plus all accrued coupons at any time the investor redeems","It is guaranteed by MAS under the Code on CIS"],"correct":[1],"explain":"Preservation applies to 100% of capital invested less the upfront sales charge and only if held to maturity; it is not a full guarantee because issuer insolvency (counterparty risk) defeats it."},{"type":"mcq","q":"Under the CPPI technique, a fund has total assets of SGD 100 and a floor value of SGD 84. If the multiplier is 4, what is the allocation to the risky asset?","options":["SGD 16","SGD 64","SGD 84","SGD 336"],"correct":[1],"explain":"Cushion = Assets − Floor = 100 − 84 = 16. Exposure = Multiplier × Cushion = 4 × 16 = SGD 64. SGD 16 is just the cushion; SGD 336 wrongly multiplies the floor."},{"type":"mcq","q":"A CPPI manager assumes the largest one-period crash in the risky asset is 25%. What multiplier should be used?","options":["2.5","4","25","0.25"],"correct":[1],"explain":"Multiplier = 1 / Crash Size = 1 / 0.25 = 4. The crash size is the percentage drop assumed in a single period."},{"type":"mcq","q":"A CPPI portfolio is worth 100 with a floor of 90 and a multiplier of 5. The required risky-asset allocation would be 50 (5 × 10). What does this imply about the constraint on exposure?","options":["The fund must short the risky asset","Allocation can exceed 100% so leverage may be implied at high cushions","The cushion must always equal the floor","Exposure is capped at the floor value"],"correct":[1],"explain":"Exposure = Multiplier × Cushion can exceed 100% of assets when the cushion is large relative to the multiplier (the example fund cap was 120%), implying leverage; here 50% is within limits but the formula itself is unbounded except by stated caps."},{"type":"mcq","q":"In the Zero Plus Option strategy, a fund places 80% in a zero-coupon bond and has 20% to buy a call option priced at 40% of capital. What is the participation rate in the underlying index?","options":["20%","40%","50%","80%"],"correct":[2],"explain":"Participation = capital for option / option price = 20% / 40% = 50%. The higher the option price relative to available capital, the lower the participation."},{"type":"mcq","q":"A 2x leveraged ETF tracks an index that rises 10% on Day 1 and falls 10% on Day 2. Starting at $100, what is the ETF's value after Day 2 (assuming daily rebalancing, ignoring fees)?","options":["$98","$96","$100","$104"],"correct":[1],"explain":"Day 1: +20% → $120. Day 2: −20% → $96. The −4% result is worse than 2× the index's −1% (which would be −2%), illustrating volatility drag / path dependency from daily rebalancing."},{"type":"mcq","q":"An index returns +5% on Day 1 and +5% on Day 2. A -1x inverse ETF starting at $100 (daily rebalancing, ignoring fees) ends at approximately:","options":["$90.00","$90.25","$89.75","$110.25"],"correct":[1],"explain":"The inverse ETF moves opposite each day: Day 1 −5% → $95; Day 2 −5% → $95 × 0.95 = $90.25. The ~−9.75% result differs from a simple −10%, showing daily-rebalancing path dependency."},{"type":"mcq","q":"An ETF returns 6.2% over a year while its benchmark index returns 7.0%. The tracking difference is:","options":["+0.8%","−0.8%","+13.2%","−13.2%"],"correct":[1],"explain":"Tracking difference = ETF return − Index return = 6.2% − 7.0% = −0.8%, indicating underperformance, commonly driven by the TER and other costs."},{"type":"mcq","q":"Which is generally TRUE about tracking error across ETF replication methods?","options":["Tracking error is generally higher for synthetic than physical replication","Tracking error is generally lower for synthetic than physical replication","Tracking error is always zero for full replication","Emerging-market benchmarks have the lowest tracking error"],"correct":[1],"explain":"Tracking error is generally lower for synthetic replication because the swap counterparty is obliged to deliver index performance; emerging-market (high-volatility) benchmarks tend to have higher, not lower, tracking error."},{"type":"mcq","q":"Under the Code on CIS / UCITS, the maximum net counterparty exposure for a synthetic ETF is:","options":["5% of NAV","10% of NAV","25% of NAV","90% of NAV"],"correct":[1],"explain":"Net counterparty exposure is capped at 10% of NAV, so investors risk losing at most about 10% on a counterparty default; the counterparty typically collateralises the remaining 90%."},{"type":"mcq","q":"In an UNFUNDED swap-based ETF, who holds the collateral pool and how often is it rebalanced?","options":["The swap counterparty; rebalanced annually","A third-party custodian, owned by the ETF; rebalanced daily to at least 90% of NAV","The fund manager directly; never rebalanced","MAS; rebalanced monthly"],"correct":[1],"explain":"In the unfunded structure the manager uses unit-sale proceeds to buy collateral held by a third-party custodian and pledged to the ETF, rebalanced daily so it is at least 90% of NAV."},{"type":"mcq","q":"Which body of law governs structured funds in Singapore, and what licence must the manager hold?","options":["The Banking Act; an MAS deposit-taking licence","The Code on CIS under the SFA; a Capital Markets Services (CMS) licence","The Companies Act; an ACRA registration only","UCITS III; a SICAV licence"],"correct":[1],"explain":"Structured funds are governed by the Code on CIS under the SFA and may only be managed by an asset management company holding a CMS licence."},{"type":"mcq","q":"A structured fund must do which of the following that a structured note or structured deposit need NOT?","options":["Embed all fees in the product price","Provide regular Net Asset Values (NAVs)","Guarantee 100% of capital","Avoid using any derivatives"],"correct":[1],"explain":"Under the Code on CIS, structured funds must publish regular NAVs, whereas structured notes and deposits are not required to."},{"type":"mcq","q":"The MAIN reason a CPPI strategy can hurt investors in a prolonged range-bound market is that the rules:","options":["Force the manager to buy low and sell high repeatedly","Force the manager to buy high and sell low, and may cash-lock at the floor","Eliminate all fees during sideways markets","Increase participation in the underlying as volatility rises"],"correct":[1],"explain":"CPPI raises risky exposure as the asset rises and cuts it as it falls, so whipsaws force buying high and selling low; a sustained sideways market raises the chance of hitting the floor and locking the fund into the risk-free asset."},{"type":"mcq","q":"How does DPPI differ from CPPI?","options":["DPPI uses a constant multiplier while CPPI varies it","DPPI uses a variable multiplier (e.g., floating within a 3-5x band) while CPPI's is constant","DPPI removes the floor value entirely","DPPI invests only in derivatives"],"correct":[1],"explain":"In DPPI (Dynamic Portfolio Insurance) the multiplier is variable, e.g., allowed to fluctuate within a 3-5x band, unlike CPPI's constant multiplier."},{"type":"mcq","q":"Which statement about ETF NAV versus trading price is correct?","options":["An ETF always trades exactly at its NAV","NAV is computed once at day's end; the trading price can be at a premium or discount to NAV","NAV is computed continuously and equals the bid price","Trading price equals NAV only for synthetic ETFs"],"correct":[1],"explain":"NAV is calculated once at the end of the trading day; because ETFs trade like stocks, the intraday price can be above (premium) or below (discount) NAV."},{"type":"mrq","q":"Select all that apply: Which are recognised SOURCES of ETF tracking error?","options":["Transaction and swap costs","Cash drag from undistributed dividends","Futures roll effects (contango/backwardation)","The mandatory elimination of all management fees"],"correct":[0,1,2],"explain":"Transaction/swap costs, cash drag, and futures roll (contango/backwardation) all create tracking error. ETFs do charge fees (a TER), which themselves contribute to tracking error, so option 4 is false."},{"type":"mrq","q":"Select all that apply: Which are responsibilities of the fund TRUSTEE (not the fund manager)?","options":["Taking legal ownership of all CIS assets held separately from the manager","Deciding the day-to-day asset allocation to maximise returns","Informing MAS within 3 business days of a breach","Ensuring the fund is managed per the trust deed in unit holders' interests"],"correct":[0,2,3],"explain":"The independent trustee holds legal ownership of assets, reports breaches to MAS within 3 business days, and ensures compliance with the trust deed. Day-to-day investment/asset allocation is the fund manager's role."},{"type":"mrq","q":"Select all that apply: Which features distinguish ETFs from traditional mutual funds?","options":["ETFs offer both primary (creation/redemption) and secondary (intraday exchange) liquidity","ETFs can be bought and sold intraday at quoted bid/ask prices","Mutual fund shares are bought/sold only at end-of-day NAV","ETFs cannot ever trade at a premium or discount to NAV"],"correct":[0,1,2],"explain":"ETFs have two liquidity sources and trade intraday at market prices, while mutual funds transact at end-of-day NAV. ETFs CAN trade at premiums/discounts, so option 4 is false."},{"type":"mrq","q":"Select all that apply: Which are TRUE of leveraged and inverse ETFs?","options":["They aim to deliver a constant multiple of the index's DAILY return","Their multi-day return equals exactly the simple multiple of the index's multi-day return","Daily rebalancing causes compounding/path dependency, worsened by volatility","Extreme market moves can force such ETFs/ETNs to be shut down"],"correct":[0,2,3],"explain":"Leveraged/inverse ETFs target a constant multiple of the DAILY return; daily rebalancing makes multi-day returns path-dependent (so option 2 is false), and extreme moves (e.g., the 2018 VIX spike) have forced closures."}]},"10":{"notes":[{"t":"h","text":"History and Origin of CFDs"},{"t":"p","text":"**Contracts for Differences (CFDs)** originated in **London in the early 1990s**, where they were first traded **over-the-counter (OTC)** in the **equity swap market**. Institutional investors used them as a cost-effective way to **hedge equity exposures**. Arbitrageurs and hedge funds used them for **market-neutral strategies**, finding CFDs an effective way to take a negative view on a market or share **without needing to borrow stock to short sell**."},{"t":"p","text":"Even though there is **no actual change of equity ownership**, CFD investors get exposure to the real-time performance of the underlying share price, are entitled to **dividends**, and face the impact of other corporate actions. However, CFD investors are **NOT entitled to voting rights**."},{"t":"p","text":"In the **late 1990s** CFDs were extended to private and retail clients, with growth driven by **online trading**. From the UK they spread to Europe (Belgium, Germany, Ireland) and later to Australia and Asia (Hong Kong, Singapore, South Korea). Due to **regulatory restrictions, CFDs are NOT available in the US**."},{"t":"h","text":"What Are CFDs?"},{"t":"def","term":"Contract for Differences (CFD)","def":"A derivative contract between a buyer and a seller to exchange the difference between the opening (entry) price and closing (exit) price of an underlying asset, settled in cash, WITHOUT taking direct ownership of that underlying asset."},{"t":"p","text":"The **buyer** has a positive (bullish) view; the **seller** has a negative (bearish) view. At settlement the **seller pays the buyer** the difference between opening and closing price if the price rose (or **vice versa** if the market moved against the buyer). CFDs are **cash settled** — there is no delivery of any underlying instrument such as a share certificate."},{"t":"key","title":"Terms of a CFD contract","points":["Underlying asset — a stock, index, commodity, currency, etc.","Price of the underlying asset — established when the contract commences","Number of units of the underlying asset","Expiry period, if any","Settlement currency"]},{"t":"diagram","kind":"flow","title":"How a CFD settles","steps":[{"label":"Open","sub":"agree entry price"},{"label":"Hold","sub":"daily mark-to-market"},{"label":"Close","sub":"agree exit price"},{"label":"Settle","sub":"pay/receive difference in cash"}]},{"t":"h","text":"Characteristics and Features of CFDs"},{"t":"key","title":"Main features","points":["**Leverage** — margin is only a fraction of asset value; small outlay gives large exposure (gains AND losses magnified)","**Flexibility** — easy to go long or short, profiting in rising or falling markets","**Low Cost** — low, competitive commissions and finance charges; no stamp duty in Singapore","**Transparency** — underlying asset/index is known and tracked; CFD closely follows the underlying price","**Ease and Simplicity** — trade via broker or online with real-time platforms","**No Expiry Date** — open position can be rolled over and held as long as desired","**Access to Asset Classes** — stocks, indices, treasuries, FX, commodities, real estate, ETFs","**Access to Global Investments** — not limited to domestic Singapore securities","**Cash Settlement** — no physical delivery; only the cash difference is exchanged","**Corporate Actions** — long position gets dividends and participates in splits etc.; no voting rights"]},{"t":"p","text":"On **leverage**: if the margin requirement is **10%**, potential gains can be **magnified by a factor of 10** — but any loss is magnified by the same factor. This loss magnification is the central risk of CFDs."},{"t":"h","text":"CFD Business Models"},{"t":"p","text":"There are **three main business models** used by CFD providers globally."},{"t":"def","term":"Market-Maker","def":"The CFD provider makes a market in CFDs and quotes its own bid-ask prices based on the underlying asset."},{"t":"def","term":"Direct Market Access (DMA)","def":"The buy/sell order goes through the provider's platform and the investor gets direct access to the market where the underlying trades; the underlying's market price determines the CFD price. This is the predominant approach of CFD providers in Singapore."},{"t":"def","term":"Exchange-Traded CFDs","def":"CFDs traded on an exchange just like listed equities; orders are placed through brokers with exchange access."},{"t":"diagram","kind":"compare","title":"Market-Maker vs DMA","colA":"Market-Maker","colB":"Direct Market Access (DMA)","rows":[["Provider quotes its own bid-ask","Underlying market price sets the CFD price"],["Price derived from underlying","Direct access to underlying market"],["Potential conflict / wider spread","Predominant model in Singapore"]]},{"t":"h","text":"Advantages of CFDs over Other Instruments"},{"t":"table","headers":["Feature","Shares","CFDs","Options","Warrants"],"rows":[["Trade on margin","No (unless facility obtained)","Yes","Yes","No"],["Trade long or short","Complex/costly","Yes","Yes","No"],["Dividend payment","Yes","Yes","No","No"],["Expiry date","No","No","Yes (can expire worthless)","Yes"],["Stop-loss orders","Yes","Yes","No","No"],["Spread","Actual price","Similar to shares","Wider than underlying","Wider than underlying"]]},{"t":"p","text":"Unlike shares, CFDs can be **traded on margin** and **shorted easily**. Unlike options and warrants, CFD prices move **similarly to the underlying share** (no time decay or volatility distortions) and CFD investors **receive dividends** on long positions."},{"t":"h","text":"Trading Mechanisms — Margin"},{"t":"def","term":"Initial Margin","def":"A fractional cash deposit, computed as a percentage of the total underlying value, that the investor pays to open a CFD position instead of paying the full value. It varies by security, asset class, country regulation and provider."},{"t":"formula","name":"Margin required (notional)","expr":"Margin = Price × Quantity × Margin %","where":["Price = underlying asset price","Quantity = number of units","Margin % = initial margin rate"]},{"t":"formula","name":"Effective leverage","expr":"Leverage = 1 ÷ Margin %","where":["Margin % = initial margin rate","e.g. 10% margin → 10x leverage; 20% margin → 5x leverage"]},{"t":"p","text":"**Example 1:** 10,000 shares at $2 = $20,000 notional. At 10% margin the deposit is **$2,000**, giving **10x leverage**. **Example 2:** 100 barrels of crude at $105 = $10,500; at 20% margin the deposit is **$2,100**, giving **5x leverage**."},{"t":"diagram","kind":"bars","title":"Effective leverage by margin rate","unit":"x","data":[{"label":"5% margin","value":20},{"label":"10% margin (equity CFD)","value":10},{"label":"20% margin (commodity CFD)","value":5},{"label":"Cash equity","value":1}]},{"t":"sub","text":"Mark-to-Market"},{"t":"def","term":"Mark-to-Market","def":"The practice whereby the CFD's value varies with the underlying price in real time, and at the end of each trading day any gain is added to (or any loss subtracted from) the investor's account."},{"t":"sub","text":"Margin Call and Liquidation"},{"t":"def","term":"Maintenance Margin","def":"A stipulated minimum account balance level. If the account falls below it, the investor receives a margin call."},{"t":"def","term":"Margin Call","def":"A demand for the investor to top up the account to restore the balance back to the level of the initial margin. If the investor cannot meet the call, the provider proceeds with liquidation."},{"t":"def","term":"Liquidation","def":"Forced selling by the provider when the account is below maintenance margin and funds are not received in time. It may be of the entire holding or partial positions sufficient to cover the shortfall. The investor remains liable for any shortfall, loss and expense."},{"t":"p","text":"The provider must inform the investor at account opening about **margin requirements, margin limits and liquidation procedures**, stated in the **Risk Disclosure Statement (RDS)**, which must be acknowledged with a **signed acknowledgment** when the account is established."},{"t":"diagram","kind":"cycle","title":"Margin process","stages":[{"label":"Initial margin","sub":"open position"},{"label":"Mark-to-market","sub":"daily gain/loss"},{"label":"Below maintenance","sub":"margin call"},{"label":"Top up or liquidate","sub":"restore or force-sell"}]},{"t":"h","text":"Orders and Stops"},{"t":"p","text":"An order can be placed before, during or after trading hours; after-hours orders execute next market day. **All orders are day orders unless stated otherwise**, and all CFD orders are based on the **bid-ask price of the underlying**."},{"t":"key","title":"Three order types (Singapore equity CFDs)","points":["**Limit Order** — transact at the limit price or better; sits in a queue (buy at ask ≤ limit; sell at bid ≥ limit)","**Market-to-Limit Order** — execute at the current market price; unfilled portion stays in the market at that price (market hours only)","**Market Order** — execute at the best available price; buy matches lowest ask, sell matches highest bid"]},{"t":"sub","text":"Contingent Orders (Stop-Loss / Stop Entry)"},{"t":"def","term":"Stop-Loss Order","def":"A contingent order triggered when a stop price is reached, used to cut a losing position or protect a profit (Trailing Stop). In volatile/gapping markets it may NOT execute at the set price; a 'guaranteed stop-loss' (premium service) always executes at the specified price."},{"t":"def","term":"Stop Entry","def":"A contingent order to enter the market once price moves through a breakout point — a Buy-Stop enters a long above the current price (or stops a short loss); a Sell-Stop is the reverse."},{"t":"h","text":"Financing and Costs"},{"t":"p","text":"Beyond margin and mark-to-market, CFDs incur **daily financing charges, commissions, GST**, and a **rollover charge** when a contract is rolled over."},{"t":"def","term":"Financing Charge","def":"Because CFDs need only a margin payment, a long investor is effectively borrowing to get full exposure and pays daily interest at an agreed rate based on a benchmark, charged for the number of days the position is open. A short investor may RECEIVE interest in lieu of deferred sale proceeds (though the provider may also charge borrowing costs for the short)."},{"t":"formula","name":"Daily financing interest","expr":"Daily interest = Notional × annual rate ÷ 360","where":["Notional = price × quantity (opening value)","annual rate = agreed financing rate","÷ 360 = day-count convention used in the chapter","Total = daily interest × days held"]},{"t":"p","text":"**Commission** is usually a percentage of the underlying's total value, subject to a minimum, and is itself **subject to GST**."},{"t":"sub","text":"Worked example — long CFD costs"},{"t":"p","text":"Buy 10,000 of Company F at $2.00; sell after 10 days at $2.20. Commission 0.4%, GST 8%, financing 5% p.a. **Buy cost:** commission $80 + GST $6.40 = $86.40. **Sell cost:** commission $88 + GST $7.04 = $95.04. **Financing:** $20,000 × 5% ÷ 360 = $2.778/day × 10 = $27.78. **Total expenses = $209.22**. Gross gain = $22,000 − $20,000 = $2,000, so **net profit = $1,790.78**."},{"t":"h","text":"Going Long and Going Short"},{"t":"formula","name":"CFD profit / loss","expr":"P/L = (Exit price − Entry price) × Quantity × Direction","where":["Direction = +1 for a long, −1 for a short","Long profits when price rises; short profits when price falls","Net P/L then subtracts commissions, GST and financing"]},{"t":"p","text":"**Short example (profit):** short 10,000 of Company G at $3.30, price falls to $3.10. Gross gain = ($3.30 − $3.10) × 10,000 = $2,000; after all expenses ($303.98) net profit ≈ **$1,696.02**. Capital invested = 20% × $33,000 = $6,600, so **ROI ≈ 25.7%** — demonstrating how leverage magnifies returns on capital."},{"t":"p","text":"**Short example (loss):** short 10,000 of Company H at $3.30, price rises to $3.45. Gross loss = ($3.45 − $3.30) × 10,000 = $1,500; with expenses ($319.10) net loss ≈ **($1,819.10)**, an **ROI of −27.56%** on the $6,600 capital. The same leverage that amplified the gain amplifies the loss."},{"t":"diagram","kind":"payoff","title":"Long CFD vs Short CFD (per unit)","legs":[{"instrument":"underlying","position":"long","strike":3.3,"qty":1}],"spotRange":[2.8,3.8]},{"t":"diagram","kind":"matrix","title":"Direction and P/L","cols":["Price rises","Price falls"],"rows":[{"label":"Long CFD","cells":["Profit; receives dividends","Loss"]},{"label":"Short CFD","cells":["Loss; pays dividends","Profit"]}]},{"t":"h","text":"Corporate Actions"},{"t":"p","text":"**Cash dividends:** long positions are **credited** the dividend, short positions are **debited**. Timing (ex-date, payment date, etc.) varies by country, and entries are usually in the declared currency of the underlying shares."},{"t":"p","text":"**Share splits / reverse splits:** quantity and price are adjusted to reflect the market-equivalent transaction. **Scrip dividends, bonus issues and rights issues:** investors may or may not be entitled; for these the provider may require all open positions be closed before the ex-date."},{"t":"h","text":"CFDs vs Futures"},{"t":"diagram","kind":"compare","title":"CFDs vs Equity Futures","colA":"CFDs","colB":"Equity Futures","rows":[["Mostly OTC (except exchange-traded) → counterparty risk","On exchanges → no counterparty risk"],["Extend/rollover as long as investor wishes","Fixed maturity / expiry dates"],["Financing cost explicit, added over holding period","Financing cost implicit, embedded in quoted price"],["Entitled to dividends","Not entitled to dividends"],["Margin and leverage: Yes","Margin and leverage: Yes"]]},{"t":"key","title":"Counterparty risk","points":["Most CFDs are OTC, so the investor is exposed to the **CFD provider's** ability to honour the contract — this is counterparty risk.","Exchange-traded CFDs and futures use a clearing house, so counterparty risk is largely removed."]},{"t":"h","text":"Global Trading Opportunities"},{"t":"list","ordered":false,"items":["**Equity CFDs** — thousands of individual shares on major global exchanges, long or short","**Index & Sector CFDs** — STI, SiMSCI, S&P 500, DJIA, FTSE 100, DAX, Nikkei 225, Hang Seng, plus sectors (Nasdaq 100 tech, energy, financials)","**Currencies** — AUD, CAD, EUR, CNY, JPY, CHF, GBP, USD","**Commodities** — energy (NYMEX/ICE crude), industrial & precious metals, agricultural softs","**Government Treasuries** — US, UK, Japan, Euro sovereigns","**ETFs** — e.g. SPDR Gold ETF","**Others** — volatility (VIX) and real estate CFDs"]},{"t":"h","text":"CFD Trading Strategies"},{"t":"sub","text":"Trading for Dividends (Dividend Stripping / Capture)"},{"t":"p","text":"A long equity CFD receives declared dividends; a short pays them. On the ex-dividend date the share price should theoretically fall by the dividend amount, but it may not fall fully if sentiment is positive. An astute trader buys before the ex-date and closes shortly after, capturing the dividend before the price fully adjusts."},{"t":"sub","text":"Pairs Trading (Market-Neutral)"},{"t":"p","text":"**Pairs trading** takes one long and one short CFD to exploit a perceived deviation from historical norms, expecting **mean reversion**. It is **market-neutral** because the long and short legs neutralise overall market risk; the net result can be positive even if only one leg profits. Gains depend on stock selection (long the undervalued, short the overvalued)."},{"t":"key","title":"Pairs-trade variations and risks","points":["**Industry sector plays** — long undervalued vs short overvalued in the same sector","**Statistical arbitrage** — correlated pairs expected to mean-revert","**Merger arbitrage** — long target, short acquirer; main risk is **deal risk** (deal fails)","**Equity indices** — e.g. S&P 500 vs Nikkei 225 convergence","Risks: anomalies may persist without converging; both legs can move adversely; involves **double commissions and finance charges**"]}],"newQuestions":[{"type":"mcq","q":"What is the essential nature of a Contract for Differences (CFD)?","options":["The investor takes direct ownership of the underlying asset","The parties exchange the cash difference between the opening and closing price without owning the underlying","The investor receives physical delivery of the underlying at expiry","The contract grants the right but not the obligation to buy the underlying"],"correct":[1],"explain":"A CFD is cash-settled on the difference between entry and exit price with no ownership of the underlying. Physical delivery (option 3) and the right-not-obligation feature (option 4, an option) are wrong."},{"type":"mcq","q":"Where and when did CFDs originate, and in which market?","options":["New York in the 2000s, the futures market","London in the early 1990s, the equity swap market (OTC)","Hong Kong in the 1980s, the listed options market","Singapore in the late 1990s, the retail brokerage market"],"correct":[1],"explain":"CFDs originated in London in the early 1990s, first traded OTC in the equity swap market, used by institutions to hedge equity exposures."},{"type":"mcq","q":"Which entitlement does a CFD investor NOT receive compared with owning the physical share?","options":["Cash dividends on a long position","Exposure to real-time share price performance","Voting rights","Participation in share splits"],"correct":[2],"explain":"CFD investors get dividends, price exposure and split participation but are NOT entitled to voting rights, since there is no actual share ownership."},{"type":"mcq","q":"A CFD on shares requires a 10% initial margin. The share price is $2 and the investor wants 10,000 shares. What initial margin must be deposited, and what is the effective leverage?","options":["$20,000 deposit; 1x leverage","$2,000 deposit; 10x leverage","$200 deposit; 100x leverage","$2,000 deposit; 5x leverage"],"correct":[1],"explain":"Notional = 10,000 × $2 = $20,000; margin = 10% × $20,000 = $2,000; leverage = 1 ÷ 10% = 10x."},{"type":"mcq","q":"An investor takes a long CFD on 100 barrels of crude oil at $105 with a 20% initial margin. What is the initial margin and effective leverage?","options":["$10,500; 1x","$2,100; 5x","$2,100; 20x","$1,050; 10x"],"correct":[1],"explain":"Notional = 100 × $105 = $10,500; margin = 20% × $10,500 = $2,100; leverage = 1 ÷ 20% = 5x."},{"type":"mcq","q":"An investor buys a CFD on 10,000 shares at $2.00 and closes at $2.20. Ignoring costs, what is the gross profit?","options":["$200","$2,000","$22,000","$20,000"],"correct":[1],"explain":"Gross P/L = (exit − entry) × qty = ($2.20 − $2.00) × 10,000 = $2,000. $22,000 (option 3) is the total sale value, not the profit."},{"type":"mcq","q":"A long CFD position has notional $20,000 with financing at 5% per annum (360-day basis). What is the financing interest for 10 days?","options":["$1,000.00","$100.00","$27.78","$2.78"],"correct":[2],"explain":"Daily interest = $20,000 × 5% ÷ 360 = $2.778; over 10 days = $27.78."},{"type":"mcq","q":"An investor SHORTS 10,000 shares via CFD at $3.30 and the price falls to $3.10. What is the gross profit (before costs)?","options":["$1,500 loss","$2,000 profit","$2,000 loss","$200 profit"],"correct":[1],"explain":"For a short, P/L = (entry − exit) × qty = ($3.30 − $3.10) × 10,000 = $2,000 profit, because shorts profit when prices fall."},{"type":"mcq","q":"An investor SHORTS a CFD at $3.30 (10,000 units) and the price RISES to $3.45. What is the gross loss before costs?","options":["$1,500","$2,000","$15,000","$150"],"correct":[0],"explain":"Short P/L = (entry − exit) × qty = ($3.30 − $3.45) × 10,000 = −$1,500. A short loses when the price rises."},{"type":"mcq","q":"Using a 20% margin, a short CFD on $33,000 notional yields a net profit of about $1,696. What is the approximate Return on Capital Invested?","options":["About 5.1%","About 25.7%","About 51.4%","About 8.5%"],"correct":[1],"explain":"Capital = 20% × $33,000 = $6,600; ROI = $1,696 ÷ $6,600 ≈ 25.7%, illustrating how leverage magnifies the return on capital."},{"type":"mcq","q":"Which CFD business model is the PREDOMINANT approach used by CFD providers in Singapore?","options":["Market-Maker","Direct Market Access (DMA)","Exchange-Traded CFDs","Principal-only dealing"],"correct":[1],"explain":"DMA is predominant in Singapore: the order goes through the provider's platform and the underlying market price determines the CFD price."},{"type":"mcq","q":"In a market-maker CFD model, how is the CFD price determined?","options":["By the clearing house at end of day","The provider quotes its own bid-ask prices based on the underlying","Solely by the exchange's last traded price","By averaging multiple brokers' quotes"],"correct":[1],"explain":"A market-maker makes a market and quotes its OWN bid-ask prices based on the underlying, unlike DMA where the underlying market price sets the CFD price."},{"type":"mcq","q":"What happens when an investor's CFD account balance falls below the maintenance margin and the investor cannot meet the margin call?","options":["The provider waives the shortfall","The provider proceeds with liquidation (forced selling)","The position automatically rolls to the next period","The maintenance margin is lowered automatically"],"correct":[1],"explain":"If the margin call is not met, the provider liquidates positions by forced selling; the investor remains liable for any shortfall, loss and expense."},{"type":"mcq","q":"For a CFD short position, the treatment of financing interest is BEST described as:","options":["The investor always pays interest, never receives it","The investor may RECEIVE interest in lieu of deferred sale proceeds","Financing never applies to short positions","Interest is capitalised into the strike price"],"correct":[1],"explain":"Shorts may receive interest in lieu of deferred sale proceeds, although the provider may also charge borrowing costs for the short transaction. Longs pay financing."},{"type":"mcq","q":"Which statement about CFDs versus equity futures is INCORRECT?","options":["Most CFDs are OTC and carry counterparty risk","CFDs can be rolled over for as long as the investor wishes","Futures investors are entitled to dividends on the underlying","CFD financing cost is explicit and added over the holding period"],"correct":[2],"explain":"This is the false statement (negative stem): futures investors are NOT entitled to dividends, whereas CFD investors are. The others are all correct."},{"type":"mcq","q":"Why might a stop-loss order fail to execute at the investor's set price?","options":["Because stop-loss orders are illegal in Singapore","Because in volatile markets price jumps (gapping) mean no transaction occurs at the set price","Because stop-loss orders only work after market hours","Because the maintenance margin overrides them"],"correct":[1],"explain":"In volatile conditions, price gaps/jumps can mean no trade occurs at the set level, so the stop may not fill there. A 'guaranteed stop-loss' premium service avoids this."},{"type":"mrq","q":"Select all that apply: Which are recognised FEATURES or advantages of CFDs per the chapter?","options":["Leverage that magnifies both gains and losses","Ability to take long or short positions easily","Entitlement to voting rights on the underlying shares","No expiry date — positions can be rolled over"],"correct":[0,1,3],"explain":"Leverage, easy long/short flexibility and no expiry date are CFD features. CFD investors are NOT entitled to voting rights, so that option is wrong."},{"type":"mrq","q":"Select all that apply: Which costs may a CFD investor incur?","options":["Daily financing charges","Commission (subject to GST)","Stamp duty in Singapore","Contract rollover charges"],"correct":[0,1,3],"explain":"Financing, commission (plus GST) and rollover charges all apply. There is NO stamp duty on CFDs in Singapore, so that option is wrong."},{"type":"mrq","q":"Select all that apply: Which statements about pairs trading with CFDs are correct?","options":["It is a market-neutral strategy taking one long and one short position","It relies on expected mean reversion of the price relationship","It always requires both legs to be profitable to make money","It involves double commissions and finance charges"],"correct":[0,1,3],"explain":"Pairs trading is market-neutral (long+short), relies on mean reversion, and incurs double costs. It does NOT require both legs to profit — net can be positive if one leg's gain exceeds the other's loss."},{"type":"mrq","q":"Select all that apply: Which are TRUE about margin and mark-to-market in CFD trading?","options":["Initial margin is a percentage of the total underlying value","Mark-to-market adds daily gains to, or subtracts losses from, the account","A margin call asks the investor to restore the balance to the initial margin level","Effective leverage equals the margin percentage"],"correct":[0,1,2],"explain":"Initial margin is a % of notional, mark-to-market is daily, and a margin call restores the balance to the initial margin level. Leverage equals 1 ÷ margin %, NOT the margin percentage itself, so the last option is wrong."}]},"11":{"notes":[{"t":"h","text":"11.1 Investment Risks for Derivatives and Structured Products"},{"t":"p","text":"Generic investment risks were covered in the CM-EIP examination. This chapter focuses on the **specific risks** of derivatives (futures, options, warrants, CFDs) and **structured products**, and the **trading risk controls** that financial organisations implement."},{"t":"sub","text":"Risks in Trading Futures"},{"t":"key","title":"Three key futures risks","points":["**Basis risk** — spot and futures prices do not move in perfect lockstep","**Liquidity risk** — no assurance of liquidity; can dry up near maturity or in a lock-limit market","**Leverage risk** — margin financing magnifies gains and losses"]},{"t":"def","term":"Basis","def":"The difference between the cash/spot price and the futures price: Basis = Cash/Spot Price − Futures Price. The basis becomes zero at maturity if the hedged asset and the underlying are identical."},{"t":"def","term":"Basis risk","def":"The risk that, when a hedge is liquidated before maturity, gains and losses on the futures contract and the cash asset do not exactly offset each other because the two prices do not move in perfect lockstep."},{"t":"p","text":"Basis risk arises because: (a) the asset hedged may not be exactly the same as the futures underlying; (b) the exact buy/sell date is uncertain; (c) the hedge may be closed out well before expiration; and (d) the size/unit of the contract may not match the hedged position, leaving it **under-hedged or over-hedged**."},{"t":"p","text":"**Liquidity risk** in futures: the only way to close a position (if not taking delivery) is to **offset with another contract**. Liquidity can dry up near maturity or in a rapidly moving market. In a **lock-limit** market (price has hit the maximum allowable daily limit with no willing counterparties), an investor cannot offset the position. Gauge liquidity using **trading volume** and **open interest** (open contracts not yet offset or delivered)."},{"t":"p","text":"**Leverage risk**: futures use **initial margin**. A small price move produces large percentage profits/losses — the percentage loss exceeds the percentage move in the underlying. Adverse moves trigger demands for additional funds (margin calls); failure to comply lets the broker liquidate the position, with the investor liable for any shortfall. Loss is NOT limited to the initial margin — there is exposure to the full downside of the underlying."},{"t":"diagram","kind":"bars","title":"Relative leverage / gearing by product","unit":"x (illustrative)","data":[{"label":"CFD","value":10,"note":"e.g. 10% margin"},{"label":"Structured warrant","value":5,"note":"geared"},{"label":"Futures","value":5,"note":"initial margin"},{"label":"Cash equity","value":1,"note":"no leverage"}]},{"t":"sub","text":"Risks in Trading Options"},{"t":"p","text":"Option holders (buyers) and writers (sellers) face different risks."},{"t":"key","title":"Risks assumed by option HOLDERS","points":["Risk of losing the **entire premium** in a short time — options lose **time value** and expire worthless if out-of-the-money","**European options** are more restrictive: with no secondary market they realise value only at expiration, so the holder must predict both direction AND timing","Specific **exercise provisions** (especially OTC options) can create additional risks"]},{"t":"key","title":"Risks assumed by option WRITERS","points":["Writers of **naked calls/puts** face **unlimited losses** if the underlying rises/falls respectively","**American options** can be exercised any time before expiry, so writers have no control over the timing/magnitude of liabilities","Obligations remain even if a closing transaction cannot be executed"]},{"t":"key","title":"Risks for BOTH holders and writers","points":["**Volatility** — small underlying moves can quickly put a position out of the money","**Complexity** of multi-leg strategies is itself a source of risk; an exchange can **halt trading**, preventing value realisation","**International options** add timing differences and **foreign currency exposure**"]},{"t":"diagram","kind":"matrix","title":"Maximum loss exposure by option position","cols":["Call","Put"],"rows":[{"label":"Long (holder)","cells":["Limited to premium paid","Limited to premium paid"]},{"label":"Short (writer)","cells":["Unlimited (underlying can rise without bound)","Large (down to zero underlying)"]}]},{"t":"sub","text":"Equity Index, Bond and Currency Options"},{"t":"p","text":"**Equity index options**: major indices (S&P 500, STI, Nikkei 225) are liquid. Niche/illiquid index underlyings expose the investor to greater risk; OTC index options also carry **counterparty risk**."},{"t":"p","text":"**Bond options**: risk is linked to the underlying bond. Bond-market volatility is usually moderate, but specific low-rated bonds are risky — **credit-rating downgrades** quickly raise required yields and depress prices."},{"t":"def","term":"Credit spread","def":"The yield difference between a corporate bond and a government bond of the same maturity. It is the risk premium investors require for taking on the corporate bond's credit (default) risk. Wide spread = 'cheap'; tight spread = 'expensive'."},{"t":"p","text":"In a **flight to safety**, money moves into US Treasuries: Treasury yields fall while the riskiest bonds' credit spreads widen most. **Sovereign defaults** show government bonds are not always risk-free (e.g. Greece, Spain, Portugal — 'bond vigilantes' in the 2010 Eurozone crisis). Besides credit risk, spreads reflect **market liquidity, embedded options, and bond terms** (change of control, event risk)."},{"t":"p","text":"**Currency / FX options**: risky because the **notional value is extremely large** and the FX market trades round the clock — positions must be monitored. OTC currency options carry **counterparty risk** as contracts are settled by actual delivery of the currencies."},{"t":"sub","text":"Risks of Trading Warrants"},{"t":"p","text":"Two types: **company warrants** (a long-term option issued by the company) and **structured warrants** (issued by financial institutions, typically banks)."},{"t":"key","title":"Warrant risks","points":["A **company warrant** expires worthless if the share price never reaches the strike; holders have **no voting or dividend rights**; exercise may **dilute** existing shareholdings","**Structured warrants** expose the investor to the market/investment risk of the underlying (stocks, indices, funds, commodities)","Warrants are **leveraged (geared)** — adverse moves cause a larger percentage loss in the warrant","Structured warrants carry **issuer risk** / the credit standing of the issuing bank"]},{"t":"sub","text":"Risks of Investing in CFDs"},{"t":"p","text":"A **CFD** is a leveraged product traded on margin. The initial margin is a percentage of contract value used as security for a much larger exposure (e.g. 10% on a $10,000 underlying = $1,000 margin)."},{"t":"key","title":"CFD risk categories","points":["**Leverage risk** — gains/losses magnified; margin calls; forced sale if unmet; losses can exceed initial margin","**Market volatility** of the underlying — illiquid/suspended underlying makes the CFD hard to close; corporate actions can delay proceeds","**Counterparty risk** — the CFD provider is the counterparty; provider default hits the investor (except exchange-traded CFDs)","**Liquidity risk** — provider may refuse to fill, or fill at an inferior price, leaving an open position","**Currency risk** — foreign-currency exposure; foreign markets may have weaker investor protection and FX controls","**Financing costs** — interest charged daily on the full position value at a spread over a benchmark; rising rates raise holding cost (interest-rate risk)"]},{"t":"def","term":"DMA vs market-maker CFD","def":"In a Direct Market Access (DMA) model pricing is transparent (based on directly observable underlying market price). In a market-maker model, liquidity and pricing depend on the provider's market-making; the bid-ask spread is at the provider's discretion and not transparent."},{"t":"h","text":"11.2 Key Risks of Structured Products"},{"t":"p","text":"A structured product **combines two or more underlying instruments**, so its risk profile is more complicated than a standard product. It is critical to identify which risks the product is exposed to and how they affect the overall risk-return profile."},{"t":"sub","text":"Market Risk"},{"t":"def","term":"Market risk","def":"Essentially systemic risk affecting the entire market. Sources include macroeconomic factors (interest rates, inflation, employment, recession), microeconomic drivers (corporate earnings) and political factors (instability, policy uncertainty)."},{"t":"p","text":"Products with **embedded short options** (e.g. 'Zero Plus' structures) are exposed to the market risk of the underlying derivative. An investor who buys a zero-coupon bond and **shorts an index option** receives a fixed premium — i.e. is **selling protection** against market risk. If the option goes in-the-money, the investor (as seller) must pay out. Shorting a **call** sells protection against price increases; shorting a **put** sells protection against price decreases. A short call has theoretically **unlimited loss** unless **covered** (holding the underlying) or in a **call spread** (max loss = strike difference × contracts)."},{"t":"diagram","kind":"payoff","title":"Short call (selling protection against a price rise)","legs":[{"instrument":"call","position":"short","strike":100,"premium":4,"qty":1}],"spotRange":[80,130]},{"t":"sub","text":"CPPI Strategy Products"},{"t":"p","text":"In **Constant Proportion Portfolio Insurance (CPPI)**, more is allocated to the risky asset as it appreciates, and less as it falls — so the investor may **buy high and sell low** in a range-bound market. After a sharp drop / major deleveraging, the portfolio can hit the **floor value**, forcing the manager to move the entire fund into the risk-free asset, ending any participation in subsequent recoveries. CPPI assumes the underlying: (a) appreciates over time; (b) has low volatility; (c) has limited drawdown."},{"t":"sub","text":"Credit and Counterparty Risks"},{"t":"p","text":"A structured product is exposed to the **credit risk of the issuer**, including **special purpose vehicles (SPVs)**. If an SPV is **not guaranteed by the parent**, investors have no recourse on default. Investors should check the issuer's credit rating, outlook, credit watch and guarantee status."},{"t":"p","text":"Where there is a **swap agreement** between issuer and another institution, the investor may bear the credit risk of **both the issuer and the swap counterparty**. For SPV notes involving **credit default swaps (CDS)**, the credit quality of the underlying debt pool and reference entities matters."},{"t":"def","term":"ISDA credit default events","def":"The ISDA classifies credit default as: Bankruptcy; Obligation Acceleration; Obligation Default; Failure to Pay; Repudiation/Moratorium; and Restructuring. ISDA implemented new Credit Derivatives Definitions in 2014."},{"t":"diagram","kind":"flow","title":"CDS cash flows in an SPV structured note","steps":[{"label":"Investor","sub":"buys notes; sells protection to SPV"},{"label":"SPV issuer","sub":"buys AAA assets; sells protection to bank"},{"label":"Bank","sub":"pays protection payment"},{"label":"Reference entity default","sub":"SPV liquidates assets; investor recovers par minus losses"}]},{"t":"sub","text":"Liquidity Risk & Secondary Market"},{"t":"p","text":"**Liquidity risk** results from lack of marketability. Structured products are designed to be **held to maturity**; the secondary market is typically limited. Investors should watch for a **lock-up period** (funds cannot be withdrawn early — months to years). Underlying components (exotic options, CDS) may not be actively traded; early liquidation may lose part of the principal."},{"t":"p","text":"Issuers/affiliates often provide a secondary market voluntarily — assess the bank's quality, commitment and track record. Price still depends on prevailing market conditions and underlying levels. A **maturity mismatch** (e.g. a basket of high-yield bonds maturing after the product) means bonds must be sold at maturity, possibly at a deep discount. Liquidity risk is **mitigated** if the components are **widely / exchange-traded** (e.g. S&P 500 index futures)."},{"t":"sub","text":"Early Termination & Reinvestment Risk"},{"t":"p","text":"**Early termination risk**: full returns are realised only at maturity. The principal-preservation feature of a zero-coupon bond is realised only at maturity; early withdrawal means the bond is sold at a discount and **unwinding costs** are incurred on the embedded derivatives."},{"t":"def","term":"Reinvestment risk","def":"The risk of reinvesting bond proceeds (coupons and/or principal) at a rate below the original yield-to-maturity (YTM). Greatest for bonds with large coupons, higher payment frequency, long maturities and selling at a premium. Zero-coupon bonds have NO reinvestment risk; callable bonds have HIGH reinvestment risk."},{"t":"sub","text":"Structure, Volatility & Correlation Risk"},{"t":"p","text":"**Structure risk**: structured products have no standardised form, so benefits and liabilities depend entirely on how the product is built; instruments that do not limit losses can lose the entire amount. Example: shorting a **receive-fixed (call) swaption** — loss is limited to the fixed rate (unless negative rates); shorting a **pay-fixed (put) swaption** — loss is **unlimited**, dependent on the floating rate."},{"t":"p","text":"**Volatility risk** applies to instruments with embedded options (callable, putable, convertible bonds). Their prices respond not only to interest rates but to **changes in volatility**. A rise in volatility increases the embedded call's value, **reducing** the callable bond's value (holders effectively sold the call to the issuer)."},{"t":"def","term":"Correlation risk","def":"The likelihood of an event affecting another directly. A structured product has high correlation risk when underlying instruments are correlated — e.g. a CDS basket of firms in the same industry or with credit relationships: one default makes others more likely."},{"t":"sub","text":"FX, Legal, Transactional & Mis-selling Risk"},{"t":"key","title":"Other structured-product risks","points":["**Foreign exchange risk** — underlyings in a different currency from the product; returns depend on exchange-rate moves","**Legal risk** — on issuer default the investor does NOT automatically own the underlying assets (only units of the product); priority over other creditors depends on the drafting","**Transactional risk** — from the time gap between contract commencement and settlement, especially across currencies","**Mis-selling risk** — investors may misunderstand the strategy; the **Product Highlights Sheet, prospectus and private placement memorandum** ensure proper risk disclosure"]},{"t":"p","text":"Example of mis-selling: an investor wanting **'100% principal preservation'** may misconstrue a product whose bonds are used as **collateral in a CDS** — in a default, the collateral compensates the CDS, defeating the preservation objective. Distributors and financial advisers play a key role in educating investors."},{"t":"h","text":"11.3 Trading Risk Control and Management"},{"t":"key","title":"Three main trading risks","points":["**Market risk** — loss from changes in market variables (rates, FX, asset/commodity prices)","**Credit risk** — counterparty/clearing broker/exchange default","**Settlement risk** — back-office responsibility for prompt, accurate settlement"]},{"t":"p","text":"Front, middle and back office must proactively monitor these risks. Risk metrics differ for futures versus options."},{"t":"sub","text":"Managing Market Risk for Futures — Setting Limits"},{"t":"list","ordered":false,"items":["**Open contracts limit** — based on volatility and expected max loss; more volatile contracts get smaller limits; capped at a percentage of Gross Open Interest to avoid liquidity problems","**Maximum loss limit** — weekly/monthly limits per trader/group; position squared off and trader suspended when hit","**Maturity limit** — limits losses from poor liquidity in far-month contracts","**Stress test limit** — set on risk tolerance using statistical results across market scenarios"]},{"t":"sub","text":"Interest-Rate Risk Measures (Fixed Income)"},{"t":"def","term":"Basis point (bps)","def":"1/100th of a percentage point. e.g. 3.50% − 3.21% = 29 bps."},{"t":"def","term":"DV01 / PVBP","def":"Dollar value per basis point (also dollar duration / PV01 / PVBP) — the dollar change in a security's price when its yield changes by 1 bp. A better interest-rate-risk measure than percentage change for fixed income."},{"t":"def","term":"Duration & modified duration","def":"Duration is the weighted average time to maturity in present-value terms. Modified duration measures price sensitivity to yield changes — higher = more interest-rate sensitive. It increases with longer maturity, lower coupon and lower yield."},{"t":"formula","name":"Change in bond price","expr":"ΔP/P = − D × ΔYTM","where":["ΔP/P = percentage price change","D = modified duration","ΔYTM = change in yield (decimal/bps)","e.g. D=2, +100 bps → ΔP/P = −2%"]},{"t":"formula","name":"DV01 / PVBP price move","expr":"ΔPrice = ΔYield(bps) × PVBP","where":["PVBP = price change per 1 bp","e.g. price $980, PVBP $1, +5 bps → −$5 → new price $975","Price and yield move inversely"]},{"t":"sub","text":"Value at Risk (VaR)"},{"t":"def","term":"Value at Risk (VaR)","def":"A portfolio risk measure incorporating volatility and correlation between market factors to estimate a potential loss. It answers 'How much could I lose in a really bad period?' — the threshold beyond which mark-to-market loss occurs with a given probability over a horizon."},{"t":"key","title":"Three VaR components","points":["A high **confidence level** (typically 95% or 99%)","A **time period** (day, month, year)","An **estimate of loss** (dollar or percentage)"]},{"t":"p","text":"Example: a 1-day 95% VaR of SGD 1 million means a 5% probability of losing more than SGD 1 million in one day — i.e. a loss of SGD 1m+ expected on 1 day in 20. Lowering VaR requires reducing portfolio size and/or highly correlated risks."},{"t":"sub","text":"Managing Market Risk for Options — the Greeks"},{"t":"table","headers":["Greek","Measures","Limit / control"],"rows":[["Delta","Option price reaction to a change in the underlying","Limits set in USD / local currency"],["Gamma","Change in delta (2nd-order); volatile near strike/maturity; negative when net short options","Measured vs a spot move (e.g. 1 std dev); limits by tenor"],["Vega","Change in premium per 1% change in volatility","Max loss tolerated for given volatility moves"],["Theta","Potential loss from time decay","Limited over a period (e.g. 1 day)"],["Rho","Impact of interest-rate change on option price","Delta amounts by period; reduced via swaps"]]},{"t":"p","text":"**Gamma, Vega and Theta** are often controlled together (combined max loss): for short options the positive Theta automatically offsets the negative Gamma. Other limits: maturity concentration control, total book size, premium payment control, intra-day control."},{"t":"sub","text":"Managing Credit & Settlement Risk for Options"},{"t":"key","title":"Credit risk sources","points":["**Counterparty risk (OTC)** — limits predefined per counterp
