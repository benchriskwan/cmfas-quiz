proaches. A premium bond therefore declines toward par (and a discount bond rises toward par)."},{"type":"mcq","q":"Which theory of the term structure argues that the yield curve should ALWAYS be upward-sloping due to a premium demanded for holding longer, more volatile securities?","options":["Expectations theory","Liquidity preference theory","Market segmentation theory","Pure arbitrage theory"],"correct":[1],"explain":"Liquidity preference theory holds that long bonds are more volatile/less liquid, so investors demand a liquidity premium, producing an upward-sloping curve; other shapes are temporary aberrations."},{"type":"mcq","q":"The 1-year rate is 5% now and is expected to be 9% next year. Under the expectations theory, the approximate yield on a 2-year bond is:","options":["5.0%","7.0%","9.0%","6.98%"],"correct":[3],"explain":"2-yr rate ≈ [(1.05)(1.09)]^½ − 1 = (1.1445)^½ − 1 = 6.98% (≈7%). The simple average (7.0%) is a common approximation but the geometric mean is exact."},{"type":"mcq","q":"A convertible bond has a conversion ratio of 25 and the underlying share trades at $30. The conversion value is:","options":["$750","$1,000","$833","$25"],"correct":[0],"explain":"Conversion value = conversion ratio × share price = 25 × $30 = $750."},{"type":"mcq","q":"A $1,000 par convertible bond has a conversion price of $40. Its conversion ratio is:","options":["40","25","4","250"],"correct":[1],"explain":"Conversion ratio = par / conversion price = 1,000 / 40 = 25 shares per bond."},{"type":"mcq","q":"A convertible bond trades at $1,150 with a conversion value of $1,000. Its conversion premium is:","options":["$150 or 15.0%","$1,000 or 100%","$150 or 13.0%","$1,150 or 115%"],"correct":[0],"explain":"Premium ($) = market price − conversion value = 1,150 − 1,000 = $150. Premium (%) = 150/1,000 = 15.0%."},{"type":"mrq","q":"Select all statements that are TRUE about convertible bonds.","options":["The minimum value is the GREATER of its conversion value and investment value","They generally yield more than a comparable plain-vanilla bond","They offer upside participation with downside protection","They can be issued at a lower coupon than a comparable straight bond"],"correct":[0,2,3],"explain":"The minimum value is the greater of conversion and investment value; the conversion sweetener lets issuers pay a LOWER coupon, so the yield is BELOW a comparable straight bond (but above the share's dividend yield). Upside participation with downside protection is the key appeal."}]},"08":{"notes":[{"t":"h","text":"Overview"},{"t":"p","text":"Portfolio management is the discipline of evaluating investment **risk and return** to construct an optimal portfolio for an investor, taking into account the investor's **objectives, risk profile, constraints and circumstances**. The chapter has four parts: (1) the Efficient Market Hypothesis and passive vs active strategies, (2) Portfolio Theory (diversification, correlation, systematic vs non-systematic risk, CAPM, CML, SML, APT), (3) the portfolio management process (investment policy, asset allocation), and (4) performance measurement (return measures, GIPS, risk-adjusted measures, attribution)."},{"t":"h","text":"The Efficient Market Hypothesis (EMH)"},{"t":"def","term":"Efficient Market Hypothesis","def":"The theory that an efficient market is one where security prices always fully reflect all available information, so stocks trade at fair value and it is impossible to consistently outperform the market on a risk-adjusted basis through stock selection or market timing."},{"t":"p","text":"There are **three forms** of the EMH, distinguished by the set of information already reflected in prices: Weak, Semi-strong and Strong."},{"t":"sub","text":"Weak form"},{"t":"p","text":"All **past price and volume information** is reflected in current prices. Future prices follow a **random walk** and cannot be predicted from past prices. Implication: **technical analysis** cannot consistently earn excess returns. Empirical evidence broadly supports the weak form, though HFT and dark-pool activity show some participants behave otherwise."},{"t":"sub","text":"Semi-strong form"},{"t":"p","text":"All **publicly available information** (e.g. earnings announcements, management changes) is reflected in prices, and prices react rapidly to new public information. Implication: neither **fundamental nor technical analysis** can consistently beat the market."},{"t":"sub","text":"Strong form"},{"t":"p","text":"All information — **public AND private (insider)** — is reflected in prices. Implication: even insider trading gives no advantage. Real-world evidence (insider-trading cases) suggests markets are NOT strong-form efficient, justifying regulatory oversight."},{"t":"diagram","kind":"bars","title":"Information reflected by each EMH form","unit":"","data":[{"label":"Weak: past prices/volume","value":1},{"label":"Semi-strong: + all public info","value":2},{"label":"Strong: + private/inside info","value":3,"note":"broadest"}]},{"t":"key","title":"Applying the EMH","points":["Average fund managers do not beat their benchmarks (even before fees), and outperformance rarely persists — supporting market efficiency.","Believers in efficiency adopt PASSIVE management (low-cost index funds).","Believers in inefficiency may: trade actively, hold strong-fundamental investments long-term, or pick an active manager."]},{"t":"h","text":"Passive vs Active Management"},{"t":"p","text":"Beyond belief in market efficiency, the choice of strategy depends on: **funds available** (size of investment), desire for **personal involvement**, **time** available, **investment expertise**, and **market structure**."},{"t":"sub","text":"Passive strategy"},{"t":"p","text":"A **buy-and-hold** approach or investing in an **index fund** that tracks a benchmark. Trading is minimised to avoid commissions; the index manager is judged on **tracking** the target index, with expenses kept low. Suited to investors who invest small amounts, lack time/expertise, or do not wish to pay fees."},{"t":"sub","text":"Active strategy"},{"t":"p","text":"Uses valuation models and analysis of the economy, industries and companies to **outperform the market on a risk-adjusted basis**. Active investors believe they have superior analytical skills or information access. Three examples of active strategies:"},{"t":"list","ordered":false,"items":["**Security selection** — buying undervalued shares (e.g. low P/E, below intrinsic value) using fundamental analysis.","**Sector rotation** — shifting sector weights toward sectors expected to outperform (interest-sensitive, cyclical, defensive shares perform differently across the business cycle).","**Market timing** — shifting between cash-equivalents and equities based on expected market direction (active asset allocation)."]},{"t":"diagram","kind":"compare","title":"Passive vs Active Management","colA":"Passive","colB":"Active","rows":[["Believes markets are efficient","Believes markets can be inefficient"],["Buy-and-hold / index tracking","Security selection, sector rotation, timing"],["Low fees & low turnover","Higher fees, research costs, turnover"],["Goal: match the benchmark","Goal: beat benchmark (risk-adjusted)"]]},{"t":"h","text":"Portfolio Theory"},{"t":"p","text":"Portfolio theory (Markowitz) explains how investors create **optimal portfolios** that maximise expected return while minimising risk. Risk is measured by **standard deviation** (volatility)."},{"t":"sub","text":"The Efficient Frontier"},{"t":"def","term":"Efficient frontier","def":"The set of all asset-class combinations that generate the highest expected return for a given level of risk. Portfolios ON the frontier are optimal (for different risk appetites); portfolios below it are inefficient because higher return is available at the same risk."},{"t":"p","text":"The frontier is a **curve, not a straight line**, because the asset returns are **not perfectly correlated**. Higher equity weights suit higher-risk-appetite clients; higher bond weights suit lower-risk clients. Adding **less-correlated assets** (e.g. hedge funds, real estate) that raise return per unit risk or lower risk per unit return pushes the frontier toward the **upper-left** (better risk-adjusted profile) — but only if they genuinely improve return per unit risk."},{"t":"sub","text":"Diversification"},{"t":"p","text":"Diversification (\"don't put all your eggs in one basket\") reduces portfolio risk by adding securities from different industries, asset classes, and countries. A single-stock portfolio faces **economic (general), industry-specific, and firm-specific** risks. Adding another stock reduces risk **as long as correlation is less than +1** — the factors need not be opposite, merely imperfectly correlated."},{"t":"key","title":"Diversification facts","points":["About half of portfolio standard deviation is eliminated by ~10 securities.","Marginal risk reduction diminishes as more securities are added.","A portfolio holding all market shares diversifies away all non-systematic risk, leaving only systematic (market) risk.","Business-cycle risk affects all shares and cannot be diversified away."]},{"t":"h","text":"Systematic vs Non-systematic Risk"},{"t":"formula","name":"Total risk decomposition","expr":"Total risk = Systematic risk + Non-systematic risk","where":["Systematic = undiversifiable / market risk","Non-systematic = firm-specific / diversifiable risk"]},{"t":"def","term":"Systematic risk","def":"Undiversifiable (market) risk from factors affecting all firms — interest rates, inflation, economic, political and sociological changes. Cannot be removed by diversification, but exposure can be partly/fully offset by HEDGING (options, futures). Measured by beta."},{"t":"def","term":"Non-systematic risk","def":"Firm-specific (diversifiable) risk peculiar to a firm or industry — management errors, new products, strategy. Can be minimised, theoretically to zero, through diversification across many uncorrelated firms/industries."},{"t":"diagram","kind":"compare","title":"Systematic vs Non-systematic Risk","colA":"Systematic (market)","colB":"Non-systematic (firm-specific)","rows":[["Affects all firms","Peculiar to a firm/industry"],["Interest, inflation, economy, politics","Management, products, strategy"],["Undiversifiable","Diversifiable (to ~zero)"],["Managed by hedging","Managed by diversification"],["Captured by beta (β)","Captured in residual / error term"]]},{"t":"h","text":"Correlation Coefficient"},{"t":"def","term":"Correlation coefficient (ρ)","def":"A measure (ranging from +1.0 to −1.0) of the extent to which the returns of two securities move together. It denotes association, not causation."},{"t":"list","ordered":false,"items":["**ρ = +1** (perfect positive): no risk reduction — portfolio risk is just the weighted average of individual risks.","**ρ = 0** (zero correlation): some risk reduction; more uncorrelated assets give significant reduction.","**ρ = −1** (perfect negative): portfolio risk can be eliminated entirely — the principle behind hedging."]},{"t":"p","text":"For efficient diversification, include securities whose returns are **not highly correlated**. As long as ρ < +1, risk can be reduced — though usually not eliminated completely. **Correlation is not stable**: it changes over time and tends to rise toward +1 during major crises (e.g. the 2008 GFC), when almost all asset classes fell together except cash and government bonds."},{"t":"h","text":"Calculating Portfolio Return and Risk"},{"t":"formula","name":"Portfolio expected return","expr":"Rp = Σ wi × ri","where":["Rp = expected return on the portfolio","wi = weight of the ith security","ri = expected return on the ith security","Σwi = 1.0"]},{"t":"p","text":"Portfolio expected return is a simple **weighted average** of the constituents' returns. However, portfolio **risk is NOT** a weighted average of individual risks (unless ρ = +1), because of the diversification (covariance) term."},{"t":"formula","name":"Two-asset portfolio risk (standard deviation)","expr":"σp = √( w1²σ1² + w2²σ2² + 2·w1·w2·ρ1,2·σ1·σ2 )","where":["w1, w2 = weights of securities 1 and 2","σ1, σ2 = standard deviations of 1 and 2","ρ1,2 = correlation coefficient between 1 and 2"]},{"t":"p","text":"**Worked example:** A (return 18%, σ 20%, weight 40%) and B (return 9%, σ 10%, weight 60%), with ρ = 0.8. Expected return = 0.4(18%) + 0.6(9%) = **12.6%**. Portfolio risk = √(0.4²·0.2² + 0.6²·0.1² + 2·0.4·0.6·0.8·0.2·0.1) = √0.01768 = **13.30%**. The same assets give σp = 14% if ρ=+1, 10% if ρ=0, and 2% if ρ=−1 — showing risk falls steadily as correlation falls."},{"t":"sub","text":"International diversification"},{"t":"p","text":"Cross-country share prices are fairly uncorrelated, so international diversification can reduce risk. But it introduces **foreign exchange risk** (hedgeable with forward contracts), and adding the wrong markets can lower risk-adjusted return. Requires top-down research and back-testing."},{"t":"h","text":"The Capital Asset Pricing Model (CAPM)"},{"t":"p","text":"Derived by Sharpe, Lintner and Mossin in the mid-1960s, CAPM describes the **equilibrium relationship between systematic risk and expected return**. It rests on assumptions including: rational risk-averse investors, infinitely divisible assets, borrowing/lending at the risk-free rate, no taxes/transaction costs, a single one-period horizon, free information, homogeneous expectations, and markets in equilibrium."},{"t":"def","term":"Market portfolio (M)","def":"The optimal portfolio of all risky assets that all investors hold under CAPM (since expectations are homogeneous). It is fully diversified — only systematic risk remains. In practice proxied by a broad index like the S&P 500."},{"t":"def","term":"Risk-free asset","def":"An asset with no risk providing the risk-free rate (Rf). Its return variance is zero, and its covariance with any risky asset is zero. Beta = 0."},{"t":"sub","text":"The Capital Market Line (CML)"},{"t":"p","text":"The CML shows the risk-return trade-off for **efficiently diversified portfolios** only. It is the efficient frontier formed by combining the **market portfolio with the risk-free asset**. In equilibrium all investors hold a portfolio on the CML. Risk is measured by **total risk (σ)**."},{"t":"formula","name":"Capital Market Line","expr":"E(Rp) = Rf + [ (E(Rm) − Rf) / σm ] × σp","where":["E(Rp) = expected return on efficient portfolio P","Rf = risk-free rate","E(Rm) = expected return on market portfolio","σm = standard deviation of market","σp = standard deviation of portfolio P","(E(Rm)−Rf)/σm = market price of risk (slope)"]},{"t":"sub","text":"The Security Market Line (SML) and Beta"},{"t":"p","text":"The SML applies to **all assets** — individual securities and portfolios, efficient or not — and plots expected return against **systematic risk (beta)**, not total risk."},{"t":"def","term":"Beta (β)","def":"The relative measure of systematic risk: the volatility of a security/portfolio return relative to the market's, multiplied by the correlation coefficient. Market beta = 1. β > 1 means more systematic risk (and higher required return); β < 1 means less. A risk-free asset has β = 0, but a β = 0 asset need not be risk-free (it may carry unsystematic risk)."},{"t":"formula","name":"CAPM / Security Market Line","expr":"E(Ri) = Rf + βi × (Rm − Rf)","where":["E(Ri) = required/expected return on security or portfolio i","Rf = risk-free rate","Rm = expected return on the market","βi = beta of i","(Rm − Rf) = market risk premium"]},{"t":"p","text":"**Worked example:** β = 1.20, Rf = 2.5%, Rm = 14%. E(r) = 2.5 + 1.2(14 − 2.5) = **16.3%**."},{"t":"diagram","kind":"compare","title":"CML vs SML","colA":"Capital Market Line (CML)","colB":"Security Market Line (SML)","rows":[["Efficient portfolios only","All assets & portfolios (efficient or not)"],["X-axis = total risk (σ)","X-axis = systematic risk (β)"],["Slope = market price of risk","Slope = market risk premium"],["Mixes Rf + market portfolio","Prices individual securities"]]},{"t":"sub","text":"Alpha"},{"t":"def","term":"Alpha (α)","def":"The actual outperformance of a portfolio above its CAPM-predicted return. Positive alpha = manager beat the risk-adjusted benchmark; negative alpha = underperformance."},{"t":"p","text":"Example: predicted CAPM return 16.3%; actual 17% → α = **+0.7%**; actual 15% → α = **−1.3%**. Buying positive-alpha funds raises their price and erodes alpha toward zero; selling negative-alpha funds raises their expected return toward zero. Hence alpha is unlikely to persist and should be assumed zero unless analysis shows otherwise."},{"t":"sub","text":"Valuation using the SML"},{"t":"list","ordered":false,"items":["Securities **above the SML** offer above-average return for their beta → **undervalued / under-priced** (buy).","Securities **below the SML** offer below-average return for their beta → **overvalued / over-priced** (sell).","A **steep SML** = large return for small extra risk → market is risk-averse and **cheap**.","A **flat SML** = little return for extra risk → market ignores risk and is **expensive/overvalued**."]},{"t":"h","text":"Arbitrage Pricing Theory (APT)"},{"t":"p","text":"Developed by **Stephen Ross** as a **multifactor** alternative to the single-factor CAPM, addressing CAPM's unrealistic assumptions and the unobservable market portfolio. APT shares CAPM's assumptions of homogeneous beliefs, risk-averse maximisers, perfect markets, and factor-driven returns — but does NOT assume a single-period horizon, no taxes, risk-free borrowing/lending, or mean-variance selection."},{"t":"formula","name":"APT factor model","expr":"Ri = E(Ri) + bi1·f1 + bi2·f2 + … + bin·fn + ei","where":["Ri = actual return on security i","E(Ri) = expected return","f = deviation of a systematic factor from its expected value","bi = sensitivity of i to a factor","ei = random error unique to i"]},{"t":"p","text":"APT risk factors must be **pervasive**, influence expected return, and be **unpredictable** (e.g. unexpected — not expected — inflation). Chen, Roll & Ross (1986) identified four: unanticipated changes in inflation, industrial production, the default-risk premium, and the term structure of interest rates. The main weakness is that the factors are not well specified ex-ante (most studies suggest 3–5 factors)."},{"t":"h","text":"Portfolio Management Services"},{"t":"p","text":"Service levels vary by client type: dedicated/personalised management for institutional, sovereign, corporate and accredited-investor funds (separately managed, regular reviews); for retail investors, pooled vehicles such as unit trusts and bank funds give diversification via economies of scale."},{"t":"diagram","kind":"compare","title":"Advisory vs Discretionary Management","colA":"Advisory","colB":"Discretionary","rows":[["Client stays actively engaged in decisions","Manager decides without per-trade approval"],["Manager advises; client approves","Manager has discretion within the IPS"],["For affluent/accredited clients","Common for most pooled mandates"],["Guided by client instructions","Guided by client's profile & policy statement"]]},{"t":"h","text":"The Portfolio Management Process"},{"t":"p","text":"The process is **dynamic, continuous and systematic**. It balances **what the markets will allow** (research outlook) with **what the client wants** (objectives), feeding into the Investment Policy Statement, portfolio construction, monitoring/rebalancing, and performance review."},{"t":"diagram","kind":"cycle","title":"Portfolio Management Process","stages":[{"label":"Set objectives","sub":"risk & return"},{"label":"Develop strategy","sub":"asset allocation"},{"label":"Monitor markets","sub":"re-evaluate needs"},{"label":"Review & adjust","sub":"rebalance"},{"label":"Measure performance","sub":"vs benchmark"}]},{"t":"h","text":"The Investment Policy Statement (IPS)"},{"t":"def","term":"Investment Policy Statement (IPS)","def":"The written 'investment mandate' that belongs to the CLIENT (not the manager). It documents the client's goals, acceptable risk, constraints and preferences, providing discipline and minimising whipsaw reactions to price swings."},{"t":"key","title":"Typical IPS contents","points":["Introduction (describes the investor)","Statement of purpose","Statement of duties & responsibilities (client, custodian, manager)","Procedures (maintaining/updating the IPS)","Investment objectives (capital appreciation, income, wealth preservation)","Investment constraints (liquidity, horizon, tax, legal/regulatory, unique needs)","Investment guidelines (leverage, loss limits, permissible markets)","Evaluation & review","Appendices on strategic asset allocation & rebalancing policy"]},{"t":"sub","text":"Return requirements & risk tolerance"},{"t":"p","text":"Determined via interview and a **risk-profiling questionnaire**. The **life-cycle approach** frames an individual's risk appetite by stage: **early career** (long horizon, small assets/large liabilities → high-risk growth assets); **mid-career** (serious program, still growth-oriented but reduce risk); **late career** (near retirement → income, capital preservation, lower-risk assets). Each individual's tolerance is still unique (net worth, health, family, job stability, temperament)."},{"t":"h","text":"Investment Constraints"},{"t":"list","ordered":false,"items":["**Liquidity requirements** — immediate needs favour high-quality short-term debt (T-bills, commercial paper); illiquid assets (real estate) require careful monitoring.","**Time horizon** — long horizons can absorb volatility (more equities); short horizons favour shorter-duration bonds and low-volatility shares.","**Tax considerations** — income tax bracket, tax treatment of assets, and dividend/interest vs capital-gains components; high-bracket investors may prefer tax-exempt bonds or capital-gain equities.","**Regulatory & legal constraints** — institutions are more regulated; CPF money is governed by the CPF Investment Scheme.","**Unique needs/preferences** — fiduciary duty to honour client limits (e.g. on equities or FX), stated in writing."]},{"t":"h","text":"Asset Allocation"},{"t":"p","text":"Asset allocation maximises return at a risk level consistent with the investor's objective. **Brinson, Hood & Beebower** found ~91.5%+ of a portfolio's return comes from asset allocation, less than 10% from security selection — making allocation the dominant driver of performance and risk."},{"t":"def","term":"Strategic Asset Allocation (SAA)","def":"The long-run 'policy' asset mix across asset classes, based on the client's risk profile and the manager's long-term forecasts of returns, variances and covariances. Expressed as % weights (often a constant-mix with ranges). Changes infrequently — only when the client's profile/risk tolerance changes."},{"t":"def","term":"Tactical Asset Allocation (TAA)","def":"Short-run overweighting/underweighting of asset classes within the SAA ranges to exploit changing economic/market conditions and relative price inefficiencies. TAA models use valuation approaches (e.g. equity-bond yield gap / risk-premium spread), cyclical considerations, or a combination."},{"t":"diagram","kind":"compare","title":"Strategic vs Tactical Asset Allocation","colA":"Strategic (SAA)","colB":"Tactical (TAA)","rows":[["Long-run 'policy' mix","Short-run deviations"],["Set by client risk profile & LT forecasts","Set by market opportunities"],["Changes rarely","Adjusts within SAA ranges"],["Constant-mix discipline","Overweight / underweight bets"]]},{"t":"p","text":"Example SAA: Equities 45–55%, Bonds 35–45%, Cash 5–15%. A favourable equity outlook may prompt TAA to move equities from 45% to 55% (within range) and bonds from 50% to 40%. Lower risk tolerance → more conservative (bond-heavy) mix; aggressive (capital-gains) portfolios hold more equities. **Rebalancing** restores the policy mix as weights drift."},{"t":"h","text":"Performance Measurement: Returns"},{"t":"formula","name":"Return — no cash flows","expr":"Rp = (VE − VB) / VB","where":["VE = ending portfolio value","VB = beginning value"]},{"t":"p","text":"Example: $30m → $35m gives Rp = 16.7%. A proper total return captures both **income and capital** components."},{"t":"formula","name":"Cash flow at END of period","expr":"Rp = [ (VE + Withdrawals − Deposits) − VB ] / VB","where":["Deposit just before period end is deducted from VE","Example: ($53m−$5m−$50m)/$50m = −4.0%"]},{"t":"formula","name":"Cash flow at START of period","expr":"Rp = [ VE − (VB + Deposits − Withdrawals) ] / (VB + Deposits − Withdrawals)","where":["Adjust the BEGINNING value","Example: [$53m−($50m+$5m)]/$55m = −3.6%"]},{"t":"sub","text":"Dollar-weighted vs Time-weighted"},{"t":"def","term":"Dollar-Weighted Return (DWR)","def":"The internal rate of return that equates the present value of all cash flows (incl. ending value) with the beginning value. Strongly influenced by the size and timing of client cash flows — so it is INAPPROPRIATE for judging a manager."},{"t":"def","term":"Time-Weighted Return (TWR)","def":"Links the sub-period returns between cash flows: Rp = [(1+r1)(1+r2)…] − 1. Independent of cash-flow timing/size, so it is the APPROPRIATE measure of manager performance (and required by GIPS)."},{"t":"formula","name":"Annualised / CAGR","expr":"Annual = [(1+r1)(1+r2)(1+r3)(1+r4)] − 1 ; CAGR: VE = VB(1+r)^n","where":["Quarterly returns geometrically linked","CAGR example: $100→$250 in 5 yrs → r = 20.1%"]},{"t":"sub","text":"Modified Dietz method"},{"t":"def","term":"Modified Dietz method","def":"Estimates the TWR by assuming a constant rate of return and weighting each cash flow by the time it is held, avoiding the need to value the portfolio at each cash-flow date. Less accurate than a true TWR, especially with large flows or in volatile markets."},{"t":"formula","name":"Modified Dietz","expr":"Rp = (VE − VB − CF) / (VB + WCF) ; WCF = Σ CFi × (n − ti)/n","where":["CF = net cash flow","WCF = weighted cash flow","ti = days from start to flow i","n = days in period"]},{"t":"h","text":"GIPS"},{"t":"def","term":"Global Investment Performance Standards (GIPS)","def":"A single global standard for investment performance reporting (revised by the CFA Institute, 2005), replacing country-specific standards."},{"t":"key","title":"Key GIPS principles","points":["Use TOTAL return (realised + unrealised gains + income).","TWR must be used; portfolios valued at least monthly; returns geometrically linked (CAGR).","Performance calculated after deducting actual trading expenses.","Dividends/interest accrued.","Show annual returns for all years (10-year record if the firm is older).","Disclose gross vs net of fees, and use of leverage/derivatives."]},{"t":"h","text":"Risk-Adjusted Performance Measures"},{"t":"formula","name":"Sharpe Ratio (excess return per unit of TOTAL risk)","expr":"Sharpe = (Rp − Rf) / σp","where":["Rp = portfolio return","Rf = risk-free rate","σp = portfolio standard deviation (total risk)","Higher is better"]},{"t":"p","text":"Example (Rf = 6%): A (10%, σ 0.15) → 0.27; B (16%, σ 0.20) → 0.50; Market (13%, σ 0.18) → 0.39. B has the best excess return per unit of total risk."},{"t":"formula","name":"Treynor Ratio (excess return per unit of SYSTEMATIC risk)","expr":"Treynor = (Rp − Rf) / βp","where":["βp = portfolio beta","Uses systematic risk only","Higher is better"]},{"t":"formula","name":"Jensen's Alpha (vs CAPM)","expr":"αp = Ractual − [ Rf + βp(Rm − Rf) ]","where":["Re = CAPM expected return = Rf + βp(Rm−Rf)","Positive α = superior performance","Negative α = inferior performance"]},{"t":"p","text":"**Sharpe vs Treynor:** Sharpe uses total risk (σ); Treynor uses systematic risk (β). For a perfectly diversified portfolio (ρ with market = 1) the two give identical rankings. For an **inadequately diversified** portfolio, the **Treynor ranking is likely higher** than Sharpe, because Treynor ignores the non-systematic risk that remains."},{"t":"diagram","kind":"compare","title":"Sharpe vs Treynor vs Jensen","colA":"Measure","colB":"Risk basis / meaning","rows":[["Sharpe","Excess return ÷ total risk (σ)"],["Treynor","Excess return ÷ systematic risk (β)"],["Jensen's α","Actual return − CAPM expected return"],["Information ratio","α ÷ σ of α (excess return per excess risk)"],["Sortino","Excess return ÷ downside (negative) volatility"]]},{"t":"p","text":"**Information (appraisal) ratio** = αp / σp — outperformance per unit of excess risk; higher is better. **Sortino ratio** = (Rp − Rf) / σnegative — uses only downside volatility, useful for positively-skewed hedge-fund returns where penalising upside volatility (as Sharpe does) is unfair."},{"t":"h","text":"Performance Attribution"},{"t":"def","term":"Performance attribution","def":"Decomposing a portfolio's total performance into components tied to specific manager decisions, to explain why it beat or lagged its benchmark (the 'bogey')."},{"t":"p","text":"A common system splits relative performance into **(a) asset allocation** choices, **(b) sector/industry choice**, and **(c) security choice**. The **bogey** is a passive benchmark whose weights reflect the investor's risk tolerance. Example: managed portfolio returns 5.55% vs bogey 4.10% → excess **1.45%**, of which **0.35%** from asset allocation and **1.10%** from sector/security selection."},{"t":"key","title":"Characteristics of a good benchmark","points":["Unambiguous — clear asset class, securities, composition","Investable — realistically held as a passive portfolio","Measurable — returns obtainable from the market","Consistent with the manager's philosophy","Bought in / accepted by the manager"]},{"t":"h","text":"Portfolio Management and Fund Sales"},{"t":"p","text":"The sales force must communicate accurately and avoid misrepresentation regarding: what the portfolio targets (and its limits), the underlying assets/instruments, the risks the client allows the manager to assume, the service/after-care level, and reliance on third-party vendors (e.g. retrocessions). Mis-selling arises from poor communication between expert portfolio teams and the sales force."}],"newQuestions":[{"type":"mcq","q":"Under which form of the EMH would TECHNICAL analysis based on past prices and volume be unable to consistently produce excess returns, while fundamental analysis might still work?","options":["Weak form","Semi-strong form","Strong form","None of the forms"],"correct":[0],"explain":"The weak form holds that past price/volume data are already reflected in prices, defeating technical analysis. The semi-strong form additionally defeats fundamental analysis, so it is too broad for this stem."},{"type":"mcq","q":"A portfolio holds Security A (expected return 18%, weight 40%) and Security B (expected return 9%, weight 60%). The portfolio's expected return is:","options":["12.6%","13.5%","11.7%","27.0%"],"correct":[0],"explain":"Expected return is a weighted average: 0.4(18%) + 0.6(9%) = 7.2% + 5.4% = 12.6%. 13.5% is the simple average (a trap)."},{"type":"mcq","q":"Using the two-asset risk formula with wA=0.4, wB=0.6, σA=20%, σB=10% and correlation ρ=0.8, the portfolio standard deviation is approximately:","options":["13.30%","14.00%","10.00%","2.00%"],"correct":[0],"explain":"σp = √(0.4²·0.2² + 0.6²·0.1² + 2·0.4·0.6·0.8·0.2·0.1) = √0.01768 = 13.30%. 14% is the ρ=+1 case, 10% the ρ=0 case, and 2% the ρ=−1 case."},{"type":"mcq","q":"A stock has beta 1.20. With a risk-free rate of 2.5% and an expected market return of 14%, the CAPM required return is:","options":["16.3%","13.8%","18.3%","11.5%"],"correct":[0],"explain":"E(r) = Rf + β(Rm − Rf) = 2.5 + 1.2(14 − 2.5) = 2.5 + 13.8 = 16.3%. 13.8% omits the risk-free rate; 11.5% is just the market risk premium."},{"type":"mcq","q":"A portfolio is built from 60% of a stock with beta 1.4 and 40% of a stock with beta 0.6. The portfolio beta is:","options":["1.08","1.00","0.84","1.40"],"correct":[0],"explain":"Portfolio beta is the weighted average of component betas: 0.6(1.4) + 0.4(0.6) = 0.84 + 0.24 = 1.08."},{"type":"mcq","q":"A portfolio returns 16% with a standard deviation of 20%. With a risk-free rate of 6%, the Sharpe ratio is:","options":["0.50","0.80","0.10","0.30"],"correct":[0],"explain":"Sharpe = (Rp − Rf)/σp = (0.16 − 0.06)/0.20 = 0.50. 0.80 wrongly uses 16%/20%; the excess return (10%) must be used."},{"type":"mcq","q":"Which line specifies the equilibrium relation between expected return and SYSTEMATIC risk and applies to ALL securities, both efficient and inefficient?","options":["The Security Market Line (SML)","The Capital Market Line (CML)","The Efficient Frontier","The Sortino Line"],"correct":[0],"explain":"The SML plots expected return against beta (systematic risk) for all assets. The CML uses total risk (σ) and applies only to efficient portfolios."},{"type":"mcq","q":"A security plots ABOVE the Security Market Line. This indicates the security is:","options":["Undervalued (under-priced)","Overvalued (over-priced)","Fairly priced","Risk-free"],"correct":[0],"explain":"Plotting above the SML means the security offers an above-average return for its beta, so it is under-priced; buying pressure should push its price up and return down toward the SML."},{"type":"mcq","q":"Which statement about beta is CORRECT?","options":["A risk-free asset has a beta of zero, but a beta-zero asset need not be risk-free","A beta of zero always means the asset is risk-free","The market portfolio has a beta of zero","Beta measures total risk including firm-specific risk"],"correct":[0],"explain":"A beta-zero asset still earns the risk-free rate but may carry unsystematic risk. The market beta is 1, and beta measures only systematic (not total) risk."},{"type":"mcq","q":"For evaluating a fund MANAGER's performance, which return measure is most appropriate, and why?","options":["Time-weighted return, because it is unaffected by the size and timing of client cash flows","Dollar-weighted return, because it equals the internal rate of return","Dollar-weighted return, because it reflects the actual investor experience","Modified Dietz, because it is always exactly accurate"],"correct":[0],"explain":"TWR isolates the manager's skill from cash flows the manager cannot control. DWR (the IRR) is distorted by client deposit/withdrawal timing, so it is inappropriate for judging the manager."},{"type":"mcq","q":"A portfolio's actual return is 17% while its CAPM-predicted return is 16.3%. Jensen's alpha is:","options":["+0.7%","−0.7%","+16.3%","+33.3%"],"correct":[0],"explain":"α = Actual − CAPM-predicted = 17% − 16.3% = +0.7%, indicating outperformance of the risk-adjusted benchmark."},{"type":"mcq","q":"Brinson, Hood and Beebower's study found that the dominant driver of a portfolio's return (over 91%) is:","options":["Asset allocation","Security selection","Market timing","Currency hedging"],"correct":[0],"explain":"Their study attributed 91.5%+ of portfolio return to asset allocation and less than 10% to security selection, underscoring allocation's importance."},{"type":"mcq","q":"Combining two securities with a correlation coefficient of −1 will:","options":["Allow portfolio risk to be eliminated altogether","Provide no reduction in portfolio risk","Make portfolio risk a simple weighted average of the two risks","Double the portfolio's standard deviation"],"correct":[0],"explain":"Perfect negative correlation (ρ = −1) allows risk to be eliminated entirely — the principle behind hedging. ρ = +1 gives no reduction (risk is the weighted average)."},{"type":"mcq","q":"A portfolio worth $50m at the start of the quarter receives a $5m client deposit just before quarter-end; the ending value is $53m. The quarterly return is:","options":["−4.0%","6.0%","10.0%","−3.6%"],"correct":[0],"explain":"Deduct the end-of-period deposit from VE: ($53m − $5m − $50m)/$50m = −4.0%. The +6% trap ignores the deposit; −3.6% applies to a start-of-period deposit."},{"type":"mcq","q":"Which is the LEAST accurate description of Tactical Asset Allocation (TAA)?","options":["It sets the long-run policy mix and changes only when the client's risk profile changes","It overweights or underweights asset classes over the short run","It responds to changing economic and market conditions","It seeks to exploit relative price inefficiencies across asset classes"],"correct":[0],"explain":"The long-run policy mix that rarely changes describes STRATEGIC asset allocation, not TAA. TAA is the short-run adjustment within the SAA ranges."},{"type":"mrq","q":"Select all characteristics of SYSTEMATIC risk:","options":["It cannot be eliminated by diversification","It arises from macroeconomic factors such as interest rates and inflation","It can be reduced to zero by adding many uncorrelated securities","Exposure to it can be partly offset through hedging with options/futures"],"correct":[0,1,3],"explain":"Systematic (market) risk is undiversifiable and stems from macro factors; it can be hedged but not diversified away. Reducing risk to zero through diversification describes non-systematic risk."},{"type":"mrq","q":"Select all that are examples of ACTIVE management strategies described in the chapter:","options":["Security selection of undervalued shares","Sector rotation","Market timing","Buying a low-cost index tracker fund"],"correct":[0,1,2],"explain":"Security selection, sector rotation and market timing are active strategies aiming to beat the market. Buying an index tracker is a passive strategy."},{"type":"mrq","q":"Select all CORRECT statements comparing the Sharpe and Treynor ratios:","options":["Sharpe uses total risk (standard deviation); Treynor uses systematic risk (beta)","For a perfectly diversified portfolio the two give identical rankings","An inadequately diversified portfolio tends to rank higher under Treynor than under Sharpe","Both use the portfolio's beta in the denominator"],"correct":[0,1,2],"explain":"Sharpe's denominator is σ and Treynor's is β; for ρ=1 (perfect diversification) σ reflects only systematic risk so rankings coincide; poorly diversified funds rank higher on Treynor because it ignores their leftover non-systematic risk."},{"type":"mrq","q":"Select all items that are typically part of an Investment Policy Statement (IPS):","options":["Investment objectives (e.g., capital appreciation, income, preservation)","Investment constraints (liquidity, time horizon, tax, legal)","Statement of duties and responsibilities","A guaranteed minimum annual return for the client"],"correct":[0,1,2],"explain":"The IPS documents objectives, constraints, duties/responsibilities, guidelines and review procedures. No IPS guarantees returns — that would be misrepresentation."},{"type":"mrq","q":"Select all fundamental principles required by the Global Investment Performance Standards (GIPS):","options":["Total return (including realised and unrealised gains and income) must be used","Time-weighted return must be used","Performance must be calculated after deducting actual trading expenses","Only dollar-weighted return may be reported to clients"],"correct":[0,1,2],"explain":"GIPS mandates total return, TWR, monthly valuation, geometric linking, and reporting net of trading expenses. It does not require (and effectively excludes) DWR for manager performance reporting."}]},"09":{"notes":[{"t":"h","text":"9.1 Introduction: Collective Investment Schemes"},{"t":"p","text":"In Singapore, most pooled investments are **Collective Investment Schemes (CIS)** or **unit trusts**, governed by the **Code on Collective Investment Schemes (Code on CIS)** issued by the **MAS**. A CIS pools money from many investors so they can access professional asset-management capabilities."},{"t":"def","term":"Collective Investment Scheme (CIS)","def":"An arrangement that pools the financial resources of many investors to be invested and managed collectively by professional fund managers, governed in Singapore by the Code on CIS."},{"t":"p","text":"Three main fund structures can be set up in Singapore: **unit trusts**, **investment holding/dealing companies**, and **limited partnerships**. These can be imperfect for funds (e.g., a company can only pay dividends out of profits and faces restrictions on returning capital)."},{"t":"sub","text":"Variable Capital Company (VCC)"},{"t":"p","text":"The **Variable Capital Companies Act (Oct 2018)** created the **VCC**, essentially a company that (1) can freely **issue and redeem shares and pay dividends out of capital**, and (2) can adopt an **umbrella structure with multiple sub-funds** for operating efficiency. The VCC encourages funds domiciled elsewhere to re-domicile in Singapore."},{"t":"key","title":"Key points","points":["Conventional CIS: ETFs and unit trusts (mainly listed equity and fixed-income).","Alternative CIS: REITs, business trusts, hedge funds, private equity (niche asset classes/strategies).","Insurance products pool both investment funds AND mortality/longevity risks."]},{"t":"h","text":"9.2 Exchange-Traded Funds (ETFs)"},{"t":"def","term":"Exchange-Traded Fund (ETF)","def":"A passively managed fund designed to track the performance of a specific index or a fixed basket of stocks/debt securities, whose units are listed and traded on an exchange like a stock."},{"t":"p","text":"ETFs differ from open-end and closed-end funds because they involve **no active management**. Underlying assets can be local or international and span stocks, fixed income, commodities, money market, or currency. Examples: the **SPDR S&P 500** (\"Spiders\"), **DJIA DIAMONDS**, and Singapore's first locally created ETF, the **SPDR STI ETF** (listed on SGX-ST since April 2002, tracks the Straits Times Index)."},{"t":"p","text":"The SPDR STI ETF is priced at about **1/100th of the STI level** (STI at 1,700 implies a unit price of $17.00), trades in **board lots of 100 units**, pays dividends roughly twice a year approximating the STI yield, and has **annual costs of 0.3%** (management, trustee, and other expenses). It invests in STI component stocks in proportion to their index weights."},{"t":"sub","text":"NAV vs Market Price"},{"t":"def","term":"Net Asset Value (NAV)","def":"The fair value of the fund's holdings, determined at the daily close of trading in all markets where the ETF is listed (per the Trust Deed/Prospectus). NAV per unit represents fair value for the ETF."},{"t":"p","text":"An ETF's **market price can deviate from NAV per unit** because price also reflects investor sentiment (supply and demand). ETFs are quoted at bid and ask prices that track, but do not always equal, NAV."},{"t":"sub","text":"Creation and Redemption"},{"t":"p","text":"Unlike a unit trust (which simply creates units when investors buy), STI ETF units can only be **created for, or redeemed by, participating dealers in blocks of 100,000 units**. To **create** units, a participating dealer deposits a specified portfolio of stocks closely approximating the index with the **trustee**. To **redeem**, ETF shares are delivered to the trustee in exchange for the underlying basket of securities. This in-kind mechanism, combined with arbitrage, keeps price close to NAV."},{"t":"sub","text":"Arbitrage that closes the price-NAV gap"},{"t":"p","text":"If the traded price is **above NAV**, an arbitrageur **sells the ETF and buys the underlying portfolio**. If the traded price is **below NAV**, the arbitrageur **sells the underlying portfolio and buys the ETF**. This arbitrage reduces the differential between price and NAV."},{"t":"diagram","kind":"flow","title":"ETF creation / redemption","steps":[{"label":"Participating Dealer","sub":"deposits basket of stocks"},{"label":"Trustee","sub":"creates 100,000-unit block"},{"label":"Market","sub":"dealer sells ETF units"},{"label":"Redemption","sub":"return units to trustee for basket"}]},{"t":"sub","text":"9.2.1 ETF Replication Structures"},{"t":"p","text":"**Physical (cash/direct) replication** holds the actual index securities. **Full replication** buys all listed stocks in exact index proportions; **representative sampling** buys a subset of dominant stocks (used when index constituents are illiquid)."},{"t":"p","text":"**Synthetic replication** uses **swaps and derivatives** to mimic the index. Advantage: **reduces tracking error**. Disadvantage: **counterparty risk** (the derivative counterparty may default). A common example uses a **total return swap**: the counterparty delivers the income and capital-gains return of the reference index to the ETF, which pays a fee. **Swap-based ETFs usually do not pay dividends.**"},{"t":"diagram","kind":"compare","title":"Physical vs Synthetic ETF","colA":"Physical (cash)","colB":"Synthetic (swap)","rows":[["Holds actual index securities","Holds derivatives/swaps mimicking index"],["Full replication or representative sampling","Total return swap with counterparty"],["Higher tracking error","Lower tracking error"],["Lower counterparty risk (may arise via sec-lending)","Significant counterparty risk"],["May pay dividends","Swap-based ETFs usually pay no dividends"]]},{"t":"sub","text":"9.2.2 Investment Strategies with ETFs"},{"t":"list","ordered":false,"items":["Long-term buy-and-hold.","Short-term tactical trading (price transparency and liquidity).","Core-satellite: a broad-index core plus higher-risk satellites.","Hedging other portfolio risks.","Cash equitization: converting cash to equities via ETFs to minimise cash drag."]},{"t":"sub","text":"9.2.3 Securities Borrowing and Lending"},{"t":"p","text":"ETFs can pay agents to **lend out portfolio shares** and earn interest. The borrower posts collateral (e.g., cash/securities ~105% of value) over the lending period (e.g., 30 days). Borrowers are often short-sellers needing stock for delivery. If the borrower defaults, the ETF faces a loss equal to the lent stocks' value, so securities lending creates **counterparty risk**."},{"t":"sub","text":"9.2.4 Advantages of ETFs"},{"t":"list","ordered":false,"items":["Diversification across a basket of securities.","Diversification with small capital outlay.","Low costs (annual fees usually <1% vs 1-2% for active unit trusts; no initial or redemption charges).","Liquidity: tradable any time during exchange hours at prevailing prices.","Transparency: holdings are continuously visible (unit trusts disclose only quarterly/semi-annually/annually)."]},{"t":"sub","text":"9.2.5 Risks of Standard ETFs"},{"t":"list","ordered":false,"items":["Tracking error: GREATER in physical ETFs than synthetic ETFs (swaps track more precisely).","Counterparty risk: high for synthetic ETFs; physical ETFs face it via third-party securities lending.","Market and sector risk.","Foreign exchange risk on foreign-currency constituents.","Taxation: non-US investors in US-established ETFs may face US withholding tax on distributions."]},{"t":"sub","text":"9.2.6-9.2.8 Specialised ETFs"},{"t":"p","text":"**Smart beta ETFs** select and weight stocks using positive performance criteria (cashflow, dividends, earnings) rather than plain market-cap weighting. **Volatility (VIX) ETFs** are for very short-term trading, not investing. **Leveraged ETFs** use financing and derivatives to amplify daily returns (commonly 2x/3x, or inverse), are often issued in long-short pairs, are highly volatile, and are **generally not suitable for retail investors**. Issuers often perform reverse splits to reset prices."},{"t":"h","text":"9.3 Unit Trusts"},{"t":"def","term":"Unit Trust","def":"A CIS that pools funds from many investors, invested and managed by one or more fund managers under the care of an independent trustee. In the US it is called a mutual fund (not necessarily a trust); in the UK, a unit trust; in Germany, an investment fund."},{"t":"p","text":"The **trustee** holds the cash, shares, and assets in its own name on behalf of investors, safeguarding them and ensuring managers act within the **trust deed** (an agreement between trustee and managers setting out aims, charges, and rules). Offshore terms: **Sicaf** (closed-end company) and **Sicav** (open-ended company); much offshore fund money is domiciled in **Luxembourg**."},{"t":"sub","text":"9.3.1-9.3.2 Domicile and Offshore Funds"},{"t":"p","text":"A fund's **domicile** is where it is based; a fund can be registered in many jurisdictions but has only **one domicile**. Singapore allows marketing of offshore funds. Offshore participation can be offered via: (i) a **public offering** on the local exchange, (ii) a **private placement**, or (iii) the **Division 5A exception** (to Institutional, Expert, and Accredited Investors)."},{"t":"sub","text":"9.3.3 Open-End vs Closed-End"},{"t":"diagram","kind":"compare","title":"Open-end vs Closed-end unit trusts","colA":"Open-End","colB":"Closed-End","rows":[["Over-the-counter","Exchange traded"],["Counterparty: issuer","Counterparty: listed exchange or issuer"],["Exit by sale/redemption through trustee","Exit by sale in the market"],["Continuous issuance of units","Fixed number of units"],["Priced at NAV","Priced by market demand & supply (and fund performance)"]],"_note":"Most Singapore unit trusts are open-end and offered to retail investors; closed-end funds are usually sold to accredited investors via private placement."},{"t":"p","text":"A unit trust divides a fund into equal **units**, each representing the same proportion of the trust's assets. Example: if investments are worth $10 million and 5 million units are issued, each unit is worth **$2**. Most unit trusts are valued daily; the value of a unit trust is its **NAV = assets − liabilities**."},{"t":"sub","text":"9.3.4 Role of Trustee"},{"t":"p","text":"Managers neither hold investments nor issue/redeem units — the **trustee** does. In an open-end trust the trustee **creates new units on purchases and redeems units on liquidations**, so capitalisation is \"open\" and units outstanding change daily. A **prospectus** details objectives, approach, performance, and fees."},{"t":"sub","text":"9.3.5-9.3.6 Advantages & Disadvantages"},{"t":"list","ordered":false,"items":["Advantages: diversification & divisibility; small capital outlay ($1,000-$5,000); professional management; flexibility to switch within a fund family; liquidity (trustee buys back at NAV less charges); lower transaction costs; security (assets held by independent trustee).","Disadvantages: relatively high sales charges and transaction costs from frequent trading; annual management fees charged regardless of performance."]},{"t":"sub","text":"9.3.7 Major Types of Unit Trust Funds"},{"t":"table","headers":["Fund type","What it invests in / feature"],"rows":[["Money market","Short-term (<1yr) instruments: CDs, commercial paper, T-bills. Usually no sales/redemption charge but pays a management fee."],["Fixed-income","Bonds (corporate, government, convertible, high-yield)."],["Equity","Shares; may focus on a sector, country, region, or be global."],["Balanced","Mix of equity and fixed income for income plus long-term growth; fairly constant mix."],["Multi-asset",">2 asset classes including private equity/commodities; manager makes tactical calls."],["Index","Passively tracks an index; lower fees than active funds."],["Fund of funds","Invests in other funds chosen by qualitative/quantitative criteria; dual layer of fees."],["Multi-manager","Invests via two or more external managers/funds; more fees with more managers."],["Capital-guaranteed","Needs an eligible guarantor (AA for FIs, AAA for others) and an unconditional written guarantee for >=100% of capital (less front-end load); usually only if held to maturity."],["Capital preservation","Aims at some preservation; no guarantor required; less onerous language."],["Hedge fund","Uses derivatives, short selling, arbitrage; targets absolute returns; performance fees."],["Umbrella / family of funds","Multiple sub-funds under one trust; switch cheaply between them."]]},{"t":"p","text":"Investors can use **CPF funds** via the **CPF Investment Scheme (CPFIS)**. Managers of CPF monies report quarterly to the CPF Board, and a funds-tracking company publishes performance/risk information on CPFIS-included funds."},{"t":"sub","text":"9.3.10 Fees and Expenses"},{"t":"def","term":"Load vs No-Load Fund","def":"A no-load fund imposes no initial sales charge or redemption charge (bid = offer = NAV). A load fund with a front-end load is sold at NAV plus a sales commission (the 'load'), usually 1.5-5% of NAV."},{"t":"def","term":"Back-end load (redemption fee)","def":"A realization/redemption charge on sale, often waived after a holding period (e.g., 60 days); its purpose is to discourage rapid trading and the resulting transaction costs."},{"t":"list","ordered":false,"items":["Management fee: ~0.5%-2.0% of NAV, accrued daily and debited from fund assets.","Switching fee: ~1% when moving between sub-funds in an umbrella fund.","Trustee, custodian, audit fees: ~0.1-0.15% of NAV.","Distribution fee: charged annually for advertising/selling.","Performance fee: incentive for beating benchmark, subject to a high watermark."]},{"t":"def","term":"Total Expense Ratio (TER)","def":"Total expenses (including management fees) measured against the fund's NAV; used to assess a manager's operational efficiency and compare funds."},{"t":"sub","text":"9.3.12 Net Asset Value (NAV) Formula"},{"t":"formula","name":"NAV per unit (OTC fund)","expr":"NAV per unit = (Fund securities + Other assets − Liabilities incl. mgt fees − Leverage debt) / Total units outstanding","where":["Fund securities = market value of holdings","Other assets = cash and accrued income","Liabilities = payables including accrued management fees","Leverage debt = borrowings used for leveraging (if any)","Units outstanding change with issuances/redemptions for open-end funds"]},{"t":"sub","text":"9.3.13 Bid-Offer Price"},{"t":"p","text":"There is a gap between NAV and the prices an investor buys/sells at, so existing holders do not unfairly bear new transaction costs. The **offer price** (buying price) = NAV per unit + purchase-related expenses (broker commission, clearing) + cash & accrued income + **manager's initial charge**. The **bid price** (selling price) = NAV per unit − sale-related expenses + cash & accrued income."},{"t":"sub","text":"9.3.14-9.3.18 Evaluation & Retrocessions"},{"t":"p","text":"Many funds cap a single security at **5%** of assets (some allow 8-9% to outperform). Suitability matches the fund to client risk tolerance, return expectations, horizon, and currency. **Fund size** matters: fixed costs hurt small funds (a SGD10,000 expense is 0.125% of an SGD8m fund but 1% of an SGD1m fund), while very large funds become hard to manage and may close to new subscriptions."},{"t":"def","term":"Retrocession","def":"A fee received by banks/FIs for distributing third-party products to clients. It creates a conflict of interest, is often undisclosed, and is a cost offset against fund performance that reduces NAV for existing clients."},{"t":"h","text":"9.4 Real Estate Investment Trusts (REITs)"},{"t":"def","term":"REIT","def":"A CIS that pools investor funds to invest predominantly in real estate; under the Code on CIS (Property Funds Appendix) at least 75% of the fund must be invested in income-producing real estate. Essentially a passive vehicle that collects rent."},{"t":"p","text":"A REIT is like a unit trust but needs a wider range of specialists, usually has a **Sponsor** (with a stake) that injects the initial portfolio and provides an asset pipeline, and its **properties are valued only once a year** (vs daily for listed equities/bonds). REITs are **listed on the SGX Mainboard**; unlisted property trusts are constituted similarly but are not publicly traded and need not distribute income."},{"t":"diagram","kind":"flow","title":"REIT structure","steps":[{"label":"Unitholders","sub":"buy units, receive distributions"},{"label":"REIT","sub":"trust deed; >=75% in real estate"},{"label":"Trustee + Manager","sub":"separate & independent"},{"label":"Properties","sub":"rental income from tenants"}]},{"t":"sub","text":"9.4.2 Advantages of REITs"},{"t":"list","ordered":false,"items":["Affordable and more diversified than buying a single property.","High liquidity: traded on the exchange with low transaction costs.","Favourable tax treatment for REITs distributing >=90% of taxable income.","Professional property management included."]},{"t":"sub","text":"9.4.3 Risks of REITs"},{"t":"list","ordered":false,"items":["Market risk: price moves with supply/demand, sector outlook, interest rates.","Income risk: a REIT may not distribute if it makes an operating loss (lease expiry, low occupancy, tenant default).","Concentration risk: few properties, sectors, or tenants.","Liquidity risk: underlying physical property is hard to sell quickly.","Leverage risk: single-tier gearing limit of 45% in Singapore.","Refinancing risk: because >=90% of income is distributed, little cash is retained; REITs rely on new borrowing or rights issues."]},{"t":"key","title":"REIT key numbers","points":["Minimum 75% of fund in income-producing real estate (to be a REIT).","Distribute at least 90% of taxable income for favourable tax treatment.","Gearing (leverage) limit of 45% (single-tier).","Properties valued at least once a year."]},{"t":"h","text":"9.5 Business Trusts (BTs)"},{"t":"def","term":"Business Trust","def":"A hybrid trust/company structure under the Business Trusts Act 2004, established by a trust deed but NOT a separate legal entity, run by a single responsible entity — the Trustee-Manager — that both holds and manages the assets."},{"t":"p","text":"BT advantages: limited liability for unit holders; **distributions from operating cash flow** (not accounting profits); CIS investment restrictions do not apply. BTs suit asset-backed/infrastructure businesses with depreciating assets but strong cash flows. Unlike REITs, BTs can **actively run a business** and have **no gearing cap** (though indiscriminate borrowing is a risk)."},{"t":"diagram","kind":"compare","title":"Listed REIT vs Business Trust","colA":"Listed REIT","colB":"Business Trust","rows":[["Trustee and Manager separate & independent","Single Trustee-Manager"],["Passive investments only","Can actively run a business"],["Mandatory >=90% distribution (for tax)","No mandatory minimum; distribute from cash flow"],["45% gearing limit","No gearing limit"],["Min 90% income from rental","No investment restrictions"],["SFA / Code on CIS","Business Trusts Act"],["Tax exempt for individual unitholders","Single-tier taxation"]]},{"t":"sub","text":"9.6 Stapled Securities"},{"t":"p","text":"A **stapled security** lists two or more securities traded as one instrument (commonly a hospitality REIT stapled to a business trust). It combines a passive-income security with an active-income security. The issuer must obey each component's rules (e.g., still pay >=90% on the REIT) and the stapled product **cannot be marketed as a REIT**."},{"t":"sub","text":"9.7 UCITS"},{"t":"p","text":"**UCITS** (Undertakings for Collective Investment in Transferable Securities) is an EU directive providing a **\"passport\"** for funds to be sold cross-border. Attractive for common disclosure standards; **UCITS III** allows derivatives and index-tracking products. MAS has allowed UCITS funds in Singapore since 2006."},{"t":"h","text":"9.8 Alternative Investments"},{"t":"p","text":"Beyond REITs/BTs: **hedge funds, private equity, commodity funds, real estate funds**. Their benefit is diversification using asset classes **less correlated** with equities and bonds, potentially raising risk-adjusted returns — though during severe crises (e.g., GFC 2008) correlations rise and the buffer weakens."},{"t":"sub","text":"9.8.1-9.8.3 Hedge Funds"},{"t":"p","text":"Hedge funds can **short and use derivatives** to reduce beta, target **absolute returns**, use leverage to produce alpha, and charge **performance/incentive fees** on top of higher management fees. They can be less transparent and slower to unwind. Risks: risky/leveraged strategies (basis and counterparty risk), illiquidity (mitigated by **lock-up periods** and **gate provisions**), and poorer investor protection/agency risk."},{"t":"diagram","kind":"compare","title":"Hedge funds vs Conventional funds","colA":"Hedge Funds","colB":"Conventional Funds","rows":[["Capture alpha; can hedge away beta","Capture alpha + beta; limited risk reduction"],["Performance mainly from manager skill/strategy","Performance mainly from market factors"],["Absolute return targets","Index-based benchmark targets"],["Significant leverage","Limited leverage"],["Less transparent; slow to unwind","More transparent pricing"],["Management + performance fees","Mainly management fees"]]},{"t":"p","text":"Hedge fund strategies include **relative value arbitrage** (long-short equity, convertible arbitrage), **event-driven** (distressed securities/vulture funds, merger arbitrage), **global macro** (directional macro bets), and **directional quantitative** (momentum / 'the trend is your friend'). A **market-neutral** long-short equity strategy invests equal dollar amounts long and short."},{"t":"sub","text":"9.8.9-9.8.11 Private Equity"},{"t":"p","text":"**Private equity** funds are long-term, OTC, sold mainly to accredited/institutional investors. Stages: **venture capital** (seed/start-up), **growth capital** (scale-up), **buyout funds** (mature firms), and **special situations** (going private, distressed). Cash flows follow a **J-curve**: ~5-6 year investment period with drawdowns and negative early returns, then a harvest period from year 6; expected IRR ~10-15%, but early redemption usually causes losses."},{"t":"sub","text":"9.8.12 Commodity & Real Estate Funds"},{"t":"p","text":"Largely similar to commodity ETFs and REITs but **sold OTC** (less liquid, sometimes more transparent). Real estate funds face a **liquidity mismatch** between redeemable units and illiquid property, prompting managers to delay redemptions in distressed markets."},{"t":"h","text":"9.9 Insurance"},{"t":"p","text":"Some insurance products also serve as **savings/investment instruments**. The two main life policies that double as savings/investment vehicles are **Whole Life** and **Endowment** insurance."},{"t":"def","term":"Whole Life Insurance","def":"Provides life cover plus an investment element; the sum assured is paid on the death of the life insured whenever it occurs. Premiums and death benefit are fixed; reserves build cash/surrender value that can be withdrawn or borrowed against."},{"t":"def","term":"Endowment Insurance","def":"Provides life cover plus investment, but matures after a fixed term (e.g., 10/15/20 years). The fixed sum assured is paid on the maturity date OR on death, whichever is earlier. Premiums are higher than whole life or term; guaranteed cash value may be less than premiums paid."},{"t":"diagram","kind":"compare","title":"Term vs Whole Life vs Endowment","colA":"Whole Life","colB":"Endowment","rows":[["Pays sum assured on death, whenever it occurs","Pays on maturity date OR death, whichever is earlier"],["Builds cash/surrender value","Builds cash/surrender value"],["Lower premium than endowment","Higher premiums than whole life and term"],["Lifelong protection","Fixed term; lump-sum at maturity (e.g., college, retirement)"]]},{"t":"p","text":"**Term insurance** (referenced as having the lowest premiums) provides pure protection for a set period with no cash/surrender value, unlike whole life and endowment which combine protection with savings."},{"t":"sub","text":"9.9.3 Participating vs Non-Participating & ILPs"},{"t":"def","term":"Non-participating (non-profit) policy","def":"A policy structured to provide only a fixed, guaranteed death benefit (sum assured) — no share of insurer surplus."},{"t":"def","term":"Participating (with-profits) policy","def":"A policy whose benefits include a non-guaranteed bonus from the insurer's annual surplus. The bonus is usually reversionary (payable only when the sum assured is paid); the link to investment performance is INDIRECT, smoothed, declared yearly by the board on the actuary's recommendation."},{"t":"def","term":"Investment-Linked Policy (ILP)","def":"A life policy whose value is DIRECTLY linked to the performance of underlying investments, by linking the policy value to units in a fund (run by the insurer or external managers). Value fluctuates daily with the investments."},{"t":"diagram","title":"Insurance investment linkage","cols":["Link to investment performance","Benefit certainty"],"rows":[{"label":"Non-participating","cells":["None","Fully guaranteed sum assured"]},{"label":"With-profits (participating)","cells":["Indirect, smoothed, annual bonus","Guaranteed sum assured + non-guaranteed bonus"]},{"label":"Investment-linked (ILP)","cells":["Direct, daily","Value varies with investments; little/no guarantee"]}],"kind":"matrix"},{"t":"h","text":"9.10 Annuities"},{"t":"def","term":"Annuity","def":"A series of payments guaranteed for a number of years or over the lifetime of the annuitant. It protects against longevity risk (outliving one's income) — the opposite purpose of life insurance, which protects against premature death."},{"t":"p","text":"**Immediate annuity**: payments begin as soon as purchased; always bought with a lump-sum (single premium). **Deferred annuity**: payments begin at a future date; can be bought with a single or periodic premiums. Payout depends on contributions, interest earned, and the annuitant's gender and age at commencement. Non-insurance examples: home mortgage payments and fixed coupon payments."},{"t":"formula","name":"Present value of an annuity","expr":"PV = C × [ (1 − (1 + i)^(−n)) / i ]","where":["C = cash flow per period","i = interest (discount) rate per period","n = number of payments","Example: C=1,000, i=3%, n=5 -> PV = $4,579.71"]},{"t":"formula","name":"Future value of an annuity","expr":"FV = C × [ ((1 + i)^n − 1) / i ]","where":["C = cash flow per period","i = interest rate per period","n = number of payments","Example: C=1,000, i=5%, n=8 -> FV = $9,549.11"]},{"t":"p","text":"Uses of annuities: insurance against **outliving one's income**; a **savings/investment vehicle** (accumulate then liquidate funds for retirement — attractive to those with high but short earning periods like athletes/entertainers); and a **hedge against adverse financial developments** for the already-wealthy."},{"t":"h","text":"9.11 Risk Management for Retirement (CPF) & Dollar Cost Averaging"},{"t":"p","text":"For CPFIS eligibility, funds must be in the **top quartile of their global peer group** and benchmark their TER to the median of CPFIS funds in their risk class. **Diversification** and **dollar-cost averaging** are recommended."},{"t":"def","term":"Market Timing","def":"An active approach of shifting in and out of risky assets to capture bull-market upside and avoid bear-market downside; difficult to do consistently."},{"t":"def","term":"Dollar Cost Averaging (DCA)","def":"Investing equal dollar amounts at regular intervals; fewer units are bought when prices are high and more when low, lowering the average cost per unit. Suitable for investors with little time to monitor markets."},{"t":"p","text":"DCA example: $5,000/month invested over 12 months buys 12,980 units, giving an average cost of $60,000/12,980 = **$4.622**, lower than the lump-sum average of $5.00 and the simple 12-month average price of ~$4.633. Empirically, **missing the best 25 days** of the S&P (1970-2016) cut returns from 1,910% to 371% (6.7% to 3.0% p.a.), supporting passive buy-and-hold over market timing; 70-80% of active managers underperform the market each year."},{"t":"diagram","kind":"bars","title":"Relative annual fee level (typical)","unit":"% of NAV","data":[{"label":"Active unit trust mgmt fee","value":2,"note":"1-2%"},{"label":"ETF mgmt fee","value":1,"note":"<1%"},{"label":"REIT gearing limit","value":45,"note":"% cap"}]}],"newQuestions":[{"type":"mcq","q":"A unit trust holds investments worth $24 million with liabilities (including accrued management fees) of $4 million, and has 5 million units outstanding. What is the NAV per unit?","options":["$4.00","$4.80","$5.60","$5.00"],"correct":[0],"explain":"NAV per unit = (assets − liabilities) / units = ($24m − $4m) / 5m = $20m / 5m = $4.00. $4.80 ignores the liabilities; $5.00 wrongly excludes management fees."},{"type":"mcq","q":"The SPDR STI ETF is priced at about 1/100th of the STI level. If the STI is at 3,400, the approximate price of one ETF unit is:","options":["$3.40","$34.00","$340.00","$0.34"],"correct":[1],"explain":"1/100th of 3,400 = $34.00. The chapter gives the example of STI at 1,700 implying $17.00 per unit."},{"type":"mcq","q":"An investor puts $20,000 into a load fund with a 3% front-end load. After deducting the load, how much is actually invested at NAV?","options":["$19,400","$20,000","$19,000","$20,600"],"correct":[0],"explain":"A front-end load is charged on top of/within the subscription; $20,000 × (1 − 0.03) = $19,400 is invested. $20,600 wrongly adds the load."},{"type":"mcq","q":"A REIT generates $90 million of annual distributable income. To qualify for favourable tax treatment in Singapore, what minimum amount must it distribute to unitholders?","options":["$67.5 million","$45.0 million","$81.0 million","$90.0 million"],"correct":[2],"explain":"REITs must distribute at least 90% of taxable income: $90m × 90% = $81.0m. 75% ($67.5m) is the minimum that must be INVESTED in real estate, not distributed."},{"type":"mcq","q":"A REIT unit trades at $1.20 and pays annual distributions of $0.084 per unit. What is its distribution yield?","options":["8.4%","6.0%","7.0%","12.0%"],"correct":[2],"explain":"Distribution yield = distribution / price = $0.084 / $1.20 = 7.0%. 8.4% misreads the distribution as a percentage; 6.0% divides by a wrong base."},{"type":"mcq","q":"A synthetic ETF tracks an index that returned 10.00%; the ETF returned 9.95%. A physical ETF on the same index returned 9.70%. The tracking difference of the synthetic ETF is:","options":["0.30%","0.05%","0.25%","0.95%"],"correct":[1],"explain":"Tracking difference = index return − ETF return = 10.00% − 9.95% = 0.05%. The physical ETF's is 0.30%, illustrating that physical ETFs generally have GREATER tracking error than synthetic ETFs."},{"type":"mcq","q":"Two funds earn the same 8% gross return. Fund A has a total expense ratio of 0.5% and Fund B has a TER of 2.0%. The difference in net return to investors is:","options":["2.5%","1.5%","0.5%","1.0%"],"correct":[1],"explain":"Net returns are 7.5% vs 6.0%, a difference of 1.5% — equal to the TER gap (2.0% − 0.5%). This shows how a higher expense ratio directly erodes returns."},{"type":"mcq","q":"Under what circumstance will an arbitrageur SELL ETF units and BUY the underlying basket of securities?","options":["When the ETF's traded price is below its NAV","When the ETF's traded price equals its NAV","When the ETF's traded price is above its NAV","When the index is falling"],"correct":[2],"explain":"When price > NAV the ETF is rich, so the arbitrageur sells the ETF and buys the cheaper underlying basket. When price < NAV they do the reverse. This arbitrage narrows the price-NAV gap."},{"type":"mcq","q":"ETF units of the SPDR STI ETF can be created or redeemed only by participating dealers in blocks of:","options":["100 units","1,000 units","10,000 units","100,000 units"],"correct":[3],"explain":"Creation/redemption occurs in 100,000-unit blocks with participating dealers (the board LOT size for retail trading is only 100 units)."},{"type":"mcq","q":"Which statement about open-end and closed-end unit trusts is CORRECT?","options":["Open-end funds have a fixed number of units; closed-end funds issue units continuously","Open-end funds are exchange-traded; closed-end funds are OTC","Open-end fund price is the NAV; closed-end fund price is set by market supply and demand","Closed-end funds are exited by redemption through the trustee"],"correct":[2],"explain":"Open-end funds are priced at NAV with continuous issuance and OTC exit through the trustee; closed-end funds have a fixed number of units, are exchange-traded, and are priced by market supply/demand."},{"type":"mcq","q":"What is the Singapore single-tier gearing (leverage) limit applicable to REITs?","options":["35%","40%","45%","No limit"],"correct":[2],"explain":"REITs are subject to a 45% single-tier leverage limit. 'No limit' applies to business trusts, not REITs."},{"type":"mcq","q":"Which type of insurance policy pays the sum assured on the maturity date OR on the death of the life insured, whichever is earlier?","options":["Whole life insurance","Term insurance","Endowment insurance","Investment-linked policy"],"correct":[2],"explain":"An endowment policy matures after a fixed term and pays on maturity or earlier death. Whole life pays only on death; term has no maturity payout."},{"type":"mcq","q":"In a with-profits (participating) life policy, the bonus is best described as:","options":["A guaranteed daily-fluctuating amount linked directly to investments","A non-guaranteed reversionary amount loosely/indirectly linked to the insurer's performance","A fixed amount paid annually in cash regardless of fund surplus","Equal to the sum assured paid immediately on policy purchase"],"correct":[1],"explain":"A with-profits bonus is usually reversionary (paid with the sum assured), non-guaranteed, declared yearly by the board, and only indirectly/loosely linked to performance. Direct daily linkage describes an ILP."},{"type":"mcq","q":"$1,000 is received at the end of each year for 5 years, discounted at 3%. The present value of this annuity is closest to:","options":["$5,000.00","$4,579.71","$4,329.48","$5,309.14"],"correct":[1],"explain":"PV = 1,000 × [(1 − 1.03^−5)/0.03] = $4,579.71, exactly the chapter's worked example."},{"type":"mcq","q":"An investor uses dollar cost averaging, spending $6,000 per month: 1,000 units at $6 in month 1 and 1,500 units at $4 in month 2. The average cost per unit is closest to:","options":["$5.00","$4.80","$4.62","$5.20"],"correct":[1],"explain":"Total spent $12,000 buys 2,500 units, so average cost = $12,000/2,500 = $4.80 — lower than the simple price average of $5.00 because more units are bought when prices are low."},{"type":"mcq","q":"Which of the following is LEAST accurate regarding synthetic ETFs?","options":["They use swaps and derivatives to mimic the index","They typically have lower tracking error than physical ETFs","Swap-based synthetic ETFs usually pay regular dividends","They expose investors to counterparty risk"],"correct":[2],"explain":"Swap-based synthetic ETFs usually do NOT pay dividends; the counterparty delivers index returns under the total return swap. The other three statements are correct."},{"type":"mcq","q":"An immediate annuity differs from a deferred annuity primarily because:","options":["It can only be bought with periodic premiums","Payments begin as soon as it is purchased and it is bought with a single premium","It protects against premature death rather than longevity","Its payout amount is independent of the annuitant's age"],"correct":[1],"explain":"An immediate annuity starts payments at once and is always purchased with a lump-sum (single premium); a deferred annuity starts later and may be funded by single or periodic premiums."},{"type":"mrq","q":"Select all advantages of investing in ETFs over actively managed unit trusts mentioned in the chapter.","options":["Lower annual fees (usually under 1%)","Intraday liquidity at prevailing prices","Guaranteed outperformance of the index","Greater transparency of holdings"],"correct":[0,1,3],"explain":"ETFs offer low costs (<1%), intraday liquidity, and continuous transparency. They track (not beat) the index, so guaranteed outperformance is false — indeed they exhibit tracking error."},{"type":"mrq","q":"Select all features that distinguish a listed REIT from a business trust.","options":["REITs have separate, independent trustee and manager; BTs use a single Trustee-Manager","REITs may actively run a business; BTs are restricted to passive investment","REITs face a 45% gearing limit; BTs have no gearing limit","REITs must invest at least 90% in rental-generating real estate; BTs have no such restriction"],"correct":[0,2],"explain":"REITs have separate trustee/manager and a 45% gearing cap; BTs use a single Trustee-Manager with no gearing cap. Option B is reversed (BTs run businesses, REITs are passive). Option D misstates the 90% figure (that is the distribution rule; the 75% rule is the real-estate investment minimum)."},{"type":"mrq","q":"Select all statements that correctly describe risks of investing in REITs.","options":["Refinancing risk arises because REITs retain little cash after distributing ~90% of income","Underlying physical property can be hard to liquidate quickly (liquidity risk)","REITs are immune to market price volatility because they are property-backed","Concentration risk arises if income depends on a few properties or tenants"],"correct":[0,1,3],"explain":"Refinancing, liquidity, and concentration risks are all real REIT risks. REITs are exchange-traded and fully exposed to market price volatility, so option C is false."}]},"10":{"notes":[{"t":"h","text":"10.1 Definition and Terminology"},{"t":"def","term":"Warrant","def":"A derivative instrument that gives the holder (buyer) the right, but not the obligation, to buy or sell a specified number of securities (usually the issuer's common share) at a fixed price (the exercise or strike price) within a specified time period."},{"t":"p","text":"Warrants issued by companies are traded on the **SGX-ST** platform and are also known as **company warrants**. They may be considered as **long-dated equity call options**: while listed call options typically expire within a few months, warrants usually have maturities of several years."},{"t":"p","text":"Companies generally issue warrants as a **\"sweetener\"** attached to an offering of bonds or rights issues. This lets the issuer obtain financing at a lower interest rate, reducing its financing cost. The warrants can be **detached** from the host security and traded separately. Because the warrant is given as an incentive, there is no price paid per se for the warrant by the buyer of the host security."},{"t":"key","title":"Warrants vs equity call options — the key difference","points":["When warrants are exercised, the company issues NEW shares, increasing shares outstanding and causing dilution of the issuer's earnings.","Equity call options do NOT cause earnings dilution because no new shares are issued on exercise — shares simply change hands.","Warrants are long-dated (years); listed call options are short-dated (months)."]},{"t":"sub","text":"Company Warrants vs Structured Warrants"},{"t":"p","text":"There are 2 types of warrants on SGX. A **company warrant** is issued by a company on its own shares; its maturity is usually measured in years, and if exercised the company issues new shares (shares outstanding increase)."},{"t":"p","text":"A **structured warrant** is issued by a bank, financial institution or other investment entity — usually a **third party**, not the underlying company. The issuer is in effect selling the holder an option to buy or sell the underlying company's shares at a pre-determined price at a later date. The underlying company does NOT endorse or guarantee such warrants."},{"t":"diagram","kind":"compare","title":"Company vs Structured Warrants","colA":"Company Warrant","colB":"Structured Warrant","rows":[["Issued by the company on its own shares","Issued by a third party (e.g., financial institution)"],["Less liquidity","More liquidity"],["One direction only
