c value. **Market factors:** liquidity of the underlying (affects issuer hedging cost), CBBC demand/supply, and issuer factors (market making, bid-ask spread)."},{"t":"formula","name":"CBBC theoretical price","expr":"Bull = [(Underlying − Strike) + Financial Cost] / Conversion Ratio ; Bear = [(Strike − Underlying) + Financial Cost] / Conversion Ratio","where":["Underlying = underlying asset price","Strike = strike price","Financial Cost = issuer funding + dividend adj + margin"]},{"t":"p","text":"**Worked example (R-Bull):** Strike $10, Call $11, ratio 10:1, financial cost 10% p.a., 12 months, spot $12. Price = [($12 − $10) + ($10 × 10% × 1)] / 10 = $0.30. Sold at 6 months with spot $15: price = [($15 − $10) + ($10 × 10% × 0.5)] / 10 = $0.55, a profit of $0.25 (+83.33%)."},{"t":"sub","text":"6.10.7 Residual value on MCE"},{"t":"formula","name":"CBBC residual value (R-CBBC) on MCE","expr":"Bull = (Settlement Price − Strike Price) / Conversion Ratio ; Bear = (Strike Price − Settlement Price) / Conversion Ratio","where":["N-CBBC residual value = 0","Bull settlement price: not lower than the minimum trading price from MCE to next session","Bear settlement price: not lower than the maximum trading price from MCE to next session"]},{"t":"p","text":"**Worked example (R-Bull MCE):** Strike $10, Call $11, ratio 10:1. Price falls and settles at $10.50. Residual value = ($10.50 − $10.00) / 10 = $0.05. With an initial price of $0.30, the loss is $0.25 (−83.33%). **R-Bear MCE example:** Strike $11, Call $10, ratio 1:1, settles $10.50: residual = ($11.00 − $10.50) / 1 = $0.50."},{"t":"sub","text":"6.10.8 Valuation at maturity"},{"t":"formula","name":"CBBC value at maturity (not called)","expr":"Bull = (Settlement Price − Strike Price) / Conversion Ratio ; Bear = (Strike Price − Settlement Price) / Conversion Ratio","where":["Settlement Price = closing price of the underlying on settlement day"]},{"t":"p","text":"**Worked example (R-Bull held to maturity):** Strike $10, ratio 10:1, settlement $15. Maturity value = ($15 − $10) / 10 = $0.50; profit $0.20 (+66.67%). **R-Bear held to maturity:** Strike $11, ratio 1:1, settlement $6.50: value = ($11 − $6.50)/1 = $4.50."},{"t":"sub","text":"6.10.9 Capital adjustments"},{"t":"p","text":"For equity-based CBBCs, adjustments are made for corporate actions: bonus issues, rights issues, share splits, reverse splits, special/extraordinary dividends. NO adjustment for regular share dividends (already in the funding cost)."},{"t":"h","text":"6.11 Risks of CBBCs"},{"t":"list","ordered":true,"items":["**Potential loss of capital** – the full invested amount can be lost if the market moves against the view.","**Mandatory call** – once called, it is irrevocable; N-investors get zero, R-investors a small residual. No recovery if the underlying bounces back.","**Gearing effect** – leverage magnifies negative returns versus direct investment.","**Limited life** – fixed lifespan; may become worthless at expiry or on MCE.","**Trading close to call price** – delta ~ 1 may not hold; price more volatile with wider spreads and uncertain liquidity.","**Volatility** – greater likelihood of being knocked out in volatile markets.","**Liquidity & market disruption** – if the underlying stops trading or is suspended, the CBBC market is impaired.","**Financial cost** – charged upfront for the entire period; on early termination the investor loses the full funding cost.","**Counterparty risk** – issued by third-party banks; issuer default exposes the investor."]},{"t":"h","text":"6.12 Knock-Out Products (CBBCs) vs Structured Warrants"},{"t":"diagram","kind":"compare","title":"CBBCs vs Warrants","colA":"CBBC (knock-out)","colB":"Warrant","rows":[["Bull / Bear contract","Call / Put warrant"],["Has a Call Price","No call price"],["Mandatory call (early termination)","No early termination"],["Implied volatility insignificant to pricing","Implied volatility affects pricing"],["Holding cost: financial cost deducted daily","Holding cost: time decay toward maturity"],["Delta ~ 1","Sensitive to volatility / time value"]]},{"t":"key","title":"Common to both","points":["Traded on a stock exchange; underlyings can be equities, indices, commodities, currencies.","Both have a strike (exercise) price and a maturity; duration determined by the issuer.","No margin requirement; maximum loss limited to the investment amount."]}],"newQuestions":[{"type":"mcq","q":"Why should a barrier option generally be CHEAPER than its vanilla counterpart?","options":["Because it pays a guaranteed coupon","Because the investor risks being knocked out or never being knocked in","Because it is exchange-traded and standardised","Because it has no counterparty risk"],"correct":[1],"explain":"The path dependency means the option may be knocked out (deactivated) or may never knock in (activate), so the buyer accepts extra risk and pays a lower premium. Barrier options are OTC, so they do carry counterparty risk."},{"type":"mcq","q":"An option is deactivated only if the underlying price FALLS to the barrier level. This is a:","options":["Up-and-out option","Down-and-out option","Up-and-in option","Down-and-in option"],"correct":[1],"explain":"Down-and-out: the price must fall to/below the barrier to knock the option out. 'Up-and-out' would require a rise; the '-in' variants activate rather than deactivate."},{"type":"mcq","q":"For a knock-out CALL with strike $8.00 and knock-out barrier $9.00, what is the maximum intrinsic value the investor LOSES the instant the barrier is breached?","options":["$0.99","$1.00","$8.00","$0.01"],"correct":[0],"explain":"At $9 the long call (strike $8) is immediately extinguished, forfeiting the maximum intrinsic value of $8.99 − $8.00 = $0.99. Unlike a bull spread, there is no protection at the upper strike."},{"type":"mcq","q":"A knock-out PUT has strike $13.50 and a knock-out barrier at $12.00. Ignoring premium, the maximum gain is approximately:","options":["$1.50","$1.49","$13.50","$12.01"],"correct":[1],"explain":"Maximum gain = $13.50 − $12.01 = $1.49 (minus the put price). The option is extinguished the moment the underlying trades at $12 or below."},{"type":"mcq","q":"Compared with a single knock-out option (same specs), a DOUBLE knock-out option is:","options":["More expensive, because it has two barriers","Cheaper, because either of two barriers can knock it out","The same price","Only available as a knock-in"],"correct":[1],"explain":"With two barriers (one above and one below the strike), there are two ways to be knocked out, raising knock-out probability and lowering the premium."},{"type":"mcq","q":"For a KNOCK-IN barrier option, a rebate is typically paid to the buyer at expiry when:","options":["The barrier is touched early","The barrier is NEVER reached during the option's life","The option finishes in-the-money","The issuer defaults"],"correct":[1],"explain":"A knock-in only activates if the barrier is touched; if it is never reached the option never came alive, so a rebate compensates the buyer. (For knock-outs, the rebate is paid when the barrier IS breached.)"},{"type":"mcq","q":"Ceteris paribus, moving a barrier CLOSER to the current price will:","options":["Make a knock-in cheaper and a knock-out more expensive","Make a knock-in more expensive and a knock-out cheaper","Make both more expensive","Have no effect on price"],"correct":[1],"explain":"Closer barrier = more likely to be reached. That raises the knock-in's chance of activating (more expensive) and raises the knock-out's chance of dying (cheaper)."},{"type":"mcq","q":"The 'shark's fin' payoff belongs to which product?","options":["Barrier Reverse Convertible","Bonus Certificate","Barrier Capital Preservation Certificate","Range Currency Deposit"],"correct":[2],"explain":"The Barrier Capital Preservation Certificate contains an up-and-out knock-out call and is nicknamed 'shark's fin' for its payoff shape: a capped return if not knocked out, otherwise the agreed capital amount."},{"type":"mcq","q":"In a Barrier Reverse Convertible, the investor effectively:","options":["Buys a down-and-in call","Sells a knock-in (typically down-and-in, at-the-money) put to the issuer","Buys a one-touch binary option","Sells a basket call option"],"correct":[1],"explain":"The investor sells a knock-in put (usually down-and-in, struck at-the-money), taking downside risk; the coupon is paid regardless, but principal is at risk if the kick-in barrier is breached."},{"type":"mcq","q":"A one-touch binary option pays out when:","options":["The price closes above strike at expiry only","The level is touched at any time during the life, regardless of the price at expiry","Both barriers are touched","The basket correlation rises"],"correct":[1],"explain":"A one-touch pays as long as the level is touched at any time. The cash-or-nothing (European) variant instead requires the price to satisfy the condition specifically AT expiry."},{"type":"mcq","q":"A range currency deposit (double no-touch) pays 8.25% if EUR/USD stays within 1.06-1.10 and 2.00% otherwise. If the pair stays in range for 88 of 90 days but touches a barrier on 1 day, the client receives:","options":["8.25%","Approximately 8.07% pro-rated","2.00%","A blend of both rates"],"correct":[2],"explain":"A double no-touch is purely binary: any single touch of a barrier means the lower 2.00% applies for the whole period, no matter how many days were in range."},{"type":"mcq","q":"Using a range accrual where in-range days earn 8.25% and out-of-range days earn 2.00%, with 60 of 90 days in range, the total return is closest to:","options":["8.25%","6.17%","5.50%","2.00%"],"correct":[1],"explain":"(60/90 × 8.25%) + (30/90 × 2.00%) = 5.50% + 0.67% = 6.17%. A range accrual is more expensive than a double no-touch, so in practice the yield drops or the range narrows."},{"type":"mcq","q":"Why is a basket option typically cheaper than buying separate options on each component asset?","options":["Because baskets are exchange-traded","Because basket volatility is lower than the weighted-average volatility of the components","Because there is no correlation risk","Because dividends are reinvested"],"correct":[1],"explain":"Imperfect correlation makes basket volatility lower than the weighted average of individual volatilities, lowering the option price. Correlation risk remains and can rise in sharply negative markets."},{"type":"mcq","q":"A Mandatory Call Event (MCE) for a BEAR CBBC is triggered when the spot price:","options":["Falls below the call price","Touches or exceeds (rises to/above) the call price","Equals the strike price at expiry","Stays within two barriers"],"correct":[1],"explain":"For a Bear contract the investor is bearish, so a RISE to/above the call price triggers the MCE. For a Bull contract, a fall to/below the call price triggers it."},{"type":"mcq","q":"An R-Category Bull CBBC has Strike $10.00 and is called when it settles at $10.50, conversion ratio 10:1. The residual value per contract is:","options":["$0.50","$0.05","$0.00","$1.05"],"correct":[1],"explain":"Bull residual = (Settlement − Strike) / Conversion Ratio = ($10.50 − $10.00) / 10 = $0.05. An N-Category CBBC would pay zero."},{"type":"mcq","q":"A CBBC has an effective gearing of 10x. If the underlying rises 1%, the theoretical CBBC price moves approximately:","options":["1%","5%","10%","0.1%"],"correct":[2],"explain":"Because delta ~ 1, gearing equals effective gearing: a 1% underlying move implies a ~10% CBBC move (in the favourable direction), magnifying both gains and losses."},{"type":"mcq","q":"Which statement about CBBC pricing is TRUE?","options":["Implied volatility is the dominant pricing factor","Financial cost is refunded if the CBBC is called early","Implied volatility is insignificant to CBBC pricing","CBBCs require posting margin"],"correct":[2],"explain":"Implied volatility is insignificant to CBBC pricing (unlike warrants). Financial cost is charged upfront for the whole period and is NOT refunded on early termination; CBBCs have no margin requirement."},{"type":"mrq","q":"Select all that apply. Compared to structured warrants, CBBCs:","options":["Have a call price","Have a mandatory call (early termination) feature","Are priced significantly by implied volatility","Have delta close to 1"],"correct":[0,1,3],"explain":"CBBCs uniquely have a call price, a mandatory call mechanism, and delta ~ 1. Implied volatility is significant for WARRANTS, not CBBCs."},{"type":"mrq","q":"Select all that apply. Disadvantages / risks of barrier options include:","options":["High risk of loss of premium if barrier conditions are breached","Exposure to counterparty (issuer) risk as OTC products","Guaranteed full capital return in all scenarios","Lack of liquidity"],"correct":[0,1,3],"explain":"Barrier options can lose the full premium on an adverse barrier event, are OTC (counterparty risk and illiquidity). Capital is NOT guaranteed in all scenarios."},{"type":"mrq","q":"Select all that apply. Which are TRUE of a Bonus Certificate?","options":["The strike/bonus level is set ABOVE the initial price","The knock-out barrier is set BELOW the initial price","The investor enjoys full upside above the bonus level","If the underlying breaches the barrier, the bonus and downside protection are forfeited"],"correct":[0,1,2,3],"explain":"All are correct: bonus level above and barrier below the initial price; full participation above the bonus level; and breaching the barrier forfeits the bonus, leaving 1:1 downside exposure."}]},"07":{"notes":[{"t":"h","text":"What are Structured Products?"},{"t":"def","term":"Structured product","def":"A financial product designed to give investors more tailored investment alternatives linked to a specific risk/reward profile or hedging strategy, addressing a view on the direction or volatility of an underlying asset or index. It is usually a combination of two or more financial instruments, with at least one being a derivative created by an issuer (usually a financial institution)."},{"t":"p","text":"The bulk of structured products are traded **over-the-counter (OTC)**, with banks acting as counterparties to individual and institutional investors. Some have become so popular and standardised that they are now featured on exchanges."},{"t":"p","text":"Underlying assets can be an **interest rate, a bond, an equity, an index, an exchange rate, or a commodity**, and can be wrapped with zero-coupons into structured deposits, notes, or funds."},{"t":"p","text":"Structured products are **complex investments**. Their risks and payoffs are less easily understood and are usually offered to more experienced investors. Past losses from OTC derivatives have led to lawsuits where clients claimed they did not understand, were not informed, or were misinformed about the risks. Proper verification of client risk profiles, documentation, and acknowledgements are now standard practice."},{"t":"p","text":"For financial institutions, the expansion of derivatives over the last 30 years helped offset narrowing trading commissions on traditional asset classes, increasing transactional volume and generating higher returns."},{"t":"sub","text":"Client suitability for structured products"},{"t":"p","text":"Investment representatives should consider the following before recommending structured products:"},{"t":"list","ordered":false,"items":["**Risk appetite** – the investor's ability and willingness to take risk.","**Investment experience and knowledge** – the investor must understand how the product works and the possible outcomes under different market scenarios.","**Liquidity needs** – highlight the consequences of early redemption when products are not held to maturity.","**Investment horizon** – value of some products is only fully realised if held to maturity; some have time-value decay and may become worthless near expiry.","**Product risk** – features can dramatically augment the payoff; some preserve capital, others can cause huge or cumulative losses.","**Restrictions** – only representatives notified under the MAS Representative Notification Framework (RNF) may advise on structured products; otherwise investors must have relevant experience and knowledge.","**Product disclosure** – full disclosure of potential risks and of how returns are generated under different market conditions."]},{"t":"p","text":"Aggressive promotion to lift transactional income caused **mis-selling** and client-product mismatches for risky products (e.g., accumulators, CDOs) in Singapore and Hong Kong. Many banks have since cut back on the riskier OTC products and refocused on recurring management fees over cyclical transactional income."},{"t":"h","text":"Risks in Structured Products"},{"t":"p","text":"At the **low-risk end**, some products (e.g., range accrual deposits) carry no risk of capital loss – only the opportunity cost of a better yield is forgone in the worst case. Moving up for higher returns, products such as **ELNs and DCIs** no longer offer any capital guarantee. Banks offer better yields only when the probability of knock-out, or the risk of taking delivery / converting to a weaker currency, is high. There is no free lunch."},{"t":"key","title":"Six risks of structured products","points":["**Market risk** – the underlying falls in value; investor loses yield, suffers book losses, or pays the cash differential.","**Liquidity risk** – limited liquidity; investor can only deal with the holding bank and may not get 100% back on early withdrawal.","**Reinvestment risk** – if called/redeemed early, funds may have to be reinvested at less attractive rates.","**Counterparty credit risk** – principal is returned at maturity only if the bank does not default; SDs are NOT covered by the Deposit Insurance Scheme.","**Currency exposure** – denomination currency affects returns vs the client's reference currency; FX products like DCIs embed a short put on the alternative currency.","**Leverage effect** – gains and losses can be magnified (e.g., step-up features accumulate more underlying on large price falls)."]},{"t":"h","text":"Trade-off Between Features"},{"t":"p","text":"Structured products can be customised to fit the client; the client decides how much risk to take for higher yield. There is always a trade-off."},{"t":"table","headers":["Feature","Effect on yield","Reason"],"rows":[["Investor sells a call to issuer","Increase","Closer the call strike to current price, higher the chance the issuer exercises → higher yield offered."],["Investor sells a put to issuer","Increase","Closer the put strike to current price, higher the chance the issuer exercises → higher yield offered."],["Investor buys a call from issuer","Decrease","Longer time to expiry costs more, reducing the structure's minimum yield."],["Investor buys a put from issuer","Decrease","Longer time to expiry costs more, reducing the structure's minimum yield."],["Time / maturity","Increase","Longer maturity gives more chance for price to reach strike, raising structure value."],["Leverage effect","Increase","Greater leverage → greater risk → greater yield/returns."]]},{"t":"h","text":"Participation Rate"},{"t":"def","term":"Participation rate","def":"The level of exposure to the movement of the underlying asset or index. It is not always 100%."},{"t":"p","text":"It depends on the **discount sum** (face value minus present value of the zero-coupon bond) relative to the **call option premium**. If the discount sum is less than the cost of the call, the issuer buys fewer options and the participation rate is below 100%. If the discount sum allows more options to be bought, participation can exceed 100%."},{"t":"formula","name":"Participation rate","expr":"Participation rate = Discount Sum ÷ Call Premium","where":["Discount Sum = Face Value − Present Value of zero-coupon bond","Call Premium = cost of the option used to give upside exposure"]},{"t":"table","headers":["Parameter","Bond A","Bond B"],"rows":[["Face value","$100.00","$100.00"],["Discount rate","5.00%","7.00%"],["Years to maturity","5","5"],["Present value","$78.35","$71.30"],["Discount sum","$21.65","$28.70"],["Call premium (S&P 500)","$24.00","$24.00"],["Participation rate","90.21%","119.58%"]]},{"t":"p","text":"Bond A: 21.65 ÷ 24 = **90.21%**. Bond B (higher discount rate → lower PV → larger discount sum): 28.70 ÷ 24 = **119.58%**."},{"t":"h","text":"Purpose and Uses of OTC Structured Products"},{"t":"list","ordered":false,"items":["**Customization** – meet needs traditional investments cannot; improve portfolio efficiency across diverse risk-return profiles.","**Optimizing yield and returns** – enhance yield in low-rate environments, accepting risks/trade-offs (e.g., effectively selling a put to the bank).","**Capital preservation** – some products are capital guaranteed, but usually only if held to maturity; counterparty risk still means capital can be lost (e.g., Lehman 2008).","**Performance** – access asset classes, indices or custom baskets otherwise hard to reach cost-effectively.","**Leverage effect** – options give leveraged exposure from a smaller outlay, but can work against the client (e.g., accumulators).","**Hedging** – manage risk on existing positions.","**Alternative rebalancing** – take long/short exposure without liquidating the existing portfolio."]},{"t":"h","text":"Types and Wrappers of Structured Products"},{"t":"p","text":"Structured products come in various **wrappers**: deposits, notes and bonds, funds, warrants, investment-linked policies (ILPs), exchange-traded funds (ETFs) and exchange-traded notes (ETNs). The same product may be marketed under different names by different banks and structured for multiple purposes."},{"t":"table","headers":["Purpose","Examples"],"rows":[["Capital preservation (partial/full)","Currency deposit with call/put options; structured deposit with call/put; range currency deposits; one-touch options; step-up digital options; Callable Range Accrual Note (CDRAN); CPPI/DPPI"],["Optimizing yield/returns","Dual Currency Investments (standard, knock-out, knock-in, double-no-touch); triple currency investments; Equity Linked Notes (Bull, Callable, EQ FCN); accumulators; decumulators; Callable Step-up Notes (CSUN); VMRAN"],["Capital gain (participation/performance)","Performance-linked basket/notes (with or without loss limits); accumulators; decumulators; Fixed Coupon Note (FCN); Twin Win Certificate"]]},{"t":"p","text":"An important caveat: the risk accepted may produce an outcome very different from the original purpose. An investor seeking better yield may instead end up taking delivery of an underlying at an unfavourable price, sustaining capital loss. Being seduced by returns while ignoring risks can lead to the opposite of the intended result."},{"t":"h","text":"Structured Deposits (SDs)"},{"t":"def","term":"Structured deposit (SD)","def":"A debt obligation of a bank that combines a deposit with an underlying financial instrument, where the return is linked to the performance of that instrument. Unlike structured notes, SDs are a type of deposit and are NOT debentures (unsecured debt)."},{"t":"key","title":"Key features of structured deposits","points":["In Singapore, the distinguishing feature is that the **principal sum, with or without interest, must be repaid in full at maturity** (this may not apply in other jurisdictions).","SDs can only be issued by **banks** and must meet the definition of 'deposit' under the Banking Act 1970.","SDs are **NOT covered by the Deposit Insurance Scheme** (under the Deposit Insurance and Policy Owners' Protection Schemes Act 2011).","**Early withdrawal** may cause loss of part of the return and/or principal; the amount payable depends on the market value of the linked instrument at withdrawal.","FAA Guidelines on Structured Deposits (FAA-G09) apply to all investors except **accredited** and **institutional** investors.","Less risky than direct investment in the underlying (bank repays full principal at maturity) but riskier than normal deposits (returns depend on other instruments; may earn no return)."]},{"t":"diagram","kind":"compare","title":"Structured Deposit vs Ordinary Fixed Deposit","colA":"Structured Deposit","colB":"Fixed Deposit","rows":[["Return linked to performance of underlying","Fixed, known interest rate"],["Principal guaranteed only at maturity","Principal always returned"],["NOT covered by Deposit Insurance Scheme","Covered by Deposit Insurance Scheme"],["Early withdrawal can lose return and/or principal","Early withdrawal usually loses only some interest"],["Limited liquidity (deal only with issuing bank)","Generally liquid"],["Higher potential yield, more risk","Lower, certain yield"]]},{"t":"diagram","kind":"flow","title":"How a capital-preserved SD is assembled","steps":[{"label":"Client deposit","sub":"principal placed with bank"},{"label":"Zero-coupon bond","sub":"PV grows to face value (principal) at maturity"},{"label":"Option (call/put)","sub":"bought with the foregone interest / discount sum"},{"label":"SD payoff","sub":"principal back + option-linked upside"}]},{"t":"sub","text":"Deposit with standard call or put option"},{"t":"p","text":"A client holding USD money-market deposits at a low rate can take a view on USD strength. Instead of paying deposit interest, the bank uses that interest to buy an FX option. The client forgoes deposit interest for potential FX upside; principal is always returned."},{"t":"p","text":"**Example (long USD call/JPY put):** spot USD/JPY 112.43, strike 113.50, 3 months, min yield 0%, MM rate 1.75% p.a., min USD 250,000. If at expiry USD/JPY < 113.50 the option is out-of-the-money and the client gets only the principal (no interest). If USD/JPY = 115.00, gain = (115.00 − 113.50) × 250,000 = JPY 375,000 = USD 3,260.87 (375,000÷115) = 1.3% over 3 months = **5.2% p.a.** (1.3% × 4)."},{"t":"sub","text":"Standard option with a knock-out feature"},{"t":"p","text":"Upside participation is **knocked out** if the spot touches the barrier at any time. A knock-out call costs less than a standard call (it may be extinguished early), so the bank returns part of the foregone interest as a **minimum yield** above zero. Example: strike 113.50, knock-out barrier 109.50, min yield 0.50% p.a. If not knocked out and USD/JPY > 113.50, client gets the FX gain plus 0.5% p.a. plus principal; if below 113.50 (or knocked out), client gets 0.5% p.a. plus principal. The barrier is set far from spot to avoid easy knock-out. A variation steps the whole payoff down by a percentage instead of cutting to a fixed return."},{"t":"sub","text":"Bull call (or put) spread structured deposit"},{"t":"p","text":"Used when only a small favourable move is expected; the upside is **capped**. The client buys a lower-strike call and sells a higher-strike call. Example: spot 112.00, spread range 114.00–118.00, min yield 1.00%, max yield 14.50%, MM rate 1.75%, participation 100%. If USD/JPY > 118.00 the sold call is exercised and the client gets the max 14.50%; between 114 and 118 the return rises from 1% to 14.5%; below 114 the client gets the minimum 1.00%. The bank funds the spread from the foregone interest (inferred cost ≈ 0.75% p.a. = 1.75% − 1.00%). No knock-out, so high volatility does not affect the structure."},{"t":"sub","text":"One-touch lock-in option"},{"t":"p","text":"Investors anticipate a temporary spike or fall. If the strike is **touched at any time** before expiry, the maximum yield is paid at maturity; otherwise a minimum yield is paid. Principal is always repaid. Example: EUR/USD spot 1.18, one-touch strike 1.12, 3 months, max yield 12%, min yield 0.75%, MM rate 1.75%. The client sacrifices ~1% to buy the one-touch option that triggers a 12% return if 1.12 is reached. Notional capital is guaranteed."},{"t":"sub","text":"Range currency deposit (double-barrier binary / double-no-touch)"},{"t":"p","text":"The investor expects the pair to stay range-bound. If it stays within the range, a high yield is earned; if either barrier is touched, a low yield applies – a **binary outcome**. Example: EUR/USD spot 1.09, range 1.06–1.10, 3 months, max yield 7.25%, min yield 2.00%, MM rate 1.50%. Touching 1.06 or 1.10 cuts the return to 2.00%. To raise yields a client can narrow the range, skew the range, or extend maturity; higher volatility also allows higher returns. Drawback: even if the pair is in range 88 of 90 days, touching a barrier on 2 days gives only 2%."},{"t":"sub","text":"Range accrual currency deposit"},{"t":"p","text":"The max yield accrues only for the **days the spot is within the band**; the min yield applies on days outside. This smooths outcomes and reduces extreme results vs the binary range deposit. Example (88 of 90 days in range): total return = (88/90 × 7.25%) + (2/90 × 2.00%) = 7.09% + 0.04% = **7.13%**. Variations use weekly or 3-monthly observation periods."},{"t":"diagram","kind":"bars","title":"Annualised return of SD structures (example terms)","unit":"%","data":[{"label":"Money market deposit","value":1.75},{"label":"Range accrual (88/90 days in)","value":7.13},{"label":"Range deposit max","value":7.25},{"label":"One-touch lock-in max","value":12.0},{"label":"Bull call spread max","value":14.5}]},{"t":"h","text":"Structured Deposits Providing Yield Enhancement"},{"t":"p","text":"Yield enhancement / return optimisation products suit clients with existing deposits, equities or fixed income who want extra yield. The extra yield comes with **additional risk and usually no capital preservation**, typically because the investor **writes a put or call** to the bank."},{"t":"key","title":"Yield-enhancement SD features","points":["Clients: medium to high-risk appetite.","Purpose: enhance/optimize yield above current deposit returns.","Gains: potentially much higher returns; acquisition of an alternate currency at a lower (built-in) rate.","Risks: loss from acquiring the deposit at a higher exchange rate than market; loss of interest; counterparty risk; liquidity risk.","Structures: various DCIs and triple currency investments."]},{"t":"sub","text":"Standard Dual Currency Investment (DCI)"},{"t":"def","term":"Dual currency investment (DCI)","def":"Formerly a dual currency deposit (DCD). It consists of (a) a SHORT call on the original reference currency (equivalently a short put on the alternate currency), and (b) a LONG money-market deposit (or bond) in the reference currency. The option premium received lets the DCI pay a higher rate than the money market."},{"t":"p","text":"At expiry: if the exchange rate strengthens or stays flat and does not cross the strike, principal plus interest is paid in the **original reference currency**. If the rate weakens past the strike, principal plus interest is **converted to the alternate (weaker) currency** – the key risk being forced conversion to a currency that then falls further."},{"t":"p","text":"**Example:** client holds USD; GBP/USD spot 1.37, strike 1.34, return 10% p.a. (vs MM 1.75%). If GBP/USD > 1.3400 at expiry, the client gets investment + 10% in USD. If GBP/USD < 1.3400, the client is paid back (investment + interest) converted at 1.3400 in GBP and may incur an FX loss."},{"t":"diagram","kind":"payoff","title":"DCI – client is effectively short a put on the alternate currency","legs":[{"instrument":"put","position":"short","strike":134,"premium":3,"qty":1}],"spotRange":[120,150]},{"t":"sub","text":"Knock-out DCI (Disappearing DCI)"},{"t":"p","text":"A standard DCI with a knock-out barrier set **out-of-the-money**. Once the spot touches the barrier, the embedded option **disappears** and the investor keeps the original reference currency regardless of the final spot. Because the knock-out benefits the client, the yield is **lower** than a standard DCI. Example: USD deposit, EUR/USD strike 1.1000, knock-out barrier 1.1500, spot 1.1200, KO DCI yield 8.50% vs standard DCI 9.00%. Components: selling a call on the base currency (USD) / a put on EUR, with a knock-out in the opposite direction to the strike. Closer barrier → more likely knocked out → lower yield; less sensitive than a standard DCI in high volatility."},{"t":"sub","text":"Knock-in DCI (Appearing DCI)"},{"t":"p","text":"Combines a money-market deposit with a knock-in barrier set **in-the-money**. If the spot never breaches the knock-in barrier, the DCI is **not activated** and the investor keeps principal plus interest in the reference currency. If the barrier is breached, the structure becomes a standard DCI at the existing call strike, with conversion risk. Example: USD deposit, spot 1.1150, EUR put/USD call strike 1.1000, knock-in barrier 1.0900, max yield 9.00%. If EUR/USD stays above 1.0900, client gets 9% in USD; if it falls below 1.0900 the standard DCI activates and, at maturity, if spot is below 1.1000, payment is in EUR (unless EUR/USD recovers above 1.1000)."},{"t":"diagram","kind":"compare","title":"Knock-out DCI vs Knock-in DCI","colA":"Knock-out (Disappearing)","colB":"Knock-in (Appearing)","rows":[["Barrier set out-of-the-money","Barrier set in-the-money"],["Touching barrier removes the option","Touching barrier activates standard DCI"],["Beneficial to client → lower yield","Conversion risk on breach → higher yield"],["Keeps reference currency if knocked out","Keeps reference currency if NOT knocked in"]]},{"t":"h","text":"Other Structured Products"},{"t":"sub","text":"Accumulators"},{"t":"def","term":"Accumulator","def":"A product for investors with a positive view, allowing them to accumulate the underlying at a discounted forward price relative to spot. The investor is long a series of calls (buy at/above forward) financed by shorting a series of puts (obliged to buy below forward)."},{"t":"p","text":"Accumulated shares are delivered regularly (usually monthly); the investor funds the settlement = Number of Shares × Forward Price, and can only sell after delivery. The four key elements are: the **barrier** (below which accumulation triggers; also the knock-out), the **set discounted strike** for accumulation, the **schedule of observation/fixing days**, and the **size of each accumulation** (with possible step-up/leverage features)."},{"t":"p","text":"Mechanics: above the barrier no accumulation occurs; at or below the barrier the fixed amount is accumulated at the discounted rate. **Example (currency):** GBP/USD initial spot 1.2275, fixed price 95% = 1.1661, barrier 105% = 1.2889, accumulate GBP 5,000 per fixing day below the barrier, 20 fixing days/month for 6 months (120 days), upfront = 5,000 × 120 × 1.1661 = USD 699,660."},{"t":"list","ordered":false,"items":["**Scenario 1:** all 120 days below barrier → accumulate GBP 600,000 at 1.1661; if final spot 1.3027, gain = (1.3027 − 1.1661) × 600,000 = **GBP 81,960**.","**Scenario 2:** above barrier half the days → accumulate GBP 300,000; gain = (1.3027 − 1.1661) × 300,000 = **GBP 40,980**.","**Scenario 4 (loss):** if GBP/USD falls below 1.1661, the client accumulates at a price above market and builds losses."]},{"t":"p","text":"Accumulators are **high-risk** and have a reputation for mis-selling. **Step-up features** force accumulation of 2–5× more when price falls below a level (leverage); margin financing magnifies gains/losses further. **Knock-out barriers** (up-and-out) cap upside but lower the cost of the in-the-money calls. An accumulator = long ITM calls + short OTM puts; because ITM calls cost more, KO barriers reduce cost. Unwinding can be costly. Advisors must approach with caution on suitability."},{"t":"diagram","kind":"cycle","title":"Accumulator lifecycle","stages":[{"label":"Set terms","sub":"discount strike, barrier, fixings"},{"label":"Observe fixings","sub":"each schedule day"},{"label":"Accumulate","sub":"buy fixed amount if below barrier"},{"label":"Settle/deliver","sub":"pay shares × forward; or knock-out terminates"}]},{"t":"sub","text":"Decumulators"},{"t":"p","text":"The reverse of an accumulator: the investor **writes calls** to the bank, taking on the obligation to **sell** a fixed amount of the underlying regularly at the contracted price/rate. Bought in expectation of a slightly bearish market; usually has a knock-out that ends the obligation. For currencies a decumulator mirrors an accumulator (selling one currency buys the other), so decumulators are less popular."},{"t":"p","text":"**Currency notes and baskets**, ELNs and fixed-income structures (CDRAN, VMRAN, CSUN, CPPI, DPPI) are introduced in this chapter's product table but are covered in detail in Chapters 8 and 9."}],"newQuestions":[{"type":"mcq","q":"In Singapore, what is the distinguishing feature of a structured deposit (SD)?","options":["The principal sum, with or without interest, must be repaid in full at maturity","It is a debenture (unsecured debt) of the bank","It is always covered by the Deposit Insurance Scheme","The bank guarantees a fixed positive return"],"correct":[0],"explain":"The defining feature in Singapore is full repayment of principal (with or without interest) at maturity. SDs are deposits, not debentures, and are NOT covered by the Deposit Insurance Scheme."},{"type":"mcq","q":"Which statement about structured deposits is TRUE?","options":["They can be issued by any financial adviser","They are covered by the Deposit Insurance Scheme","They can only be issued by banks and must meet the 'deposit' definition under the Banking Act 1970","They are debentures and therefore unsecured debt"],"correct":[2],"explain":"SDs can only be issued by banks and must meet the Banking Act 1970 definition of 'deposit'. They are not debentures and are not covered by the Deposit Insurance Scheme."},{"type":"mcq","q":"An SD has a zero-coupon bond with face value $100 and present value $76. The call premium needed for the upside is $20. What is the participation rate?","options":["76%","100%","120%","83%"],"correct":[2],"explain":"Discount sum = 100 − 76 = $24. Participation rate = discount sum ÷ call premium = 24 ÷ 20 = 1.20 = 120%. When the discount sum exceeds the call premium, participation exceeds 100%."},{"type":"mcq","q":"For the zero-coupon bond example in the chapter, why does Bond B (7% discount rate) give a higher participation rate than Bond A (5%)?","options":["A higher discount rate raises the present value, lowering the discount sum","A higher discount rate lowers the present value, raising the discount sum available to buy options","Bond B uses a cheaper call premium","Bond B has a shorter maturity"],"correct":[1],"explain":"A higher discount rate produces a lower present value ($71.30 vs $78.35), so the discount sum is larger ($28.70 vs $21.65). With the same $24 call premium, that buys more options → 119.58% vs 90.21%."},{"type":"mcq","q":"In a USD/JPY deposit with a long USD call/JPY put (strike 113.50), USD/JPY settles at 115.00 at expiry on USD 250,000. What is the approximate 3-month return?","options":["1.3%","5.2%","0.0%","3.3%"],"correct":[0],"explain":"Gain = (115.00 − 113.50) × 250,000 = JPY 375,000 = USD 3,260.87 (375,000÷115). Return = 3,260.87 ÷ 250,000 = 1.3% over 3 months (which annualises to ~5.2%)."},{"type":"mcq","q":"A client holds USD and invests in a GBP/USD DCI with strike 1.3400 and 10% p.a. return. At expiry GBP/USD is 1.3200. What happens?","options":["Client receives principal + 10% interest in USD","Client receives principal + interest converted into GBP at 1.3400 and may incur an FX loss","Client loses the entire principal","The deposit is rolled over automatically at the new spot"],"correct":[1],"explain":"GBP/USD (1.3200) is below the 1.3400 strike, so the alternate-currency conversion is triggered: principal plus interest is paid in GBP converted at 1.3400, exposing the client to an FX loss since the market rate is weaker."},{"type":"mcq","q":"A range accrual currency deposit pays 7.25% on days in-range and 2.00% on days out-of-range. If the spot is in range for 80 of 90 days, the total return is closest to:","options":["7.25%","6.66%","2.00%","6.67%"],"correct":[1],"explain":"Total = (80/90 × 7.25%) + (10/90 × 2.00%) = 6.444% + 0.222% = 6.67%. (6.66% vs 6.67% rounding: 6.667% rounds to 6.67%.)"},{"type":"mcq","q":"Which of the following BEST describes the components of a standard DCI?","options":["A long call on the reference currency plus a short money-market deposit","A short call on the reference currency (short put on the alternate currency) plus a long money-market deposit","Two long puts on different currencies","A long zero-coupon bond plus a long call option"],"correct":[1],"explain":"A standard DCI = short call on the reference currency (equivalently short put on the alternate currency) + long money-market deposit. The premium received funds the enhanced yield."},{"type":"mcq","q":"Why is the yield on a knock-out DCI (disappearing DCI) typically LOWER than a standard DCI, all else equal?","options":["The knock-out increases the bank's risk","The knock-out feature is beneficial to the client, so the client receives less yield","Knock-out DCIs have longer maturities","The principal is no longer guaranteed"],"correct":[1],"explain":"Once knocked out, the embedded option disappears and the client keeps the reference currency (no conversion) – a benefit to the client. Because the client gains this protection, the offered yield is lower."},{"type":"mcq","q":"In a one-touch lock-in structured deposit, the maximum yield is paid when:","options":["The strike level is touched or crossed at any time during the life of the structure","The spot closes exactly at the strike on expiry only","The spot never reaches the strike","The barrier is breached on expiry day only"],"correct":[0],"explain":"A one-touch pays the maximum yield if the level is touched at any time before expiry; otherwise it pays the minimum yield. Principal is repaid in full regardless."},{"type":"mcq","q":"Which risk is UNIQUE to structured deposits compared with ordinary fixed deposits?","options":["The deposit earns interest","Returns depend on the performance of an underlying instrument and SDs are not SDIC-insured","The bank holds the funds","Principal is repaid at maturity"],"correct":[1],"explain":"Unlike fixed deposits, SD returns are linked to an underlying's performance and SDs are NOT covered by the Deposit Insurance Scheme – the investor bears counterparty credit risk for the principal."},{"type":"mcq","q":"A bull call spread structured deposit offers a minimum yield of 1.00% when the money-market rate is 1.75% and participation is 100%. The implied annualised cost of the spread charged by the bank is approximately:","options":["1.75%","1.00%","0.75%","2.75%"],"correct":[2],"explain":"The bank uses part of the foregone interest to fund the spread, so cost ≈ money-market rate − minimum yield = 1.75% − 1.00% = 0.75% annualised."},{"type":"mcq","q":"An accumulator is best described as:","options":["Long a series of puts financed by selling calls","Long a series of calls financed by shorting a series of puts on the underlying","A capital-guaranteed deposit with no downside","A short money-market deposit plus a long call"],"correct":[1],"explain":"An accumulator = long a series of calls (buy at/above the forward) financed by shorting a series of puts (obliged to buy below the forward), letting the investor accumulate at a discounted forward price."},{"type":"mcq","q":"In the currency accumulator example, the client accumulates GBP 5,000 per fixing day at 1.1661 over 120 days (all below barrier). If GBP/USD ends at 1.3027, the total gain is:","options":["GBP 40,980","GBP 81,960","GBP 600,000","USD 699,660"],"correct":[1],"explain":"Accumulated GBP = 5,000 × 120 = 600,000. Gain = (1.3027 − 1.1661) × 600,000 = 0.1366 × 600,000 = GBP 81,960."},{"type":"mcq","q":"For a currency accumulator with fixed (strike) rate 1.1661, the client begins to ACCUMULATE LOSSES when GBP/USD:","options":["Rises above the 1.2889 barrier","Falls below 1.1661 while still accumulating","Stays exactly at 1.2275","Closes at 1.3027"],"correct":[1],"explain":"The client buys at the fixed 1.1661 rate. If the market falls below 1.1661 while accumulation continues, the client pays above market and builds losses – the core risk of accumulators."},{"type":"mcq","q":"A decumulator differs from an accumulator in that the investor:","options":["Buys the underlying at a discount each period","Writes calls and is obliged to SELL the underlying regularly at the contracted price","Receives capital guarantee","Has no knock-out feature"],"correct":[1],"explain":"In a decumulator the investor writes calls to the bank, taking on the obligation to sell a fixed amount of the underlying regularly. It suits a slightly bearish view and usually has a knock-out."},{"type":"mrq","q":"Select all that apply: Which are recognised RISKS of structured products listed in the chapter?","options":["Counterparty credit risk","Liquidity risk","Reinvestment risk","Guaranteed-profit risk"],"correct":[0,1,2],"explain":"Market, liquidity, reinvestment, counterparty credit, currency and leverage risks are listed. 'Guaranteed-profit risk' is not a risk – there is no guaranteed profit."},{"type":"mrq","q":"Select all that apply: Which statements about a knock-in DCI (appearing DCI) are correct?","options":["The knock-in barrier is set in-the-money","If the barrier is never breached, the investor keeps the reference currency","If breached, it becomes a standard DCI with conversion risk","It guarantees no currency conversion can ever occur"],"correct":[0,1,2],"explain":"A knock-in DCI has an in-the-money barrier; if untouched the investor keeps the reference currency; if breached it converts into a standard DCI with conversion risk. It does NOT guarantee against conversion."},{"type":"mrq","q":"Select all that apply: Which factors INCREASE the yield offered on a structured product?","options":["The investor sells a call/put to the issuer with strike near the current price","Longer time to maturity","Greater leverage effect","The investor buys a put from the issuer with longer time to expiry"],"correct":[0,1,2],"explain":"Selling options to the issuer (strike near spot), longer maturity, and greater leverage all raise yield. Buying a put from the issuer DECREASES the minimum yield because the investor must pay more compensation."},{"type":"mrq","q":"Select all that apply: A representative assessing client suitability for structured products should consider:","options":["The client's risk appetite and investment knowledge","The client's liquidity needs and investment horizon","Full disclosure of product risks and how returns are generated","Only the client's age, ignoring product features"],"correct":[0,1,2],"explain":"Suitability covers risk appetite, experience/knowledge, liquidity needs, investment horizon, product risk, restrictions and full disclosure. Considering only age while ignoring product features is incorrect."}]},"08":{"notes":[{"t":"h","text":"8.1 What is a Structured Note?"},{"t":"def","term":"Structured note","def":"A debt instrument / debenture whose return characteristics (e.g., coupon amount or market value) are linked to the performance of one or more underlying instruments such as equities, indices, interest rates, credit default swaps, CDOs, or a basket of instruments."},{"t":"p","text":"Although the underlying instruments are used as a **reference** for the note's performance, the note holder typically has **no claim over the underlying instruments**. Structured notes usually contain one or more **embedded options/derivatives** or employ other derivative strategies."},{"t":"p","text":"As a **debenture** (senior unsecured debt), a structured note is governed by the **Securities and Futures Act 2001 (SFA)**, which requires a **prospectus** unless the note is offered only to accredited investors, institutional clients, or for a minimum consideration of **S$200,000** (or foreign-currency equivalent). They are therefore mostly sold **over-the-counter (OTC)** by banks to FIs, fund managers, corporations and accredited investors."},{"t":"sub","text":"Components of a structured note"},{"t":"list","ordered":false,"items":["**Principal Component** - without collateral, investors rely solely on the issuer for principal repayment; with collateral the funded portion may be zero-coupon or corporate bonds or other securities. Principal repayment is often NOT guaranteed.","**Return (derivative) Component** - provides exposure to the chosen asset class, e.g., selling an option for a fixed premium, or taking a long option position."]},{"t":"p","text":"Some structures link **both** coupons and/or principal to the underlying's performance. The issuer may also enter a **derivatives contract or swap** with another party; that instrument's performance directly affects the note's overall return. All payout conditions are set out in the **product offering documents**, which investors must review."},{"t":"diagram","kind":"flow","title":"Structure of a structured note (bond + option)","steps":[{"label":"Investor cash","sub":"buys note"},{"label":"Principal component","sub":"bond / zero-coupon (funded)"},{"label":"Return component","sub":"embedded option / derivative"},{"label":"Payout at maturity","sub":"coupon + redemption linked to underlying"}]},{"t":"key","title":"Key points - what a structured note is","points":["A debt instrument / debenture under the SFA - issuer obligation, not a claim on the underlying.","Return is linked to an underlying via embedded derivatives.","Built from a principal (debt) component plus a return (derivative) component.","Principal repayment is often not guaranteed; prospectus needed unless AI/II or >= S$200,000."]},{"t":"h","text":"8.2 Issuing Structured Notes"},{"t":"p","text":"Structured notes are usually issued by **banks** or by a **Special Purpose Vehicle (SPV)** set up by banks."},{"t":"sub","text":"Direct issuance"},{"t":"p","text":"The bank issues notes directly to investors. Funds raised appear as a **liability on the bank's balance sheet**. The debt is a direct obligation of the bank, so the investor bears the **credit risk of the bank**."},{"t":"p","text":"If the issuer enters a **swap** with another institution to generate the cash flows for coupons/redemptions and passes on the swap counterparty's credit risk, the investor bears the credit risk of **both** the note issuer **and** the swap counterparty."},{"t":"sub","text":"Issuance via SPV"},{"t":"p","text":"An SPV is a **separate legal construct** set up by the bank. It uses note proceeds to buy fixed-income securities (zero-coupon bonds, debt securities, CDOs, other asset-backed securities) either to **preserve principal** (capital preservation product) or as **collateral** against options/credit insurance it sells (yield enhancement product)."},{"t":"p","text":"SPV assets and liabilities are usually **off-balance-sheet** from the bank's perspective. In default, note holders first claim on the **SPV's assets** and may have **no recourse to the bank** that set up the SPV."},{"t":"diagram","kind":"compare","title":"Direct issuance vs SPV issuance","colA":"Direct (bank issues)","colB":"SPV issues","rows":[["On bank's balance sheet (liability)","Off-balance-sheet for the bank"],["Investor bears bank's credit risk","Investor claims on SPV assets first"],["Direct obligation of the bank","May have no recourse to the bank"]]},{"t":"h","text":"8.3 Types of Structured Notes"},{"t":"p","text":"There are three main categories:"},{"t":"list","ordered":true,"items":["Some **capital preservation** with focus on yield enhancement/optimisation;","Yield enhancement/optimisation with **no capital preservation**; and","**Capital gains** from price movement of the underlying with **no capital preservation**."]},{"t":"table","headers":["Asset class","Some capital preservation","Yield, no preservation","Capital gain participation"],"rows":[["Equity","-","ELNs, Bull ELNs, Callable ELNs, Worst-of ELNs","Performance-linked basket notes, Accumulators"],["Bonds (credit)","-","First-to-default notes, Credit Linked Notes","-"],["Interest rate","Range Accrual Notes, Callable RAN (CDRAN/VMRAN)","Inverse Floater Notes, Callable Step-Up Notes","ETNs, Index-Linked Notes, Participatory Notes"],["Foreign exchange","Callable FX-Linked Notes, FX Range Accrual","Dual Currency Deposits, FX-Linked Barrier Notes","FX Accumulators, FX knock-in/knock-out, Tracker/Bonus Certificates"]]},{"t":"h","text":"8.4 Yield Enhancement with Some Capital Preservation"},{"t":"p","text":"Banks design yield-enhancement structures to generate additional income vs money-market yields, but extra yield comes with extra risk. Most 'yield-enhancing' strategies share one feature - the extra yield comes from **writing/selling options**, so clients bear the risks of an **option writer** rather than buyer."},{"t":"p","text":"**Capital guaranteed** structures generally give relatively low yield and protect the notional capital **only if held to maturity** - other risks still apply (interest-rate/currency volatility before maturity, loss of interest, reinvestment risk, liquidity risk because the client relies on the OTC counterparty)."},{"t":"key","title":"Capital-preservation note - key risks","points":["Loss of interest (zero or lower coupon possible).","Loss of principal value if redeemed BEFORE maturity (rates/FX volatility); no nominal loss if held to maturity.","Coupon reinvestment risk.","Liquidity risk - reliant on the OTC counterparty."]},{"t":"sub","text":"8.4.1 Range Accrual Notes (RANs)"},{"t":"def","term":"Range Accrual Note","def":"A structured note where the investor earns a target return for each day a reference index stays within an agreed range; on days the index is outside the range, lesser-to-no interest accrues. The principal is not affected."},{"t":"p","text":"The reference index may be a stock index (e.g., DJIA) or a rate benchmark (LIBOR, SIBOR, Singapore SOR). Interest is usually accrued **daily** for days the index is inside the range. Observation can be daily/weekly/monthly (usually daily), and it is more common for the outside-range payout to be **zero**."},{"t":"formula","name":"Range accrual payout","expr":"Inside: Payout = P1 x (d/N)   |   Outside: Payout = P2 x (N-d)/N (or zero)","where":["N = total observations/days in the period","d = days the index is inside the range","P1 = payout when inside the range","P2 = payout when outside the range (often 0)"]},{"t":"p","text":"Key terms: **Reference Index**, **Range**, **Inside-Range Payout**, **Outside-Range Payout**, **Observation Period**, and **Settlement Period** (coupon payment interval)."},{"t":"p","text":"**Worked example** (RAN linked to 3M SGD SOR, 5% p.a. for days SOR closes within 1.0%-1.5%, semi-annual coupon, ACT/360): If SOR is in range 110 of 182 days in the 1st period, coupon = 110/182 x (5%/2) = **1.51%**. If 160 of 183 days in the 2nd period, coupon = 160/183 x (5%/2) = **2.19%**."},{"t":"sub","text":"8.4.2 Callable Daily Range Accrual Notes (CDRAN / VMRAN)"},{"t":"p","text":"A **CDRAN** adds a **call feature** giving the issuer the right to redeem the note (typically at par) on specific dates. The call is valuable to the issuer and exposes the investor to **re-investment risk**, so the investor is compensated with a **higher coupon/yield**. CDRANs become callable only after an initial **lockout** period, then on designated coupon dates. Because the call changes the effective maturity, it is also called a **Variable Maturity Range Accrual Note (VMRAN)**."},{"t":"sub","text":"8.4.3 Inverse Floating Rate Notes (Inverse Floaters)"},{"t":"p","text":"Pays a coupon **inversely** linked to a floating-rate index (usually a near-term rate such as 3M LIBOR). The initial coupon is much higher than a bank deposit rate, but **as rates rise the coupon falls**, scaled by a **leverage factor**."},{"t":"formula","name":"Inverse floater coupon","expr":"Coupon = Max [ X% - Leverage x Floating Rate Index , Min Coupon ]","where":["X% = fixed base rate","Leverage = leverage/multiplier on the floating rate","Floating Rate Index = reference rate (e.g., 3M LIBOR)","Min Coupon = coupon floor (often 0%)"]},{"t":"sub","text":"8.4.4 Callable Step-Up Notes (CSUN)"},{"t":"p","text":"A **capital-guaranteed** instrument offering fixed coupons that **step up** over its life. Because step-ups create risk for the issuer, the note is **callable** by the issuer on specific dates. Investor risks are **issuer credit risk** and **call/reinvestment risk** - an investment-grade rating (BBB+ or higher) is desired. CSUNs become popular in a **rising-rate** environment; if rate-hike expectations fade, the issuer is more likely to call to avoid paying higher step-up coupons."},{"t":"h","text":"8.5 Yield Enhancement (No Capital Preservation)"},{"t":"p","text":"A **short-option** strategy combines selling a put/call with a note/deposit to offer higher-than-market yield. These give a fixed return but carry **downside risk** and **no capital preservation** - upside is capped while a full capital loss is possible in the worst case (though unlikely)."},{"t":"sub","text":"8.5.1 Equity Linked Notes (ELNs)"},{"t":"def","term":"Equity Linked Note","def":"A structured product giving better-than-market yield as long as the underlying equity/index does not breach the strike price at maturity. ELNs have a different payoff from the equity itself - capped upside but downside capital loss if the stock falls sharply. In Singapore and Hong Kong, ELNs are typically offered with no principal guarantee."},{"t":"list","ordered":false,"items":["**Bull ELN** - investor SELLS a PUT. If the underlying closes at/above strike on the valuation date, investor receives the promised yield; if below strike, the put is exercised and the investor buys the stock at strike (or settles cash equivalent).","**Bear ELN** - investor SELLS a CALL; enhanced yield if price closes at/below strike, else investor must sell the underlying at strike.","**Strangle ELN** - investor sells BOTH a call and a put at different strikes; yield earned if price closes between the strikes.","**Worst-of ELN** - investor writes puts on 2-4 stocks; obliged to buy the worst performer if it is below strike (see 8.5.3)."]},{"t":"p","text":"For the SIP module the focus is on the **Bull ELN** (the most popular type). Key ELN terms: **Issuer** (FI or SPV), **Reference Financial Asset**, **Strike Price** (below which the option is exercised), **Price of Note** (a discount to face value - the discount creates the yield if the put is not exercised), **Mode of Settlement** (cash/physical), and **Fixing Date** (the day the closing price determines payout, usually 2 business days from maturity)."},{"t":"sub","text":"8.5.2 Bull ELN payoff and worked example"},{"t":"p","text":"In a Bull ELN the investor sells an embedded **put** to the FI, allowing the FI to sell the underlying back at strike if breached at maturity. If the strike is not breached, the investor keeps the higher return with no equity delivery. Returns are **capped** at the fixed yield - a very bullish investor is better off buying the shares directly; the Bull ELN suits a **mildly bullish / flat** near-term view. Downside protection can be added by buying a lower-strike put, but this costs upside yield."},{"t":"diagram","kind":"payoff","title":"Bull ELN = short put payoff profile","legs":[{"instrument":"put","position":"short","strike":174.52,"premium":6,"qty":1}],"spotRange":[140,210]},{"t":"p","text":"**Apple Bull ELN example** - 6-month note, USD 1m, strike $174.52 (92.54% of $188.59 spot), put priced at $6, money-market yield 2.51688% p.a. Writing 5,730 puts generates $34,380 premium; placed at money-market for 6 months gives ~USD 1,047,309.75, a 4.73% 6-month return, or annualised ~**9.68%**. Issue price = 1/(1.0968)^0.5 = **95.49%** of face ($954,900)."},{"t":"list","ordered":true,"items":["**Scenario 1** - Apple rises 12% to $211.22: put not exercised, investor gets USD 1m face value (9.68% annualised on $954,900). Direct shareholding would have returned 12%, so the ELN caps the upside.","**Scenario 2** - Apple falls 5% to $179.16 (still above strike $174.52): put not exercised, investor still earns 9.68% annualised.","**Scenario 3** - Apple falls 10% to $169.73 (below strike): put exercised, investor buys 5,730 shares at $174.52. Unrealised book loss = (169.73/174.52 - 1) = -2.74% (cash settlement realises ~ -$27,446.70)."]},{"t":"p","text":"Theoretically the **downside is the entire notional** (no capital preservation) - any stock can fall to zero - but selecting quality stocks makes the worst case unlikely."},{"t":"key","title":"Bull ELN at a glance","points":["Investor is a NET SELLER of a put = bears option-writer risk.","Upside is CAPPED at the fixed yield; downside can be the full notional.","Suits mildly bullish/flat views and investors willing to own the stock at strike.","Investor also bears issuer credit risk and liquidity risk (little/no secondary market)."]},{"t":"sub","text":"8.5.3 Worst-of ELN (Laggard ELN)"},{"t":"p","text":"Linked to **more than one** share/index. The investor sells a put on a **basket** and must buy the **worst-performing** stock at its strike if that stock closes below strike. The worst performer is found by comparing each stock's closing price on the fixing date to its initial price in **percentage** terms (the worst stock need not be the one that touched the knock-in)."},{"t":"p","text":"Premium drivers: **higher correlation between underlyings -> LOWER premium** (lower chance of exercise; at correlation = 1 it equals a single-name put). **Negative correlation -> higher premium**. **Higher volatility -> higher premium**. Worst-of ELNs may add **knock-in** and/or **knock-out** barriers and pay a **higher yield (deeper discount)** because they are riskier than a standard ELN."},{"t":"sub","text":"8.5.4 Risks of ELNs"},{"t":"list","ordered":false,"items":["**Market risk** - if the stock closes below the put strike at the final fixing, the investor is obliged to buy above market and bears the full downside.","**Issuer credit risk** - a credit event can trigger early termination; payout is liquidation value of components, possibly far below principal.","**Liquidity risk** - little/no secondary market; should hold to maturity. If a market exists, mark-to-market value fluctuates with share price, volatility, dividends, the fixed-income leg, and issuer creditworthiness.","**Worst-of risk** - exposed to the worst performer even if all others are above strike; deeper discount reflects the higher risk."]},{"t":"h","text":"8.6 Credit Linked Notes (CLNs)"},{"t":"def","term":"Credit Linked Note","def":"A yield-enhancement note in which the investor effectively SELLS credit insurance (via an embedded CDS) on a reference entity to the issuer, in return for a higher yield. A fixed-income investment serves as collateral against the CDS."},{"t":"def","term":"Credit Default Swap (CDS)","def":"An OTC contract akin to credit insurance: the buyer pays periodic premiums to the seller in exchange for a payout if a credit event occurs on the reference entity."},{"t":"p","text":"**Credit events** include: bankruptcy; failure to pay; debt restructuring (adverse change); repudiation; moratorium; obligation acceleration; obligation default. **Debt restructuring** = terms made less favourable to holders (lower principal, lower coupon, postponed payments, longer maturity, or changed payment priority)."},{"t":"p","text":"In a CLN the investor sells the CDS to the issuer for higher yield. **No credit event** -> investor receives cash principal plus the credit-insurance spread at maturity. **Credit event** -> the note redeems and the investor receives the **defaulted reference asset** instead of cash (usually at a deep discount = substantial loss)."},{"t":"diagram","kind":"flow","title":"Credit-Linked Note cash flows","steps":[{"label":"CLN investor","sub":"sells CDS / pays principal"},{"label":"Issuing bank","sub":"holds collateral, pays coupon"},{"label":"Reference entity","sub":"credit monitored"},{"label":"At maturity","sub":"no event: principal+spread; event: defaulted asset"}]},{"t":"p","text":"Settlement on a credit event: **Physical** - the bank pays the CDS buyer the principal and receives the defaulted bond, which it passes to the CLN investors (who end up owning the defaulted bond). **Cash** - the bank pays the buyer the difference between par and market price of the defaulted obligation (often set by auction) and passes that loss to the CLN investors."},{"t":"p","text":"Key terms: **Issuer**, **Reference Entity/Entities**, **Mode of Settlement**, **Type of CDS** (single name or first-to-default), **Early Termination** trigger, **Coupon**, and **Coupon Payment Period**."},{"t":"sub","text":"8.6.1 First-to-Default CLN & 8.6.2 Risks"},{"t":"p","text":"A **first-to-default** CLN insures **multiple** credits; if **any one** defaults (the first one), collateral is used to compensate the CDS buyer and the investor likely loses a substantial part or all of the principal - much riskier than a single-name CLN. A CLN investor is exposed to **two credit risks**: (a) the note issuer / SPV collateral, and (b) the **reference entity** linked to the CDS."},{"t":"sub","text":"8.6.3-8.6.4 Bond-Linked Notes (BLNs)"},{"t":"p","text":"A **BLN** embeds a **short put on a bond** (with a strike). Like a CLN the investor may end up owning a bond, but differences are: a CLN sells a **CDS on a reference entity** whereas a BLN sells a **put on a bond**; a CLN's payout depends on a **credit event** whereas a BLN's payout depends on the **bond price** (which can move on downgrades, widening spreads or volatile rates); and a BLN investor may end up owning a bond **even with no credit event**."},{"t":"diagram","kind":"compare","title":"CLN vs BLN","colA":"Credit Linked Note","colB":"Bond Linked Note","rows":[["Sells a CDS on a reference entity","Sells a put option on a bond (has a strike)"],["Payout depends on a credit event","Payout depends on the bond's price"],["Triggered by credit default","Affected by default AND downgrades/spreads/rates"],["Owns defaulted asset only on credit event","May own a bond even with no credit event"]]},{"t":"h","text":"8.7 Market Access Notes"},{"t":"p","text":"These give investors access to markets/opportunities: **ETNs**, **Index-Linked Notes**, **Participatory Notes (PNs)** and **Access Notes**."},{"t":"sub","text":"8.7.1 Exchange-Traded Notes (ETNs)"},{"t":"p","text":"ETNs have **no fixed coupons** and **principal at risk**; price depends on the **issuer's credit quality** and the **underlying benchmark/strategy**. They are **listed and traded on an exchange** (the main difference vs unlisted structured notes), giving investors greater **liquidity** while still bearing issuer credit risk."},{"t":"diagram","kind":"compare","title":"ETN vs ETF","colA":"ETN","colB":"ETF","rows":[["Debt instrument backed by issuer's credit","Holds a proportional stake in the tracked assets"],["Has a maturity date","No fixed maturity"],["No trustee required (some have one)","Trustee required, independent of manager"],["Issuer credit risk","Diversified asset exposure"]]},{"t":"sub","text":"8.7.2 Index-Linked Notes"},{"t":"p","text":"Debt securities whose coupons and/or principal are linked to a market index/asset price. For slightly less upside, they may add a **minimum return at maturity** plus the original principal. Structured with a **participation rate** (e.g., 100% of annual average performance) or a **periodic cap** (e.g., 10% annual cap)."},{"t":"p","text":"**Worked example** (principal-preserved, redemption = greater of Principal x (100%+4%) or Principal x (85% + Average Performance) on SGD 1m): If average STI performance is **+5%**, redemption = greater of $40,000 (4%) and $1m x 85% x 5% = **$42,500**. If average performance is **-5%**, the 4% floor applies = **$40,000**."},{"t":"sub","text":"8.7.3-8.7.4 Participatory Notes & Access Notes"},{"t":"p","text":"**Participatory Notes (PNs)** are offshore derivative instruments, not registered with the underlying market's regulator and not listed (e.g., issued by Indian securities firms to foreign investors); dividends/capital gains flow through to PN holders. **Access Notes** are sold directly to the public by the issuing corporation (equities or bonds raising funds); investors usually hold to maturity and collect interim coupons."},{"t":"h","text":"8.8 Investors, Suitability & Documentation"},{"t":"p","text":"Investors buy structured notes mainly for **yield enhancement** and **market access**, and must have a greater **risk appetite** and understand the product's strategy. For **retail investors** who generally want principal guarantee, the FI must explain the risk of **principal loss/unlimited downside** if the note lacks it, and assess suitability against wealth and risk tolerance. If unsuitable but the investor insists, the FI must obtain documented acknowledgement."},{"t":"key","title":"Factors investors must consider in the sales process","points":["Liquidity - usually not fully redeemable during the tenure; early withdrawal can lose part/all principal.","Risk - higher because of the multiple layers; need matching risk appetite.","Returns - tied to underlying performance; principal values may be affected.","Terms & conditions - review obligations and risks.","Fees & charges - usually higher than standard instruments; understand how transaction costs are passed on."]},{"t":"p","text":"**Structured deposits** resemble structured notes (a debt obligation of the bank) but are **NOT debentures** - they are a type of **deposit** that only banks can issue and must meet the definition of 'deposit' under the **Banking Act 1970**."},{"t":"diagram","kind":"compare","title":"Structured note vs Structured deposit","colA":"Structured note","colB":"Structured deposit","rows":[["A debenture (senior unsecured debt)","Not a debenture - a type of deposit"],["Governed by the SFA (prospectus regime)","Must meet 'deposit' definition under Banking Act 1970"],["Issued by banks or SPVs","Can only be issued by banks"],["Sold mostly OTC","A bank deposit product"]]},{"t":"p","text":"**Disclosure & valuation**: a structured note must be **marked-to-market periodically** so the holder knows its value, with pricing from an **independent source**, and timely meaningful ongoing disclosures. For each issue the bank should provide a **Prospectus** and a **Product Highlights Sheet (PHS)** - the PHS highlights key terms/risks in simple language and complements the prospectus."},{"t":"diagram","kind":"cycle","title":"Worst-of/autocallable note observation cycle","stages":[{"label":"Issue","sub":"set strike/KO/KI"},{"label":"Obs 1","sub":"all >= KO? call + coupon"},{"label":"Obs 2","sub":"else continue"},{"label":"Final val","sub":"compare to strike; convert worst performer if below"}]}],"newQuestions":[{"type":"mcq","q":"A structured note is BEST described as:","options":["A unit in a collective investment scheme","A debt instrument / debenture whose return is linked to underlying instruments","An exchange-traded equity giving voting rights","A deposit guaranteed under the Banking Act 1970"],"correct":[1],"explain":"A structured note is a debt instrument/debenture whose return characteristics are linked to underlying instruments via embedded derivatives. It is not a CIS unit, not equity, and a structured deposit (not note) is the deposit product."},{"type":"mcq","q":"Under the SFA, a prospectus is NOT required for a structured note offer EXCEPT when it is offered:","options":["Only to accredited investors","Only to institutional clients","For a minimum consideration of S$200,000","To the retail public below S$200,000"],"correct":[3],"explain":"A prospectus is generally required for retail offers; it is exempt only for AI/II offers or a minimum consideration of at least S$200,000. A retail offer below that threshold needs a prospectus."},{"type":"mcq","q":"When a structured note is issued via an SPV, which statement is correct?","options":["The note appears as a liability on the bank's balance sheet","Investors always have full recourse to the bank in default","SPV assets/liabilities are off-balance-sheet and note holders claim first on SPV assets","The SPV cannot hold any collateral"],"correct":[2],"explain":"An SPV is a separate legal construct; its assets/liabilities are off-balance-sheet for the bank, and in default note holders claim first on SPV assets and may have no recourse to the bank."},{"type":"mcq","q":"A RAN linked to 3M SOR pays 5% p.a. semi-annually for each day SOR closes within range. If SOR is in range on 110 of 182 days in the first period, the coupon for that period is approximately:","options":["1.51%","2.50%","3.02%","5.00%"],"correct":[0],"explain":"Coupon = (d/N) x (annual rate/2) = (110/182) x (5%/2) = 0.604 x 2.5% = 1.51%."},{"type":"mcq","q":"In the second RAN period, SOR is in range on 160 of 183 days. The coupon (5% p.a., semi-annual) is approximately:","options":["1.51%","2.19%","4.37%","5.00%"],"correct":[1],"explain":"Coupon = (160/183) x (5%/2) = 0.874 x 2.5% = 2.19%."},{"type":"mcq","q":"For an inverse floating rate note with coupon = Max[X% - Leverage x Floating Rate Index, Min Coupon], what happens to the coupon as interest rates RISE?","options":["The coupon rises proportionally","The coupon falls, reduced by the leveraged rate increase","The coupon is unaffected","The principal is reduced"],"correct":[1],"explain":"An inverse floater's coupon moves inversely to the reference rate; as rates rise the coupon falls by the leveraged increase, subject to the minimum coupon floor."},{"type":"mcq","q":"A callable step-up note (CSUN) is MOST likely to be called by the issuer when:","options":["Inflation and rate-hike expectations rise sharply","Rate-hike expectations wane so the issuer avoids paying higher step-up coupons","The investor requests early redemption","The note's credit rating is upgraded"],"correct":[1],"explain":"If further rate hikes look less likely, the issuer has good reason to call the note to avoid paying the higher step-up coupons, raising the likelihood of early redemption."},{"type":"mcq","q":"In a Bull ELN, the investor's embedded option position is:","options":["Long a call","Short a put","Long a put","Short a call"],"correct":[1],"explain":"A Bull ELN investor sells (is short) a put on the underlying; if the stock closes below strike the put is exercised and the investor must buy the stock at strike."},{"type":"mcq","q":"Apple Bull ELN: strike $174.52, 5,730 shares, cash settlement. At maturity Apple is $169.73. The realised loss is approximately:","options":["-2.74% (about $27,447)","-5.00% (about $50,000)","-10.00% (about $100,000)","0% (no loss)"],"correct":[0],"explain":"Buy at strike $174.52 but worth $169.73: (169.73/174.52 - 1) = -2.74%. On 5,730 shares the loss is about $27,447."},{"type":"mcq","q":"In the Apple Bull ELN, if Apple rises 12% to $211.22 at maturity, the investor:","options":["Participates fully in the 12% gain","Receives the capped fixed yield (~9.68% annualised) only","Must deliver the shares at $211.22","Loses the premium earned"],"correct":[1],"explain":"The put is not exercised, so the investor receives the face value and the capped fixed yield (~9.68% annualised), NOT the full 12% upside - ELN upside is capped."},{"type":"mcq","q":"For a worst-of ELN, an INCREASE in the correlation between the underlying stocks generally:","options":["Increases the put premium (higher yield)","Decreases the put premium (lower yield)","Has no effect on premium","Eliminates conversion risk"],"correct":[1],"explain":"Higher correlation lowers the chance of any single name breaching strike, reducing the worst-of put premium; at correlation = 1 it equals a single-name put. Negative correlation raises the premium."},{"type":"mcq","q":"In a worst-of ELN, the stock that is converted to the investor at maturity is:","options":["The first stock to touch its knock-in level","The worst performer (largest % fall from initial) at the final valuation date","The stock with the highest volatility","Always the same stock named in the term sheet"],"correct":[1],"explain":"The converted stock is the worst performer in percentage terms at the final valuation date, which need not be the one that touched the knock-in level."},{"type":"mcq","q":"In a CLN with no credit event during its life, the investor receives at maturity:","options":["The defaulted reference asset","Cash principal plus the credit-insurance spread","Only the recovery value of the bond","Shares of the reference entity"],"correct":[1],"explain":"If no credit event occurs, the CLN investor receives the cash principal plus the spread earned from selling the credit insurance (CDS)."},{"type":"mcq","q":"A first-to-default CLN insuring three reference entities is riskier than a single-name CLN because:","options":["It pays a lower coupon","A default by ANY one (the first) of the entities can cause substantial principal loss","The investor buys rather than sells the CDS","It has no issuer credit risk"],"correct":[1],"explain":"In a first-to-default structure, the default of the first of several entities triggers settlement and likely substantial principal loss, making it much riskier than a single-name CLN."},{"type":"mcq","q":"Index-linked note: redemption = greater of Principal x (100%+4%) or Principal x (85% + Average Performance), on SGD 1m. If average index performance is +5%, the return is:","options":["$40,000 (4%)","$42,500 (4.25%)","$50,000 (5%)","$85,000 (8.5%)"],"correct":[1],"explain":"Participation = $1m x 85% x 5% = $42,500, which exceeds the 4% floor of $40,000, so the investor receives the greater amount, $42,500."},{"type":"mcq","q":"For the same index-linked note, if average index performance is -5%, the investor receives:","options":["A loss of $50,000","$0","$40,000 (the 4% minimum)","$42,500"],"correct":[2],"explain":"With principal preservation and a 4% floor, a negative index performance triggers the greater amount = Principal x 4% = $40,000."},{"type":"mcq","q":"Which statement about ETNs is LEAST accurate?","options":["They are listed and traded on an exchange","They have no fixed periodic coupon and principal is at risk","They hold a proportional stake in the assets they track, like an ETF","Their price depends on issuer credit quality and the underlying benchmark"],"correct":[2],"explain":"An ETN is a debt instrument backed by the issuer's credit, not a fund holding a proportional stake - that diversified holding describes an ETF, not an ETN."},{"type":"mrq","q":"Select all that apply: A CLN investor is exposed to which credit risks, and how are credit events settled?","options":["Credit of the note issuer / SPV collateral","Credit of the reference entity linked to the CDS","Physical settlement (delivery of defaulted bond)","The investor faces no credit risk because collateral is held"],"correct":[0,1,2],"explain":"A CLN investor bears both the issuer/SPV-collateral credit risk and the reference entity's credit risk; settlement on a credit event can be physical (deliver defaulted bond) or cash. Option 4 is false."},{"type":"mrq","q":"Select all that apply: Which are characteristics or risks of a Bull ELN with no capital preservation?","options":["Upside is capped at the fixed yield","Investor may be obliged to buy the stock at strike if it falls below strike","Little or no secondary market liquidity","Principal is fully guaranteed if held to maturity"],"correct":[0,1,2],"explain":"Bull ELNs cap the upside, can force the investor to buy the stock at strike, and typically have little/no liquidity. They are sold with NO capital preservation in Asia, so option 4 is false."},{"type":"mrq","q":"Select all that apply: Which statements correctly distinguish a Bond-Linked Note (BLN) from a Credit-Linked Note (CLN)?","op
