— call warrant","Both call and put warrants can be issued"],["Usually one exercise price","Can have several exercise prices on same underlying"],["Maturity typically measured in years","Shorter-term, usually 6–12 months"],["New shares issued upon exercise (dilution)","No new shares issued upon exercise"],["Settled by delivery of shares","Cash-settled (no delivery of shares)"]]},{"t":"sub","text":"Structured Warrant Code (example: CapitalaMBeCW181009 / COWW)"},{"t":"p","text":"Structured warrant terminology is more complex than that of company warrants. The example below (a Macquarie Bank warrant) shows how each part of the code is read."},{"t":"table","headers":["Code part","Attribute","Meaning"],"rows":[["Capitala","Underlying asset","CapitaLand Limited shares"],["MB","Issuer","Macquarie Bank Limited"],["e","Exercise style","European-style warrant"],["CW","Type of warrant","Call Warrant (PW = Put Warrant)"],["181009","Expiry date (YYMMDD)","Expires 9 October 2018"],["COWW","Warrant code/symbol","Unique 4-character SGX code ending in \"W\""]]},{"t":"sub","text":"Basic Features of (Company) Warrants"},{"t":"list","ordered":false,"items":["**Underlying security** — the security that can be purchased upon conversion of the warrant.","**Exercise price** — the price at which the holder can buy the underlying security; typically set ABOVE the prevailing share price at issue.","**Conversion ratio** — the number of warrants required to convert into one share.","**Expiration date** — the last date on which a warrant can be exercised."]},{"t":"p","text":"While warrants are not converted into the underlying shares, their **holders do not receive dividends**."},{"t":"h","text":"10.2 Warrant Valuation"},{"t":"p","text":"Worked example used throughout: one **Duty Free International (DF Int'l)** warrant converts into one DF Int'l share (conversion ratio n = 1) by paying an exercise price of **$0.430**. On listing (18 May 2017) the stock traded at $0.38; by 17 Jan 2018 the share price had fallen to $0.26 and the warrant traded at $0.030."},{"t":"sub","text":"Intrinsic Value"},{"t":"def","term":"Intrinsic value","def":"When the share price exceeds the exercise price the warrant is in-the-money, and the intrinsic value is the difference between the current share price and the exercise price, divided by the conversion ratio. When the share price is below the exercise price the warrant is out-of-the-money and intrinsic value is zero."},{"t":"formula","name":"Intrinsic value (in-the-money)","expr":"Intrinsic Value = (SP − EP) / n","where":["SP = share price","EP = exercise price","n = conversion ratio","= 0 if SP ≤ EP"]},{"t":"p","text":"For DF Int'l, while SP ($0.26) stayed below EP ($0.43) the intrinsic value was **zero**. If the share price rises to $0.48, intrinsic value = ($0.480 − $0.430) ÷ 1 = **$0.05** per warrant."},{"t":"sub","text":"Conversion Price"},{"t":"def","term":"Conversion price","def":"The total price the investor must pay to convert warrants into one underlying share — the warrant cost plus the exercise price."},{"t":"formula","name":"Conversion price","expr":"Conversion price = nWP + EP","where":["n = conversion ratio","WP = warrant price","EP = exercise price","DF Int'l: $0.030 + $0.430 = $0.46"]},{"t":"sub","text":"Warrant Price and Warrant Premium"},{"t":"def","term":"Warrant premium","def":"The additional amount spent by buying warrants and paying the exercise price to convert into one share, compared with buying the share outright in the market. Note: \"premium\" here does NOT mean the warrant's price (unlike a conventional option, where the premium IS the option price)."},{"t":"formula","name":"Warrant premium","expr":"Premium ($) = nWP + EP − SP   ;   Premium (%) = [(nWP + EP − SP) / SP] × 100","where":["n = conversion ratio","WP = warrant price","EP = exercise price","SP = share price"]},{"t":"table","headers":["Item","Scenario 1 (17 Jan 2018)","Scenario 2 (assumed rise)"],"rows":[["Share price","$0.26","$0.480"],["Intrinsic value","Zero","$0.05 per warrant"],["Warrant price","$0.030","$0.080"],["Premium ($)","0.030 + 0.430 − 0.26 = $0.20","0.080 + 0.430 − 0.480 = $0.030"],["Premium (%)","0.20 / 0.26 = 76.92%","0.030 / 0.480 = 6.25%"]]},{"t":"key","title":"The leverage effect","points":["Leverage offers greater PERCENTAGE gains (and losses) than the underlying share for a given move in the share price.","DF Int'l example: the share rose 85% ($0.26 → $0.480) but the warrant rose 167% ($0.030 → $0.080).","This amplified return is the main reason investors are attracted to warrants."]},{"t":"sub","text":"Gearing Ratio"},{"t":"def","term":"Gearing ratio","def":"Compares the cost of the warrants needed to convert into one share against the share price at a point in time. Gearing lets investors participate in the share's performance at a lower outlay."},{"t":"formula","name":"Gearing ratio","expr":"Gearing = SP / (nWP)","where":["SP = share price","n = conversion ratio","WP = warrant price","DF Int'l: 0.265 / 0.030 ≈ 8.8x"]},{"t":"sub","text":"Minimum Value and Maximum Value"},{"t":"p","text":"In an arbitrage-free market warrants trade within well-specified bounds. For a conversion ratio of 1:"},{"t":"list","ordered":false,"items":["**Maximum value** = the underlying share price. Most warrants trade below this maximum, and prices fall as expiry approaches. The maximum-price line sits at a 45-degree angle to the x-axis.","**Minimum value** = the intrinsic value: SP − EP if SP > EP, otherwise 0."]},{"t":"formula","name":"Minimum value (n = 1)","expr":"Min value = SP − EP   if SP > EP ;   = 0   if SP ≤ EP","where":["SP = share price","EP = exercise price"]},{"t":"p","text":"As the share price rises well above the exercise price, the **premium over intrinsic value shrinks**, because the leverage potential of the warrant declines — a given share-price rise becomes an increasingly smaller percentage of the (now higher) share price. When SP = EP the warrant is at-the-money."},{"t":"diagram","kind":"payoff","title":"Long call warrant payoff (at expiry, EP = 0.43)","legs":[{"instrument":"call","position":"long","strike":0.43,"premium":0.03,"qty":1}],"spotRange":[0.2,0.7]},{"t":"diagram","kind":"matrix","title":"Warrant moneyness (call warrant)","cols":["Position of SP vs EP","Status"],"rows":[{"label":"SP > EP","cells":["In-the-money","Intrinsic value = SP − EP > 0"]},{"label":"SP = EP","cells":["At-the-money","Intrinsic value = 0"]},{"label":"SP < EP","cells":["Out-of-the-money","Intrinsic value = 0"]}]},{"t":"h","text":"10.3 Factors Affecting the Price of a Company Warrant"},{"t":"p","text":"Once detached from its host security, a company warrant's price is influenced by eight factors. Because company warrants are always **call** warrants, directions below are for call warrants (put-warrant notes are given for completeness only)."},{"t":"list","ordered":false,"items":["**Underlying share price** — company warrants are all call warrants, so they are worth more when the underlying share price rises.","**Life of the warrant** — longer time to expiry means a higher price; an out-of-the-money warrant may still become valuable later. As life shortens it loses speculative (time) value; at expiry a warrant is worth only its intrinsic value, after which it is worthless.","**Exercise price** — the LOWER the exercise price, the higher the warrant price (lower EP raises intrinsic value).","**Price volatility of the underlying** — the more volatile the share, the higher the warrant price, because warrants capture upside but cap downside.","**Dividend on the underlying** — warrant holders get no dividends, so dividend declarations reduce the call warrant's price slightly (warrants \"lose out\").","**Leverage** — warrants offering greater leverage command higher prices.","**Interest rates** — higher rates RAISE the call warrant price (interest saved on the lower capital outlay vs buying the stock). For completeness, higher rates LOWER a put warrant's price.","**Size of warrant issue** — the more warrants outstanding, the greater the potential earnings dilution; hence a NEGATIVE relation between issue size and warrant price."]},{"t":"table","headers":["Factor increases (↑)","Effect on warrant price"],"rows":[["Remaining life of warrant","↑"],["Exercise price","↓"],["Underlying share price","↑"],["Volatility","↑"],["Dividend expectations","↓"],["Leverage opportunities","↑"],["Interest rates","↑"],["Issue size of warrant","↓"]]},{"t":"key","title":"Dilution from company warrants","points":["Exercising company warrants creates new shares, increasing shares outstanding.","Deep in-the-money warrants, if converted, dilute existing shareholders and reduce per-share value.","Larger issue size = greater potential dilution = lower warrant price (negative relation).","Structured warrants cause no dilution because no new shares are issued (cash-settled)."]},{"t":"h","text":"10.4 Summary"},{"t":"list","ordered":true,"items":["Company warrants are CALL warrants issued only by the company and are settled by DELIVERY of shares. Structured warrants (call or put) are issued by a third party (usually a bank) and are CASH-settled.","A company warrant gives the right to buy a stated number of common shares at a specified price within a specified period. Unlike common shares, warrants expire and warrant holders receive no dividends.","Beyond the underlying's fundamental value, investors must consider intrinsic value, warrant premium, gearing ratio and the expiration date.","Maximum value of a warrant = the underlying share price. Minimum value = the intrinsic value (zero, or SP − EP, whichever is larger).","Warrant prices depend on: underlying share price, life of the warrant, exercise price, volatility, dividend expectations, leverage, interest rates and issue size."]}],"newQuestions":[{"type":"mcq","q":"Which best defines a warrant?","options":["An obligation to buy shares at maturity at the market price","A derivative giving the holder the right, but not the obligation, to buy or sell a set number of securities at a fixed price within a set period","A debt instrument that pays a fixed coupon and returns principal at maturity","A unit in a pooled fund holding the issuer's shares"],"correct":[1],"explain":"A warrant confers a right (not an obligation) to buy/sell a specified number of securities at a fixed exercise price within a set time. The other choices describe obligations, bonds and funds."},{"type":"mcq","q":"Warrants are best characterised as which of the following?","options":["Short-dated put options","Long-dated equity call options","Zero-coupon bonds","Convertible preference shares"],"correct":[1],"explain":"Warrants behave like call options but with maturities of years rather than months, hence 'long-dated equity call options'. Company warrants are calls, not puts."},{"type":"mcq","q":"Why do companies typically attach warrants as a 'sweetener' to a bond or rights issue?","options":["To guarantee a higher coupon to bondholders","To obtain financing at a lower interest rate, reducing financing cost","To avoid issuing any new shares in future","To force investors to hold the host security to maturity"],"correct":[1],"explain":"The warrant incentive lets the issuer raise funds at a lower interest rate, reducing its financing cost. Warrants can later be detached and traded separately."},{"type":"mcq","q":"A key difference between exercising a company warrant and exercising an equity call option is that warrant exercise:","options":["Pays the holder a dividend","Issues new shares, causing earnings dilution","Is always cash-settled with no share movement","Cannot occur before maturity"],"correct":[1],"explain":"Exercising a company warrant creates NEW shares, diluting earnings; exercising a call option moves existing shares and causes no dilution."},{"type":"mrq","q":"Select all that apply: characteristics of a COMPANY warrant (as opposed to a structured warrant).","options":["Issued by the company on its own shares","Both call and put versions are issued","New shares are issued upon exercise","Maturity typically measured in years"],"correct":[0,2,3],"explain":"Company warrants are issued by the company, create new shares on exercise, and run for years. Issuing both calls and puts is a feature of structured warrants — company warrants are call-only."},{"type":"mrq","q":"Select all that apply: features that describe a STRUCTURED warrant.","options":["Issued by a third party such as a financial institution","Cash-settled with no delivery of shares","Endorsed and guaranteed by the underlying company","Can be issued with several exercise prices on the same underlying"],"correct":[0,1,3],"explain":"Structured warrants are third-party issued, cash-settled, and can carry multiple strikes. The underlying company does NOT endorse or guarantee them."},{"type":"mcq","q":"In the structured-warrant code CapitalaMBeCW181009, what does the 'CW' segment indicate?","options":["The European exercise style","A Call Warrant","The issuer Macquarie Bank","The expiry date"],"correct":[1],"explain":"'CW' denotes a Call Warrant (PW would denote a Put Warrant). 'e' is the European style, 'MB' the issuer, '181009' the expiry."},{"type":"mcq","q":"In the code CapitalaMBeCW181009, the segment '181009' represents:","options":["The conversion ratio","The exercise price in cents","The expiry date, 9 October 2018 (YYMMDD)","The number of warrants issued"],"correct":[2],"explain":"'181009' is the expiry date in YYMMDD format — 9 October 2018."},{"type":"mcq","q":"At issue, the exercise price of a company warrant is TYPICALLY set:","options":["Equal to the prevailing share price","Above the prevailing share price","Below the prevailing share price","At zero"],"correct":[1],"explain":"Exercise (strike) prices are typically set above the prevailing share price when warrants are issued."},{"type":"mcq","q":"A warrant has share price $0.60, exercise price $0.45 and conversion ratio of 1. Its intrinsic value is:","options":["$0.00","$0.15","$0.45","$0.60"],"correct":[1],"explain":"Intrinsic value = (SP − EP)/n = (0.60 − 0.45)/1 = $0.15. The warrant is in-the-money."},{"type":"mcq","q":"A call warrant has share price $0.40 and exercise price $0.50 (n = 1). Its intrinsic value is:","options":["−$0.10","$0.00","$0.10","$0.50"],"correct":[1],"explain":"When SP ≤ EP the warrant is out-of-the-money and intrinsic value is zero — never negative. The −$0.10 choice is the trap."},{"type":"mcq","q":"Warrant price $0.03, exercise price $0.43, conversion ratio 1. The conversion price is:","options":["$0.40","$0.43","$0.46","$0.03"],"correct":[2],"explain":"Conversion price = nWP + EP = (1 × 0.03) + 0.43 = $0.46 — the total cost to obtain one share via the warrant."},{"type":"mcq","q":"Share price $0.26, warrant price $0.03, exercise price $0.43, n = 1. The warrant premium in DOLLAR terms is:","options":["$0.03","$0.17","$0.20","$0.43"],"correct":[2],"explain":"Premium ($) = nWP + EP − SP = 0.03 + 0.43 − 0.26 = $0.20 (the extra paid versus buying the share outright)."},{"type":"mcq","q":"Using share price $0.26, warrant price $0.03, exercise price $0.43 (n = 1), the warrant premium in PERCENTAGE terms is approximately:","options":["6.25%","20.00%","76.92%","167.00%"],"correct":[2],"explain":"Premium (%) = (nWP + EP − SP)/SP × 100 = 0.20/0.26 × 100 ≈ 76.92%."},{"type":"mcq","q":"Share price $0.265, warrant price $0.030, conversion ratio 1. The gearing ratio is approximately:","options":["1.0x","8.8x","17.7x","0.11x"],"correct":[1],"explain":"Gearing = SP/(nWP) = 0.265/0.030 ≈ 8.8x. Higher gearing means greater leveraged exposure per dollar."},{"type":"mcq","q":"For a warrant with a conversion ratio of 1, the MAXIMUM value of the warrant is:","options":["The exercise price","The underlying share price","The warrant premium","Zero"],"correct":[1],"explain":"The maximum value equals the underlying share price; the maximum-price line is at 45 degrees to the x-axis. Most warrants trade below this."},{"type":"mcq","q":"For a warrant with conversion ratio 1, its MINIMUM value is:","options":["Always zero","The intrinsic value (SP − EP if SP > EP, else 0)","The warrant premium","The conversion price"],"correct":[1],"explain":"Minimum value is the intrinsic value: SP − EP when in-the-money, otherwise zero."},{"type":"mcq","q":"All of the following raise the price of a company (call) warrant EXCEPT:","options":["A rise in the underlying share price","A longer remaining life","A higher exercise price","Greater price volatility of the underlying"],"correct":[2],"explain":"A HIGHER exercise price LOWERS the warrant price (it reduces intrinsic value). Higher share price, longer life and greater volatility all raise it."},{"type":"mrq","q":"Select all that apply: factors that INCREASE the price of a company call warrant when they rise.","options":["Underlying share price","Dividend expectations on the underlying","Volatility of the underlying","Interest rates"],"correct":[0,2,3],"explain":"Higher share price, volatility and interest rates raise a call warrant's price. Higher dividend expectations REDUCE it because warrant holders receive no dividends."},{"type":"mrq","q":"Select all that apply: correct statements about warrants.","options":["Company warrants are settled by delivery of shares; structured warrants are cash-settled","Warrant holders are not entitled to dividends","A larger warrant issue size tends to raise the warrant price","On the expiration day a warrant is worth only its intrinsic value"],"correct":[0,1,3],"explain":"Company warrants deliver shares and structured warrants are cash-settled; holders get no dividends; at expiry the warrant equals its intrinsic value. A larger issue size LOWERS the price (greater dilution), so that statement is false."}]},"11":{"notes":[{"t":"h","text":"11.1 Overview of Technical Analysis"},{"t":"p","text":"Besides fundamental analysis, **technical analysis** is the other major approach to security evaluation. Though controversial, many traders use technical trading rules and indicators to make investment decisions. It applies to individual securities, the whole market, and any asset class (equities, FX, gold, bonds)."},{"t":"def","term":"Technical analysis","def":"The methodology of forecasting fluctuations in securities prices through an examination of historical market data (mainly price and trading volume). Also called market or internal analysis."},{"t":"def","term":"Fundamental analysis","def":"The approach that focuses on factors affecting a company's business profitability — economic, industry, and company-specific factors — to estimate a security's fair (intrinsic) value."},{"t":"p","text":"Technical analysis believes prices are determined by **demand and supply**, which are in turn affected by both fundamental factors (e.g. macroeconomic forces) and non-fundamental factors (e.g. market sentiment, speculative forces). Technical analysts study past price and volume behaviour to detect shifts in supply and demand and predict future prices. Crucially, they are **not concerned with a security's fair value**."},{"t":"diagram","kind":"compare","title":"Technical vs Fundamental Analysis","colA":"Technical","colB":"Fundamental","rows":[["Studies price and volume data","Studies economic, industry, company factors"],["Goal: predict price direction/timing","Goal: estimate intrinsic (fair) value"],["Not concerned with fair value","Central concern is fair value"],["Assumes irrational factors persist","Assumes rationality prevails long run"],["Also called market/internal analysis","Also called intrinsic-value analysis"]]},{"t":"sub","text":"Underlying Assumptions of Technical Analysis"},{"t":"list","ordered":true,"items":["A security's market value is determined ONLY by its supply and demand.","Supply and demand are affected by both rational and irrational factors — economic variables plus hopes, fears, opinions, moods and guesses of buyers and sellers.","Prices of individual securities and the overall market move in trends that persist over an appreciable length of time.","Trends develop in reaction to changes in the supply-demand balance, and such changes can be detected by studying market action.","Chart patterns tend to repeat themselves."]},{"t":"key","title":"Where analysts agree and disagree","points":["Both technical and non-technical analysts generally accept assumptions (a) and (b) — price is set by supply/demand, governed by many variables.","Key disagreement: technical analysts expect IRRATIONAL factors to persist; fundamental analysts expect only a temporary effect with rational beliefs prevailing long run.","On assumption (c): technical analysts believe new information is priced in GRADUALLY over a period (different information sources, unequal access), so prices adjust slowly and exhibit persistent trends.","Assumption (d): as price moves to a new equilibrium, the change can be detected in charts — technicians hope to be among the first to spot a trend shift."]},{"t":"h","text":"11.1.3 Challenges to Technical Analysis"},{"t":"p","text":"The **Efficient Market Hypothesis (EMH)** presents the greatest challenge. Tests of weak-form efficiency generally support that prices adjust rapidly to new information; if markets price in all information very quickly, there is little opportunity to profit from market data."},{"t":"def","term":"Random walk theory","def":"The theory that share prices follow a random walk — price movements are independent over time — which casts doubt on whether past prices can predict future prices."},{"t":"key","title":"Other criticisms","points":["Popularity self-defeat: if a popular trading rule is followed by many, prices change faster than expected and only the earliest actors benefit; competition eventually negates the rule's value.","Subjectivity: chart reading is subjective, so the same pattern can have several interpretations — there is always doubt and disagreement.","Weak-form EMH evidence undermines the predictive value of historical price data."]},{"t":"h","text":"11.2 Price-based Technical Indicators"},{"t":"p","text":"Price-based indicators mine information from current and historical prices to try to 'beat' the market. They typically measure market **momentum** and the relative state of the market — whether it is **overbought** or **oversold**."},{"t":"sub","text":"11.2.1 Moving Average"},{"t":"def","term":"Moving average (MA)","def":"The average of a security's closing price over a given period. In a simple moving average each day receives equal weight (e.g. 1/100 in a 100-day MA); a more sophisticated MA gives higher weight to more recent prices. The MA is more stable than the daily price, making it useful for detecting trends."},{"t":"p","text":"If the current market price starts to diverge directionally from the moving average, this may indicate a **trend reversal**."},{"t":"sub","text":"11.2.2 Advance-Decline Line (Breadth Index)"},{"t":"def","term":"Advance-Decline (A/D) line","def":"A breadth index covering ALL securities traded. On a cumulative daily basis it plots the running total of the net difference between the number of shares with price advances and those with price declines (advances minus declines)."},{"t":"p","text":"The A/D line corrects the weakness that an index is based on only selected shares. It is compared to an index such as the STI. If both rise (decline) the market is technically strong (weak). In a rising market, a **divergence** where the index rises but the A/D line does not signals a market peak (most shares not participating). If the A/D line rises while the index declines, it signals a reversal of the falling trend."},{"t":"sub","text":"11.2.3 Moving Average Convergence Divergence (MACD)"},{"t":"def","term":"MACD","def":"A trend-following momentum indicator showing the relationship between two moving averages of a security's price, designed to reveal changes in the strength, direction, momentum and duration of a price trend."},{"t":"p","text":"MACD is a collection of **three time series**. The **MACD series** = fast (short-period) EMA minus slow (long-period) EMA. The **signal (average) series** = an EMA of the MACD series itself. An EMA reacts more strongly to recent price changes than a simple moving average (SMA), which weights all observations equally."},{"t":"key","title":"MACD signals (notation MACD(a,b,c))","points":["Notation MACD(a,b,c): MACD series is difference of EMAs with times a and b; signal is an EMA of the MACD series with time c.","Most common values: MACD(12,26,9) days.","Bearish signal: MACD crosses and falls BELOW the signal line — may be time to sell.","Bullish signal: MACD crosses and rises ABOVE the signal line — upward momentum likely."]},{"t":"sub","text":"11.2.5 Bollinger Bands"},{"t":"def","term":"Bollinger Bands","def":"A price envelope (developed by John Bollinger) plotted at a standard-deviation level above and below a simple moving average of price. Because the band distance is based on standard deviation, the bands widen and narrow with volatility."},{"t":"key","title":"Constructing Bollinger Bands","points":["1. Compute the SMA (typically 20-day) of the price.","2. Compute the standard deviation of price over the same data set.","3. Multiply the standard deviation by 2 (common multiplier); add to / subtract from each SMA point to get the upper and lower bands.","Interpretation: prices near the upper band = overbought; near the lower band = oversold; either may precede a reversal or correction."]},{"t":"p","text":"Individual indicators are generally NOT used in isolation but in conjunction with others. Moving averages and the RSI (Section 11.5) are two further common indicators."},{"t":"h","text":"11.3 Trends, Support and Resistance"},{"t":"def","term":"Uptrend","def":"In place when current highs are above previous highs AND current lows are above previous lows; drawn as a rising trend line connecting ascending lows."},{"t":"def","term":"Downtrend","def":"Occurs when current lows are lower than previous lows AND current peaks are lower than previous peaks; drawn as a falling trend line connecting descending highs."},{"t":"def","term":"Trend channel","def":"The trading range between the top and bottom trend lines; may be rising, flat or declining. If prices stay within a rising channel, the technician holds and rides the trend."},{"t":"def","term":"Support level","def":"A price range where a substantial increase in demand is expected, as prices become attractive to buyers who missed earlier opportunities."},{"t":"def","term":"Resistance level","def":"A price range where buyers refuse to pay higher prices and sellers take profits; this supply is called the market 'overhang'."},{"t":"diagram","kind":"compare","title":"Support vs Resistance","colA":"Support","colB":"Resistance","rows":[["Price floor — demand surges","Price ceiling — supply surges"],["Buyers step in (attractive prices)","Sellers take profit; buyers refuse"],["Break BELOW = bearish breakout","Break ABOVE = bullish breakout"],["Penetration below support = sell signal","Penetration above resistance = buy signal"]]},{"t":"def","term":"Breakout","def":"A movement through and beyond the support or resistance level. A breakout above resistance is a bullish signal; a breakout below support is a bearish signal. A breakout confirms continuation of the primary trend, while a penetration below a support line signals a reversal of an uptrend (a sell signal)."},{"t":"h","text":"11.4 Significance of Volume"},{"t":"def","term":"Volume","def":"The number of securities transacted; it shows the intensity of excess demand or supply at a point in time and reflects changes in investors' attitudes."},{"t":"key","title":"Reading volume","points":["Price rise on LOW volume = weak enthusiasm; price rise on HEAVY volume = bullish (strong conviction).","Price decline on HEAVY volume = very bearish (strong, widespread desire to sell).","In a bull market, a downward 'correction' on DECLINING volume may be a lull before the rally continues.","A rally that develops on CONTRACTING volume could signal a possible trend reversal."]},{"t":"h","text":"11.5 Share Price and Volume Techniques"},{"t":"p","text":"Three techniques are covered: the **Dow Theory**, the **Moving Average Line**, and the **Relative Strength Index (RSI)**."},{"t":"sub","text":"11.5.1 The Dow Theory"},{"t":"p","text":"Created by Charles Dow, the Dow Theory is the oldest and most popular method for identifying **long-term trends**, based on the movements of the Dow Jones Industrial Average (DJIA) and the Dow Jones Transportation Average (DJTA)."},{"t":"diagram","kind":"cycle","title":"Dow Theory — three market movements","stages":[{"label":"Primary","sub":"months-years; the main trend (bull/bear)"},{"label":"Secondary","sub":"weeks-months; opposite direction; retraces 1/3 to 2/3"},{"label":"Daily","sub":"random; no forecasting value"}]},{"t":"key","title":"Dow Theory mechanics","points":["Purpose: determine WHERE the market is and where it is going — but NOT the magnitude of moves.","Uptrend (bull): successive highs and successive lows are both higher.","Downtrend (bear): successive highs and successive lows are both lower.","Secondary moves retrace one-third to two-thirds of the prior advance (decline); bear markets are historically shorter than bull markets.","Confirmation: a new primary trend is confirmed only when BOTH the DJIA and DJTA give the same signal. If they diverge, the prior trend is assumed to be maintained."]},{"t":"key","title":"Weaknesses of the Dow Theory","points":["Relies too heavily on the DJIA — a limited selection of old, large 'blue chip' shares; high-tech firms under-represented.","Slow to identify a major trend; may miss a move or be 'whiplashed' by a short-term reversal.","Uses the Transportation Average (mainly railways) which no longer drives the economy.","Designed for the major trend — not useful for the short-term trend.","Does not identify WHICH shares to buy or sell."]},{"t":"sub","text":"11.5.2 Moving Average Line"},{"t":"p","text":"Moving averages smooth out erratic price changes so the underlying trend is clear, and are used to confirm trend direction. The **200-day MA** identifies long-term trends; a **20- to 30-day MA** identifies short/intermediate trends; the 50-day MA is also popular."},{"t":"key","title":"Crossover signals","points":["Trend changes are identified NOT by a change in MA direction but by a CROSSOVER between the price (index) and the moving-average line.","After a downtrend the MA line lies ABOVE current prices; if price breaks UP through the MA from below on heavy volume = bullish (downtrend reversal).","In an uptrend the MA line lies BELOW current prices; if price breaks DOWN through the MA from above on heavy volume = bearish (uptrend reversal).","Signal is stronger if (a) price cuts both short- and long-term MAs, and (b) the short-term MA cuts the long-term MA in the same direction."]},{"t":"sub","text":"11.5.3 Relative Strength Index (RSI)"},{"t":"def","term":"Relative Strength Index (RSI)","def":"A momentum indicator (developed by J. Welles Wilder) that measures the degree of buying or selling interest and the speed of change of price movements. It ranges from 0 to 100."},{"t":"formula","name":"Relative Strength Index","expr":"RSI = 100 − [ 100 / (1 + (Average upward price change / Average downward price change)) ]","where":["Average upward price change = mean of gains over the period","Average downward price change = mean of losses over the period","RSI ranges from 0 to 100"]},{"t":"key","title":"RSI interpretation","points":["RSI above 70 = overbought; RSI below 30 = oversold.","Contrarian: a low RSI of 20-30 or lower may signal a buying opportunity; a high RSI of 70-80 or higher may signal a profit-taking opportunity.","Best practice: track the security's own historical RSI peaks/troughs to calibrate overbought/oversold levels.","RSI is LESS useful in steady, consistent trends — a growth stock in constant demand may stay persistently high; do not read that as a sell signal, instead accumulate when RSI dips.","Overbought/oversold conditions can persist (e.g. 1-2 weeks) while prices keep moving, so technicians wait a few days before acting."]},{"t":"h","text":"11.6 Charts and Chart Patterns"},{"t":"list","ordered":false,"items":["**Line chart** — connects closing prices.","**Bar chart** — shows high, low, open and close for each period.","**Candlestick chart** — shows high, low, open and close with a coloured body.","**Point and figure chart** — plots price movements ignoring time."]},{"t":"def","term":"Reversal pattern","def":"A chart pattern indicating an important reversal in trend is occurring (e.g. head and shoulders, double tops/bottoms)."},{"t":"def","term":"Continuation pattern","def":"A pattern suggesting the market is only pausing (often to correct a short-term overbought/oversold condition) before the existing trend resumes (e.g. rectangles, triangles, flags, pennants, wedges)."},{"t":"diagram","kind":"matrix","title":"Chart patterns by type and direction","cols":["Reversal","Continuation"],"rows":[{"label":"Bullish (bottom)","cells":["Inverse head & shoulders; double/triple bottom","Ascending triangle; bull flag; falling wedge"]},{"label":"Bearish (top)","cells":["Upright head & shoulders; double/triple top","Descending triangle; bear flag; rising wedge"]}]},{"t":"sub","text":"11.6.1 Head and Shoulders"},{"t":"p","text":"The **upright head-and-shoulders** is a reversal pattern at market peaks and one of the more reliable major-reversal indicators. Left shoulder: 1st rally on heavy volume, then a decline on less volume. Head: a higher rally on high volume, then a fall on lower volume. Right shoulder: a 3rd rally on even less volume that fails to reach the head and falls through the neckline."},{"t":"key","title":"Head and shoulders confirmation","points":["Breakout confirmed if price CLOSES below the neckline by 3% of the share price.","Magnitude of the projected decline = distance from head to neckline, projected downward from the neckline.","Inverse head and shoulders indicates a market BOTTOM; the RSI typically shows oversold at the head; breakout above neckline (rising volume) signals uptrend reversal.","Currencies form these patterns faster; commodities can take much longer."]},{"t":"sub","text":"11.6.2 Double and Triple Tops and Bottoms"},{"t":"p","text":"A **double top** is a reversal pattern (market top): two tops separated by a valley, the 2nd top on distinctly LOWER volume than the 1st; confirmed when the neckline is broken on the way down. A **double bottom** occurs in a bear market signalling a reversal: 1st bottom on heavy volume, 2nd bottom dull/low volume, volume rises significantly on the breakout; confirmed when the neckline is broken on the way up. These can extend into triple tops/bottoms."},{"t":"sub","text":"11.6.3 Consolidation Rectangles"},{"t":"p","text":"A **consolidation rectangle** forms when prices move sideways within a narrow range for an extended period — usually a continuation pattern. A break upwards is bullish; a break downwards signals further weakness. While forming, the breakout direction is hard to predict, so the prevailing trend is assumed to continue until proven otherwise."},{"t":"sub","text":"11.6.4 Triangles"},{"t":"p","text":"Triangles have four points of contact (two support, two resistance)."},{"t":"table","headers":["Triangle","Boundaries","Signal"],"rows":[["Symmetrical","Up-sloping support + down-sloping resistance","Breakout either side; major move in that direction"],["Ascending","Up-sloping support + ~horizontal resistance","Bullish — buyers aggressive; prices advance once supply absorbed"],["Descending","~Horizontal support + down-sloping resistance","Bearish — sellers aggressive; prices fall once demand filled"]]},{"t":"sub","text":"11.6.5 Flags and Pennants"},{"t":"p","text":"A **flag** is a parallelogram of price fluctuations after a sharp, almost vertical move, with declining volume; prices break out in the SAME direction as before. In a rising market the flag slants slightly down; in a falling market it slants slightly up. A **pennant** is similar but formed by CONVERGING lines instead of parallel lines. In an up-move flag, volume dries up then explodes on breakout; in a down-move flag, breakout volume need not be explosive."},{"t":"sub","text":"11.6.6 Wedges"},{"t":"p","text":"A **wedge** is formed by converging peaks and troughs that both move in the same direction. A **rising wedge** (both lines slant up) usually develops in a falling trend and is bearish — prices fall sharply after completion (characteristic of bear-market rallies). A **falling wedge** (both lines slant down) interrupts a rising trend; after breaking out prices often drift sideways before rising."},{"t":"sub","text":"11.6.7 Gaps"},{"t":"def","term":"Gap","def":"A price range where no transactions occur — an empty vertical space between adjacent trading periods. A gap is 'closed/covered' when price retraces the entire range; this may take days, weeks, months, or never."},{"t":"key","title":"Three types of gaps","points":["Breakaway gap: appears when price breaks out of a pattern (beginning of a move); emphasises bullishness/bearishness — bullish upside breakouts need heavy volume to confirm.","Runaway (continuation) gap: occurs in the middle of a rapid straight-line move when trends accelerate and emotions run high.","Exhaustion gap: the end of a rapid move — the last in a series of runaway gaps; hard to distinguish from another runaway gap.","Caution: gaps generally get covered eventually but not always — do not trade solely assuming a gap will fill."]},{"t":"h","text":"11.7 Elliott Wave Theory"},{"t":"def","term":"Elliott Wave Theory","def":"Proposed by R.N. Elliott (1938): prices move in cycles of waves and sub-waves and exhibit the Golden Ratio (~1.618). Each cycle comprises a 5-wave advance and a 3-wave retreat (8 waves per cycle)."},{"t":"p","text":"Turning points often occur at **Fibonacci** support/resistance levels (61.8, 161.8, etc.). The Fibonacci series (0,1,1,2,3,5,8,13,21…) is built by adding the two preceding numbers; as it progresses the ratio of consecutive numbers approaches the Golden Ratio of ~1.618."},{"t":"h","text":"11.8 Quantitative Analysis"},{"t":"def","term":"Quantitative analysis","def":"The abstraction of market reality (economy, financial markets and environment) into relations incorporated in a financial model, aiming to identify price anomalies and arbitrage possibilities and to increase speed of access to market information."},{"t":"p","text":"Quantitative analysis uses **statistics and calculus** for pricing, algorithmic trading, asset allocation, risk management, trading-strategy modelling, portfolio optimization, and identifying opportunities. Practitioners are called **'quants'** or 'rocket scientists' and work in the front office (trading strategies) or risk management."},{"t":"key","title":"Quant insights and cautions","points":["Quants decompose price changes to create specific risk profiles — looking beyond first-order change (delta) to 2nd- and 3rd-order derivatives.","Quant funds extensively use quantitative analysis in fund-management decisions.","Controversy on usefulness/fairness: Long Term Capital Management (LTCM), a quant-driven hedge fund, still incurred huge losses despite elegant models.","High-frequency trading, relying on transmission speed and price-discovery algorithms, is under intense regulatory scrutiny."]},{"t":"h","text":"11.9 Summary"},{"t":"list","ordered":true,"items":["Technical analysis studies past price/volume to predict future direction of securities or the market.","It assumes prices discount everything and move in trends; trend shifts can be detected in charts.","The greatest challenge is the EMH; popular trading rules also self-destruct through competition.","Indicators include the A/D line (breadth) and moving averages (smooth out noise).","MACD (trend-following momentum) and Bollinger Bands (SD envelopes around an SMA) are two more.","Dow Theory: primary, secondary and daily movements; goal is to identify the primary trend.","Moving-average crossovers with the index identify trend reversals.","RSI identifies overbought (>70) and oversold (<30) conditions.","Charts: line, bar, candlestick, point and figure.","Patterns are reversal (head & shoulders, double tops/bottoms) or continuation (rectangles, triangles, flags, pennants, wedges).","Elliott Wave: cycles of 8 waves (5 advance, 3 retreat).","Quantitative analysis builds financial models expressing market reality as arbitrage/investment opportunities."]}],"newQuestions":[{"type":"mcq","q":"Which statement BEST describes the focus of technical analysis?","options":["Estimating a security's intrinsic value from company fundamentals","Forecasting price fluctuations by examining historical price and volume data","Discounting future cash flows to derive a fair value","Assessing macroeconomic policy to value the overall market"],"correct":[1],"explain":"Technical analysis forecasts price fluctuations from historical market data (price and volume) and is not concerned with fair/intrinsic value, which is the domain of fundamental analysis."},{"type":"mcq","q":"According to the underlying assumptions of technical analysis, a security's market value is determined ONLY by:","options":["Its discounted future earnings","Its supply and demand","Its book value and dividend yield","Central bank interest rate policy"],"correct":[1],"explain":"Assumption (a) states that a security's market value is determined only by its supply and demand; these are in turn affected by rational and irrational factors."},{"type":"mcq","q":"On which assumption do technical and fundamental analysts MOST differ?","options":["That price is determined by supply and demand","That supply and demand are governed by many variables","The persistence of irrational factors and the speed of price adjustment","That the market constantly assesses available factors"],"correct":[2],"explain":"Both camps accept that supply/demand (driven by many variables) set prices. The key difference is that technicians expect irrational factors to persist and prices to adjust gradually (forming trends), while fundamentalists expect rationality to prevail."},{"type":"mcq","q":"The GREATEST challenge to technical analysis comes from:","options":["The Dow Theory","The Efficient Market Hypothesis","The Elliott Wave Theory","Bollinger Bands"],"correct":[1],"explain":"The EMH (supported by weak-form efficiency tests) holds that prices adjust rapidly to new information, leaving little opportunity to profit from historical market data."},{"type":"mrq","q":"Select all that apply: Which are recognised criticisms of technical analysis in this chapter?","options":["Weak-form EMH evidence shows prices adjust rapidly to information","Chart reading is subjective with multiple interpretations","Popular trading rules self-destruct as competition negates them","It requires detailed forecasts of company cash flows"],"correct":[0,1,2],"explain":"The chapter cites weak-form efficiency, subjectivity of chart reading, and the self-defeating popularity of trading rules. Requiring cash-flow forecasts describes fundamental, not technical, analysis."},{"type":"mcq","q":"A 5-day simple moving average uses closing prices of $20, $22, $24, $23 and $26. What is the moving average value?","options":["$22.50","$23.00","$23.50","$24.00"],"correct":[1],"explain":"(20 + 22 + 24 + 23 + 26) / 5 = 115 / 5 = $23.00. A simple moving average gives equal weight to each day."},{"type":"mcq","q":"Over 14 days a stock's average upward price change is $3 and its average downward price change is $1. Using the chapter's RSI formula, the RSI is approximately:","options":["25","50","67","75"],"correct":[3],"explain":"RS = 3/1 = 3. RSI = 100 − [100 / (1 + 3)] = 100 − 25 = 75. An RSI of 75 is in overbought territory (>70)."},{"type":"mcq","q":"An RSI reading of 18 for a stock that has just been heavily sold on unwarranted fear would, for a contrarian, MOST likely signal:","options":["An overbought condition and a sell signal","An oversold condition and a potential buying opportunity","A neutral condition with no signal","Confirmation to short the stock further"],"correct":[1],"explain":"RSI below 30 indicates oversold; a low RSI of 20-30 or lower can signal a buying opportunity for a contrarian, especially after emotional/unwarranted selling."},{"type":"mcq","q":"In the MACD indicator, the 'signal' (average) line is:","options":["A simple moving average of closing prices","The difference between a fast and slow EMA","An EMA of the MACD series itself","The 200-day moving average of price"],"correct":[2],"explain":"The MACD series is the fast EMA minus the slow EMA; the signal/average series is an EMA of the MACD series itself. Common parameters are MACD(12,26,9)."},{"type":"mcq","q":"A BULLISH MACD signal occurs when:","options":["The MACD crosses and falls below the signal line","The MACD crosses and rises above the signal line","Price touches the lower Bollinger Band","The A/D line declines while the index rises"],"correct":[1],"explain":"When the MACD crosses and rises above the signal line it is bullish (upward momentum). Crossing below the signal line is bearish."},{"type":"mcq","q":"Bollinger Bands are typically plotted at:","options":["A fixed 5% above and below the closing price","Two standard deviations above and below a simple moving average","The 50-day and 200-day moving averages","The Fibonacci levels of 61.8% and 161.8%"],"correct":[1],"explain":"Bollinger Bands are plotted at a standard-deviation level (commonly 2 SD) above and below an SMA (often 20-day), so the bands widen and narrow with volatility."},{"type":"mcq","q":"In a rising market, a divergence in which the index continues to rise but the advance-decline (A/D) line does NOT is interpreted as:","options":["A signal of a market bottom","A bullish breakout confirmation","A warning of a market peak (poor breadth)","Confirmation that the rally is broad-based"],"correct":[2],"explain":"If the index rises but the A/D line does not follow, most shares are not participating — a sign of weak breadth indicating a possible market peak."},{"type":"mrq","q":"Select all that apply: Which volume-and-price relationships are correctly described?","options":["A price rise on heavy volume is bullish","A price decline on heavy volume is very bearish","A rally developing on contracting volume can signal a possible reversal","A price rise on low volume reflects strong conviction"],"correct":[0,1,2],"explain":"Heavy volume confirms moves (rise = bullish, decline = very bearish), and a rally on contracting volume warns of reversal. A rise on LOW volume reflects WEAK, not strong, conviction."},{"type":"mcq","q":"Under the Dow Theory, a new primary trend is CONFIRMED only when:","options":["The DJIA alone makes a new high","Both the DJIA and the DJTA give the same signal","The RSI exceeds 70","The 50-day MA crosses the 200-day MA"],"correct":[1],"explain":"Dow Theory requires confirmation by BOTH the DJIA and the DJTA. If the two averages diverge, the prior trend is assumed to be maintained."},{"type":"mrq","q":"Select all that apply: Which are stated weaknesses of the Dow Theory?","options":["It relies too heavily on the DJIA's limited selection of blue-chip shares","It is slow to identify a major trend and can be 'whiplashed'","It does not identify which specific shares to buy or sell","It is highly effective for short-term trading"],"correct":[0,1,2],"explain":"The chapter lists over-reliance on the DJIA, slowness/whiplash, and failure to indicate which shares to trade. It is NOT useful for the short-term trend, so the last option is false."},{"type":"mcq","q":"Under the moving-average technique, a trend change is identified by:","options":["A change in the direction of the moving-average line itself","A crossover between the price (index) and the moving-average line","The RSI crossing 50","A gap in the price chart"],"correct":[1],"explain":"Trend changes are signalled NOT by the MA changing direction but by a crossover between current prices and the MA line, ideally on heavy volume."},{"type":"mcq","q":"Which pattern is a REVERSAL pattern that forms at a market peak?","options":["Ascending triangle","Consolidation rectangle","Upright head and shoulders","Bull flag"],"correct":[2],"explain":"The upright head and shoulders is a reversal pattern occurring at market peaks. Ascending triangles, rectangles and flags are continuation patterns."},{"type":"mcq","q":"A head-and-shoulders breakout is considered CONFIRMED when the price:","options":["Touches the right shoulder","Closes below the neckline by 3% of the share price","Reaches the height of the head","Forms a second top on lower volume"],"correct":[1],"explain":"Confirmation requires the price to close below the neckline by 3% of the share price; the projected decline equals the head-to-neckline distance projected down."},{"type":"mrq","q":"Select all that apply: Which of the following are CONTINUATION patterns?","options":["Symmetrical triangle","Double top","Consolidation rectangle","Flag"],"correct":[0,2,3],"explain":"Triangles, rectangles, flags, pennants and wedges are continuation patterns. A double top is a reversal pattern indicating a market top."},{"type":"mcq","q":"In quantitative analysis, the failure of Long Term Capital Management (LTCM) is cited to illustrate that:","options":["Quant models guarantee arbitrage-free returns","Elegant, mathematically robust models can still incur huge losses","High-frequency trading is unregulated","Quants only analyse first-order (delta) price changes"],"correct":[1],"explain":"LTCM, a heavily quant-driven hedge fund, suffered huge losses despite elegant models — illustrating the controversy over the usefulness and fairness
