hange rate** (since 1981), not interest rates or money supply — the exchange rate strongly influences local inflation and competitiveness. MAS cannot set independent targets for both the exchange rate and interest rates, as one affects the other."},{"t":"key","title":"Key features of the SGD exchange-rate regime (MAS)","points":["SGD managed against a trade-weighted basket of major trading partners/competitors, weighted by trade importance","Managed float within a policy band; level and direction announced semi-annually","Band periodically reviewed (~6-month cycle); a Monetary Policy Statement and Macroeconomic Review are released","MAS gives up control over domestic interest rates and money supply; SG rates are largely set by foreign rates and SGD expectations","The exchange rate is an effective anti-inflation tool — inflation averaged ~1.9% p.a. (1981-2010)"]},{"t":"sub","text":"Money Supply, Credit Creation & Reserves"},{"t":"p","text":"Money supply also rises from **credit creation**: a bank takes a new deposit, keeps 10% as statutory reserves and lends 90%; repeated through the system this produces a ~10-fold increase in money supply. **Raising required reserves** reduces money supply/liquidity (used to cool an overheating economy); **lowering required reserves** expands it. China cut its Reserve Requirement Ratio three times in H1 2018 to boost liquidity amid trade-war fears."},{"t":"def","term":"Quantity Theory of Money","def":"States a direct proportional relationship between the amount of money in the economy and the price of goods and services — too much money in the system causes inflation."},{"t":"formula","name":"Fisher's equation of exchange","expr":"M × V = P × Q","where":["M = stock of money (currency outside banks + demand deposits)","V = velocity of money circulation","P = general price level / price index","Q = number of transactions in the economy in a year"]},{"t":"p","text":"Significance: when fully operative, the central bank cannot raise output by raising M, because more money chases goods so **P rises (inflation)**, and **V (socially determined) then determines Q (output)**."},{"t":"sub","text":"Inflation, Interest Rates & Asset Values"},{"t":"p","text":"**Bonds:** lower rates = lower discount rates = higher fair values; higher rates = lower bond intrinsic values. Because interest-rate inflection points coincide with business-cycle peaks, the **highest bond yields occur near the cycle peak** (end of a hiking series) and the **lowest yields near the bottom** before recovery."},{"t":"p","text":"**Stocks:** the relationship is more complex. Markets can rise through rising rates if the economy is strong, even with inflation. But at some point the market recognises that further hikes will no longer be matched by strong earnings, and a further hike becomes a **negative trigger** for an overvalued market — a deeper correction ensues."},{"t":"key","title":"Three interest-rate scenarios (k = required return, g = growth)","points":["Positive: rates rise with inflation AND strong earnings; firms pass on costs (high employment). Stock prices stable — higher k is offset by higher g","Slightly negative: rates rise but earnings flat (firms can't raise prices). Stocks fall — k rises while g constant","Very negative: rates rise and cash flows decline (lower sales, layoffs, higher unemployment). Stocks fall sharply — k rises while g declines, widening the k-g spread"]},{"t":"p","text":"Rising rates are not negative for the whole market: in early expansion, **banks benefit** by widening the net interest spread (raising lending rates faster than deposit rates) while loan demand stays strong."},{"t":"sub","text":"Valuation: How k and g Drive Value (DDM / Gordon Growth)"},{"t":"p","text":"The chapter's k-g framework underlies the **Dividend Discount Model (DDM)**. The constant-growth (Gordon growth) model shows why a small change in the **required return (k)** or **growth (g)** moves intrinsic value sharply, and why a widening **k − g spread** depresses prices."},{"t":"formula","name":"Gordon Growth (constant-growth DDM)","expr":"P0 = D1 / (k − g) = D0 × (1 + g) / (k − g)","where":["P0 = intrinsic value today","D1 = next year's dividend = D0 × (1 + g)","D0 = current (just-paid) dividend","k = required rate of return","g = constant dividend growth rate (k must be > g)"]},{"t":"formula","name":"Justified (forward) P/E","expr":"P/E (forward) = (D1 / E1) / (k − g) = payout ratio / (k − g)","where":["D1/E1 = expected dividend payout ratio","k = required rate of return","g = sustainable growth rate","A higher g or lower k raises the justified multiple; a wider k − g compresses it"]},{"t":"p","text":"Worked logic: if D1 = $2, k = 10%, g = 4%, then P0 = 2 / (0.10 − 0.04) = **$33.33**. If k rises to 12% (g unchanged), P0 = 2 / (0.12 − 0.04) = **$25.00** — a ~25% fall from a 2-point rate rise, illustrating why rate hikes pressure equity valuations."},{"t":"sub","text":"Effectiveness of Fiscal & Monetary Policy; Negative Rates; External Flows"},{"t":"key","title":"When policies are less effective","points":["Fiscal and monetary policy running in opposite directions can cancel out (e.g., govt wants jobs, central bank wants contraction)","High savings cultures (e.g., Japan) blunt tax-cut stimulus to consumption","Very open economies leak fiscal stimulus abroad (reliance on foreign firms/labour)","Both policies need time; deeper recessions take longer to respond","Weak/unstable governments (corruption, unrest, hyperinflation) undermine both"]},{"t":"p","text":"**Negative interest rates** (Sweden, Denmark, Switzerland, Japan) charge banks for holding excess reserves at the central bank, aiming to push banks to lend and businesses/individuals to spend and escape deflation. **External money flows** arise from **flights to quality** — funds move to markets with stronger currency, better outlook and higher returns (e.g., USD demand in 2018 as money left emerging markets)."},{"t":"h","text":"3.2.5 Business Cycles & Market Movement"},{"t":"def","term":"Business cycle","def":"The rise and fall in the general level of economic activity — a peak, a slowdown/contraction, a recessionary trough, then recovery and expansion."},{"t":"p","text":"The **stock market is predictive**: its peaks and troughs typically **precede** turning points in the real economy — stock prices turn ahead of GDP. Markets correct before two quarters of negative GDP (a technical recession) are even announced, and rally ahead of reported economic improvement."},{"t":"diagram","kind":"cycle","title":"The Business Cycle & Financial Markets (market leads the economy)","stages":[{"label":"1. Early-Mid Bear","sub":"Negative GDP; rate cuts; liquidity raised; equities fall; loan losses; keep cash, IG bonds, precious metals"},{"label":"2. Late Bear-Early Bull","sub":"Negative GDP persists; cuts continue; worst perceived over; assets rebound; buy cyclical/high-beta, cut cash"},{"label":"3. Early-Mid Bull","sub":"GDP positive; rates start rising; profits improve; employment rises; buy growth & high-yield, rotate to laggards"},{"label":"4. Late Bull-Early Bear","sub":"Inflation rises; CB hikes; costs up, earnings fall; job cuts; hold defensive/high-dividend stocks & IG bonds"}]},{"t":"p","text":"The **bond market** predicts interest-rate trends: yields rise ahead of actual hikes. It also reflects credit demand. When long-term credit demand is weak, long rates may not rise much even with Fed hikes, **flattening the yield curve** — an early predictor of recession."},{"t":"h","text":"3.2.6-3.2.7 Economic Calendars & Indicators"},{"t":"p","text":"**Economic calendars** list key data-release dates; investors monitor releases to judge impact on markets. **Economic indicators** are key statistics signalling the direction of the economy. Composite indicators flag turning points but **do not indicate the magnitude** of the shift."},{"t":"diagram","kind":"compare","title":"Leading vs Lagging Indicators","colA":"Leading","colB":"Lagging","rows":[["Peaks/troughs precede the economy","Peaks/troughs come after the economy"],["Short-term predictor of turning points","Confirms turning points already formed"],["e.g., CLEI components, PMI, S&P 500, building permits","e.g., avg prime rate, CPI for services, commercial loans"],["Used to position ahead of moves","Used to confirm the move has happened"]]},{"t":"def","term":"Leading indicators","def":"Data whose peaks/troughs precede the economy; short-term predictors. US example: the Composite Leading Economic Index (CLEI, 10 components, The Conference Board); OECD compiles CLIs internationally."},{"t":"list","ordered":true,"items":["Average weekly hours (manufacturing)","Unemployment claims","Manufacturers' shipments, inventories & orders","Manufacturers' orders for non-defence capital goods","Housing starts & building permits","10-year T-bond spread over the Fed rate","Adjusted M2 money supply","ISM manufacturing index (new production orders)","S&P 500 index","Consumer sentiment (Univ. of Michigan)"]},{"t":"def","term":"Purchasing Managers' Index (PMI)","def":"A widely followed leading indicator of activity for manufacturing, construction and services. A reading of 50+ signals expansion, below 50 signals contraction. US/China PMIs matter most as the two largest economies; SG PMI is published by SIPMM."},{"t":"def","term":"Coincident indicators","def":"Data whose peaks/troughs align with and move in tandem with the economy, reflecting its current state. US CEI = nonfarm payroll employment, industrial production index, manufacturing & trade sales index, personal income & consumption expenditure."},{"t":"def","term":"Lagging indicators","def":"Data whose peaks/troughs come after the economy (usually by a few quarters); useful to confirm turning points. US index (7 components) includes average duration of employment, inventory-to-sales ratio, change in labour cost per unit of output, average prime rate, outstanding C&I loans, consumer-credit-to-income ratio, and change in CPI for services."},{"t":"p","text":"Singapore equivalents (Dept of Statistics): the **CLI** (leading; e.g., total new companies formed, M2, SGX indices, PMI, non-oil seaborne cargo, domestic liquidity indicator) and the **Composite Coincident Index (CCI)** (e.g., real GDP, industrial production, non-oil domestic exports, total employment, retail sales)."},{"t":"h","text":"3.2.8 Other Economic Factors"},{"t":"p","text":"**Foreign reserves & balance of payments (BoP):** a positive BoP (trade or capital account) builds FX reserves. A widening **trade deficit** makes a country a 'debtor nation' and a target for speculative attack (Asian Currency Crisis 1997). Singapore and Hong Kong defended their currencies; SG holds large reserves (USD 337bn, Jul 2023). A currency expected to fall sharply causes outflows from all securities denominated in it."},{"t":"def","term":"Consumer Price Index (CPI)","def":"Measures the price level of goods and services bought by households as an indicator of inflation. The US Fed primarily uses Core PCE (core inflation) with a long-run 2% target."},{"t":"key","title":"Why inflation is a major concern","points":["Erodes purchasing power","Pressures consumers to buy ahead (esp. big-ticket items)","Encourages businesses to build buffer pricing, aggravating increases","Forces central banks to raise borrowing costs","Rising costs hurt quality of life and can create social unrest"]},{"t":"def","term":"Deflation","def":"A fall in the real value of assets (not merely lower inflation/disinflation). Falling prices shift spending to the future, cutting consumption and investment and causing unwarranted contraction (e.g., Japan's ~12 years of deflation after 1989)."},{"t":"p","text":"**Factor cost changes:** crude oil is a key factor cost — 5 of the last 6 US recessions since the 1970s were preceded by oil-price spikes. Falling oil (to ~USD 28/bbl in 2015-2017) cut costs and inflation globally, aiding recovery (though it hurt oil producers). Other major factor costs are **rent and labour**."},{"t":"h","text":"3.2.9 Political Factors"},{"t":"p","text":"**Country/political risk:** beyond fiscal/monetary actions, markets assess the legal framework, FX reserves, political stability and credibility (BMI Group, EIU, Country Risk Solutions, Euromoney; sovereign ratings from Moody's, S&P, Fitch). Stable, consistent, lawful governments rank highly and attract investors; **higher-risk countries have lower valuations** because investors demand higher yields."},{"t":"p","text":"**Political shocks:** Brexit (2016) sank the GBP ~10.5% in 4 days (down ~18% by October). The DJIA plunged 800 points on Trump's win but recovered when fiscal stimulus (tax cuts, infrastructure) was highlighted. **Continuity and political will** matter — uncertainty over succession raises risk and triggers outflows. New governments cause **sectors/companies to fall in and out of favour** (e.g., healthcare, defence, renewables, gaming)."},{"t":"h","text":"3.2.10 Industry Analysis"},{"t":"p","text":"Industry factors can outweigh economic factors. Two reasons industry analysis matters: (1) risks and returns vary widely across industries due to different product mixes and cycle sensitivities; (2) industries show different returns over time, so past performance cannot simply be extrapolated. Three frameworks: **industry life cycle, Porter's five forces, and business-cycle analysis**."},{"t":"sub","text":"Industry Life Cycle (5 stages)"},{"t":"diagram","kind":"cycle","title":"Industry Life Cycle","stages":[{"label":"Early Development","sub":"New tech/product; high R&D; modest/no sales; small or negative margins; high risk, high reward"},{"label":"Rapid Growth","sub":"Demand surges; survivors become leaders; accelerating profit growth; very high margins"},{"label":"Mature Growth","sub":"Demand largely met; sales above-average (12-20%) but not accelerating; new competition; margins decline"},{"label":"Stabilisation","sub":"Longest phase; grows with the economy; standardised products; tight margins; returns near competitive level"},{"label":"Decline","sub":"Sales fall (demand shifts/substitutes); margins squeezed; low/negative returns; e.g., physical music records"}]},{"t":"p","text":"Average investors favour **rapid/mature growth** stages; aggressive investors may target **early development** (highest return, highest risk); **decline** stages are generally avoided."},{"t":"sub","text":"Porter's Five Competitive Forces"},{"t":"p","text":"Michael Porter holds that the competitive environment determines a firm's ability to sustain above-average returns on invested capital. Favourable forces = many firms earn attractive returns; intense forces = hard to earn high returns."},{"t":"list","ordered":true,"items":["Rivalry among existing competitors — intense when many equal-size firms, slow growth, high fixed costs/exit barriers","Threat of new entrants — limited by high barriers (capital needs, economies of scale, distribution, switching costs, licensing)","Threat of substitute products — closer substitutes cap prices (e.g., digital photography bankrupting Kodak)","Bargaining power of buyers — strong when buyers are large vs supplier sales (e.g., US govt for defence, Apple for contractors)","Bargaining power of suppliers — strong when few suppliers of critical inputs, strong unions, monopolistic/oligopolistic suppliers"]},{"t":"sub","text":"Business-Cycle Analysis of Industries"},{"t":"table","headers":["Industry type","Behaviour"],"rows":[["Cyclical","Earnings move with the cycle; great in expansions, poor in contractions (durable goods: cars, refrigerators)"],["Defensive","Least affected by recession (food, public utilities)"],["Growth","Earnings well above average, may grow despite economic setbacks (e.g., mobile devices, apps)"],["Interest-sensitive","Sensitive to interest-rate expectations (financial services, real estate)"]]},{"t":"p","text":"Heading into recession, **cyclical industries suffer most** and **defensive industries least** — investors match industry to their risk/return needs."},{"t":"h","text":"3.2.11 Firm-Specific Factors"},{"t":"p","text":"A **bottom-up** approach identifies firms with competitive advantages within an industry (why Alibaba/Tencent dominate; why Nvidia traded richer than peers in 2017). Firm-specific factors sharpen sales/earnings forecasts and valuation accuracy."},{"t":"list","ordered":false,"items":["Dominance/control of technology or research","Control over resource supply","Superior brand differentiation","Dominance in sales distribution/marketing","Cost efficiency / lowest-cost producer","Successful focus on a target niche","Established, diversified core business","Superior leadership, management and talent retention"]},{"t":"h","text":"3.3 Market-Driven Factors"},{"t":"def","term":"Market-driven factors","def":"Physical market conditions that affect short-term demand and supply and therefore the pricing of investment products."},{"t":"p","text":"**Liquidity & money flow:** in uncertainty, investors hold cash and rates are low. A rally runs while liquidity/flows persist; when most funds are invested, the market plateaus, funds rotate to laggards, parts become overvalued, and it is poised for a correction. Analysts track fund flows, mutual-fund cash balances and bank deposits to predict available investing funds."},{"t":"p","text":"**New securities issues:** several large IPOs in a period drain funds from existing similar stocks (some IPOs are priced at a discount to ensure demand); too many IPOs can hurt later issues. Likewise, **excess T-bill/bond issuance** of a maturity creates oversupply, dipping prices to lift yields; reduced buying by China/Japan of US Treasuries can also create excess supply."},{"t":"sub","text":"Derivatives & Other Asset-Class Influence"},{"t":"p","text":"**Structured products:** institutions that are counterparties may have a collective incentive to push prices toward strike targets, especially in thin trading — unethical even if hard to prove illegal. **Futures and options** are leveraged (traded on margin), so in bear markets selling futures/puts magnifies pressure; margin calls force further selling, risking a **downward spiral** between derivative and underlying markets."},{"t":"def","term":"Triple witching hour","def":"The last trading hour (3-4pm NY time) on the third Friday of March, June, September and December, when stock-index futures, stock-index options and stock options all expire, increasing volume and sometimes volatility."},{"t":"sub","text":"Other Trade Flows & Microstructure"},{"t":"p","text":"**Hot money** from hedge/large funds exploits temporary inefficiencies, temporarily lifting volume and prices (a sophisticated, global 'pump-and-dump'). **Computer-driven momentum/algorithmic trading** (incl. high-frequency trading, HFT) executes high-speed trades on technical signals regardless of valuation, improving liquidity and price efficiency but **increasing volatility** and enabling predatory trading."},{"t":"def","term":"Market microstructure","def":"The trading/execution processes, rules, liquidity and strength of participants that influence pricing. Price discovery varies: issuer-quoted (price-taker), OTC negotiated, continuous order-book markets (price-then-time priority), call markets (price priority, batched once/twice daily), and rare auctions."},{"t":"def","term":"Dark pools","def":"Private forums/exchanges for trading (mostly large institutional block trades) off public exchanges, keeping details confidential. Their opacity and size put less sophisticated participants at a disadvantage and reduce price transparency."},{"t":"h","text":"3.4 Investment Behaviour & Emotions"},{"t":"def","term":"Herd instinct","def":"An emotional phenomenon — lack of independent decision-making in a crowd acting without central direction — driven by greed and fear; it can push asset values far above or below fundamental levels, especially when information is scarce and threats seem imminent."},{"t":"p","text":"As a market troughs, accumulation begins when investors believe the worst is over; confidence and greed then push markets to new highs, forming a **bubble** when fundamentals are ignored (e.g., the 1997-2000 Dot-com bubble; NASDAQ 1000 to 5000 at a 200x P/E, then a 75% collapse; Greenspan's 'irrational exuberance', Dec 1996). On the downside, disappointment turns to **panic** and capitulation; some investors nibble blue chips near the bottom while most nurse losses."},{"t":"def","term":"Loss aversion (prospect theory)","def":"Investors prefer less uncertainty over gains and more uncertainty over losses, so they sell winners to lock in gains while holding losers hoping for a rebound — potentially a double-negative impact, since the sold winners may have had more upside and the retained losers may fall further."},{"t":"def","term":"Cognitive bias","def":"The tendency to draw conclusions from past experiences, preferences or predetermined beliefs. Example: confirmation bias — seeking views aligned with one's own and adding funds to reinforce them; a disciplined investor actively seeks opposing views."},{"t":"key","title":"Exam essentials","points":["3 drivers: fundamental, market-driven, behavioural","GDP = C + I + G + NE; map each policy to a component","Expansionary policy lifts liquidity/asset values; contractionary cools inflation","Markets LEAD the economy; leading indicators predict, coincident move with, lagging confirm","Value P0 = D1/(k−g): higher k or wider k−g lowers value; higher g raises it","Cyclical hurt most in recession; defensive (food, utilities) least"]}],"newQuestions":[{"type":"mcq","q":"According to the chapter, which formula correctly expresses Gross Domestic Product using the expenditure approach?","options":["GDP = C - I + G + NE","GDP = C + I + G + NE","GDP = C + I - G - NE","GDP = M × V"],"correct":[1],"explain":"GDP = Consumption + Private investment + Government spending + Net exports. The last option is Fisher's equation of exchange, not GDP."},{"type":"mcq","q":"A stock is expected to pay a dividend of $3.00 next year (D1). The required return is 10% and dividends grow at a constant 4%. Using the Gordon growth model, the intrinsic value is closest to:","options":["$30.00","$42.86","$50.00","$75.00"],"correct":[2],"explain":"P0 = D1/(k−g) = 3.00/(0.10−0.04) = 3.00/0.06 = $50.00. $42.86 wrongly uses 0.07; $75 wrongly uses 0.04 as the denominator."},{"type":"mcq","q":"Using the same stock (D1 = $3.00, g = 4%), if the required return rises from 10% to 12%, the intrinsic value will:","options":["Rise to $75.00","Stay at $50.00","Fall to about $37.50","Fall to about $30.00"],"correct":[2],"explain":"P0 = 3.00/(0.12−0.04) = 3.00/0.08 = $37.50. A higher k widens the k−g spread and lowers value, illustrating why rate hikes pressure equity valuations."},{"type":"mcq","q":"A firm has an expected dividend payout ratio of 40%, a required return of 9% and sustainable growth of 5%. Its justified forward P/E is closest to:","options":["4.4x","8.0x","10.0x","20.0x"],"correct":[2],"explain":"Justified forward P/E = payout/(k−g) = 0.40/(0.09−0.05) = 0.40/0.04 = 10.0x. 8x wrongly uses payout/k; 20x ignores the payout ratio."},{"type":"mcq","q":"Which monetary policy tool has the US Fed relied on most heavily to influence market liquidity?","options":["The discount window","Open Market Operations (OMOs)","Changing the required reserve ratio","Negative interest rates"],"correct":[1],"explain":"The chapter states the Fed has relied heavily on OMOs (buying/selling government securities), used extensively to pump liquidity in 2008."},{"type":"mcq","q":"In which order does a change in liquidity from monetary policy typically take effect, according to the chapter?","options":["Common stocks, then bonds, then the aggregate economy","The aggregate economy, then bonds, then stocks","Bond prices, then common stocks, then the aggregate economy","Stocks and the economy simultaneously, then bonds"],"correct":[2],"explain":"The text says liquidity changes first affect bond prices, then common stocks, and finally the aggregate economy."},{"type":"mcq","q":"The relationship between the financial markets and the real economy business cycle is best described as:","options":["The economy leads the market","The market leads the economy","They move exactly in tandem","The market lags the economy by a few quarters"],"correct":[1],"explain":"Stock-market peaks and troughs typically precede turning points in general business activity — the market leads the economy; markets correct before a technical recession is even announced."},{"type":"mcq","q":"A Purchasing Managers' Index (PMI) reading of 47 most likely indicates:","options":["Expansion in the manufacturing sector","Contraction in the manufacturing sector","Exactly neutral conditions","Runaway inflation"],"correct":[1],"explain":"A PMI of 50+ signals expansion and below 50 signals contraction; 47 indicates contraction."},{"type":"mcq","q":"Which of the following is classified in the chapter as a LAGGING indicator?","options":["Housing starts and building permits","S&P 500 index","Average prime rate charged by banks","Consumer sentiment"],"correct":[2],"explain":"The average prime rate is one of the seven lagging-indicator components; building permits, the S&P 500 and consumer sentiment are all leading indicators."},{"type":"mcq","q":"Which industry would be LEAST affected if the economy heads into a recession?","options":["Automobile manufacturing","Public utilities","Specialist coffee chains","Construction equipment"],"correct":[1],"explain":"Public utilities are defensive and least affected by recession; autos and construction equipment are cyclical durable goods, and specialist coffee chains are noted as not necessarily defensive."},{"type":"mcq","q":"Under the 'very negative' interest-rate scenario in the chapter, stock prices decline significantly because:","options":["k falls while g rises, narrowing the spread","k rises while g declines, widening the k−g spread","Both k and g rise equally, offsetting","g rises faster than k"],"correct":[1],"explain":"When rates rise and cash flows decline (layoffs, falling earnings), the required return k increases while growth g declines, causing a large increase in the k−g spread and a sharp price fall."},{"type":"mcq","q":"Singapore's monetary policy is primarily conducted by:","options":["Targeting the domestic interest rate","Targeting money supply (M2)","Managing a trade-weighted exchange rate within a policy band","Setting the reserve requirement ratio"],"correct":[2],"explain":"Since 1981 MAS centres policy on managing the SGD against a trade-weighted basket within a band; it gives up control over domestic interest rates and money supply."},{"type":"mcq","q":"During the EARLY expansion phase when interest rates begin to rise gradually, which sector typically benefits?","options":["Banks, via a wider net interest spread","Defensive food producers","Decline-stage music retailers","Oil-importing manufacturers only"],"correct":[0],"explain":"Banks benefit by raising lending rates faster than deposit rates (widening the net interest spread) while loan demand stays strong, expanding net interest income."},{"type":"mcq","q":"Which statement about the Efficient Market Hypothesis (EMH) is correct per the chapter?","options":["Investors can consistently outperform the market through analysis","Prices adjust slowly over months to new information","Asset prices adjust rapidly to reflect new public information, so price equals fair value","Markets are never efficient at any time"],"correct":[2],"explain":"Fama's EMH holds that prices adjust rapidly to all new public information, making price the fair value so no one can consistently outperform — though the chapter notes real-world inefficiencies appear."},{"type":"mcq","q":"A flattening of the yield curve, where long rates do not rise much despite Fed rate hikes, is described as:","options":["A confirmation that expansion will continue","An early predictor of an upcoming recession","Evidence of strong long-term credit demand","A sign of accelerating inflation"],"correct":[1],"explain":"Weak long-term credit demand keeps long rates from rising with the Fed funds rate, flattening the curve — an early predictor of recession."},{"type":"mrq","q":"Select all that apply: According to the chapter, the THREE primary factors affecting market movements and asset values are:","options":["Fundamental factors","Market-driven factors","Investment behaviour","Sovereign credit ratings"],"correct":[0,1,2],"explain":"The three drivers are fundamental, market-driven and investment-behaviour factors. Sovereign credit ratings are part of country-risk assessment, not a top-level driver."},{"type":"mrq","q":"Select all that apply: Which measures are part of an EXPANSIONARY policy stance described in the chapter?","options":["Lowering the required reserve ratio","Raising interest rates to contain inflation","Cutting personal income taxes","Open market purchases of government securities"],"correct":[0,2,3],"explain":"Lower reserve ratios, tax cuts (fiscal stimulus) and OMO purchases all expand liquidity/demand. Raising rates to contain inflation is contractionary."},{"type":"mrq","q":"Select all that apply: Which are components of the US Composite Leading Economic Index (CLEI)?","options":["Building permits and housing starts","ISM manufacturing index","Average duration of employment","Consumer sentiment (Univ. of Michigan)"],"correct":[0,1,3],"explain":"Building permits, the ISM index and consumer sentiment are leading-index components. Average duration of employment is a lagging indicator."},{"type":"mrq","q":"Select all that apply: Which are among Porter's five competitive forces?","options":["Bargaining power of suppliers","Threat of substitute products","Stage of the industry life cycle","Rivalry among existing competitors"],"correct":[0,1,3],"explain":"Supplier power, substitute threat and rivalry are three of Porter's five forces. The industry life cycle is a separate framework, not one of the five forces."},{"type":"mrq","q":"Select all that apply: Which behavioural phenomena are discussed as influencing investment decisions and asset prices?","options":["Herd instinct (greed and fear)","Loss aversion","Confirmation bias","The multiplier effect"],"correct":[0,1,2],"explain":"Herd instinct, loss aversion and confirmation bias (a cognitive bias) are behavioural drivers. The multiplier effect is a fiscal-policy concept, not a behavioural bias."}]},"04":{"notes":[{"t":"h","text":"4.1 Introduction and Terminology"},{"t":"p","text":"The foreign exchange (FX) market is the **largest decentralised global market**, averaging about **USD 7.5 trillion** of FX contracts traded daily (BIS 2022). **Spot trades** make up roughly a third of turnover; **currency derivatives** (FX swaps, outright forwards) make up the rest. The market is borderless, runs round the clock, and is integrated with money, equity, derivatives and commodity markets."},{"t":"def","term":"Foreign exchange transaction","def":"The purchase of one currency against the simultaneous sale of another currency, for settlement or delivery on a specified date."},{"t":"def","term":"Exchange rate","def":"The price per unit of one currency expressed in units of another currency."},{"t":"def","term":"Base currency","def":"The first-listed currency in a pair (e.g. USD in USD/SGD). It is the operating/reference currency; one unit of it is being priced. All P&L is measured in the investor's chosen base/reference currency."},{"t":"def","term":"Counter (term) currency","def":"The second-listed currency in a pair (e.g. SGD in USD/SGD). The quote tells you how many units of counter currency equal one unit of base currency."},{"t":"key","title":"Reading a quote","points":["USD/SGD 1.2520 means USD 1 = SGD 1.2520.","First currency = base (the unit being priced).","Second currency = counter/term currency (the price).","Holding any currency other than your base currency creates FX risk that must be managed."]},{"t":"sub","text":"Long, short and squaring off"},{"t":"p","text":"To **go long** a currency is to buy the base currency expecting it to strengthen against the term currency. To **go short** is to sell the base currency expecting it to fall. Example: an investor who borrows USD to fund an SGD investment has sold USD spot for SGD, so he is **short USD / long SGD**. To close out, he does the opposite (sell SGD, buy USD); his position is then **squared off** with no remaining FX exposure."},{"t":"h","text":"4.2 Factors Influencing Exchange Rates"},{"t":"p","text":"Numerous factors drive exchange rates. The leading ones examined in this chapter are **interest rates, inflation rates, political stability, foreign currency reserves, trade account balances / terms of trade, and government (public) debt**."},{"t":"sub","text":"Interest rates"},{"t":"p","text":"Interest rates, inflation and exchange rates are highly correlated. **Higher interest rates** offer lenders higher returns relative to other countries, attracting an **inflow of foreign capital**, which **pushes the exchange rate up**. The effect can be moderated by higher domestic inflation or other economic/political factors."},{"t":"sub","text":"Inflation rates"},{"t":"p","text":"A country with **consistently lower inflation** than others tends to see its currency **appreciate**; **high inflation** tends to cause **depreciation**. Hyperinflation (e.g. Venezuela's bolivar, which fell ~95% on the day the new note launched) can render a currency virtually worthless."},{"t":"sub","text":"Political stability"},{"t":"p","text":"Stable governments with sound financial and trade policies attract investment, so currencies appreciate on strong capital inflows. **Corruption, social unrest, frequent government change and policy inconsistency** erode confidence, reduce demand, and prompt residents to move wealth into safer foreign currencies."},{"t":"sub","text":"Foreign currency reserves"},{"t":"p","text":"A large reserve does **not necessarily** cause appreciation (some governments do not want a strong currency), but **strong reserves** let a country **defend and manage** its currency. During the Asian Currency Crisis, countries with strong reserves (Hong Kong, Singapore, Taiwan) successfully defended their currencies against speculators while weaker-reserve currencies were exploited."},{"t":"sub","text":"Trade account balance and terms of trade"},{"t":"p","text":"A **trade deficit** (imports > exports) raises demand for foreign currency to pay for imports, weakening the local currency. A **trade surplus** (exports > imports) raises demand for the local currency, strengthening it."},{"t":"def","term":"Terms of trade","def":"The ratio of export prices to import prices. Terms of trade improve when export prices rise faster than import prices, implying higher demand for the currency and appreciation; the reverse implies depreciation."},{"t":"sub","text":"Government (public) debt"},{"t":"p","text":"Excessive public debt relative to GDP makes a country less attractive to foreign investors. If debt is **denominated in USD**, a fall in the local currency makes it harder to repay. **Printing money** to repay debt risks massive inflation and further devaluation. Greece could not inflate its way out because, as a Eurozone member, it had **no independent monetary policy**."},{"t":"diagram","kind":"compare","title":"Appreciation vs Depreciation drivers","colA":"Tends to APPRECIATE","colB":"Tends to DEPRECIATE","rows":[["Higher interest rates (capital inflow)","Lower interest rates (capital outflow)"],["Lower / stable inflation","High inflation / hyperinflation"],["Political stability, sound policy","Corruption, unrest, policy uncertainty"],["Trade surplus / improving terms of trade","Trade deficit / worsening terms of trade"],["Low, manageable public debt","Excessive public debt, money printing"]]},{"t":"h","text":"4.3 Foreign Exchange Markets"},{"t":"p","text":"Participants include financial institutions, commercial banks, firms, governments and central banks, tourists, speculators and investors. Unlike the stock or futures market, FX has **no central exchange**: it trades over a global communication network and operates 24 hours, the trading day flowing from Sydney to Tokyo, Singapore/Hong Kong, London, New York and San Francisco."},{"t":"key","title":"Market structure facts","points":["The **USD is the dominant vehicle currency** — on one side of about 88% of all trades (2019).","The **EUR** is the second most traded currency; the **JPY** third.","**FX swaps** are the largest segment (~half of turnover), then spot, then outright forwards.","**G-7 currency pairs** dominate global turnover."]},{"t":"p","text":"The **CHF** (and sometimes the **JPY**) are low-volatility **safe-haven / risk-off** currencies sought when risk rises; in Southeast Asia the **SGD** plays this role. The **AUD** and **ZAR** are **commodity currencies** that strengthen when global growth and commodity demand are high and weaken when demand falls."},{"t":"h","text":"4.4 Foreign Exchange Rate Quotations"},{"t":"p","text":"FX rates can be quoted on a **direct, indirect or cross** basis, usually to four decimal places. The last digit is a **pip** (= 0.0001), the smallest unit of price movement — the FX equivalent of a basis point in interest rates."},{"t":"sub","text":"Bid-offer spread"},{"t":"p","text":"A market maker always shows two prices. The **bid** is the rate at which the bank **buys** the base currency; the **offer (ask)** is the rate at which it **sells** the base currency. Example: USD/SGD 1.2520-25 means the bank pays SGD 1.2520 to buy USD 1 and sells USD 1 for SGD 1.2525. The 0.0005 difference (5 pips) is the bank's **spread** (profit)."},{"t":"key","title":"Golden rule for the price taker","points":["The price is always **against the price taker** (the party asking for the quote).","The price taker **BUYS the base currency at the OFFER** (the higher rate).","The price taker **SELLS the base currency at the BID** (the lower rate).","Wider uncertainty/volatility = wider spread."]},{"t":"sub","text":"Direct quotes (European convention)"},{"t":"def","term":"Direct quote","def":"Expresses the price of one unit of FOREIGN currency in units of DOMESTIC currency (foreign/domestic). The foreign currency is the base. Because the USD is most widely accepted, it is usually the base, e.g. USD/SGD 1.2520, USD/JPY 101.86, USD/CNY 6.6186."},{"t":"sub","text":"Indirect quotes (American convention)"},{"t":"def","term":"Indirect quote","def":"Expresses the price of one unit of DOMESTIC currency in units of FOREIGN currency (domestic/foreign). The domestic currency is the base. The 'sterling bloc' currencies (GBP, AUD, NZD) and the EUR are quoted with the USD as the counter currency, e.g. GBP/USD 1.6816, EUR/USD 1.3622, AUD/USD 0.9235."},{"t":"p","text":"Whether a quote is direct or indirect depends on **context** — which currency is domestic vs foreign. The indirect quote is simply the **reciprocal** of the direct quote. In Singapore, if the direct quote is USD/SGD 1.2520, the indirect quote is SGD/USD = 1/1.2520 = **0.7987**."},{"t":"formula","name":"Direct / indirect reciprocal","expr":"Indirect quote = 1 ÷ Direct quote","where":["e.g. USD/SGD 1.2520 → SGD/USD = 1 / 1.2520 = 0.7987"]},{"t":"diagram","kind":"compare","title":"Direct vs Indirect quote","colA":"Direct (European)","colB":"Indirect (American)","rows":[["Foreign = base, domestic = counter","Domestic = base, foreign = counter"],["Form: foreign/domestic","Form: domestic/foreign"],["USD usually the base (USD/SGD, USD/JPY)","Sterling bloc + EUR are base (GBP/USD, EUR/USD, AUD/USD)"],["Price of 1 foreign unit in domestic","Price of 1 domestic unit in foreign"]]},{"t":"sub","text":"Cross quotes / cross rates"},{"t":"def","term":"Cross rate","def":"An exchange rate between two currencies that does NOT involve the USD, derived from two quotes that share a common currency (usually the USD)."},{"t":"key","title":"Cross-rate rules (from the chapter examples)","points":["**Two direct quotes (USD base on both, e.g. SGD/JPY from USD/JPY and USD/SGD):** divide the term currency on the SAME side by the base currency on the OPPOSITE side. SGD/JPY bid = USD/JPY bid ÷ USD/SGD ask; SGD/JPY ask = USD/JPY ask ÷ USD/SGD bid.","**One direct + one indirect quote (e.g. GBP/SGD from GBP/USD and USD/SGD):** MULTIPLY on the same side. GBP/SGD bid = GBP/USD bid × USD/SGD bid; GBP/SGD ask = GBP/USD ask × USD/SGD ask."]},{"t":"table","headers":["Worked example","Bid","Ask"],"rows":[["USD/SGD","1.3362","1.3382"],["USD/JPY","112.6530","112.7330"],["SGD/JPY = (USD/JPY)/(USD/SGD)","112.6530/1.3382 = 84.1825","112.7330/1.3362 = 84.3684"],["GBP/USD","1.3501","1.3510"],["GBP/SGD = (GBP/USD)×(USD/SGD)","1.3501×1.3362 = 1.8040","1.3510×1.3382 = 1.8079"]]},{"t":"sub","text":"Settlement (value) dates"},{"t":"def","term":"Spot transaction","def":"A contract to exchange one currency for another for settlement usually in 2 business days (value spot). Same-day = value today; next-day = value tom. Weekends and public holidays are non-working days, so a Thursday/Friday deal settles the following Monday/Tuesday."},{"t":"def","term":"Forward transaction","def":"A contract to exchange one currency for another at a future date later than spot, at a rate fixed on the trade date. Purpose: to establish and fix the cost of a known future FX commitment."},{"t":"h","text":"4.5 Forward Foreign Exchange Contracts"},{"t":"p","text":"An investor enters a forward to (a) **hedge** a currency exposure, or (b) **speculate** on the direction of a currency. A single forward transaction is called an **outright**. Hedging by locking in a forward rate removes uncertainty but also **forfeits any gain** from favourable market moves."},{"t":"sub","text":"Forward rates and premium/discount"},{"t":"p","text":"A forward is made of two components: the **spot rate** and the **interest differential** (expressed in FX terms). The differential is converted into **forward (swap) points** added to or subtracted from spot."},{"t":"formula","name":"Forward exchange rate","expr":"Forward rate = Spot rate ± Forward points","where":["+ points → forward at a PREMIUM (forward more expensive than spot)","− points → forward at a DISCOUNT (forward cheaper than spot)"]},{"t":"key","title":"Which currency is at premium vs discount","points":["The currency of the country with the **HIGHER interest rate trades at a forward DISCOUNT** (cheaper forward).","The currency with the **LOWER interest rate trades at a forward PREMIUM** (more expensive forward).","Forward points reflect ONLY the interest-rate differential — they are NOT a forecast of the future spot rate."]},{"t":"diagram","kind":"compare","title":"Forward premium vs discount","colA":"Forward PREMIUM","colB":"Forward DISCOUNT","rows":[["Forward rate > spot rate","Forward rate < spot rate"],["Points ADDED to spot","Points SUBTRACTED from spot"],["Base currency has the LOWER interest rate","Base currency has the HIGHER interest rate"],["Points ascending (low/high), e.g. 17/21","Points descending (high/low), e.g. 52/51"]]},{"t":"sub","text":"Calculating forward points"},{"t":"formula","name":"Forward points","expr":"Forward points = [ S × (Rc − Rb) × n/360 ] ÷ [ 1 + (Rb × n/360) ]","where":["S = spot rate","Rc = annualised interest rate of counter currency","Rb = annualised interest rate of base currency","n = number of days from spot date to forward date"]},{"t":"p","text":"**Worked example:** Spot USD/SGD = 1.2520, Rb (USD) = 1.75%, Rc (SGD) = 0.75%, n = 30. Points = [1.2520 × (0.0075 − 0.0175) × 30/360] ÷ [1 + (0.0175 × 30/360)] = −0.0010 ÷ 1.0015 ≈ **−0.0010 (−10 points)**. Forward USD/SGD = 1.2520 − 0.0010 = **1.2510**, a discount (because the base USD has the higher rate)."},{"t":"sub","text":"Interest rate parity (IRP)"},{"t":"p","text":"IRP states that (ignoring small transaction costs) the **forward premium/discount equals the interest-rate differential** of the two currencies for the same maturity. If IRP is violated, **arbitrageurs earn risk-free profit**, and their trades force forward and spot rates back into alignment."},{"t":"formula","name":"Interest rate parity (forward rate)","expr":"F = S × [ (1 + Rc × n/360) ÷ (1 + Rb × n/360) ]","where":["F = forward rate","S = spot rate","Rc = annualised rate of counter currency","Rb = annualised rate of base currency","n = number of days"]},{"t":"sub","text":"Covered interest arbitrage"},{"t":"p","text":"**Example:** R_USD = 6%, R_GBP = 5%, GBP spot = USD 1.50. Fair 1-yr forward = 1.50 × (1.06/1.05) = **USD 1.5143/GBP**. If the market forward is mispriced at USD 1.5100 (too cheap), an arbitrageur: (1) borrows GBP 1,000,000 at 5% (owes GBP 1,050,000); (2) sells GBP spot for USD 1,500,000; (3) invests USD at 6% → USD 1,590,000; (4) buys back GBP 1,050,000 forward at 1.5100 = USD 1,585,500. Net profit = 1,590,000 − 1,585,500 = **USD 4,500**, risk-free. The whole sequence — borrow one currency, invest another, cover with a forward — is **covered interest arbitrage**."},{"t":"diagram","kind":"flow","title":"Covered interest arbitrage (GBP cheap forward)","steps":[{"label":"Borrow GBP 1.0m","sub":"at 5%"},{"label":"Sell GBP spot","sub":"get USD 1.50m at 1.50"},{"label":"Invest USD at 6%","sub":"grows to USD 1.59m"},{"label":"Buy GBP forward","sub":"pay USD 1.5855m at 1.5100"},{"label":"Repay GBP loan","sub":"net profit USD 4,500"}]},{"t":"sub","text":"Forward rate quotes (points)"},{"t":"p","text":"Services quote forwards as **margins in points** above/below spot. Market makers quote points on a bid/offer spread, **lower value first, higher value second**. The shape of the pair tells you whether to add or subtract:"},{"t":"list","ordered":true,"items":["**Descending points** (LHS higher than RHS, e.g. 52/51): SUBTRACT from spot → discount. USD/JPY 119.22/25 with −52/−51 → outright 119.2148/119.2449.","**Ascending points** (LHS lower than RHS, e.g. 17/21): ADD to spot → premium. AUD/USD 0.6475/80 with +17/+21 → outright 0.6492/0.6501."]},{"t":"sub","text":"Non-Deliverable Forwards (NDFs)"},{"t":"def","term":"Non-Deliverable Forward (NDF)","def":"A cash-settled, short-term OTC forward (tenor ~1 month to 1 year) used to hedge currencies that are not freely traded or are restricted by capital controls (e.g. China, Taiwan, Vietnam, Indonesia). There is NO physical delivery of the restricted currency; settlement is the cash difference between the contracted NDF rate and the spot rate at maturity, paid in a freely-traded reference currency (usually USD)."},{"t":"p","text":"**NDF hedge example:** A Singapore importer owes the USD equivalent of CNY 10m in 3 months; spot USD/CNY = 6.5845 (≈ USD 1,518,718). He fears the USD **depreciating** against the CNY (USD/CNY falling). He enters a USD/CNY NDF to sell USD / buy CNY at 6.5845. If USD/CNY falls 5% to 6.2553, the supplier costs USD 79,926 more, but the bank pays the client ≈ USD 79,926 on the NDF, offsetting the loss. If USD/CNY instead rises to 6.9137, the client pays the bank ≈ USD 72,314 but saves the same amount on the invoice — the rate is locked either way."},{"t":"h","text":"4.6 Risks in Foreign Exchange"},{"t":"list","ordered":false,"items":["**Market risk** — movement and volatility of FX rates.","**Price/liquidity risk** — in thinly traded currencies, or in majors during extreme events.","**Credit risk** — counterparty fails to honour the deal; in FX it is only a fraction of the notional because the deal is an exchange, not an outright loan.","**Settlement/delivery risk** — counterparty fails to pay on time (in FX, in the ~2 days before payment). **Continuous Linked Settlement (CLS)** has significantly reduced this risk."]},{"t":"h","text":"4.7 Managing Foreign Exchange Risks"},{"t":"sub","text":"Exchange rate regimes"},{"t":"def","term":"Exchange rate regime","def":"The policy framework a central bank uses to manage its currency relative to others and the FX market. Choices range from a fixed peg, to a managed soft peg, to a trade-weighted band, to a free (or managed) float."},{"t":"p","text":"Special arrangements include **dollarization / currency substitution** (adopting another nation's currency as legal tender — inheriting its currency's credibility but not its creditworthiness), a **monetary/currency union** (shared currency, e.g. EUR), and a **currency board** (full convertibility of the local currency into a reserve currency backed by reserves, e.g. HKD)."},{"t":"key","title":"Singapore's regime (MAS)","points":["The **SGD is managed as a trade-weighted currency band** based on Singapore's major trading partners and competitors.","MAS runs a **managed float within an undisclosed currency band**, giving flexibility for short-term fluctuations.","The band is reviewed periodically against economic fundamentals.","Under a 1967 Currency Interchangeability Agreement, the **Brunei Dollar is interchangeable with the SGD at par** and is legal tender in Singapore (and vice versa)."]},{"t":"table","headers":["Regime","Description"],"rows":[["Fixed / pegged","Currency managed against a major currency; many peg to USD or EUR."],["Managed (soft) peg","No official fixing; another currency is a reference point, drift allowed within a pre-defined limit."],["Trade-weighted band","Managed within a band vs a trade-weighted basket. Tighter band + more intervention (e.g. China) = more peg-like; wider band (e.g. SGD) = more float-like."],["Floating / managed float","Currency set by demand and supply with little interference, though governments often step in when trends harm the economy."]]},{"t":"p","text":"Defending a desired level can be **costly**: when China moved to a managed trade-weighted approach in late 2015, it had to run down foreign reserves by almost **USD 1 trillion (~25%)** from Jul 2014–Dec 2016 to avert CNY depreciation."},{"t":"sub","text":"Hedging by borrowing in a similar currency (natural hedge)"},{"t":"p","text":"Borrowing in the **currency of the investment** creates a natural hedge: if that currency weakens, the loan that funded the asset also falls in home-currency terms, cushioning the loss."},{"t":"p","text":"**Worked example:** A Singapore firm buys a GBP 1m UK property, funding 80% by loan; GBP/SGD = 1.8060 falls 5% to 1.7157 in a year (sold at same GBP price). **Borrow SGD:** down payment SGD 361,200 + loan SGD 1,444,800; sale proceeds = SGD 1,715,700; loss = 1,715,700 − 361,200 − 1,444,800 = **−SGD 90,300**. **Borrow GBP:** down payment SGD 361,200; net GBP proceeds after repaying the GBP 800,000 loan = GBP 200,000 = SGD 343,140; loss = 343,140 − 361,200 = **−SGD 18,060**. Borrowing in GBP gives the **smaller loss** — the natural hedge works."},{"t":"diagram","kind":"flow","title":"Natural hedge: borrow in the investment currency","steps":[{"label":"Buy GBP asset","sub":"GBP exposure created"},{"label":"Borrow in GBP","sub":"offsetting GBP liability"},{"label":"GBP weakens","sub":"asset value falls in SGD"},{"label":"Loan also falls in SGD","sub":"loss is cushioned"}]},{"t":"sub","text":"Carry trades"},{"t":"def","term":"Currency carry trade","def":"Borrowing/selling a low-interest-rate currency and investing the proceeds in a higher-yielding currency to capture the interest-rate differential. It relies on relative currency stability — an adverse FX move can wipe out the carry."},{"t":"p","text":"A popular Asian carry trade was to **borrow JPY at <1% and invest in AUD products yielding ~4.5%**. It works while the borrowed currency stays flat or weakens against the invested currency. The risk: if the **invested currency falls**, the investor loses on **both** the FX move and the funding interest. In 2008, the AUD fell ~34% vs JPY, turning the carry into a loss despite the positive yield spread."},{"t":"diagram","kind":"flow","title":"JPY–AUD carry trade","steps":[{"label":"Borrow JPY","sub":"low rate <1%"},{"label":"Convert to AUD","sub":"at spot"},{"label":"Invest in AUD asset","sub":"yield ~4.5%"},{"label":"Earn the spread","sub":"~350-400 bps if FX stable"}]},{"t":"h","text":"4.8 Summary of Key Relationships"},{"t":"key","title":"Exam cheat-sheet","points":["Price taker BUYS base at the OFFER, SELLS base at the BID.","Indirect quote = 1 ÷ direct quote.","Two-USD-base cross → divide; direct × indirect cross → multiply (same-side rules for bid/offer).","Higher interest rate currency → forward DISCOUNT; lower rate → forward PREMIUM.","F = S × (1 + Rc·n/360) ÷ (1 + Rb·n/360).","Forward points reflect interest differentials only, not a spot forecast.","Carry trade: borrow low-yield currency, invest in high-yield currency."]}],"newQuestions":[{"type":"mcq","q":"In the quote USD/SGD 1.2520, which statement is correct?","options":["SGD is the base currency and USD 1.2520 = SGD 1","USD is the base currency and USD 1 = SGD 1.2520","The quote means SGD 1 = USD 1.2520","SGD is the reference currency for measuring P&L"],"correct":[1],"explain":"The first-listed currency (USD) is the base; the quote gives units of counter currency (SGD) per one unit of base, so USD 1 = SGD 1.2520."},{"type":"mcq","q":"A market maker quotes USD/SGD 1.2520-25. A corporate client wants to BUY USD 1,000,000. How much SGD will the client pay?","options":["SGD 1,252,000","SGD 1,252,500","SGD 1,250,250","SGD 1,252,250"],"correct":[1],"explain":"The price is against the price taker, who buys the base currency (USD) at the OFFER of 1.2525. 1,000,000 × 1.2525 = SGD 1,252,500. Using the bid 1.2520 is the trap."},{"type":"mcq","q":"In Singapore the direct quote is USD/SGD 1.2520. What is the corresponding indirect quote (SGD/USD)?","options":["0.7987","1.2520","1.5675","0.8013"],"correct":[0],"explain":"The indirect quote is the reciprocal of the direct quote: 1 / 1.2520 = 0.7987."},{"type":"mcq","q":"Which of the following is quoted using the indirect (American) convention against the USD?","options":["USD/JPY","USD/CHF","EUR/USD","USD/SGD"],"correct":[2],"explain":"The sterling-bloc currencies (GBP, AUD, NZD) and the EUR are the base against the USD, e.g. EUR/USD. USD/JPY, USD/CHF and USD/SGD all have USD as base (direct convention)."},{"type":"mcq","q":"Given USD/SGD bid/ask = 1.3362/1.3382 and USD/JPY bid/ask = 112.6530/112.7330, what is the SGD/JPY BID rate?","options":["84.1825","84.3684","84.2754","83.9900"],"correct":[0],"explain":"With two USD-base quotes, SGD/JPY bid = USD/JPY bid ÷ USD/SGD ask = 112.6530 / 1.3382 = 84.1825."},{"type":"mcq","q":"Given GBP/USD bid/ask = 1.3501/1.3510 and USD/SGD bid/ask = 1.3362/1.3382, what is the GBP/SGD ASK rate?","options":["1.8040","1.8079","1.8060","1.8025"],"correct":[1],"explain":"Direct (USD/SGD) combined with indirect (GBP/USD): multiply on the same side. GBP/SGD ask = GBP/USD ask × USD/SGD ask = 1.3510 × 1.3382 = 1.8079."},{"type":"mcq","q":"The smallest unit of price movement in an FX quote, usually the fourth decimal place (0.0001), is called a:","options":["Tick","Basis point","Pip","Spread"],"correct":[2],"explain":"A pip (= 0.0001) is the FX equivalent of a basis point; it is the smallest standard increment of an FX quote."},{"type":"mcq","q":"Spot USD/SGD = 1.2520, R_USD (base) = 1.75% p.a., R_SGD (counter) = 0.75% p.a., n = 30 days. Using the forward-points formula, the 30-day forward USD/SGD rate is approximately:","options":["1.2530 (premium)","1.2510 (discount)","1.2520 (unchanged)","1.2505 (discount)"],"correct":[1],"explain":"Points = [1.2520×(0.0075−0.0175)×30/360] / [1+(0.0175×30/360)] ≈ −0.0010. Forward = 1.2520 − 0.0010 = 1.2510, a discount because the base USD has the higher rate."},{"type":"mcq","q":"Using interest rate parity with R_USD = 6%, R_GBP = 5% and GBP spot = USD 1.50, the fair 1-year forward (USD per GBP) is closest to:","options":["USD 1.4858","USD 1.5000","USD 1.5143","USD 1.5300"],"correct":[2],"explain":"F = S × (1 + Rc)/(1 + Rb) where USD is counter and GBP is base: 1.50 × (1.06/1.05) = USD 1.5143 per GBP."},{"type":"mcq","q":"All other things equal, the currency of a country with the HIGHER interest rate will trade:","options":["At a forward premium","At a forward discount","At the same rate as spot","At a premium only if inflation is low"],"correct":[1],"explain":"The higher-interest-rate currency trades at a forward discount (forward cheaper than spot); the lower-rate currency trades at a forward premium."},{"type":"mcq","q":"Spot USD/JPY = 119.22/25 with 1-month points quoted 52/51. The outright 1-month USD/JPY is:","options":["119.2748/119.2949 (added)","119.2148/119.2449 (subtracted)","119.7400/119.7600 (added)","118.7000/118.7400 (subtracted)"],"correct":[1],"explain":"Descending points (LHS higher than RHS) are subtracted: 119.22−0.52 = 119.2148 and 119.25−0.51 = 119.2449, a discount."},{"type":"mcq","q":"An investor borrows USD to fund an SGD-denominated investment. His FX position is best described as:","options":["Long USD, short SGD","Short USD, long SGD","Long both USD and SGD","Squared off"],"correct":[1],"explain":"He sold USD spot to obtain SGD, so he is short USD and long SGD. He squares off only by later selling SGD and buying USD."},{"type":"mcq","q":"A Singapore importer owes the USD equivalent of CNY 10m in 3 months (spot USD/CNY 6.5845). To hedge, he should enter a USD/CNY NDF to:","options":["Buy USD / sell CNY at 6.5845","Sell USD / buy CNY at 6.5845","Buy CNY at any future spot rate","Do nothing because NDFs deliver CNY"],"correct":[1],"explain":"He fears the USD depreciating against the CNY (USD/CNY falling), so he locks in by selling USD/buying CNY at 6.5845; the NDF cash settles the difference with no CNY delivery."},{"type":"mcq","q":"Which feature MOST distinguishes a Non-Deliverable Forward (NDF) from a regular FX forward?","options":["The NDF tenor is always over one year","There is no physical delivery of the restricted currency; it is cash-settled","NDFs eliminate all credit risk","NDFs are exchange-traded and standardised"],"correct":[1],"explain":"An NDF is a cash-settled OTC contract used for restricted currencies; settlement is the cash difference vs spot in a freely-traded reference currency, with no exchange of the notional/restricted currency."},{"type":"mcq","q":"A Singapore firm funds a GBP 1m UK property 80% by loan; GBP/SGD falls from 1.8060 to 1.7157. Compared with borrowing SGD (loss SGD 90,300), borrowing in GBP results in a loss of:","options":["SGD 18,060","SGD 90,300","SGD 72,300","Zero"],"correct":[0],"explain":"Borrowing in GBP is a natural hedge: net proceeds GBP 200,000 = SGD 343,140 less the SGD 361,200 down payment = −SGD 18,060, far smaller than the SGD 90,300 loss from borrowing SGD."},{"type":"mcq","q":"Which statement about MAS's management of the SGD is CORRECT?","options":["The SGD is hard-pegged to the USD","The SGD floats freely with no intervention","The SGD is managed as a trade-weighted band within an undisclosed range","The SGD is part of a monetary union with Malaysia"],"correct":[2],"explain":"MAS manages the SGD as a trade-weighted currency band (a managed float) within an undisclosed band reviewed against fundamentals. The Brunei Dollar, not the ringgit, is interchangeable at par."},{"type":"mcq","q":"Forward points in the FX market are BEST understood as:","options":["A forecast of the future spot exchange rate","A reflection of the interest-rate differential between the two currencies","The bank's profit margin on a spot trade","The central bank's target band width"],"correct":[1],"explain":"Forward points reflect only the relative interest rates of the two currencies; they are explicitly not a prediction of the future spot rate."},{"type":"mrq","q":"Select ALL factors that, other things equal, tend to cause a currency to APPRECIATE.","options":["Higher domestic interest rates attracting capital inflows","Consistently lower inflation than other countries","A persistent trade deficit","Political stability and sound policy"],"correct":[0,1,3],"explain":"Higher rates (inflows), lower inflation and political stability all support appreciation. A persistent trade deficit raises demand for foreign currency and tends to weaken the local currency."},{"type":"mrq","q":"Select ALL statements that are TRUE about the bid-offer spread and price taker.","options":["The price taker buys the base currency at the offer","The price taker sells the base currency at the bid","Greater market volatility narrows the spread","The spread is the market maker's profit"],"correct":[0,1,3],"explain":"The price taker buys at the offer and sells at the bid, and the spread is the maker's profit. Greater volatility WIDENS, not narrows, the spread."},{"type":"mrq","q":"Select ALL statements that correctly describe a currency carry trade.","options":["The investor borrows a low-interest-rate currency and invests in a higher-yielding one","It seeks to capture the interest-rate differential","It is safest when the borrowed currency strengthens sharply","An adverse FX move can wipe out the interest carry"],"correct":[0,1,3],"explain":"A carry trade borrows the low-yield currency and invests in the high-yield one to capture the spread, but it is vulnerable to FX moves. It fails when the borrowed currency strengthens (or the invested currency weakens), as in 2008's AUD/JPY collapse."}]},"05":{"notes":[{"t":"h","text":"5.1 Company Analysis in Fundamental Analysis"},{"t":"p","text":"Company analysis is the part of fundamental analysis that drills into a single firm. It is relevant not only to **equity analysis** but also to **credit analysis** of bonds and other securities whose cashflows depend on the issuer's ongoing viability. It is divided into **qualitative analysis** and **quantitative analysis (financial statement analysis)**."},{"t":"key","title":"Guiding principles","points":["Asset prices are driven by the FUTURE prospects of a company; historical statements are used only to make projections.","Performance is first driven by QUALITATIVE factors (news, competitive advantages) which precede and drive quantitative outcomes.","Excellent companies with sustainable growth can look expensive near-term but remain good long-term investments; buying beaten-down weak companies, at best, offers short-term trades."]},{"t":"sub","text":"Qualitative competitive advantages"},{"t":"list","ordered":false,"items":["Dominance/control of key technology, research and patents (Apple, Nvidia, Pfizer) — supports price premiums and higher margins.","Control over key resource supply (De Beers, Bayer-Monsanto).","Superior brand differentiation (Coca-Cola, BMW, SIA) — commands higher pricing.","Control of distribution channels (Alibaba, Amazon, Tencent).","Cost efficiency / lowest-cost producer (TSMC, McDonald's, IKEA).","Successful focus on niche clients (Harley Davidson, Swiss private banks, LVMH).","Superior management, talent and relationships (Berkshire Hathaway).","Diversified core businesses with shared costs (GE, 3M, Honeywell) — cyclical downturns in one division are cushioned by others; cash cows fund new growth."]},{"t":"h","text":"5.3 Quantitative (Financial Statement) Analysis"},{"t":"p","text":"Financial statements show the resources available to management, how they are financed, and what the firm achieved with them. They must be **audited**; auditors issue a **qualified report** when not satisfied with how statements are prepared. US firms follow **US GAAP**; European firms and Singapore follow **IFRS** — differences require restatement to compare across markets. US firms report quarterly; many other markets only require semi-annual/annual (most Singapore firms report quarterly)."},{"t":"p","text":"We look at historical data because, for most firms, recent past performance is the **best reference point** for near-term forecasts. Reviewing statements means: examine key ratios over time, forecast future performance, compare with industry peers, and estimate fair value."},{"t":"diagram","kind":"compare","title":"The three financial statements","colA":"Statement","colB":"What it shows","rows":[["Balance Sheet","Financial condition at a POINT IN TIME (assets, liabilities, equity)"],["Income Statement","Revenue and expenses OVER A PERIOD (sales and earnings performance)"],["Cash Flow Statement","Changes in CASH position over a year (operating, investing, financing)"]]},{"t":"h","text":"5.4 The Balance Sheet"},{"t":"p","text":"The balance sheet shows financial condition at a point in time, usually the financial year-end. It has three parts: **assets** (resources owned), **liabilities** (amounts owed to outside parties), and **shareholders' equity** (the residual)."},{"t":"formula","name":"Balance sheet identity","expr":"Assets = Liabilities + Shareholders' Equity","where":["US format: assets on one side, liabilities + equity on the other","UK format: Assets − Liabilities = Shareholders' Equity (Net Assets)","Equity = Share capital + Retained earnings − Treasury shares"]},{"t":"p","text":"A **common-size balance sheet** restates every line as a percentage of total assets (= 100%), making it easy to compare firms of different sizes. When examining the balance sheet, focus on (a) the largest items on both sides, (b) the relationship between assets and liabilities, and (c) significant trends over time."},{"t":"sub","text":"Assets"},{"t":"p","text":"Assets convertible to cash within a year are **current assets**; the rest are **long-term / non-current assets**. Current assets relative to current liabilities reflect short-term liquidity."},{"t":"list","ordered":false,"items":["**Cash and bank balances**: a war chest aids survival in downturns but idle cash is an underutilised asset, sacrifices returns, and can make a firm an acquisition target. High cash generation suggests potential for high dividend payouts (gaming, tobacco firms).","**Inventories**: small for airlines (2-3%); huge for jewellers (~40-60%, retains value) and lower for food (spoilage risk). Watch for inventory build-up amid FALLING sales — a warning sign — but build-up can also be positive (anticipated demand, cheap raw materials, product mix change).","**Accounts receivable**: amounts owed by customers on credit. Low for cash-based businesses (airlines <5%). Rising receivables with falling sales signals collection problems / future bad debts; rising receivables with rising sales may signal a credit-terms strategy.","**Investments**: excess cash often parked in financial assets; for some firms investment income exceeds core income. Best practice marks investments to market — beware reclassification to long-term at cost to avoid MTM.","**Plant, property & equipment (PPE)**: large in capital-intensive industries (airlines 51-65%, shipping, mining). Watch fleet/plant age, obsolescence, upgrade cost and funding.","**Intangibles**: goodwill, patents, copyrights, trademarks, licences; most are amortised (goodwill is the notable exception)."]},{"t":"def","term":"Goodwill","def":"The premium an acquirer pays above the book value of a target (for brand, technology, management). A goodwill write-down is charged directly against equity reserves; because both equity and total assets fall, ROA and ROE can look artificially HIGHER in later years."},{"t":"sub","text":"Liabilities and shareholders' equity"},{"t":"p","text":"On the liability side, watch the **size of debt** (more debt = more financial risk), the **funding mix** (short vs long-term; multiple banks/markets — excessive funding of long-term assets with short-term debt risks a liquidity crunch), and the **currency** (unhedged foreign-currency debt can balloon — many SE Asian firms went bankrupt in 1997 when USD Eurobond debt quadrupled in local terms)."},{"t":"list","ordered":false,"items":["**Accounts payable**: short-term credit from suppliers; stretching payables improves operating cash flow but a build-up with falling sales may signal payment difficulty.","**Deferred taxes**: deferring tax provides a form of free capital; rises with consistently rising earnings, falls if earnings drop.","**Shareholders' equity** = share capital + reserves + provisions + FX adjustments. Preferred shareholders get a FIXED dividend first but no growth; common shareholders are RESIDUAL owners with growth potential.","**Treasury stock**: shares bought back and 'retired' — remaining shareholders own a larger share of earnings/dividends.","**Reserves & hidden reserves**: accumulated net earnings after dividends; write-downs/provisions charged directly against reserves can create HIDDEN reserves (e.g. banks over-provisioning then slow to reverse), so a firm may be worth more than stated."]},{"t":"h","text":"5.8 The Income Statement"},{"t":"p","text":"The income statement (profit and loss statement) reflects **sales and earnings over a period** and is the main focus for most investors. It can be recast as a **common-size statement** based on sales revenue (each line as a % of sales). It reveals the major factors affecting performance and whether a firm is volume-driven with thin margins."},{"t":"p","text":"**Revenue drivers** break into (i) **unit sales growth** and (ii) **pricing changes**; raising either lifts revenue. Revenues/profits can be broken into **segments** (geography, division, product, customer) to show where income comes from and how assets are deployed."},{"t":"p","text":"**Costs and expenses**: review major cost items as a % of sales, rising/falling trends (raw materials, fuel), and non-cash items. For SIA the big items were staff and fuel costs. **Depreciation** is a major non-cash cost in capital-intensive firms and a source of abuse — stretching the depreciation period (e.g. taxis from 5 to 10 years) cosmetically lifts net profit without changing cash flow."},{"t":"h","text":"5.9 The Cash Flow Statement"},{"t":"p","text":"The cash flow statement shows the **real cash earnings** by adding back non-cash items (depreciation, amortisation, impairments, losses from associates) to profit. It has three parts."},{"t":"diagram","kind":"flow","title":"Three sections of the cash flow statement","steps":[{"label":"Operating","sub":"core cash earnings; add back depreciation etc."},{"label":"Investing","sub":"capex, buy/sell assets & investments"},{"label":"Financing","sub":"shares, borrowings, dividends, repayments"}]},{"t":"key","title":"Why cash flow matters","points":["For capital-intensive firms net profit understates ability to service debt — depreciation is added back.","A major red flag is consistently NEGATIVE operating cash flow; most defaulted Singapore bond/perp issuers had negative operating cash flows beforehand.","Poor net cash flow can be temporarily masked by selling assets/businesses (positive investing cash flow); unsustainable if the core does not recover."]},{"t":"p","text":"Examples of classification: aircraft purchases are **investing outflows**; proceeds from selling aircraft are **investing inflows**; capital-raising and new borrowings are **financing inflows**; dividends and loan repayments are **financing outflows**."},{"t":"h","text":"5.10 Per-Share Calculations"},{"t":"p","text":"Balance-sheet per-share figures (like BVPS) use the **number of shares outstanding at year-end** (a snapshot). DPS uses shares outstanding at the **ex-dividend date**. **EPS uses the WEIGHTED AVERAGE number of shares** because earnings are generated over the whole year and shares change with issuances/buybacks."},{"t":"formula","name":"Book value per share (BVPS)","expr":"BVPS = Shareholders' Equity / Total Shares Outstanding","where":["Uses year-end share count"]},{"t":"formula","name":"Earnings per share (EPS)","expr":"EPS = Net Earnings / Weighted Avg Number of Shares","where":["Net earnings = net income available to common shareholders","Weighted average reflects share count changes over the year"]},{"t":"formula","name":"Fully diluted EPS","expr":"Diluted EPS = Net Earnings / Fully Diluted Number of Shares","where":["Assumes ALL options, convertibles and derivatives are exercised/converted (worst case)","Particularly relevant for EPS projections — always forecast on a diluted basis for comparability"]},{"t":"formula","name":"Dividend per share (DPS)","expr":"DPS = Dividends Paid / Total Shares Outstanding","where":["Uses shares at ex-dividend date"]},{"t":"diagram","kind":"compare","title":"Basic vs Diluted EPS","colA":"Basic EPS","colB":"Diluted EPS","rows":[["Net earnings / weighted avg shares","Net earnings / fully diluted shares"],["Ignores potential dilution","Assumes all convertibles/options exercised"],["Higher (smaller denominator)","Lower or equal (larger denominator) — 'worst case'"],["Reported headline number","Used for projections & comparability"]]},{"t":"h","text":"5.11 Ratio Analysis"},{"t":"p","text":"Ratios let us evaluate financial strength, earnings quality and performance. Used **in isolation they are meaningless** — an interest coverage of 2x may be low for one industry and high for another. They must be benchmarked against industry peers and the firm's own history. The four categories are **liquidity, leverage, efficiency/activity, and profitability** ratios."},{"t":"sub","text":"Liquidity ratios"},{"t":"p","text":"Liquidity is the availability of funds at any time at reasonable cost. Liquidity ratios measure the ability to meet **short-term** obligations."},{"t":"formula","name":"Current ratio","expr":"Current Ratio = Current Assets / Current Liabilities","where":["Conventional wisdom: 2 or more, but too much liquidity is unproductive","NOTE: equal dollar increase to BOTH numerator and denominator LOWERS the ratio if it was >1 and RAISES it if it was <1"]},{"t":"formula","name":"Quick ratio (acid test)","expr":"Quick Ratio = (Cash + Marketable Securities + Accounts Receivable) / Current Liabilities","where":["EXCLUDES inventory (less liquid) — only difference vs current ratio","Low for supermarkets (~0.2); not meaningful for banks/financials with no inventory"]},{"t":"formula","name":"Cash ratio","expr":"Cash Ratio = (Cash + Near-Cash) / Current Liabilities","where":["Most stringent; only cash and short-term marketable securities convertible quickly to cash"]},{"t":"formula","name":"Operating cash flow ratio","expr":"OCF Ratio = Cash Flow from Operating Activities / Current Liabilities","where":["A weak current ratio can be fine if OCF is strong (cash-based service firms)","A healthy current ratio can mask trouble if OCF is negative"]},{"t":"p","text":"**Window dressing**: current/quick ratios at reporting dates can be manipulated by collecting receivables early, cutting inventory and delaying purchases to pay down current liabilities. In crises, creditors value securities at lower of book/market, write down inventory/receivables, and report FX debt at market rates."},{"t":"sub","text":"Leverage / solvency ratios"},{"t":"p","text":"Leverage ratios reveal the debt-vs-equity financing mix and financial risk; they are of primary interest to **bondholders**. Higher leverage raises ROE and reduces dilution but can lower the credit rating and raise the cost of debt."},{"t":"formula","name":"Debt-to-equity (gearing) ratio","expr":"D/E = Total Debt / Total Shareholders' Equity","where":["Debt = all short- and long-term borrowings incl. subordinated convertibles","Higher gearing = higher leverage and greater impact on ROE"]},{"t":"formula","name":"Debt-to-total-assets ratio","expr":"Debt/Assets = Total Debt / Total Assets","where":["Portion of assets financed by debt","Assets include intangibles; debt carried at face value"]},{"t":"formula","name":"Total-liabilities-to-total-assets","expr":"Total Liabilities / Total Assets","where":["How much of assets is funded by ALL liabilities (not just borrowings)"]},{"t":"formula","name":"Interest coverage (times interest earned)","expr":"Interest Coverage = EBIT / Interest Expense","where":["EBIT = Earnings Before Interest and Taxes = Pre-tax income + Interest","Higher = lower financial risk; key for bond investors","A negative ratio reflects a loss; size is also affected by the absolute interest amount"]},{"t":"formula","name":"EBITDA interest coverage","expr":"EBITDA Interest Coverage = EBITDA / Interest Expense","where":["EBITDA = EBIT + Depreciation + Amortisation","Better for firms with high depreciation/amortisation where cash earnings exceed EBIT"]},{"t":"formula","name":"Total fixed charge coverage","expr":"= (EBIT + Lease Payments) / (Interest + Lease Payments + Preferred Div / (1 − Tax Rate))","where":["Covers ALL fixed charges incl. fixed leases and preferred dividends","Preferred dividends are grossed up because they are paid out of AFTER-tax earnings"]},{"t":"sub","text":"Operating efficiency / activity ratios"},{"t":"p","text":"Efficiency ratios measure how productively management uses assets and capital to generate sales, and feed the **cash conversion cycle** (time between paying suppliers and collecting from customers — the period for which short-term financing is needed)."},{"t":"formula","name":"Total asset turnover","expr":"Total Asset Turnover = Sales / Average Total Assets","where":["Uses AVERAGE total assets (start + end)/2 because sales accrue over the period","~1 for capital-intensive firms, >10 for some retailers"]},{"t":"formula","name":"Inventory turnover","expr":"Inventory Turnover = Sales / Average Inventory","where":["Times per year inventory is sold and restocked","Some use COGS (inventory is at cost) but sales is used when COGS unavailable"]},{"t":"formula","name":"Days to sell inventory","expr":"Days to Sell Inventory = 365 / Inventory Turnover","where":["= Average Inventory / (Sales / 365)"]},{"t":"formula","name":"Receivables turnover","expr":"Receivables Turnover = Sales / Average Accounts Receivable","where":["Times per year the firm collects receivables; uses AVERAGE receivables"]},{"t":"formula","name":"Collection period","expr":"Collection Period = 365 / Receivables Turnover","where":["= Average Accounts Receivable / (Sales / 365)","Compare with the firm's credit policy and industry; a period above norm = slow payers / bad-debt risk"]},{"t":"sub","text":"Profitability ratios"},{"t":"p","text":"Profitability is analysed relative to **sales** (margins) or **capital** (ROA, ROE)."},{"t":"formula","name":"Gross profit margin","expr":"Gross Profit Margin = Gross Profit / Sales","where":["Gross profit = Sales − COGS, before selling/general/admin expenses"]},{"t":"formula","name":"Operating profit margin","expr":"Operating Profit Margin = EBIT / Sales","where":["Earnings before financing and taxes; its variability over time indicates business risk"]},{"t":"formula","name":"Net profit margin","expr":"Net Profit Margin = Net Income / Sales","where":["Net income = profit after tax, before dividends to preference and ordinary shares"]},{"t":"formula","name":"Return on equity (ROE)","expr":"ROE = Net Income / Average Common Equity","where":["Rate of return on shareholders' capital","Beware ROE inflated by depletion of the equity base in prior years"]},{"t":"formula","name":"Return on assets (ROA)","expr":"Pre-tax ROA = (Pre-tax Income + Interest) / Average Total Assets","where":["After-tax ROA = (Net Income + Interest(1 − Tax Rate)) / Average Total Assets — the more popular form","Profit is taken before interest to separate operating from financing decisions"]},{"t":"h","text":"DuPont Decomposition of ROE"},{"t":"p","text":"The DuPont identity breaks ROE into three drivers built from ratios in this chapter — **net profit margin** (profitability), **total asset turnover** (efficiency) and the **equity multiplier** (leverage). It shows WHETHER a high ROE comes from profitability, efficient asset use, or simply more leverage."},{"t":"formula","name":"DuPont (3-step) ROE","expr":"ROE = Net Profit Margin × Total Asset Turnover × Equity Multiplier","where":["Net Profit Margin = Net Income / Sales","Total Asset Turnover = Sales / Total Assets","Equit
