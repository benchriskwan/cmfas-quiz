ion** is a contract between two parties — the **option writer** (seller/issuer) and the **option holder** (buyer) — that gives the holder the **right, but not the obligation**, to buy or to sell the underlying from/to the writer. The writer, having received the premium, carries the obligation if the holder exercises."},{"t":"def","term":"Call option","def":"Gives the buyer the RIGHT (not obligation) to BUY the underlying at the strike price within a specific period. The seller is OBLIGED to deliver the underlying at the strike (forced into a short position) if exercised."},{"t":"def","term":"Put option","def":"Gives the buyer the RIGHT (not obligation) to SELL the underlying at the strike price within a specific period. The seller is OBLIGED to take delivery of the underlying at the strike if the buyer exercises."},{"t":"key","title":"Two types of options","points":["Call = right to BUY; buyer is bullish","Put = right to SELL; buyer is bearish","Buyer pays a premium and holds the right","Writer receives the premium and bears the obligation"]},{"t":"p","text":"Listed options began in 1973 when the **Chicago Board Options Exchange (CBOE)** started trading call options on 16 stocks; before that options were OTC only. Today underlyings include equities, bonds, interest rates, currencies, indices, futures, and even options on options (**compound options**), plus newer underlyings such as real estate, weather, volatility and ETFs. In Singapore the options market has grown mainly in the **OTC** market via structured products, so counterparty risk warrants scrutiny."},{"t":"h","text":"4.2 Option Features and Definitions"},{"t":"sub","text":"4.2.1 Style of Option"},{"t":"p","text":"**European-style** options can be exercised ONLY on the expiration date. **American-style** options can be exercised at ANY time before expiration. (For US-listed equity options, expiry is the 3rd Friday of the expiration month.)"},{"t":"sub","text":"4.2.2 Strike Price"},{"t":"def","term":"Strike (exercise) price","def":"The fixed contracted price at which a call buyer can buy, or a put buyer can sell, the underlying. It is a key variable in determining the option's intrinsic value. The closer the strike is to the underlying value, the more valuable the option."},{"t":"sub","text":"4.2.3 Expiration Date"},{"t":"p","text":"Every option has a finite life and lapses at expiry. The longer the time to maturity, the higher the time value. US exchange-traded options follow expiration cycles such as JAJO, FMAN and MJSD."},{"t":"table","headers":["Cycle","Cycle Name","Expiration Months"],"rows":[["1st month of quarter","JAJO","January, April, July, October"],["2nd month of quarter","FMAN","February, May, August, November"],["3rd month of quarter","MJSD","March, June, September, December"]]},{"t":"sub","text":"4.2.4 Class and Series"},{"t":"p","text":"Options on the same asset and issuer are of the same **class**. Options of the same class with the **same strike and same expiration month** form a **series** (e.g., all ABC January 50 calls)."},{"t":"h","text":"4.3 Option Price (Premium)"},{"t":"p","text":"The price the buyer pays the seller is the **option premium**. An option's price and volatility are driven by the price movement of the underlying."},{"t":"formula","name":"Option price components","expr":"Option Price = Intrinsic Value + Time Value","where":["Intrinsic Value = profit if exercised now (cannot be negative)","Time Value = the extra paid above intrinsic value, reflecting time and uncertainty"]},{"t":"sub","text":"4.3.1 Intrinsic Value & Moneyness"},{"t":"p","text":"**Intrinsic value** relates to **moneyness** — the profit/loss from exercising immediately. Because the holder has a right and not an obligation, intrinsic value can never be negative. An option has intrinsic value only when it is **in-the-money (ITM)**; when **at-the-money (ATM)** or **out-of-the-money (OTM)**, intrinsic value is zero."},{"t":"formula","name":"Intrinsic value","expr":"Call IV = Max(0, S − X)   |   Put IV = Max(0, X − S)","where":["S = current market price of underlying","X = strike (exercise) price","Call ITM when S > X; Put ITM when X > S"]},{"t":"table","headers":["Condition","Call","Put"],"rows":[["S > X","In-the-money (C = S − X)","Out-of-the-money (P = 0)"],["S = X","At-the-money (C = 0)","At-the-money (P = 0)"],["S < X","Out-of-the-money (C = 0)","In-the-money (P = X − S)"]]},{"t":"key","title":"Worked example — call intrinsic value","points":["Strike X = $50, call price = $6, share S = $54","Intrinsic value = S − X = $54 − $50 = $4","Time value = $6 − $4 = $2","If at expiry S falls to $48: IV = $0 (OTM); time value = 0 at expiry"]},{"t":"key","title":"Worked example — put intrinsic value","points":["Strike X = $50, put price = $9, share S = $44","Intrinsic value = X − S = $50 − $44 = $6","Time value = $9 − $6 = $3","If at expiry S rises to $53: IV = $0 (OTM); time value = 0 at expiry"]},{"t":"sub","text":"4.3.2 Time Value"},{"t":"formula","name":"Time value","expr":"Time Value = Option Price − Intrinsic Value","where":["Generally positive before expiry","At expiry time value → 0, so Option Price = Intrinsic Value","Longer time to expiry → greater time value"]},{"t":"p","text":"Even an option that is currently ATM or OTM (zero intrinsic value) can become ITM before expiry, which is why time value exists."},{"t":"diagram","kind":"matrix","title":"Option positions — call/put × long/short","cols":["Call","Put"],"rows":[{"label":"Long (buyer)","cells":["Right to BUY; bullish; pays premium; loss limited to premium","Right to SELL; bearish; pays premium; loss limited to premium"]},{"label":"Short (writer)","cells":["Obligation to deliver; neutral/bearish; keeps premium; loss unlimited","Obligation to take delivery; neutral/bullish; keeps premium; large loss to strike"]}]},{"t":"diagram","kind":"compare","title":"4.3.3 Call vs Put — buyer's view","colA":"Call buyer","colB":"Put buyer","rows":[["Bullish outlook","Bearish outlook"],["Right to buy at strike","Right to sell at strike"],["Gains as underlying rises","Gains as underlying falls"],["Max loss = premium paid","Max loss = premium paid"],["Max gain unlimited","Max gain = strike − premium"]]},{"t":"h","text":"4.4 Factors Influencing Equity Option Prices"},{"t":"p","text":"Six major factors affect an equity option's premium: (a) underlying share price, (b) strike price, (c) time to expiration, (d) volatility, (e) risk-free interest rate, and (f) expected dividends."},{"t":"table","headers":["Factor increases →","Effect on Call","Effect on Put"],"rows":[["Underlying share price ↑","↑","↓"],["Exercise (strike) price ↑","↓","↑"],["Time to expiration ↑","↑","↑"],["Volatility ↑","↑","↑"],["Risk-free interest rate ↑","↑","↓"],["Expected dividends ↑","↓","↑"]]},{"t":"key","title":"Reasoning behind the signs","points":["Higher share price helps calls (right to buy cheap), hurts puts","Lower strike helps calls; higher strike helps puts","More time and more volatility help BOTH (greater chance of finishing ITM)","Higher rates raise the cost of carrying the share, helping calls and hurting puts","Dividends drop the share price ex-div, hurting calls and helping puts"]},{"t":"h","text":"4.5 Payoff Profiles"},{"t":"p","text":"A payoff profile shows the maximum gain, maximum loss and breakeven of a position against the underlying price at expiry. The breakeven for both buyer and writer of the same option is the same price."},{"t":"sub","text":"Long Call"},{"t":"key","title":"Long call — X=$100, premium=$4","points":["Payoff = Max(0, S − X); profit = payoff − premium","Breakeven = X + premium = $104","Max loss = premium ($4)","Max gain = unlimited"]},{"t":"diagram","kind":"payoff","title":"Long call payoff (X=100, premium=4)","legs":[{"instrument":"call","position":"long","strike":100,"premium":4,"qty":1}],"spotRange":[70,140]},{"t":"sub","text":"Short Call (Writer)"},{"t":"key","title":"Short call — X=$100, premium=$4","points":["Payoff = −Max(0, S − X); profit = premium − payoff","Breakeven = X + premium = $104 (same as buyer)","Max gain = premium ($4)","Max loss = unlimited (uncovered)"]},{"t":"diagram","kind":"payoff","title":"Short call payoff (X=100, premium=4)","legs":[{"instrument":"call","position":"short","strike":100,"premium":4,"qty":1}],"spotRange":[70,140]},{"t":"sub","text":"Long Put"},{"t":"key","title":"Long put — X=$130, premium=$4","points":["Payoff = Max(0, X − S); profit = payoff − premium","Breakeven = X − premium = $126","Max loss = premium ($4)","Max gain = X − premium = $126 (if S falls to 0)"]},{"t":"diagram","kind":"payoff","title":"Long put payoff (X=130, premium=4)","legs":[{"instrument":"put","position":"long","strike":130,"premium":4,"qty":1}],"spotRange":[90,160]},{"t":"sub","text":"Short Put (Writer)"},{"t":"key","title":"Short put — X=$130, premium=$4","points":["Payoff = −Max(0, X − S); profit = premium − payoff","Breakeven = X − premium = $126 (same as buyer)","Max gain = premium ($4)","Max loss = X − premium = $126 (if S falls to 0)"]},{"t":"diagram","kind":"payoff","title":"Short put payoff (X=130, premium=4)","legs":[{"instrument":"put","position":"short","strike":130,"premium":4,"qty":1}],"spotRange":[90,160]},{"t":"h","text":"4.6 Put-Call Parity"},{"t":"p","text":"**Put-call parity** is the relationship between **European** call and put prices on the same underlying, strike and expiry. A portfolio of a call plus cash equal to the present value of the strike has the same expiration value as a portfolio of the put plus the underlying share."},{"t":"formula","name":"Put-call parity","expr":"C + PV(X) = P + S","where":["C = price of European call","P = price of European put","S = current price of underlying","PV(X) = present value of strike discounted at risk-free rate","Does NOT hold for American options (early exercise)"]},{"t":"p","text":"Rearranging parity creates **synthetic securities**: a synthetic bond PV(X) = S + P − C; a synthetic share S = PV(X) + C − P. Parity shows that any one of the four instruments can be replicated by the other three, and that options can be priced relative to one another."},{"t":"sub","text":"4.6.2 Arbitrage & 4.6.3 Synthetic Positions"},{"t":"p","text":"If prices diverge from parity, **arbitrageurs** execute risk-free trades until the anomaly is eliminated. Synthetic positions replicate the risk/payoff of an underlying or option using combinations of calls, puts and the share."},{"t":"table","headers":["Synthetic position","Constructed from"],"rows":[["Synthetic long stock","Long ATM call + Short ATM put"],["Synthetic short stock","Long ATM put + Short ATM call"],["Synthetic long call","Long underlying + Long put"],["Synthetic long put","Short underlying + Long call"],["Synthetic short call","Short underlying + Short put"],["Synthetic short put","Long underlying + Short call"]]},{"t":"h","text":"4.7 Option Valuation"},{"t":"p","text":"The **Black-Scholes** model (Black, Scholes, Merton, 1973) computes an option's theoretical value from six inputs: share price, strike, time to expiry, implied volatility, dividends and interest rates. The **binomial** model is often used for American options because it handles early exercise. (CM-SIP candidates need not compute Black-Scholes, but must explain how its variables are used.)"},{"t":"sub","text":"4.7.2 Volatility"},{"t":"p","text":"Volatility (σ) is the annualised standard deviation of the underlying's daily returns. **Historical (statistical) volatility** measures past price changes; **implied volatility** is the market's expectation backed out of the option's market price."},{"t":"sub","text":"4.7.3–4.7.8 The Greeks"},{"t":"table","headers":["Greek","Measures","Key facts"],"rows":[["Delta (Δ)","Δ option price / Δ underlying price","Call 0 to 1; put −1 to 0; ITM → ±1 near expiry; used for delta (dynamic) hedging"],["Gamma (Γ)","Δ delta / Δ underlying price","Highest ATM & near expiry; always positive for long positions"],["Theta (Θ)","Δ option price / Δ time","Negative for long options (time decay); largest for ATM"],["Vega","Δ option price / Δ implied volatility","Positive for calls & puts; highest ATM"],["Rho","Δ option price / Δ interest rate","Positive for calls, negative for puts; small effect"]]},{"t":"key","title":"Delta hedging example","points":["Delta of ATM call = 0.50 → option moves $0.50 per $1.00 of share","Short 1,000 calls with delta 0.642: a $1 rise loses $642","Hedge by buying 642 units of the underlying to gain $642","Delta changes constantly, so delta hedging is DYNAMIC"]},{"t":"p","text":"**Practical hedging limits:** delta is only an estimate; gamma (second derivative) is even less reliable. In illiquid markets a few market-makers may manipulate delta/gamma quotes. Most traders hedge delta daily and hedge gamma/vega rarely because suitable offsetting instruments are scarce; volatility spikes make all of them hard to estimate."},{"t":"h","text":"4.8 Exchange-Traded vs OTC Options"},{"t":"diagram","kind":"compare","title":"Exchange-traded vs OTC options","colA":"Exchange-traded","colB":"OTC","rows":[["Regulated organised exchange","Little regulation; private"],["Standardised terms","Customised, tailor-made"],["Cleared via clearing house (performance guaranteed)","No clearing house; counterparty risk"],["Daily mark-to-market available","MTM may not be readily available"]]},{"t":"h","text":"4.9 Contract Specifications"},{"t":"p","text":"A typical option term sheet specifies ticker, contract size (the underlying), contract months, trading hours, last trading day, tick size, strike intervals, exercise procedure (European/American), settlement (cash or delivery — ITM options usually auto-exercised), daily price limits (circuit breakers), and position limits."},{"t":"h","text":"4.10 Options on Other Underlyings"},{"t":"list","ordered":false,"items":["**Equity index options** (CBOE 1983) are cash-settled at (index close − strike) × multiplier; e.g., SPX uses a $100 multiplier and is European-style.","**Bond options** are typically OTC; expiry is set well before the bond's maturity (price uncertainty fades near par). Buy a call if rates expected to fall; buy a put if rates expected to rise.","**Interest-rate options** let borrowers cap rates (buy call on rate futures) and lenders fix a floor (buy put). Eurodollar futures price = 100 − yield.","**Currency options** give the right to exchange currency at a fixed rate; a currency call ≈ long currency futures. Buying a USD/JPY call = buying a JPY/USD put.","**Options on futures** are exercised into a futures position; all SGX options are American-style futures options.","**Swaptions** are options on a swap: a receiver swaption receives fixed/pays floating; a payer swaption pays fixed/receives floating."]},{"t":"sub","text":"4.10.3 Caps, Floors & Collars"},{"t":"list","ordered":false,"items":["**Interest rate cap** = a series of CALL options on a rate; pays out when the rate exceeds the cap. Protects a borrower.","**Interest rate floor** = a series of PUT options on a rate; pays out when the rate falls below the floor. Protects an investor's return.","**Interest rate collar** = buy a cap funded by selling a floor (borrower), limiting the range of cash flows at lower cost."]},{"t":"h","text":"4.11 Basic Option Strategies"},{"t":"sub","text":"4.11.1 Call Buying"},{"t":"p","text":"Buying a call is bullish: limited downside (premium), upside in tandem with the share, and leverage from small outlay. Uses include capital investment, cash extraction and hedging a short underlying position."},{"t":"sub","text":"4.11.2 Call Writing — Covered Call"},{"t":"p","text":"**Uncovered (naked)** call writing extracts premium but carries unlimited loss if the share rises. **Covered call** = own the share + write a call; a yield-enhancement strategy for holders, capping upside in exchange for the premium."},{"t":"key","title":"Covered call example","points":["Buy stock S0=$12.00; write call X=$12.40 for premium $0.80","Breakeven = S0 − premium = $11.20","Max gain = X − S0 + premium = $1.20 (if S ≥ X)","Max loss = premium − S0 = −$11.20 (if S falls to 0)"]},{"t":"diagram","kind":"payoff","title":"Covered call (long stock @12 + short call X=12.40, prem 0.80)","legs":[{"instrument":"underlying","position":"long","strike":12,"premium":0,"qty":1},{"instrument":"call","position":"short","strike":12.4,"premium":0.8,"qty":1}],"spotRange":[8,18]},{"t":"sub","text":"4.11.3 Put Buying — Protective Put"},{"t":"p","text":"Buying a put is bearish (alternative to shorting). Combining a **long put with a long share** is a **protective put** (portfolio insurance): downside is limited while upside is retained, in return for the premium."},{"t":"key","title":"Protective put example","points":["Buy stock S0=$12.00; buy put X=$11.60 for premium $0.80","Breakeven = S0 + premium = $12.80","Max loss = X − S0 − premium = −$1.20","Max gain = S − S0 − premium (theoretically unlimited)"]},{"t":"diagram","kind":"payoff","title":"Protective put (long stock @12 + long put X=11.60, prem 0.80)","legs":[{"instrument":"underlying","position":"long","strike":12,"premium":0,"qty":1},{"instrument":"put","position":"long","strike":11.6,"premium":0.8,"qty":1}],"spotRange":[8,18]},{"t":"sub","text":"4.11.4 Put Writing"},{"t":"p","text":"Writing a put collects premium and obliges the writer to buy the share at the strike. Often used to set a target entry price or for yield enhancement — e.g., a fixed-rate note with an embedded short put becomes a **bull equity-linked note (ELN)** offering enhanced yield if the share holds above the strike."},{"t":"h","text":"4.12 Market-Outlook Strategies"},{"t":"p","text":"Strategy choice depends on both direction and expected volatility. **Long** options profit from strong trends and rising volatility; **short** options profit from stable prices, time decay and falling volatility."},{"t":"sub","text":"4.12.5 Long Straddle"},{"t":"p","text":"A **long straddle** = buy 1 ATM call + buy 1 ATM put (same strike, expiry). Neutral on direction, **bullish on volatility**: unlimited profit on a big move either way; max loss = total premium if the share finishes at the strike."},{"t":"diagram","kind":"payoff","title":"Long straddle (long call + long put, X=20, prem 2+2)","legs":[{"instrument":"call","position":"long","strike":20,"premium":2,"qty":1},{"instrument":"put","position":"long","strike":20,"premium":2,"qty":1}],"spotRange":[8,32]},{"t":"sub","text":"4.12.6 Strangle"},{"t":"p","text":"A **long strangle** = buy 1 OTM call + buy 1 OTM put. Cheaper than a straddle but needs a larger move; max loss occurs between the two strikes. A **short strangle** profits when the price stays range-bound between the strikes (low volatility)."},{"t":"sub","text":"4.12.7–4.12.10 Vertical Spreads"},{"t":"table","headers":["Spread","Construction","View","Cash at entry"],"rows":[["Bull call","Buy ITM (lower-strike) call + sell OTM (higher-strike) call","Moderately bullish","Net debit"],["Bull put","Buy OTM (lower-strike) put + sell ITM (higher-strike) put","Moderately bullish","Net credit"],["Bear call","Buy OTM (higher-strike) call + sell ITM (lower-strike) call","Moderately bearish","Net credit"],["Bear put","Buy ITM (higher-strike) put + sell OTM (lower-strike) put","Moderately bearish","Net debit"]]},{"t":"key","title":"Bull call spread example","points":["Long $20 call @ $1.50; short $25 call @ $0.75; net debit = $0.75","Breakeven = lower strike + net debit = $20.75","Max profit = (25 − 20) − 0.75 = $4.25","Max loss = net debit = $0.75"]},{"t":"diagram","kind":"payoff","title":"Bull call spread (long 20 call, short 25 call)","legs":[{"instrument":"call","position":"long","strike":20,"premium":1.5,"qty":1},{"instrument":"call","position":"short","strike":25,"premium":0.75,"qty":1}],"spotRange":[15,30]},{"t":"sub","text":"4.12.11 Strategy Selection Matrix"},{"t":"diagram","kind":"matrix","title":"Strategy by direction and volatility","cols":["Bullish","Bearish","Neutral"],"rows":[{"label":"Volatility Up","cells":["Long Call","Long Put","Long Straddle / Strangle"]},{"label":"Volatility Down","cells":["Short Put","Short Call","Short Straddle / Strangle"]},{"label":"Volatility Neutral","cells":["Bull Spread","Bear Spread","Butterfly / Condor"]}]},{"t":"p","text":"A **butterfly spread** (buy 1 ITM, sell 2 ATM, buy 1 OTM) combines a bull and a bear spread — a limited-profit, limited-risk neutral strategy. Condors are similar neutral strategies."},{"t":"h","text":"4.13 Hedging with Options"},{"t":"p","text":"Hedging transfers risk at a cost (direct premium or indirect opportunity cost). For an equity portfolio, **protective puts** give defined, limited downside; **covered calls** generate income but do NOT limit downside — the premium is only a small cushion against a sharp fall."},{"t":"sub","text":"4.13.2 Currency Hedging"},{"t":"p","text":"To hedge currency: buy a **call to protect a short** position, or a **put to protect a long** position. An importer who must pay USD buys a USD call; an exporter with USD receipts buys a USD put."},{"t":"sub","text":"4.13.3 Zero-Cost (Costless) Collar"},{"t":"p","text":"A **collar** = buy a protective put + write an OTM covered call. In a **zero-cost (costless) collar** the call premium received equals the put premium paid, so the cash outlay is zero. It fully protects a long position while capping upside at the call strike."},{"t":"diagram","kind":"payoff","title":"Zero-cost collar (long stock @156, long 155 put, short 160 call)","legs":[{"instrument":"underlying","position":"long","strike":156,"premium":0,"qty":1},{"instrument":"put","position":"long","strike":155,"premium":15.3,"qty":1},{"instrument":"call","position":"short","strike":160,"premium":15.3,"qty":1}],"spotRange":[120,200]},{"t":"diagram","kind":"bars","title":"Relative downside protection of hedges","unit":"protection","data":[{"label":"Protective put","value":3,"note":"defined floor"},{"label":"Zero-cost collar","value":3,"note":"floor + cap, ~no cost"},{"label":"Covered call","value":1,"note":"premium cushion only"}]}],"newQuestions":[{"type":"mcq","q":"Which statement about a call option is correct?","options":["The buyer is obliged to buy the underlying at the strike","The buyer has the right but not the obligation to buy at the strike","The seller has the right to deliver the underlying","The buyer profits when the underlying price falls"],"correct":[1],"explain":"A call gives the buyer the right (not obligation) to buy at the strike; the seller carries the obligation to deliver if exercised."},{"type":"mcq","q":"A European-style option differs from an American-style option in that it:","options":["Can be exercised at any time before expiry","Can only be exercised on the expiration date","Is always cash-settled","Never has time value"],"correct":[1],"explain":"European options can be exercised only on the expiration date, whereas American options can be exercised any time before expiry."},{"type":"mcq","q":"A call has strike $50, the share trades at $54, and the call premium is $6. What is the time value?","options":["$0","$2","$4","$6"],"correct":[1],"explain":"Intrinsic value = 54 − 50 = $4; time value = premium − intrinsic = 6 − 4 = $2."},{"type":"mcq","q":"A put has strike $130 and is bought for a $4 premium. The share is at $120 at expiry. What is the buyer's net profit per share?","options":["$10","$6","$4","−$4"],"correct":[1],"explain":"Payoff = X − S = 130 − 120 = $10; net profit = 10 − 4 = $6."},{"type":"mcq","q":"An investor buys a call with strike $100 for a $4 premium. The breakeven share price at expiry is:","options":["$96","$100","$104","$108"],"correct":[2],"explain":"For a long call, breakeven = strike + premium = 100 + 4 = $104. The breakeven is identical for the call writer."},{"type":"mcq","q":"Which factor, when it INCREASES, raises the value of BOTH calls and puts?","options":["Underlying share price","Strike price","Time to expiration","Risk-free interest rate"],"correct":[2],"explain":"More time to expiry raises both call and put values (greater chance of finishing ITM). Volatility also raises both; the others move calls and puts in opposite directions."},{"type":"mcq","q":"All else equal, an increase in expected dividends on the underlying share will:","options":["Increase the call value and decrease the put value","Decrease the call value and increase the put value","Increase both call and put values","Have no effect on either"],"correct":[1],"explain":"Dividends lower the share price ex-dividend, which decreases call value and increases put value."},{"type":"mcq","q":"The maximum loss to the writer of an UNCOVERED call is:","options":["Limited to the premium received","The strike price minus the premium","Theoretically unlimited","Zero"],"correct":[2],"explain":"An uncovered (naked) call writer faces theoretically unlimited loss because the share price can rise without bound and must be bought to deliver."},{"type":"mcq","q":"Put-call parity is expressed as:","options":["C − PV(X) = P − S","C + PV(X) = P + S","C + S = P + PV(X)","C × PV(X) = P × S"],"correct":[1],"explain":"Put-call parity is C + PV(X) = P + S for European options on the same underlying, strike and expiry."},{"type":"mcq","q":"Using put-call parity, a synthetic long stock position is created by:","options":["Long call + long put","Long call + short put (ATM, same expiry)","Short call + long put","Long put + long underlying"],"correct":[1],"explain":"S = PV(X) + C − P implies a synthetic long stock = long ATM call + short ATM put with the same expiry."},{"type":"mcq","q":"A covered call is constructed by:","options":["Buying the share and buying a call","Buying the share and writing a call","Shorting the share and writing a call","Buying a put and writing a call"],"correct":[1],"explain":"A covered call = own the underlying + write a call. It is a yield-enhancement strategy that caps upside at the strike."},{"type":"mcq","q":"An investor buys stock at $12.00 and a protective put at strike $11.60 for $0.80. The breakeven at expiry is:","options":["$11.60","$12.00","$12.80","$10.80"],"correct":[2],"explain":"Protective put breakeven = S0 + premium = 12.00 + 0.80 = $12.80."},{"type":"mcq","q":"A long straddle is BEST described as:","options":["Buy an ATM call and an ATM put — profit from large moves either way","Buy an OTM call and sell an OTM put — bullish","Buy stock and write a call — income","Buy a call and a put at different strikes — directional"],"correct":[0],"explain":"A long straddle buys an ATM call and ATM put (same strike/expiry); it is neutral on direction but bullish on volatility, with max loss = total premium at the strike."},{"type":"mcq","q":"A bull call spread (long $20 call @ $1.50, short $25 call @ $0.75) has a maximum profit of:","options":["$0.75","$4.25","$5.00","Unlimited"],"correct":[1],"explain":"Max profit = (25 − 20) − net debit (0.75) = 5 − 0.75 = $4.25; max loss = net debit = $0.75."},{"type":"mcq","q":"Which spread results in a NET CREDIT at entry?","options":["Bull call spread","Bear put spread","Bull put spread","A protective put"],"correct":[2],"explain":"A bull put spread (sell ITM put, buy OTM put) gives a net credit; bull call and bear put spreads are net-debit positions."},{"type":"mcq","q":"A zero-cost (costless) collar on a long stock position is created by:","options":["Buying a put and buying a call with equal premiums","Buying a protective put funded by writing an OTM covered call of equal premium","Selling a put and a call simultaneously","Buying two puts at different strikes"],"correct":[1],"explain":"A zero-cost collar buys a protective put and writes an OTM call whose premium offsets the put cost, so net cash outlay is zero while capping upside at the call strike."},{"type":"mcq","q":"An interest rate CAP is economically a:","options":["Series of put options on the reference rate","Series of call options on the reference rate","Single forward rate agreement","Short position in bond futures"],"correct":[1],"explain":"A cap is a strip of call options on the reference rate that pays the borrower when the rate exceeds the cap; a floor is a series of put options."},{"type":"mrq","q":"Select all that apply: Which positions have intrinsic value that can NEVER be negative?","options":["Long call","Long put","Short call","Short put"],"correct":[0,1],"explain":"Intrinsic value of an OPTION (the holder's right) is never negative for long calls or long puts. Writers' payoffs can be negative, but that is payoff, not the option's intrinsic value."},{"type":"mrq","q":"Select all that apply: Which features describe EXCHANGE-TRADED options (versus OTC)?","options":["Standardised terms","Settled through a clearing house","Fully customised, private contracts","Daily mark-to-market prices available"],"correct":[0,1,3],"explain":"Exchange-traded options are standardised, cleared (performance guaranteed) and marked-to-market daily. Full customisation and privacy describe OTC options."},{"type":"mrq","q":"Select all that apply: Which statements about the option Greeks are correct?","options":["Delta of a long call ranges from 0 to 1","Theta is negative for long options (time decay)","Vega is negative for puts","Gamma is highest when the option is ATM and near expiry"],"correct":[0,1,3],"explain":"Long call delta is 0 to 1; theta is negative for long options; gamma peaks ATM near expiry. Vega is positive for both calls and puts, so the third statement is false."}]},"05":{"notes":[{"t":"h","text":"5.1 Introduction"},{"t":"p","text":"Besides futures and options, **Specified Investment Products (SIPs)** include products with more complex structures, features and risks such as **structured warrants**, **Daily Leveraged Certificates (DLCs)** and synthetic ETFs."},{"t":"p","text":"Under MAS guidelines, investment representatives must assess whether clients have the relevant knowledge and experience before they can invest in SIPs. Investors complete a **Customer Account Review (CAR)** and must satisfy at least one of three criteria: educational qualifications, work experience, or investment experience."},{"t":"h","text":"5.2 Introduction to Structured Warrants"},{"t":"def","term":"Structured warrant","def":"A financial instrument created by a third party (typically a financial institution) that lets investors gain exposure to the performance of an underlying asset for a fraction of its price."},{"t":"p","text":"Like options, structured warrants let investors profit from a bull market (**call warrants**) or a bear market (**put warrants**). The underlying may be individual stocks, equity indices, investment funds, or commodities."},{"t":"p","text":"Structured warrants have a short finite lifespan, usually less than a year (mostly 3-6 months). Some are listed and traded on SGX-ST. A **zero-strike warrant** (a synthetic stock) has an exercise price of zero, so it is always in-the-money (ITM); its cash settlement and price equal the underlying's closing price."},{"t":"sub","text":"5.2.1 European vs American Style Warrants"},{"t":"p","text":"**European-style** warrants can only be exercised at expiry; **American-style** warrants can be exercised throughout the warrant's life. SGX-listed structured warrants are European-style — assume European-style throughout the CM-SIP exam."},{"t":"p","text":"A **European call warrant** gives the right to buy the underlying at a fixed strike price at expiry (bullish view). A **European put warrant** gives the right to sell the underlying at a fixed strike at expiry (bearish view). During the warrant's life the value rises and falls with the underlying, but there is no early execution and no realisation of gain/loss until expiry. SGX warrants settle in cash, with no delivery of the underlying."},{"t":"formula","name":"Settlement profit (call warrant)","expr":"Profit = (Settlement Price of Underlying at Expiry − Exercise Price) ÷ Conversion Ratio","where":["Per warrant amount","Only positive if underlying settles above strike"]},{"t":"formula","name":"Settlement profit (put warrant)","expr":"Profit = (Exercise Price − Settlement Price of Underlying at Expiry) ÷ Conversion Ratio","where":["Per warrant amount","Only positive if underlying settles below strike"]},{"t":"sub","text":"5.2.2 Structured Warrants vs Standard Company Warrants"},{"t":"diagram","kind":"compare","title":"Structured vs Company Warrants","colA":"Structured warrant","colB":"Company warrant","rows":[["Can be call OR put","Call only"],["Short duration (≤ 6 months)","Long-dated"],["No dilution (no new shares)","Exercise dilutes earnings (new shares issued)"],["Issued by third-party institutions","Issued by the underlying company"],["Provides no new capital to company","Raises capital / sweetener for bonds/rights"],["Cash-settled on maturity (SGX)","Physical delivery of shares"],["Counterparty risk to issuer/market maker","Issuer is the company itself"]]},{"t":"p","text":"Company warrants are essentially long-dated American-style call options issued as a **sweetener** for bond or rights issues; they are covered in CM-EIP. **Designated market makers** act as counterparties for structured warrants, so holders bear counterparty risk to the issuer and market maker."},{"t":"sub","text":"5.2.3 Benefits of Structured Warrants"},{"t":"key","title":"Benefits","points":["Call warrants give leveraged exposure to upward moves at a fraction of the underlying's cost","Put warrants give leveraged exposure to downward moves — can hedge a portfolio","Losses are limited to the amount paid for the warrants","Access to diverse markets, baskets and indices without large outlay","Paid upfront, so no margin calls (unlike options and CFDs)"]},{"t":"p","text":"Structured warrants are popular in Singapore, Hong Kong, London and Mumbai, and less popular in the US where American-style options dominate."},{"t":"diagram","kind":"payoff","title":"Long call warrant (bullish)","legs":[{"instrument":"call","position":"long","strike":16.5,"premium":2.6,"qty":1}],"spotRange":[12,24]},{"t":"diagram","kind":"payoff","title":"Long put warrant (bearish)","legs":[{"instrument":"put","position":"long","strike":27,"premium":1.64,"qty":1}],"spotRange":[20,34]},{"t":"h","text":"5.3 Key Features and Terms of a Warrant"},{"t":"def","term":"Conversion ratio (n)","def":"The number of warrants that must be exercised to buy or sell ONE unit of the underlying. A 5:1 ratio means 5 warrants are needed for 1 share."},{"t":"def","term":"Exercise / strike price (X)","def":"The price at which the holder can buy (call) or sell (put) the underlying asset."},{"t":"def","term":"Expiry date","def":"The last day on or before which the warrant must be exercised."},{"t":"def","term":"Issue price","def":"The price at which the structured warrant is initially sold by the issuer."},{"t":"p","text":"**Settlement style** (physical delivery of shares or cash) is fixed when the warrant is issued. SGX-ST structured warrants are settled in **cash**."},{"t":"def","term":"Gearing","def":"How many times more underlying exposure an investor gets for the same capital versus buying the underlying directly. Gearing 8x means 8 times the exposure of buying the share with the same money."},{"t":"formula","name":"Gearing ratio","expr":"Gearing = Share (or index) price ÷ (Warrant price × Conversion ratio n)","where":["Higher gearing = more amplified % moves","A small move in the underlying causes a larger % move in the warrant"]},{"t":"h","text":"5.4 Factors Affecting the Warrant Price"},{"t":"p","text":"The warrant price is the speculative value investors pay. It is driven by several factors:"},{"t":"sub","text":"5.4.1 Life of the warrant"},{"t":"p","text":"All else equal, the longer to expiry the greater the warrant price. As life shortens the warrant loses speculative (time) value. The day before expiry it is worth only its intrinsic value; after expiry it is worthless."},{"t":"sub","text":"5.4.2 Performance of the underlying"},{"t":"p","text":"Call warrants are worth more when the underlying rises; put warrants are worth more when the underlying falls."},{"t":"sub","text":"5.4.3 Exercise price level"},{"t":"p","text":"Higher strike → call less likely exercised → call worth less. Higher strike → put more likely exercised → put worth more."},{"t":"sub","text":"5.4.4 Volatility"},{"t":"p","text":"More volatile underlyings make appreciation more likely, so investors pay a larger premium. **Implied volatility** is the market's pricing quotation. Warrant buyers are **long** volatility; sellers/writers are **short** volatility. Buying at 7% implied vol and selling at 8% earns a profit (higher vol = higher warrant price)."},{"t":"sub","text":"5.4.5 Dividends"},{"t":"p","text":"Holders are not entitled to dividends. A dividend declaration has a mild effect: call prices fall slightly, put prices rise slightly."},{"t":"sub","text":"5.4.6 Interest rate"},{"t":"p","text":"Higher rates raise the issuer's hedging cost for calls (delta hedging by buying shares), pushing call prices up. Hedging puts becomes cheaper with higher rates, pushing put prices down."},{"t":"sub","text":"5.4.7 Leverage"},{"t":"p","text":"Warrants offering greater leverage (via conversion ratio) command higher prices."},{"t":"table","headers":["Factor increases","Call warrant","Put warrant"],"rows":[["Life of warrant","Up","Up"],["Exercise price","Down","Up"],["Underlying price","Up","Down"],["Volatility","Up","Up"],["Dividends (mild)","Down","Up"],["Leverage","Up","Up"],["Interest rate","Up","Down"]]},{"t":"h","text":"5.5 Trading & Pricing Measures"},{"t":"sub","text":"5.5.1 SGX naming convention"},{"t":"p","text":"Example: **DBS MB ECW220627**. DBS = underlying (for an index the strike follows the name, e.g. HSI 21000...); MB = issuer (Macquarie Bank); e = European style (no prefix means American); CW = call warrant (PW = put, DC = discount certificate); 220627 = expiry 27 Jun 2022 in YYMMDD."},{"t":"sub","text":"5.5.2 Worked example — call warrant (DBS)"},{"t":"p","text":"Share $18.16, strike $16.50, warrant $0.325, n = 8:1. Initial gearing = 18.16 ÷ (0.325 × 8) = **6.98x**. When DBS fell 4.6% the warrant fell 24.6%; when DBS rallied to $22.19 the warrant more than doubled to $0.665 (about +105%). This shows the gearing effect — a small % move in the underlying produces a much larger % move in the warrant. A flat underlying still erodes the warrant via time decay."},{"t":"sub","text":"5.5.4 Delta"},{"t":"def","term":"Delta","def":"The rate at which the warrant price changes with the underlying price (price sensitivity). Delta = n × (ΔWP/ΔS)."},{"t":"p","text":"Call deltas are always positive; put deltas always negative. ATM warrants have delta ≈ 0.5; deep-ITM warrants have delta close to 1. Investors expecting a small move buy ATM/slightly ITM warrants; those expecting a large move buy cheaper OTM warrants. Delta is only a point-in-time estimate and changes with market conditions and time decay."},{"t":"sub","text":"5.5.5 Effective gearing"},{"t":"formula","name":"Effective gearing","expr":"Effective gearing = Delta × Gearing","where":["Best estimate of the actual % move in the warrant for a 1% move in the underlying","Call e.g. 0.95 × 7 = 6.65x; Put e.g. −0.4533 × 16.92 ≈ −7.67x"]},{"t":"sub","text":"5.5.6 Implied volatility"},{"t":"p","text":"Implied volatility is the market consensus of the underlying's future volatility over the warrant's life. For similar warrants, higher implied volatility means a more expensive warrant. IV = f(share price, warrant price, strike, maturity, interest rate, dividend yield)."},{"t":"h","text":"5.6 Warrant Valuation"},{"t":"def","term":"Intrinsic value (IV)","def":"The in-the-money portion of a warrant. Only ITM warrants have intrinsic value; OTM warrants have zero."},{"t":"formula","name":"Intrinsic value","expr":"Call IV = MAX{0, (S − X)/n}   |   Put IV = MAX{0, (X − S)/n}","where":["S = underlying price","X = exercise price","n = conversion ratio"]},{"t":"formula","name":"Conversion price (breakeven)","expr":"Call CP = X + nWP   |   Put CP = X − nWP","where":["WP = warrant price","Total effective cost of acquiring/selling the underlying via the warrant"]},{"t":"def","term":"Premium","def":"The difference between the warrant price and its intrinsic value — essentially the warrant's time value. (Different from option 'premium', which means the option's price.)"},{"t":"formula","name":"Warrant premium","expr":"Call Premium($) = nWP + X − S   |   Put Premium($) = nWP − X + S","where":["Premium % = Premium($) ÷ S × 100","The % the underlying must move by maturity for the investor to break even"]},{"t":"p","text":"Example (DBS call): IV = (18.16 − 16.50)/8 = $0.2075; CP = 16.50 + 8×0.325 = $19.10; Premium% = [(8×0.325 + 16.50 − 18.16)/18.16]×100 = 5.18%."},{"t":"h","text":"5.7 Roles of Warrant Holder & Issuer"},{"t":"p","text":"The **listing document** sets out the contractual rights and obligations. The **holder** has the right but not the obligation to buy/sell a stated number of shares at the strike within the period. The **issuer** must deliver the underlying and receive the strike if a call is exercised, or receive the underlying and pay the strike if a put is exercised — though most SGX-ST warrants settle in cash."},{"t":"h","text":"5.8 Designated Market Makers"},{"t":"p","text":"Issuers who commit to make a market need not meet the minimum placement/holder-size requirements for listed equities, and the minimum issue size is **SGD 2 million** (previously SGD 5m). The **DMM** must provide competitive bid/offer quotes within a maximum spread and minimum lot size (set in the listing document) to create liquidity. DMMs can be large international banks and brokers."},{"t":"h","text":"5.9 Settlement of Warrants"},{"t":"diagram","kind":"flow","title":"Physical settlement of a call warrant","steps":[{"label":"Holder","sub":"submits exercise notice + cash"},{"label":"Warrant agent","sub":"informs CDP & issuer"},{"label":"CDP","sub":"credits holder shares, debits issuer"}]},{"t":"p","text":"For a put, CDP debits the holder's securities and credits the issuer, and the agent pays cash to the holder. Exercise expenses are always borne by the holder."},{"t":"formula","name":"Cash settlement per warrant","expr":"Call = (S − X)/n   |   Put = (X − S)/n","where":["Most structured warrants are automatically exercised and cash-settled at expiry"]},{"t":"p","text":"**Asian-style expiry settlement**: the last trading day differs from the expiry date. For an auto-exercise warrant, last trading day is at least 3 business days before expiry. The settlement price is the **arithmetic average of the official closing prices of the underlying for the 5 market days prior to expiry** — making it path-dependent."},{"t":"h","text":"5.10 Corporate Action Adjustments"},{"t":"p","text":"Rights issues, bonus issues, stock splits, special dividends or consolidations can dilute or concentrate the underlying's value, triggering adjustments to the conversion ratio, exercise price or other variables effective on the **ex-date**. Adjustments are usually made for **special** (not normal) dividends."},{"t":"formula","name":"Dividend adjustment","expr":"New X = Old X × Adjustment Factor;  AF = (P − SD − ND) ÷ (P − ND)","where":["P = last cum-date closing price","SD = special dividend per share","ND = normal dividend per share","New conversion ratio = Old ratio × AF"]},{"t":"formula","name":"Share split adjustment","expr":"New X = Old X × (A/B)","where":["A = existing shares","B = shares on ex-basis","New conversion ratio = Old ratio × (A/B)"]},{"t":"h","text":"5.11 Exotic Warrant Structures"},{"t":"list","ordered":false,"items":["**Index warrants** — cash-settled; cash = multiplier × (settlement level − strike)/n. No corporate-action adjustment needed (index already adjusted).","**Currency translated warrants** — settlement currency differs from underlying currency (e.g. HSI warrant: underlying HKD, settled SGD via an exchange rate).","**Basket warrants** — underlying is a pre-defined basket of shares (e.g. a sector); cash or physical settled.","**Yield-enhanced / capped warrants (discount certificates)** — upside is capped at the cap/strike in exchange for buying the underlying at a discount.","**Commodity warrants** — oil, precious metals; usually cash-settled and longer-dated than commodity futures/options.","**FX warrants** — right to exchange currencies at a set rate; cash-settled, leveraged."]},{"t":"p","text":"For a **capped/yield-enhanced** warrant: at maturity if the underlying closes at or above the cap strike, the holder receives the cap strike value; if below, the holder receives the value of the underlying."},{"t":"h","text":"5.12 Daily Leveraged Certificates (DLCs)"},{"t":"def","term":"Daily Leveraged Certificate (DLC)","def":"A leveraged short-term exchange-traded derivative designed mainly for intra-day trading, magnifying the DAILY performance of an underlying benchmark (usually an index) for amplified long or short exposure."},{"t":"p","text":"DLCs originated in Europe in 2012 (constant leverage products / factor certificates) and reached Asia on SGX in 2017. Because they are highly leveraged they are high-risk; representatives must inform clients of the risks."},{"t":"sub","text":"5.12.1 Features"},{"t":"table","headers":["Feature","Detail"],"rows":[["Leverage","Up to 7x (commonly 3x-7x)"],["Direction","Long or short"],["Maximum tenure","3 years"],["Currency","SGD (regardless of index)"],["Settlement","T+2 (like SGX stocks)"],["Fees","Brokerage 0.1 bps; clearing 0.4 bps; management fee charged to price if held overnight"],["Max loss","Limited to capital invested (no margin)"]]},{"t":"sub","text":"Naming convention"},{"t":"p","text":"Example: **DLC SG 5x Long HSI 200714** — a DLC issued by SG (Societe Generale), 5x leverage, Long the HSI, expiring 14 Jul 2020."},{"t":"sub","text":"5.12.1.2 Leverage & daily reset"},{"t":"p","text":"A 3x Long DLC rises ~3% for each 1% rise in the index (before costs); a 3x Short DLC rises ~3% for each 1% fall. Losses are amplified the same way. Performance is **reset at the end of each trading day**, so returns are computed off each day's closing level."},{"t":"diagram","kind":"bars","title":"Typical leverage by product","unit":"x","data":[{"label":"CFD","value":20,"note":"margin, OTC, can lose > capital"},{"label":"Structured warrant","value":50,"note":"5-50x via optionality"},{"label":"DLC","value":7,"note":"fixed daily, no margin"},{"label":"Leveraged ETF","value":3,"note":"fund structure"},{"label":"Cash equity","value":1}]},{"t":"sub","text":"5.12.1.3 Compounding / path dependency"},{"t":"p","text":"Because the leverage resets daily, holding a DLC over several days **compounds** the daily returns. In a trending market this amplifies gains beyond the simple multiple; in a choppy market it erodes value. DLCs are meant for intra-day trading and are NOT suitable as long-term investments."},{"t":"table","headers":["Days (index +2%/day)","Index cumulative","5x Long DLC"],"rows":[["1 day","+2.00%","+10.00%"],["2 days","+4.04%","+21.00%"],["3 days","+6.12%","+33.10%"],["4 days","+8.24%","+46.41%"],["5 days","+10.41%","+61.05%"]]},{"t":"p","text":"Example: over a short week a net −2.49% move in the HSI produced a compounded −11.66% on a 5x Long DLC. An 8-10% index correction could mean a 47-61% DLC loss. The realised compounding differs slightly from theory because of market-maker pricing, the management fee, and the daily reset."},{"t":"sub","text":"5.12.1.6 Airbag feature"},{"t":"p","text":"The **airbag** is a safeguard that slows the rate of loss in a major intra-day shock. It triggers only on losses when the underlying index falls by **20%+ (3x DLC)** or **10%+ (5x DLC)** in a day. On trigger, trading in the DLC is suspended for **30 minutes** (intra-day reset). After reset, performance is based on the **Minimum Observed Level** (lowest index value for a Long, highest for a Short) during the 15-minute window after the trigger."},{"t":"diagram","kind":"cycle","title":"DLC airbag mechanism","stages":[{"label":"Index falls","sub":"5x DLC down ~10% in a day"},{"label":"Airbag triggers","sub":"loss threshold breached"},{"label":"30-min suspension","sub":"intra-day reset"},{"label":"New reference","sub":"Min Observed Level (15 min)"},{"label":"Resume","sub":"further loss off lower base"}]},{"t":"p","text":"Worked airbag example: 5x Long DLC priced S$2.00 with index at 1,000. Index drops 10% to 900 → DLC loses 50% to S$1.00 and the airbag triggers (30-min suspension). After resuming, a further 5% index fall costs 25% of S$1.00 = S$0.75. Without the airbag the same total 15% fall would have cost 75% of the S$2.00 close, leaving S$0.50. The airbag cushions the loss by resetting the base."},{"t":"sub","text":"5.12.2 Benefits of DLCs"},{"t":"key","title":"DLC benefits","points":["Augments returns via leverage up to 5x and capitalises on volatility","Both long and short exposure; can hedge daily","Low capital outlay; loss limited to amount invested","No margins required","No implied-volatility impact (unlike options)","No time-decay impact (unlike options)","Transparent pricing/structure (except exact management fee)","No fund structure to maintain (unlike leveraged ETFs)"]},{"t":"p","text":"At expiry (max 3-year tenure) the final exercised value is auto-paid. Unlike leveraged ETFs, DLCs do NOT reset price via reverse splits. A DLC can shrink toward zero before expiry (a 5x DLC under a 2%/day decline for 50 days can drop to about $0.01); remaining value is distributed proportionately to holders. Investors must set **stop-loss limits**, cut losses, and avoid averaging down or buy-and-hold."},{"t":"sub","text":"5.12.4 Comparison with other leveraged products"},{"t":"diagram","kind":"compare","title":"DLC vs Structured Warrant","colA":"DLC","colB":"Structured warrant","rows":[["Exchange-traded (SGX)","Exchange-traded (SGX)"],["Fixed daily leverage (3-7x)","Variable leverage (5-50x)"],["Daily reset → path-dependent compounding","Price driven by delta, vol, time decay"],["No implied vol / no time decay","Affected by implied vol and time decay"],["Loss capped at capital","Loss capped at capital"],["No margin","No margin"]]},{"t":"p","text":"DLCs and structured warrants are exchange-traded; **CFDs** are OTC, margin-based, can be leveraged up to 20x and can lose more than the capital invested. Leveraged ETFs require a fund structure and usually go up to 3x. Losses on DLCs and structured warrants are capped at the amount invested."}],"newQuestions":[{"type":"mcq","q":"Which statement about structured warrants versus standard company warrants is correct?","options":["Company warrants can be call or put; structured warrants are call only","Exercise of structured warrants dilutes the company's earnings","Structured warrants are issued by third parties and do not raise capital for the underlying company","Company warrants are cash-settled with no delivery of shares"],"correct":[2],"explain":"Structured warrants are issued by third-party institutions and provide no new capital. Company warrants are call-only and dilute earnings via new shares; structured warrants do not."},{"type":"mcq","q":"SGX-listed structured warrants are which exercise style and settlement type?","options":["American-style, physical delivery","European-style, cash-settled","American-style, cash-settled","European-style, physical delivery"],"correct":[1],"explain":"SGX structured warrants are European-style (exercisable only at expiry) and are settled in cash, with no delivery of the underlying."},{"type":"mcq","q":"A call warrant has underlying price S = $18.16, warrant price WP = $0.325 and conversion ratio n = 8. What is the gearing ratio (to 2 dp)?","options":["2.27x","6.98x","8.00x","55.88x"],"correct":[1],"explain":"Gearing = S / (WP × n) = 18.16 / (0.325 × 8) = 18.16 / 2.60 = 6.98x. Dividing by WP alone (55.88x) or by n alone are traps."},{"type":"mcq","q":"A call warrant has S = $20, X = $17, n = 5. What is its intrinsic value per warrant?","options":["$3.00","$0.60","$0.40","$0.00"],"correct":[1],"explain":"Call IV = MAX{0,(S−X)/n} = (20−17)/5 = $0.60. The $3.00 trap omits dividing by the conversion ratio."},{"type":"mcq","q":"A put warrant has S = 24,981, X = 27,200, n = 8,000. What is its intrinsic value per warrant (to 4 dp)?","options":["$0.0000","$0.2773","$2,218.62","$3.4000"],"correct":[1],"explain":"Put IV = MAX{0,(X−S)/n} = (27,200−24,981)/8,000 ≈ $0.2773. Because X > S the put is ITM, so IV is positive."},{"type":"mcq","q":"A warrant has delta of 0.95 and gearing of 7x. Its effective gearing is closest to:","options":["7.37x","6.65x","0.95x","13.65x"],"correct":[1],"explain":"Effective gearing = Delta × Gearing = 0.95 × 7 = 6.65x. This is the best estimate of the warrant's actual % move per 1% move in the underlying."},{"type":"mcq","q":"On a single day a 3x Long DLC tracks an index that rises 2%. Before costs, the DLC's return that day is closest to:","options":["+2.0%","+3.0%","+6.0%","+9.0%"],"correct":[2],"explain":"A 3x Long DLC moves about 3 × the daily index return: 3 × 2% = +6%."},{"type":"mcq","q":"An index rises exactly 2% per day for 5 consecutive days (cumulative +10.41%). A 5x Long DLC held throughout returns approximately:","options":["+10.41%","+52.05%","+61.05%","+50.00%"],"correct":[2],"explain":"Daily reset compounds the 10%/day gains: (1.10)^5 − 1 ≈ +61.05%, well above the naive 5 × 10.41% = 52.05%. This is the compounding/path effect."},{"type":"mcq","q":"The airbag feature of a 5x leveraged DLC is triggered when the underlying index falls intra-day by at least:","options":["5%","10%","20%","2%"],"correct":[1],"explain":"For a 5x DLC the airbag triggers on a 10%+ intra-day fall; for a 3x DLC the threshold is 20%."},{"type":"mcq","q":"When the airbag is triggered, trading in the DLC is suspended for:","options":["15 minutes","30 minutes","one full trading day","60 minutes"],"correct":[1],"explain":"An intra-day reset takes place over a 30-minute suspension; the new reference uses the Minimum Observed Level during the 15-minute window after the trigger."},{"type":"mcq","q":"All of the following are benefits of DLCs EXCEPT:","options":["No margin requirement","Loss limited to capital invested","Guaranteed positive return if held long enough","No time-decay impact unlike options"],"correct":[2],"explain":"DLCs can lose the entire invested capital, especially over multiple days due to compounding; there is no guaranteed return. The others are genuine benefits."},{"type":"mcq","q":"For SGX structured warrants with Asian-style settlement, the settlement price of the underlying is based on:","options":["The closing price on the expiry date only","The opening price on the last trading day","The arithmetic average of closing prices over the 5 market days prior to expiry","The highest price during the warrant's life"],"correct":[2],"explain":"Asian-style settlement averages the official closing prices over the 5 market days before expiry, making the payoff path-dependent."},{"type":"mcq","q":"All else equal, an increase in the exercise price of a PUT warrant will:","options":["Decrease its value","Have no effect","Increase its value","Make it worthless"],"correct":[2],"explain":"A higher strike makes a put more likely to be exercised and therefore more valuable. (For a call, a higher strike reduces value.)"},{"type":"mcq","q":"An investor buys a warrant at an implied volatility of 7% and later sells it at 8%, all else equal. The result is:","options":["A loss, because higher volatility lowers the warrant price","A profit, because higher volatility raises the warrant price","No change, volatility does not affect price","A loss equal to the management fee"],"correct":[1],"explain":"Buyers are long volatility; higher implied volatility means a higher warrant price, so selling at 8% after buying at 7% yields a profit."},{"type":"mcq","q":"Which product can cause an investor to lose MORE than the capital invested?","options":["Structured warrant","Daily Leveraged Certificate","Contract for Difference (CFD)","Zero-strike warrant"],"correct":[2],"explain":"CFDs are margin-based OTC products where losses can exceed the invested capital. DLCs and structured warrants cap losses at the amount invested."},{"type":"mcq","q":"A call warrant has X = $16.50, WP = $0.325 and n = 8. Its conversion price (breakeven) is:","options":["$16.50","$19.10","$13.90","$2.60"],"correct":[1],"explain":"Call CP = X + nWP = 16.50 + (8 × 0.325) = 16.50 + 2.60 = $19.10."},{"type":"mrq","q":"Select all that apply. Which are TRUE of Daily Leveraged Certificates (DLCs)?","options":["Leverage resets at the end of each trading day","They are designed mainly for long-term buy-and-hold investing","Holding over several days compounds daily returns (path dependency)","Maximum tenure is 3 years"],"correct":[0,2,3],"explain":"DLCs reset daily, compound over multi-day holds, and have a 3-year max tenure. They are designed for intra-day trading, NOT long-term holding."},{"type":"mrq","q":"Select all that apply. Which statements about warrant valuation are correct?","options":["Only in-the-money warrants have intrinsic value","Premium is largely the warrant's time value","Call intrinsic value = MAX{0,(X−S)/n}","Premium % is the % the underlying must move by maturity to break even"],"correct":[0,1,3],"explain":"Only ITM warrants have intrinsic value; premium is mainly time value and expresses the break-even move. The call IV formula is (S−X)/n, not (X−S)/n — that is the put formula."},{"type":"mrq","q":"Select all that apply. Which factors, when they INCREASE, tend to RAISE a call warrant's price?","options":["Underlying asset price","Volatility","Exercise price","Time to expiry"],"correct":[0,1,3],"explain":"Higher underlying price, higher volatility and longer life all raise a call warrant's price. A higher exercise price LOWERS a call's value."},{"type":"mrq","q":"Select all that apply. Which are characteristics of structured warrants on SGX-ST?","options":["Cash-settled on maturity","Paid upfront, so no margin calls","Designated market makers provide liquidity","Exercise issues new shares, diluting the company"],"correct":[0,1,2],"explain":"SGX structured warrants are cash-settled, fully paid upfront (no margin), and supported by DMM liquidity. They do NOT issue new shares or dilute the company — that is a feature of company warrants."}]},"06":{"notes":[{"t":"h","text":"6.1 Introduction to Exotic / Complex Options"},{"t":"p","text":"**Exotic (complex) options** have flexible, innovative features used to build **structured products**. Their features can be varied to create strategies that meet client demands and exploit market opportunities. They are typically transacted **over-the-counter (OTC)**."},{"t":"sub","text":"Features that can be customised"},{"t":"list","ordered":false,"items":["**Timing of exercise** – final expiry only (European), anytime before expiry (American), at set intervals (Bermudan), or triggered by an event.","**Uncertainty as to time of expiration** – may be other than the stipulated expiry, or triggered by an event.","**Payoff computation** – the price level used to compute payoff may differ from the actual spot price.","**Conditional events / trigger points** – if the underlying touches or crosses a trigger, it affects the option's validity and final payoff.","**Underlying assets** – can extend beyond traditional assets/indices to real estate, volatility, etc.","**Currency features** – can create a payoff in a different currency, e.g., **Quanto**."]},{"t":"h","text":"6.2 Barrier Options"},{"t":"def","term":"Barrier option","def":"A path-dependent exotic option that is activated (knock-in) or deactivated/cancelled (knock-out) when a preset trigger price level (the barrier) of the underlying asset is reached. Popular in bank structured products because of its simple 'if-then-or-else', game-like outcomes."},{"t":"def","term":"Barrier","def":"A price trigger level which, when reached, causes an event (e.g., payment of interest, higher interest, currency conversion, buying/selling a stock). It can reference a stock price, index level, FX rate, money-market or bond rate, or a weighted average of a basket of stocks."},{"t":"p","text":"The payoff depends not only on whether and how much the option is in-the-money at exercise, but also on whether the underlying: (a) touched the barrier during the option's life; (b) was above/below the barrier at expiry (or throughout); or (c) stayed within or outside two barriers."},{"t":"key","title":"Key concepts","points":["**Knock-out / kick-out:** touching the barrier DEACTIVATES the option's rights.","**Knock-in / kick-in:** touching the barrier ACTIVATES the option's rights.","Barrier options are **path dependent** – the path of the underlying, not just the final price, determines the outcome.","Barrier options should be **CHEAPER than vanilla** options because the investor risks being knocked out or never being knocked in."]},{"t":"diagram","kind":"compare","title":"Barrier vs Vanilla option","colA":"Barrier option","colB":"Vanilla option","rows":[["Path dependent","Not path dependent (European)"],["Activated/deactivated at barrier","Always active to expiry"],["Cheaper (lower premium)","More expensive"],["Risk of knock-out / never knocking in","No barrier risk"]]},{"t":"h","text":"6.3 Knock-Out Barrier Options"},{"t":"p","text":"**Knock-out** structures terminate when the underlying (equity, rates, indices, commodities, currencies) hits a predetermined level. They can be built from one or more knock-out options. **Bullish/call/long** products benefit from rising prices; **bearish/put/short** products benefit from falling prices."},{"t":"sub","text":"6.3.1 Single barrier knock-out"},{"t":"list","ordered":false,"items":["**Down-and-out:** the price must FALL to/below the barrier to be knocked out and deactivated.","**Up-and-out:** the price must RISE to/above the barrier to be knocked out and deactivated.","In both cases the option is deactivated when the barrier is reached or breached.","Some knock-out options pay a fixed **rebate** if the barrier is breached (the option is extinguished but the investor receives a fixed cash amount)."]},{"t":"p","text":"**Worked example (knock-out call):** Strike $8.00, Knock-out $9.00, Spot $7.00. The investor participates in the upside above $8.00, but if the price reaches $9.00 the call is cancelled. Maximum gain = $8.99 − $8.00 − call price = $0.99 − premium. Breakeven when the call price = $0.99. It is equivalent to buying a visible call at $8 and selling an embedded call at $9 to the bank; the premium received cheapens the structure. UNLIKE a bull spread, the long call is immediately extinguished the moment the underlying trades at $9 or higher, so the investor loses the maximum intrinsic value of $0.99."},{"t":"p","text":"**Worked example (knock-out put):** Strike $13.50, Knock-out $12.00, Spot $15.00. The investor profits from a fall above $12.00. Maximum gain = $13.50 − $12.01 − put price = $1.49 − premium. Breakeven when the put price = $1.49. UNLIKE a bear spread, the long put is immediately extinguished the moment the underlying trades at $12 or lower, so the investor loses the maximum intrinsic value of $1.49."},{"t":"diagram","kind":"payoff","title":"Knock-out call (visible call $8 + sold call $9) vs vanilla long call","legs":[{"instrument":"call","position":"long","strike":8,"premium":0.5,"qty":1},{"instrument":"call","position":"short","strike":9,"premium":0.2,"qty":1}],"spotRange":[6,12]},{"t":"sub","text":"6.3.2 Double barrier (double knock-out)"},{"t":"p","text":"A **double barrier option** has TWO knock-out levels: one HIGHER than the strike and one LOWER than the strike. The investor participates only while the underlying stays WITHIN the two barriers. Example: Strike $8.00, Spot $7.80, Knock-out 1 = $7.00, Knock-out 2 = $9.00."},{"t":"list","ordered":true,"items":["If spot stays below the strike throughout, there is no reason to exercise; the loss is the cost of the unexercised option.","If at expiry $8.00 < spot < $9.00, exercise gives up to ~$0.99 gain.","If at any time the underlying touches/passes either the $7.00 lower barrier or the $9.00 upper barrier, the knock-out occurs and the option becomes worthless."]},{"t":"key","title":"Why double knock-out is cheaper","points":["A **double knock-out is cheaper than a single knock-out** because either of the two barriers could knock it out.","It is cheaper than a straight call and put combined with the same specifications."]},{"t":"h","text":"6.4 Knock-In (Kick-In) Barrier Options"},{"t":"p","text":"For **knock-in** options the reverse happens: the option becomes ACTIVATED if the underlying touches the knock-in barrier. Once touched, the terms stay active until expiry even if the price falls back. A **rebate** is usually paid to the buyer at expiry if the knock-in barrier is NEVER reached."},{"t":"list","ordered":false,"items":["**Down-and-in:** activates when the price falls to the barrier.","**Up-and-in:** activates when the price rises to the barrier."]},{"t":"h","text":"6.5 Summary & Application of Barrier Options"},{"t":"p","text":"Unlike regular European calls/puts, barrier options are **path dependent**. A knock-in option only comes into existence when the barrier is touched; once 'live' it behaves as a normal European option. A knock-out option is extinguished when the barrier is touched and the structure then expires worthless."},{"t":"diagram","kind":"compare","title":"Knock-in vs Knock-out behaviour at the barrier","colA":"Knock-OUT","colB":"Knock-IN","rows":[["Deactivates / extinguishes the option","Activates / makes the option 'live'"],["Starts active, dies when barrier touched","Starts inactive, born when barrier touched"],["Rebate may be paid if barrier IS touched","Rebate paid if barrier is NEVER touched"],["Ideal for small moves / sideways market","Ideal for speculating large market moves"]]},{"t":"diagram","kind":"matrix","title":"Barrier option types: direction x activation","cols":["Knock-OUT (deactivate)","Knock-IN (activate)"],"rows":[{"label":"DOWN (price falls to barrier)","cells":["Down-and-out","Down-and-in"]},{"label":"UP (price rises to barrier)","cells":["Up-and-out","Up-and-in"]}]},{"t":"sub","text":"6.5.1 Advantages of (long) barrier options"},{"t":"list","ordered":false,"items":["Cheaper / lower premium than standard options (a knock-out may terminate early; a knock-in may never activate). A double knock-in has a higher knock-in probability than a single knock-in.","Higher return on capital if barrier conditions are satisfied (no knock-out, or knock-in occurs), since the outlay is lower.","Greater selection of products for diverse market views, with leverage on capital invested.","Knock-in options suit speculating large moves; knock-out options suit small moves in a sideways market."]},{"t":"sub","text":"6.5.2 Disadvantages of barrier options"},{"t":"list","ordered":false,"items":["High risk of loss of premium if barrier conditions are breached (knock-out occurs, or no knock-in event).","They are OTC products: premium paid upfront, no exchange trading, and exposure to **counterparty (issuer) risk** plus a lack of liquidity."]},{"t":"p","text":"**Structured product example (embedded up-and-out USD call / JPY put):** Spot 112.00, Strike 112.00, Knock-out barrier 119.00, Knock-out rebate 2%, money-market rate 1.5%, 3-month maturity, 100% participation, min size USD 500,000. The client participates in USD/JPY 112–118.99. If USD/JPY touches 119, the right is extinguished and a fixed 2% annualised yield (rebate) plus principal is returned."},{"t":"h","text":"6.6 Barrier Options in Structured Products"},{"t":"sub","text":"6.6.1 Barrier Capital Preservation Certificate ('Shark's Fin')"},{"t":"p","text":"Contains an **up-and-out knock-out call**. Named 'shark's fin' from its payoff shape. The investor gets a **capped** return at maturity if the knock-out does NOT occur; if it does, the investor receives the agreed capital amount. Capital preservation is a % of nominal at maturity (not the purchase price); value may fall below preservation during the life. Features: participation until knock-out, possible rebate, capped upside."},{"t":"sub","text":"6.6.2 Barrier Reverse Convertible"},{"t":"p","text":"Enhances yield when the underlying is expected flat / slightly up or down. Comprises a note/money-market instrument/bond PLUS a **knock-in put sold by the investor to the issuer** (typically a down-and-in put, often at-the-money). Offers conditional capital preservation via a kick-in barrier set below the share price at issue."},{"t":"list","ordered":false,"items":["The **coupon is ALWAYS paid** regardless of market direction; higher volatility requires higher coupons.","Maximum yield earned (100% capital repaid) if price closes above the strike OR never touches the kick-in barrier.","If the kick-in is touched before maturity, it converts into a standard reverse convertible; principal is at risk.","Risk: underlying falls enough to breach the kick-in, so capital is no longer preserved."]},{"t":"formula","name":"Barrier reverse convertible payout at maturity (only if barrier breached)","expr":"= Min{100%, 100% − (1 / Strike Price) × Max[0, Strike Price − (Spot at maturity / Spot at inception)]}","where":["Coupon is paid regardless of outcome","Applies only when the kick-in barrier has been breached"]},{"t":"sub","text":"6.6.3 Bonus Certificate"},{"t":"p","text":"For investors wanting upside participation with some downside protection. The **strike / bonus level** is set ABOVE the initial price; the **knock-out barrier** is set BELOW the initial price (usually observed continuously). If the underlying never touches the barrier the bonus is paid; if it trades below the barrier the bonus and protection are forfeited and the investor has 1:1 downside exposure. Investors forego dividends (used to fund the put purchased from the investor). Risks: loss equal to negative performance, surrender of dividends, issuer credit risk."},{"t":"p","text":"Issuer trade-off variables: level of participation/cap, strike/bonus level, knock-out barrier level, and maturity. E.g., lowering participation and capping upside allows a higher bonus level or a farther barrier."},{"t":"sub","text":"6.6.4 Barrier Capital Preservation Certificate (Straddle)"},{"t":"p","text":"Contains TWO knock-out options – a barrier call AND a barrier put (upper and lower knock-out barriers). The investor gets a capped return at maturity if no knock-out occurs; if either knock-out occurs, the agreed capital amount is paid. Suits a view of no large price swings and realised volatility higher than implied volatility. Limited profit potential."},{"t":"sub","text":"6.6.5 Positioning of the Barriers"},{"t":"key","title":"Barrier positioning rules (ceteris paribus)","points":["The closer the barrier is to the current price, the more likely it is reached, making the **knock-in option MORE expensive**.","The closer the barrier is to the current price, the **cheaper the knock-out option**.","Strong conviction of a large move -> set the barrier farther away to get a cheaper option; less confidence -> set the barrier closer."]},{"t":"h","text":"6.7 Binary (Digital / One-Touch) Options"},{"t":"def","term":"Binary option","def":"Also called a digital or one-touch option. It has only TWO outcomes: it pays a specific yield/amount if the underlying reaches the pre-specified level, and zero (or a lower amount) if it does not."},{"t":"list","ordered":false,"items":["**One-touch:** pays out as long as the level is touched at any time, regardless of where the price ends at expiry.","**All-or-nothing / cash-or-nothing (European):** for a call, the price must STAY ABOVE the level AT EXPIRY; for a put, BELOW the level at expiry. Otherwise nothing is paid.","**Asset-or-nothing:** delivers the asset value rather than a fixed cash sum when the condition is met.","**Barrier binary:** higher fixed payment if a level is touched, lower if not (a knock-in or knock-out version).","**Double barrier binary (double no-touch):** higher payment only if the price stays WITHIN both barriers; zero/lower if either barrier is touched."]},{"t":"diagram","kind":"flow","title":"One-touch binary outcome logic","steps":[{"label":"Buy one-touch","sub":"strike level set"},{"label":"Barrier touched?","sub":"any time in life"},{"label":"Touched -> MAX yield","sub":"e.g., 10%"},{"label":"Not touched -> MIN yield","sub":"e.g., 1%"}]},{"t":"p","text":"**One-touch example:** Bearish EUR/USD. Spot 1.08, one-touch strike 1.04, 3 months. If 1.04 is touched, max yield 10% is paid; if not, min yield 1% is paid. Principal repaid in full regardless. Money-market rate 2%, so the client sacrifices ~1% to buy the one-touch."},{"t":"p","text":"**Range currency deposit = double barrier binary (double no-touch):** Spot 1.09, upper barrier 1.10, lower barrier 1.06, 3 months. If EUR/USD stays within 1.06–1.10, return = 8.25%; if it touches/moves beyond either barrier, return = 2.00%. The outcome is purely binary (+8.25% or 2.00%). Painful edge case: if the pair sits in range for 88 of 90 days but touches a barrier on 1 day, the client still gets only 2%."},{"t":"p","text":"**Range accrual alternative:** interest accrues at the higher rate for in-range days and the lower rate for out-of-range days. It is MORE expensive than a double no-touch, so in practice either the yield drops or the range narrows. Example: 60/90 days in range, 30/90 out: total = (60/90 × 8.25%) + (30/90 × 2.00%) = 5.50% + 0.67% = 6.17%."},{"t":"formula","name":"Range accrual total return","expr":"Total return = (days in-range / total days) × High rate + (days out-of-range / total days) × Low rate","where":["High rate = yield earned within the barrier range","Low rate = yield earned outside the barrier range"]},{"t":"h","text":"6.8 Basket Options"},{"t":"def","term":"Basket option","def":"An option on a customised set of underlying assets (a few indices or selected stocks). Pricing is similar to equity index options but with fewer underlyings; asset correlation is used to gauge basket volatility."},{"t":"key","title":"Basket option key points","points":["Basket volatility is LOWER than the weighted-average volatility of the individual assets, so the basket option is **cheaper than buying individual options** on each asset.","Useful for buying calls on several stocks cheaply, or as **portfolio insurance** (a put on a basket of held stocks).","**Correlation risk:** in sharply negative markets, correlation can rise significantly, reducing the diversification benefit."]},{"t":"h","text":"6.9 Knock-Out Warrants"},{"t":"p","text":"**Knock-out warrants** are like regular warrants but with a knock-out/barrier feature: if the underlying touches the barrier, the warrant terminates. There are call (rising market) and put (falling market) versions. In some markets a knock-out warrant is called a **callable bull/bear contract (CBBC)**."},{"t":"list","ordered":false,"items":["Small investment generating leveraged performance relative to the underlying.","Increased risk of total loss (limited to the initial investment).","Immediately expires if the barrier is breached during its life.","Suitable for short-term speculation or hedging; requires continuous monitoring.","Volatility sensitivity (skew) depends on the barrier and where the underlying trades relative to it."]},{"t":"h","text":"6.10 Callable Bull/Bear Contracts (CBBCs)"},{"t":"p","text":"A **CBBC** is essentially a knock-out warrant, popular with retail investors in Asia. Barrier options are embedded in it. A **Bull contract** takes a bullish position; a **Bear contract** takes a bearish position. CBBCs are traded on the **cash market** of the exchange, settle like equities (**T+2**), and are issued by a third party (usually an investment bank), independent of the underlying and the exchange."},{"t":"p","text":"A CBBC can track domestic/overseas single stocks, domestic/overseas equity indices, currencies, commodities, or other asset baskets allowed by the exchange and deemed suitable by the issuer."},{"t":"sub","text":"6.10.1 Price movement & conversion ratio"},{"t":"p","text":"A CBBC's **delta is close to 1** (Bull ~ +1, Bear ~ −1), so its price closely tracks the underlying. With a 1:1 conversion ratio, a Bull CBBC rises ~$1 when the underlying rises $1; a Bear CBBC falls ~$1. There is greater **transparency** than other structured products."},{"t":"def","term":"Conversion ratio","def":"The number of underlying assets that each unit of CBBC is obligated to buy or sell. A 10:1 ratio means 10 units of CBBC control 1 unit of the underlying."},{"t":"sub","text":"6.10.2 Lifespan & Mandatory Call Event (MCE)"},{"t":"def","term":"Mandatory Call Event (MCE)","def":"A trigger event where the issuer must call the CBBC early because the underlying reaches the specified call price at any time before expiry. The CBBC expires early and trading terminates immediately (a knock-out event)."},{"t":"key","title":"When the MCE is triggered","points":["**Bull contract:** Spot Price touches or FALLS BELOW the Call Price.","**Bear contract:** Spot Price touches or EXCEEDS (rises to/above) the Call Price."]},{"t":"diagram","kind":"flow","title":"Mandatory Call Event (MCE) process","steps":[{"label":"CBBC trading","sub":"delta ~ 1"},{"label":"Spot hits Call Price","sub":"Bull: falls / Bear: rises"},{"label":"MCE triggered","sub":"issuer calls early"},{"label":"Trading terminates","sub":"irrevocable"},{"label":"Payoff","sub":"N: zero / R: residual value"}]},{"t":"sub","text":"6.10.3 Gearing effect"},{"t":"p","text":"CBBCs are **leveraged**: the investor commits only a small fraction of the underlying's full value, so returns AND losses are magnified. Because delta ~ 1, the **gearing ratio equals the effective gearing**. An effective gearing of 10x means each 1% move in the underlying moves the CBBC ~10%. The closer the strike is to the spot, the higher the gearing and the higher the risk of being called."},{"t":"formula","name":"CBBC Gearing ratio","expr":"Gearing Ratio = Underlying Asset Price / (Price of CBBC × Conversion Ratio)","where":["Equal to effective gearing because delta ~ 1","Higher when the strike is close to the spot"]},{"t":"sub","text":"6.10.4 Hedging (Bear contracts)"},{"t":"p","text":"CBBCs can hedge market risk. An investor holding an STI-mirroring equity portfolio can buy **Bear CBBCs on the STI**: if the market declines, the portfolio loss is offset by the CBBC gain."},{"t":"sub","text":"6.10.5 Categories: N-CBBC vs R-CBBC"},{"t":"list","ordered":false,"items":["**N-CBBC (No residual value):** Call Price = Strike Price. No cash payment when MCE occurs.","**R-CBBC (Residual value):** Call Price differs from Strike Price. Holder may receive a small residual cash payment when called."]},{"t":"diagram","kind":"matrix","title":"CBBC categories: Call Price vs Strike Price & MCE direction","cols":["BULL contract","BEAR contract"],"rows":[{"label":"R-Category","cells":["Call Price > Strike; MCE when asset FALLS & hits Call Price","Call Price < Strike; MCE when asset RISES & hits Call Price"]},{"label":"N-Category","cells":["Call Price = Strike; MCE when asset FALLS & hits Call Price","Call Price = Strike; MCE when asset RISES & hits Call Price"]}]},{"t":"sub","text":"6.10.6 Factors affecting CBBC pricing"},{"t":"p","text":"**Theoretical factors** determine intrinsic value (underlying price − strike price): price movement of the underlying, strike price, and **financial cost** (issuer's borrowing cost, dividend adjustments, profit margin). Financial cost is higher the longer the maturity and declines over time toward expiry; it is charged upfront and detailed in the Listing Document."},{"t":"p","text":"For a Bull CBBC, a higher strike means LOWER intrinsic value; for a Bear CBBC, a higher strike means HIGHER intrinsi
