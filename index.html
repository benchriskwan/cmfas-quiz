value"],correct:[1],explain:"Underwriters canvass demand across an indicative range and price where demand supports it. MAS regulates the process but does not set the price."},{type:"mcq",q:"Which are collective investment schemes (CIS) under the Securities and Futures Act? (I) A unit trust  (II) A REIT  (III) A bank fixed deposit  (IV) A single-stock futures contract",options:["I and II only","I, II and IV only","I only","II and III only"],correct:[0],explain:"Unit trusts and REITs are CIS. A fixed deposit is a bank deposit and a futures contract is a derivative — so only I and II."},{type:"mcq",q:"Which market participant is MOST exposed to principal (inventory) risk?",options:["A broker executing client orders for commission","A market maker quoting two-way prices on its own book","A custodian holding client assets","A share registrar / transfer agent"],correct:[1],explain:"A market maker holds securities on its own book to quote two-way prices, bearing inventory/price risk. The others act purely as agents."}]},{code:"02",name:"Risk, Return & Time Value",questions:[{type:"mcq",q:"An investor needs $50,000 in 5 years. If she can earn 6% p.a. compounded annually, the amount she must invest today is closest to:",options:["$37,363","$38,500","$40,000","$35,000"],correct:[0],explain:"PV = 50,000 / (1.06)^5 = 50,000 / 1.33823 = $37,363."},{type:"mcq",q:"A stock has a 30% chance of returning +20%, a 50% chance of +5%, and a 20% chance of −10%. Its expected return is:",options:["+6.5%","+5.0%","+8.5%","+4.5%"],correct:[0],explain:"Expected return = 0.30×20 + 0.50×5 + 0.20×(−10) = 6 + 2.5 − 2 = +6.5%."},{type:"mcq",q:"A bank quotes a nominal 8% p.a. compounded quarterly. The effective annual rate (EAR) is closest to:",options:["8.00%","8.24%","8.16%","8.30%"],correct:[1],explain:"EAR = (1 + 0.08/4)^4 − 1 = (1.02)^4 − 1 = 8.24%."},{type:"mcq",q:"The coefficient of variation is a useful risk measure because it:",options:["Measures total return","Expresses risk per unit of return, allowing comparison of assets with different expected returns","Always equals beta","Ignores standard deviation entirely"],correct:[1],explain:"Coefficient of variation = standard deviation ÷ expected return; it standardises risk per unit of return for comparing assets."},{type:"mcq",q:"An investment returns a nominal 9% over one year while inflation is 4%. The EXACT real return is closest to:",options:["5.00%","4.81%","13.0%","5.20%"],correct:[1],explain:"Exact Fisher relation: (1.09 / 1.04) − 1 = 4.81%. The 5.00% option is the approximation (9% − 4%) — a deliberate trap."},{type:"mcq",q:"A stock is bought at $20.00, pays $1.00 of dividends, and is sold at $22.40. The total return and the capital-gain yield are, respectively:",options:["17% and 12%","12% and 17%","17% and 5%","7% and 12%"],correct:[0],explain:"Total return = (22.40 − 20 + 1)/20 = 17%. Capital-gain yield = (22.40 − 20)/20 = 12% (the dividend yield is the remaining 5%)."},{type:"mcq",q:"$5,000 invested for 3 years at 8% p.a. compounded annually grows to closest to:",options:["$6,200","$6,299","$6,000","$5,400"],correct:[1],explain:"FV = 5,000 × (1.08)³ = 5,000 × 1.259712 = $6,298.56."},{type:"mcq",q:"Assets X and Y each have an expected return of 8%. X has a standard deviation of 10%; Y, 18%. A risk-averse investor should:",options:["Always prefer Y for its higher upside","Prefer X — same expected return for less risk","Be indifferent between them","Prefer Y, since a higher standard deviation guarantees a higher return"],correct:[1],explain:"With equal expected returns, a risk-averse investor takes the lower-risk asset (X). A higher standard deviation means more risk, not a higher guaranteed return."},{type:"mrq",q:"Which of the following INCREASE the future value of a single lump sum, holding all else constant?",options:["A higher interest rate","A longer investment horizon","More frequent compounding within the year","A higher rate of inflation"],correct:[0,1,2],explain:"A higher rate, longer horizon and more frequent compounding all raise nominal future value. Inflation erodes real value but does not change the nominal FV calculation."}]},{code:"03",name:"Key Drivers of Market Movements & Asset Values",questions:[{type:"mcq",q:"Leading economic indicators are most useful because they:",options:["Confirm a recession only after it has ended","Tend to change direction before the overall economy does","Move exactly in step with GDP","Are published with the longest lag"],correct:[1],explain:"Leading indicators (e.g. building permits, new orders, equity prices) tend to turn ahead of the economy; coincident indicators move with it; lagging indicators confirm afterward."},{type:"mcq",q:"Which is LEAST likely to be classified as a coincident indicator?",options:["Industrial production","Personal income","Number of building permits issued","Manufacturing and trade sales"],correct:[2],explain:"Building permits are a leading indicator; industrial production, personal income and trade sales are coincident."},{type:"mcq",q:"If a company's required rate of return RISES while its expected dividend growth is unchanged, its justified P/E ratio and its intrinsic value will, all else equal:",options:["Both rise","Both fall","P/E rises while value falls","Be unaffected"],correct:[1],explain:"A higher required return lowers both the justified multiple and the intrinsic value (value = D₁/(r − g))."},{type:"mcq",q:"Which is LEAST likely to cause a domestic currency to depreciate?",options:["A rise in the domestic central bank's policy interest rate","Persistent current-account deficits","Domestic inflation running higher than trading partners'","A sharp increase in domestic political instability"],correct:[0],explain:"A rate rise attracts capital inflows and tends to appreciate the currency — the opposite of depreciation."},{type:"mcq",q:"In the late stage of an expansion with rising inflation, which sector is generally considered the MOST defensive?",options:["Consumer discretionary","Consumer staples","Technology","Industrials"],correct:[1],explain:"Consumer staples see steady demand across the cycle; discretionary, tech and industrials are cyclical."},{type:"mrq",q:"An unexpected, sharp RISE in long-term interest rates would tend to:",options:["Reduce the price of long-duration bonds","Pressure the valuations of high-P/E growth equities","Increase the present value of distant cash flows","Raise corporate borrowing costs"],correct:[0,1,3],explain:"Higher rates cut long bond prices, pressure high-P/E equities and raise borrowing costs. They REDUCE the present value of distant cash flows, so that option is wrong."}]},{code:"04",name:"Foreign Exchange",questions:[{type:"mcq",q:"Given USD/SGD = 1.3400 and USD/JPY = 150.00, the SGD/JPY rate (JPY per SGD) is closest to:",options:["111.94","201.00","0.0089","112.50"],correct:[0],explain:"JPY per SGD = (USD/JPY) ÷ (USD/SGD) = 150.00 / 1.3400 = 111.94."},{type:"mcq",q:"Spot USD/SGD = 1.3500. The 3-month forward points are quoted as −60 (i.e. −0.0060). The 3-month forward outright rate is:",options:["1.3560","1.3440","1.3500","1.4100"],correct:[1],explain:"Negative forward points are subtracted: 1.3500 − 0.0060 = 1.3440 (USD at a forward discount in SGD terms)."},{type:"mcq",q:"The Monetary Authority of Singapore conducts monetary policy primarily by:",options:["Setting a domestic policy interest rate","Managing the SGD against a trade-weighted basket of currencies within an undisclosed band (the S$NEER)","Fixing the SGD one-for-one to the US dollar","Targeting the growth of the money supply directly"],correct:[1],explain:"MAS uses the exchange rate (the S$NEER policy band) as its main policy tool rather than an interest rate."},{type:"mcq",q:"A Singapore company will RECEIVE USD 1,000,000 in 3 months and is worried the USD will weaken. To hedge, it should:",options:["Buy USD forward","Sell USD forward, locking in a rate at which it will convert the USD to SGD","Do nothing","Buy a USD call option"],correct:[1],explain:"An exporter receiving USD hedges by selling USD forward, locking in the SGD proceeds regardless of where spot moves."},{type:"mcq",q:"A traveller sees: USD/SGD 1.3480 / 1.3530 and EUR/USD 1.0820 / 1.0860. The rate (SGD per EUR) at which the traveller can BUY EUR with SGD is closest to:",options:["1.459","1.469","1.452","1.445"],correct:[1],explain:"Buy USD at the ask 1.3530, then buy EUR at the EUR/USD ask 1.0860. SGD per EUR = 1.3530 × 1.0860 ≈ 1.469. Using the bid rates (≈1.459) is the trap."},{type:"mcq",q:"USD/SGD moves from 1.3500 to 1.2960. The Singapore dollar has APPRECIATED against the US dollar by approximately:",options:["4.0%","4.2%","5.4%","0.054%"],correct:[1],explain:"Measure the SGD: 1/1.2960 vs 1/1.3500 → (0.7716 − 0.7407)/0.7407 ≈ 4.2%. The 4.0% option is the USD's depreciation on USD/SGD — appreciation of one is not equal to depreciation % of the other."},{type:"mcq",q:"The 6-month SGD interest rate is LOWER than the 6-month USD rate. Under covered interest parity, the 6-month USD/SGD forward rate will be:",options:["Above the spot (USD at a forward premium in SGD terms)","Below the spot (USD at a forward discount in SGD terms)","Equal to the spot rate","Indeterminate from the information given"],correct:[1],explain:"The higher-rate currency (USD) trades at a forward discount — fewer SGD per USD forward — so the USD/SGD forward is below spot."},{type:"mrq",q:"A Singapore importer must PAY USD in three months. If unhedged, which outcomes would cause a loss (a higher SGD cost)?",options:["The USD appreciates against the SGD","The USD depreciates against the SGD","The SGD weakens against the USD","The SGD strengthens against the USD"],correct:[0,2],explain:"The importer pays a fixed USD amount, so a stronger USD / weaker SGD raises the SGD cost."}]},{code:"05",name:"Company Analysis & Financial Statements",questions:[{type:"mcq",q:"A company has a net profit margin of 8%, asset turnover of 1.5×, and an equity multiplier (assets/equity) of 2.0. Using the DuPont identity, its return on equity (ROE) is:",options:["24%","12%","16%","11.5%"],correct:[0],explain:"DuPont ROE = net margin × asset turnover × equity multiplier = 0.08 × 1.5 × 2.0 = 24%."},{type:"mcq",q:"A company has current assets of $400m (of which inventory is $150m) and current liabilities of $250m. Its quick (acid-test) ratio is closest to:",options:["1.60","1.00","0.60","2.20"],correct:[1],explain:"Quick ratio = (current assets − inventory) ÷ current liabilities = (400 − 150)/250 = 1.00."},{type:"mcq",q:"A company has net profit of $120m and 100m ordinary shares. Convertible bonds, if converted, would add 20m shares (ignore any interest adjustment). The fully diluted EPS is closest to:",options:["$1.20","$1.00","$6.00","$1.40"],correct:[1],explain:"Diluted EPS = 120 / (100 + 20) = $1.00; basic EPS was $1.20, so dilution lowers reported EPS."},{type:"mcq",q:"Under the indirect method, depreciation appears in the cash flow statement as:",options:["A cash outflow in financing activities","A non-cash expense added back to net profit in the operating section","A cash inflow from investing activities","An item that does not appear at all"],correct:[1],explain:"Depreciation is a non-cash expense, so it is added back to net profit when deriving operating cash flow."},{type:"mcq",q:"A firm has EBIT of $90m and interest expense of $30m. Its interest coverage (times-interest-earned) ratio is:",options:["3.0×","0.33×","2.0×","4.0×"],correct:[0],explain:"Interest coverage = EBIT ÷ interest expense = 90/30 = 3.0×."},{type:"mcq",q:"A company reports: revenue $500m, COGS $300m, operating expenses $100m, interest $20m, tax $16m. Its net profit margin is closest to:",options:["12.8%","40.0%","16.0%","20.0%"],correct:[0],explain:"Gross 200, operating 100, pre-tax 80, net 64. Net margin = 64/500 = 12.8%."},{type:"mcq",q:"All of the following are limitations of the P/E ratio EXCEPT:",options:["Earnings can be distorted by one-off items","It is not meaningful when earnings are negative","It directly measures a company's liquidity","Differing accounting policies reduce comparability across firms"],correct:[2],explain:"The P/E says nothing about liquidity (that's the current/quick ratio). The other three are genuine limitations."},{type:"mcq",q:"Companies A and B report identical net profit, but A carries much more debt. All else equal, A will tend to have a ___ return on equity and ___ financial risk than B:",options:["higher; higher","lower; lower","higher; lower","lower; higher"],correct:[0],explain:"Leverage amplifies ROE (a smaller equity base for the same profit) and financial risk (fixed interest obligations)."},{type:"mrq",q:"Which items appear on the statement of financial position (balance sheet)?",options:["Retained earnings","Cost of goods sold","Trade payables","Property, plant & equipment"],correct:[0,2,3],explain:"Retained earnings, trade payables and PP&E are balance-sheet items. Cost of goods sold belongs to the income statement."}]},{code:"06",name:"Equity Securities",questions:[{type:"mcq",q:"A stock trades at $40 and just paid a dividend of $1.60 (D₀), expected to grow 6% forever. Using the dividend discount model, the implied required return is closest to:",options:["10.00%","10.24%","6.00%","11.00%"],correct:[1],explain:"r = D₁/P + g, where D₁ = 1.60 × 1.06 = 1.696; r = 1.696/40 + 0.06 = 0.0424 + 0.06 = 10.24%."},{type:"mcq",q:"A company has an ROE of 15% against a required return of 12%, with sustainable growth. Its justified price-to-book (P/B) ratio is likely to be:",options:["Greater than 1, because ROE exceeds the required return","Less than 1","Exactly 1","Zero"],correct:[0],explain:"When ROE exceeds the required return, the firm creates value and tends to trade above book value (P/B > 1)."},{type:"mcq",q:"A bonus (scrip) issue differs from a rights issue in that a bonus issue:",options:["Raises new cash for the company","Capitalises reserves and issues free shares, raising no new cash","Is offered only to new investors","Always doubles the share price"],correct:[1],explain:"A bonus issue converts reserves into shares at no cost to existing holders and raises no cash; a rights issue raises cash."},{type:"mcq",q:"A stock bought at $25 rises to $27 over a year and pays $1.25 in dividends. The income (dividend) component of its total return is closest to:",options:["5.0%","8.0%","13.0%","4.6%"],correct:[0],explain:"Dividend yield on cost = 1.25/25 = 5.0%. (Total return is 13%: 8% capital plus 5% income.)"},{type:"mcq",q:"All of the following are typically rights of an ordinary shareholder EXCEPT:",options:["The right to vote at general meetings","A residual claim on assets in a winding-up","A guaranteed fixed annual dividend","Pre-emptive rights in a rights issue"],correct:[2],explain:"Ordinary dividends are discretionary and never guaranteed; the others are standard ordinary-shareholder rights."},{type:"mcq",q:"A share trades cum-rights at $5.00. The company announces a 1-for-4 rights issue at a subscription price of $3.00. The theoretical ex-rights price (TERP) is closest to:",options:["$4.60","$4.50","$4.75","$4.00"],correct:[0],explain:"TERP = (4 × 5.00 + 1 × 3.00) / 5 = 23.00 / 5 = $4.60."},{type:"mcq",q:"Using the figures above (cum-rights $5.00, 1-for-4 at $3.00), the theoretical value of ONE right is closest to:",options:["$0.40","$0.32","$1.60","$0.20"],correct:[0],explain:"Value of a right = cum-price − TERP = 5.00 − 4.60 = $0.40."},{type:"mcq",q:"A stock JUST PAID a dividend of $2.00 (D₀). Dividends grow at 5% forever; the required return is 12%. The dividend discount model gives an intrinsic value of closest to:",options:["$28.57","$30.00","$40.00","$42.00"],correct:[1],explain:"Use D₁ = 2.00 × 1.05 = 2.10; value = 2.10/(0.12 − 0.05) = $30.00. The $28.57 option uses D₀ — the classic trap."},{type:"mrq",q:"Which statements about preference shares are correct?",options:["They typically rank ahead of ordinary shares for dividends","Cumulative preference shares carry forward unpaid dividends to future periods","They always carry full voting rights at general meetings","In a winding-up they rank behind secured creditors"],correct:[0,1,3],explain:"Preference shares rank ahead of ordinary for dividends, can be cumulative, and rank behind secured creditors. They usually have limited or no voting rights, so that option is false."}]},{code:"07",name:"Deposits & Fixed-Income Securities",questions:[{type:"mcq",q:"A 3-year bond pays a 5% annual coupon (face $1,000) when the market yield is 6%. Its price is closest to:",options:["$973.27","$1,000.00","$1,026.73","$950.00"],correct:[0],explain:"Price = 50/1.06 + 50/1.06² + 1,050/1.06³ = 47.17 + 44.50 + 881.60 = $973.27 (a discount, since coupon < yield)."},{type:"mcq",q:"A bond has a Macaulay duration of 4.2 years and a yield to maturity of 5% (annual). Its modified duration is closest to:",options:["4.20","4.00","4.41","3.80"],correct:[1],explain:"Modified duration = Macaulay duration ÷ (1 + y) = 4.2 / 1.05 = 4.00."},{type:"mcq",q:"The 'dirty' (full) price of a bond is:",options:["The clean price minus accrued interest","The clean price plus accrued interest","Always equal to the clean price","The face value of the bond"],correct:[1],explain:"Dirty price = clean (quoted) price + accrued interest; it is the actual cash amount that settles on trade."},{type:"mcq",q:"A bond rated BB (or Ba) by the major agencies is classified as:",options:["Investment grade","Below investment grade (high-yield, or 'junk')","Risk-free","Government guaranteed"],correct:[1],explain:"BBB−/Baa3 is the lowest investment grade; BB/Ba and below are speculative (high-yield)."},{type:"mcq",q:"A zero-coupon bond with face $1,000 maturing in 2 years is priced at $890. Its annualised yield (compounded annually) is closest to:",options:["5.5%","6.0%","11.2%","12.4%"],correct:[1],explain:"Yield = (1,000/890)^(1/2) − 1 ≈ 6.0%. The 12.4% figure is the simple 2-year total return and 11.2% is that halved — both traps."},{type:"mcq",q:"A bond has a modified duration of 6.5 and a price of $980. If market yields rise by 50 basis points, the approximate change in price is closest to:",options:["−$31.85","−$3.19","+$31.85","−$63.70"],correct:[0],explain:"ΔP ≈ −(modified duration) × Δy × price = −6.5 × 0.005 × 980 = −$31.85."},{type:"mcq",q:"For a bond trading at a DISCOUNT, the correct ordering of yields is:",options:["Coupon rate < Current yield < Yield to maturity","Yield to maturity < Current yield < Coupon rate","Current yield < Coupon rate < Yield to maturity","Coupon rate = Current yield = Yield to maturity"],correct:[0],explain:"For a discount bond: coupon < current yield < YTM. (A premium bond reverses this order.)"},{type:"mcq",q:"A 4% semi-annual coupon bond (face $1,000) trades at $1,080. Its current yield is closest to:",options:["3.70%","4.00%","4.32%","2.00%"],correct:[0],explain:"Current yield = (4% × 1,000)/1,080 = 40/1,080 = 3.70% — below the coupon because the bond is at a premium."},{type:"mcq",q:"Which bond is LEAST sensitive to a change in market interest rates?",options:["10-year zero-coupon bond","10-year 3% coupon bond","2-year 6% coupon bond","30-year 4% coupon bond"],correct:[2],explain:"The shortest maturity with the highest coupon has the lowest duration and least rate sensitivity. The 10-year zero has the most."},{type:"mrq",q:"Which statements about a callable bond are correct?",options:["The issuer benefits when interest rates fall","It typically offers a higher yield than an otherwise identical non-callable bond","Call risk increases the investor's reinvestment risk","The investor holds the option to call the bond"],correct:[0,1,2],explain:"The issuer gains when rates fall, so callable bonds pay more and add reinvestment risk. The ISSUER, not the investor, holds the call."}]},{code:"08",name:"Portfolio Management",questions:[{type:"mcq",q:"Using the CAPM, a stock with beta 1.3 when the risk-free rate is 3% and the expected market return is 9% has a required return of:",options:["10.8%","11.7%","9.0%","7.8%"],correct:[0],explain:"Required return = Rf + β(Rm − Rf) = 3 + 1.3 × (9 − 3) = 3 + 7.8 = 10.8%."},{type:"mcq",q:"Combining two perfectly negatively correlated assets (correlation = −1) in the right proportions can theoretically:",options:["Eliminate portfolio risk entirely","Double the risk","Have no effect on risk","Only reduce the return"],correct:[0],explain:"With a correlation of −1, a suitably weighted combination can drive portfolio standard deviation to zero."},{type:"mcq",q:"As more securities are added to a portfolio, the risk that CANNOT be diversified away is:",options:["Unsystematic risk","Systematic (market) risk","Company-specific risk","All risk is eliminated"],correct:[1],explain:"Diversification removes unsystematic (firm-specific) risk; systematic market risk remains."},{type:"mcq",q:"A portfolio is 60% equity (expected return 10%) and 40% bonds (expected return 4%). Its expected return is:",options:["7.6%","7.0%","6.4%","14.0%"],correct:[0],explain:"0.60 × 10% + 0.40 × 4% = 6.0% + 1.6% = 7.6%."},{type:"mcq",q:"Adding an asset with a correlation of −0.3 to a portfolio, versus one with +0.8 (same return and standard deviation), will:",options:["Reduce portfolio risk by more","Increase portfolio risk by more","Have an identical effect on risk","Eliminate all portfolio risk"],correct:[0],explain:"Lower (more negative) correlation provides greater diversification, reducing portfolio risk by more."},{type:"mcq",q:"All of the following are unsystematic risks EXCEPT:",options:["A product recall at one company","A factory fire at a single firm","A nationwide rise in interest rates","Litigation against a single issuer"],correct:[2],explain:"A nationwide rate rise is systematic (market-wide); the others are firm-specific and diversifiable."},{type:"mcq",q:"A portfolio holds 50% in a stock with beta 1.4 and 50% in a stock with beta 0.6. The portfolio beta is:",options:["1.0","2.0","0.84","1.4"],correct:[0],explain:"Portfolio beta = 0.5 × 1.4 + 0.5 × 0.6 = 1.0."}]},{code:"09",name:"ETFs, Unit Trusts, REITs & Insurance",questions:[{type:"mcq",q:"Two funds track the same index. Fund A has a total expense ratio of 0.20%; Fund B, 1.10%. Over the long run, all else equal:",options:["Fund A will tend to track the index more closely and deliver higher net returns","Fund B will outperform because higher fees mean better management","Fees have no effect on an index fund's returns","Both will deliver identical net returns"],correct:[0],explain:"For an index fund, lower fees mean lower tracking difference and higher net returns to the investor."},{type:"mcq",q:"A REIT generates returns for unitholders mainly through:",options:["Capital gains on the units only","Rental income distributions plus potential capital appreciation of the units","Guaranteed fixed coupons","Deposit insurance"],correct:[1],explain:"REITs distribute rental income (at least 90% of taxable income for tax transparency) and the units can appreciate in value."},{type:"mcq",q:"Which statement about a participating (par) whole-life policy is INCORRECT?",options:["It may pay non-guaranteed bonuses or dividends from the participating fund","It provides lifelong death-benefit cover","Its entire return is guaranteed and does not depend on the insurer's fund performance","It typically builds a cash value over time"],correct:[2],explain:"Par policies have both guaranteed and non-guaranteed (bonus) elements, so the total return is not entirely guaranteed."},{type:"mcq",q:"An ETF has a net asset value (NAV) of $50.00 but trades on the exchange at $50.40. The ETF is trading at a:",options:["Premium to NAV","Discount to NAV","Tracking error of 0.8%","Sales charge of $0.40"],correct:[0],explain:"Market price ($50.40) above NAV ($50.00) means the ETF trades at a premium to NAV."},{type:"mcq",q:"A Singapore REIT must distribute at least 90% of its taxable income for tax transparency. If it distributes only 80%, the most likely consequence is that it:",options:["Is automatically wound up","Loses tax-transparent treatment on the undistributed income (taxed at the entity level)","Faces no change in tax treatment","Allows unitholders to receive distributions entirely free of tax"],correct:[1],explain:"Falling below the 90% threshold loses tax transparency on the undistributed portion, which is then taxed at the entity level."},{type:"mrq",q:"Which statements correctly distinguish ETFs from unit trusts?",options:["ETFs trade intraday on an exchange; unit trusts typically deal at NAV once a day","ETFs always guarantee they will beat their benchmark index","An ETF's market price can deviate from its NAV (a premium or discount)","Unit trusts cannot be actively managed"],correct:[0,2],explain:"ETFs trade intraday and can sit at a premium/discount; unit trusts deal at NAV. ETFs aim to track (not beat) and unit trusts can be actively managed, so those two are false."},{type:"mcq",q:"In an investment-linked policy (ILP), which statement is TRUE?",options:["The insurer guarantees the investment return","The policyholder bears the investment risk and the cash value can fall","Premiums are fully allocated to units from day one in every ILP","An ILP contains no insurance protection element"],correct:[1],explain:"In an ILP the policyholder bears the investment risk and the cash value fluctuates with the underlying funds."}]},{code:"10",name:"Warrants",questions:[{type:"mcq",q:"A call warrant: underlying $50, strike $48, warrant price $0.60, conversion ratio 10 (10 warrants per share). The premium (the extra cost of buying via the warrant versus the underlying) is closest to:",options:["8.0%","4.0%","12.0%","2.0%"],correct:[0],explain:"Conversion price = strike + warrant price × conversion ratio = 48 + 0.60 × 10 = $54; premium = (54 − 50)/50 = 8.0% above the current price."},{type:"mcq",q:"A call warrant has an exercise price of $4.00, a warrant price of $0.25, and a conversion ratio of 5 (5 warrants per share). The break-even (conversion) price of the underlying is closest to:",options:["$4.25","$5.25","$4.05","$9.00"],correct:[1],explain:"Conversion price = exercise + warrant price × conversion ratio = 4.00 + 0.25 × 5 = $5.25."},{type:"mcq",q:"A warrant has a gearing ratio of 8.0 and a delta of 0.45. Its effective gearing is closest to:",options:["8.0 times","17.8 times","3.6 times","0.45 times"],correct:[2],explain:"Effective gearing = gearing ratio × delta = 8.0 × 0.45 = 3.6×. The raw gearing overstates leverage because it ignores delta."},{type:"mcq",q:"A call warrant: underlying $12.00, strike $10.00, conversion ratio 4 (4 warrants per share). The intrinsic value per warrant is:",options:["$2.00","$0.50","$8.00","$0.00"],correct:[1],explain:"Intrinsic value per warrant = (spot − strike) ÷ conversion ratio = (12 − 10)/4 = $0.50."},{type:"mcq",q:"Holding all else constant, which change would DECREASE the price of a call warrant?",options:["An increase in the underlying's volatility","A longer time to expiry","An increase in the strike (exercise) price","A rise in the underlying's price"],correct:[2],explain:"A higher strike makes the right to buy less valuable, lowering a call warrant's price. The other three all raise it."},{type:"mrq",q:"Which are genuine risks of holding a structured warrant?",options:["Time decay of the warrant's value","Issuer / counterparty credit risk","The warrant expiring worthless if out-of-the-money at expiry","Guaranteed capital protection at maturity"],correct:[0,1,2],explain:"Warrants suffer time decay, carry issuer credit risk and can expire worthless. They are not capital-protected."}]},{code:"11",name:"Technical & Quantitative Analysis",questions:[{type:"mcq",q:"Which is NOT an assumption underlying technical analysis?",options:["Prices move in trends","Market action discounts all available information","Intrinsic value is the sole determinant of price","History tends to repeat — patterns recur"],correct:[2],explain:"Technical analysis assumes price discounts everything, moves in trends and that patterns repeat. 'Intrinsic value alone' is fundamental analysis."},{type:"mcq",q:"A 'death cross', generally read as bearish, occurs when:",options:["The 50-day moving average crosses above the 200-day moving average","The 50-day moving average crosses below the 200-day moving average","RSI rises above 70","Trading volume spikes sharply"],correct:[1],explain:"A death cross is the short-term MA crossing below the long-term MA — bearish. The reverse is a golden cross."},{type:"mcq",q:"An RSI reading of 78 alongside a fresh price high most likely indicates that the stock is:",options:["Oversold and likely to rebound","Overbought, signalling possible exhaustion of the up-move","Fairly valued","In a confirmed downtrend"],correct:[1],explain:"RSI above 70 with a new high signals overbought conditions and possible exhaustion of the rally."},{type:"mrq",q:"Which of the following are momentum / oscillator indicators?",options:["Moving Average Convergence Divergence (MACD)","Stochastic oscillator","Relative Strength Index (RSI)","Dividend discount model"],correct:[0,1,2],explain:"MACD, stochastics and RSI are technical momentum indicators; the dividend discount model is a fundamental valuation tool."}]}],cases:[{title:"Horizon Telecom — ratios & an FX position",scenario:"An investor reviews Horizon Telecom Ltd, which reports EBIT of $240m, interest expense of $60m, net profit of $135m and 150m shares outstanding, trading at $9.00. Separately, the investor holds a US-dollar bond and notes that USD/SGD has moved from 1.36 to 1.32.",questions:[{type:"mcq",q:"Horizon's interest coverage (times-interest-earned) ratio is:",options:["4.0×","2.25×","0.25×","3.0×"],correct:[0],explain:"Interest coverage = EBIT ÷ interest = 240/60 = 4.0×, indicating interest is comfortably covered."},{type:"mcq",q:"Horizon's price-to-earnings (P/E) ratio is closest to:",options:["7.5","10.0","12.0","8.0"],correct:[1],explain:"EPS = 135/150 = $0.90; P/E = 9.00/0.90 = 10.0."},{type:"mrq",q:"Which statements are correct?",options:["The SGD has appreciated against the USD","The investor's USD bond is worth fewer SGD after the move","Interest coverage of 4.0× indicates the firm comfortably covers its interest","A higher equity multiplier would reduce the firm's ROE"],correct:[0,1,2],explain:"USD/SGD fell from 1.36 to 1.32, so the SGD appreciated and each USD now converts to fewer SGD. Coverage of 4.0× is comfortable. A higher equity multiplier (more leverage) would INCREASE ROE, so that statement is false."}]},{title:"Meridian Foods Ltd — valuation & rights issue",scenario:"Meridian Foods Ltd trades cum-rights at $6.00. It reported net profit of $90 million with 120 million ordinary shares in issue. It expects to pay a dividend of $0.30 next year, growing at 4% per annum indefinitely; the required return is 10%. Meridian has announced a 1-for-5 rights issue at a subscription price of $4.50.",questions:[{type:"mcq",q:"The theoretical ex-rights price (TERP) is closest to:",options:["$5.75","$5.50","$5.25","$6.00"],correct:[0],explain:"TERP = (5 old × 6.00 + 1 new × 4.50) / 6 = 34.50 / 6 = $5.75."},{type:"mcq",q:"Meridian's price-to-earnings (P/E) ratio (on the cum-rights price) is closest to:",options:["6.0","8.0","10.0","13.3"],correct:[1],explain:"EPS = 90m / 120m = $0.75; P/E = 6.00 / 0.75 = 8.0."},{type:"mrq",q:"Which statements are correct?",options:["The dividend discount model gives an intrinsic value of about $5.00, below the $6.00 market price","The rights are being issued at a discount to the cum-rights price","A shareholder who neither takes up nor sells the rights risks dilution","The TERP is approximately $5.75"],correct:[0,1,2,3],explain:"DDM value = 0.30/(0.10 − 0.04) = $5.00 (below $6.00); $4.50 is a discount to $6.00; ignoring rights causes dilution; TERP ≈ $5.75. All four hold."}]},{title:"Two bonds in a rising-rate environment",scenario:"An investor compares two SGD bonds (face $1,000 each). Bond P pays a 5% annual coupon, has 4 years to maturity, and trades at $1,030. Bond Q has a modified duration of 7.2 and trades at $950. Commentators expect interest rates to rise by 75 basis points over the coming year.",questions:[{type:"mcq",q:"Because Bond P trades at a PREMIUM, the correct ordering of its yields is:",options:["YTM < Current yield < Coupon","Coupon < Current yield < YTM","Current yield < YTM < Coupon","All three are equal"],correct:[0],explain:"Bond P is at a premium, so the order is YTM < current yield < coupon."},{type:"mcq",q:"If rates rise by 75 bps, the approximate change in Bond Q's price is closest to:",options:["−$51.30","−$5.13","+$51.30","−$71.25"],correct:[0],explain:"ΔP ≈ −7.2 × 0.0075 × 950 = −$51.30."},{type:"mrq",q:"Which statements are correct?",options:["Shortening the portfolio's duration would reduce its interest-rate sensitivity","Both bond prices would fall if rates rise as expected","Adding a floating-rate note would reduce the portfolio's rate sensitivity","Bond P's yield to maturity exceeds its 5% coupon"],correct:[0,1,2],explain:"Shorter duration and a floating-rate note cut rate sensitivity; both fixed bonds fall when rates rise. Bond P is at a premium, so its YTM is below its coupon — that option is false."}]}]},M6A:{key:"M6A",code:"CM-SIP",name:"Module 6A",tagline:"Specified Investment Products & Derivatives",accent:"#6D28D9",soft:"#F5F3FF",format:{questions:80,timeMin:150,passPct:70},topics:[{code:"01",name:"Overview of Derivatives",questions:[{type:"mcq",q:"All of the following are common uses of derivatives EXCEPT:",options:["Hedging an existing exposure","Speculating on price direction with leverage","Eliminating all risk with certainty in every situation","Arbitraging price differences between markets"],correct:[2],explain:"Derivatives can hedge, speculate and arbitrage, but they do not eliminate all risk with certainty — basis risk and counterparty risk remain."},{type:"mcq",q:"The economic function by which futures prices aggregate participants' expectations of an asset's future value is known as:",options:["Arbitrage","Price discovery","Speculation","Settlement"],correct:[1],explain:"Price discovery — futures prices incorporate new information into an implied market value for the underlying."},{type:"mcq",q:"All of the following are derivatives EXCEPT:",options:["A stock index futures contract","An equity call option","An ordinary share","An interest rate swap"],correct:[2],explain:"An ordinary share is a primary security, not a derivative. Futures, options and swaps all derive value from an underlying."},{type:"mrq",q:"Which statements about exchange-traded vs OTC derivatives are correct?",options:["Exchange-traded contracts are standardised","OTC contracts generally carry higher counterparty risk (absent central clearing)","Exchange-traded derivatives are novated to a central counterparty / clearing house","OTC contracts cannot be customised"],correct:[0,1,2],explain:"Exchange-traded contracts are standardised and centrally cleared; OTC carry more counterparty risk. OTC CAN be customised, so that option is false."}]},{code:"02",name:"Futures, Forwards & Swaps",questions:[{type:"mcq",q:"The spot price of an index is 4,000, the risk-free rate is 4% p.a., and the index pays no dividend. The theoretical 6-month futures price is closest to:",options:["4,080","4,160","4,000","3,920"],correct:[0],explain:"F = S × (1 + r × t) = 4,000 × (1 + 0.04 × 0.5) = 4,000 × 1.02 = 4,080."},{type:"mcq",q:"If that same index (spot 4,000, r 4%) instead pays a dividend yield of 2% p.a., the theoretical 6-month futures price is closest to:",options:["4,080","4,040","4,000","4,120"],correct:[1],explain:"F = S × (1 + (r − q) × t) = 4,000 × (1 + (0.04 − 0.02) × 0.5) = 4,000 × 1.01 = 4,040."},{type:"mcq",q:"Which is NOT a typical motivation for entering an interest-rate swap?",options:["Converting floating-rate debt to fixed","Managing interest-rate risk","Obtaining ownership of the counterparty's assets","Reducing borrowing cost via comparative advantage"],correct:[2],explain:"Swaps exchange cash flows, not ownership of assets."},{type:"mcq",q:"In a cross-currency swap, unlike a plain-vanilla interest-rate swap:",options:["No interest is exchanged","The principal amounts in the two currencies are typically exchanged at the start and re-exchanged at maturity","Only one currency is involved","It cannot be used to hedge FX risk"],correct:[1],explain:"Because the principals are in different currencies, cross-currency swaps usually exchange principal at inception and re-exchange it at maturity."},{type:"mcq",q:"A trader is LONG 1 futures contract (multiplier 100) entered at 1,000. Initial margin $5,000, maintenance margin $3,500. The settlement price falls to 980. What happens?",options:["Loss of $2,000; equity falls to $3,000, triggering a margin call to restore the $5,000 initial margin","Loss of $20; no action required","Loss of $2,000; no margin call, as equity remains above maintenance","Gain of $2,000"],correct:[0],explain:"Loss = (1,000 − 980) × 100 = $2,000. Equity $3,000 is below the $3,500 maintenance level, so a margin call restores the initial $5,000."},{type:"mcq",q:"For a NON-dividend-paying asset with positive storage and financing costs, the theoretical futures price relative to spot is:",options:["Below spot (backwardation)","Above spot (contango)","Equal to spot","Always zero"],correct:[1],explain:"With positive cost of carry and no income, the futures price exceeds spot — a contango structure."},{type:"mcq",q:"Which is NOT a difference between futures and forwards?",options:["Futures are exchange-traded; forwards are OTC","Futures are marked to market daily; forwards typically settle at maturity","Both are firm obligations to transact, not options","Forwards are standardised while futures are customised"],correct:[3],explain:"This is reversed — futures are standardised and forwards are customised. The other statements are correct distinctions."},{type:"mrq",q:"In a plain-vanilla interest rate swap, which statements are correct?",options:["One party pays fixed and receives floating","The notional principal is usually exchanged at the start of the swap","It can convert a floating-rate borrowing into a fixed-rate obligation","Typically only the net interest difference is exchanged on each settlement date"],correct:[0,2,3],explain:"One side pays fixed/receives floating, it can convert floating to fixed, and only the net interest is settled. The notional is usually NOT exchanged."}]},{code:"03",name:"Futures Strategies",questions:[{type:"mcq",q:"A $5,000,000 portfolio with beta 1.2 is hedged with index futures, where one contract is worth $250,000. The approximate number of contracts to SHORT for a full hedge is:",options:["20","24","17","30"],correct:[1],explain:"Contracts = (portfolio value × beta) ÷ contract value = (5,000,000 × 1.2)/250,000 = 24."},{type:"mcq",q:"A fund manager holds a S$10m equity portfolio (beta 1.0) and fears a market decline. The most direct hedge is to:",options:["Buy index futures","Sell (go short) index futures","Buy call options on every holding","Do nothing and ride it out"],correct:[1],explain:"Short index futures to hedge a long portfolio — gains on the short offset losses on the portfolio."},{type:"mcq",q:"A LONG futures position profits when:",options:["The futures price falls","The futures price rises","Volatility falls","Time passes (decay)"],correct:[1],explain:"A long futures position gains when the futures price rises. Futures have no premium or time decay."},{type:"mcq",q:"In a futures hedge, 'basis' is defined as:",options:["Futures price minus the option premium","The spot price minus the futures price","Initial margin minus maintenance margin","Strike price minus spot price"],correct:[1],explain:"Basis = spot price − futures price. The risk that it moves unfavourably during a hedge is basis risk."}]},{code:"04",name:"Options",questions:[{type:"mcq",q:"For European options on a non-dividend-paying stock, put-call parity states that C − P equals:",options:["S − PV(K)","S + K","K − S","PV(K) − S"],correct:[0],explain:"Put-call parity: C − P = S − PV(K) — the call price minus the put price equals the spot minus the present value of the strike."},{type:"mcq",q:"An investor owns a share at $30 and writes a call with strike $33 for a premium of $1.50 (a covered call). The maximum profit at expiry is:",options:["$3.00","$4.50","$1.50","Unlimited"],correct:[1],explain:"If the share is called away at $33: profit = (33 − 30) + 1.50 premium = $4.50. Upside above $33 is forgone."},{type:"mcq",q:"An investor owns a share at $40 and buys a put with strike $38 for $1.00 (a protective put). The maximum loss is:",options:["$2.00","$3.00","$1.00","Unlimited"],correct:[1],explain:"The put floors the sale price at $38: max loss = (40 − 38) + 1.00 premium = $3.00."},{type:"mcq",q:"The 'theta' of a long option position is normally negative, which means:",options:["The option gains value as volatility rises","The option loses value as time passes, all else equal (time decay)","The option's delta is negative","The option is in-the-money"],correct:[1],explain:"Theta measures time decay; a long option loses value as expiry approaches, holding all else constant."},{type:"mcq",q:"An investor BUYS a call option, strike $50, premium $3.00. At expiry the underlying is $58. The net profit per share is:",options:["$8.00","$5.00","−$3.00","$11.00"],correct:[1],explain:"Intrinsic value = 58 − 50 = $8.00; net profit = 8.00 − 3.00 premium = $5.00."},{type:"mcq",q:"An investor BUYS a put, strike $40, premium $2.50. The breakeven underlying price at expiry is:",options:["$42.50","$37.50","$40.00","$2.50"],correct:[1],explain:"Put breakeven = strike − premium = 40.00 − 2.50 = $37.50. (A call's breakeven would be strike + premium.)"},{type:"mcq",q:"The MAXIMUM loss to the writer (seller) of a NAKED call option is:",options:["Limited to the premium received","Limited to the strike price","Theoretically unlimited","Zero"],correct:[2],explain:"A naked call writer faces theoretically unlimited loss, since the underlying can rise without limit. The premium is the maximum gain, not loss."},{type:"mcq",q:"Holding all else constant, the price of a call option would FALL if:",options:["The underlying price rises","Volatility increases","Time to expiry lengthens","The risk-free interest rate falls"],correct:[3],explain:"Call value rises with interest rates, so a fall in rates lowers it. A higher underlying price, higher volatility and longer time all raise call value."},{type:"mrq",q:"Which factors INCREASE the value of a PUT option, all else equal?",options:["A fall in the underlying price","An increase in volatility","A higher strike (exercise) price","A rise in the risk-free interest rate"],correct:[0,1,2],explain:"A put gains from a falling underlying, higher volatility and a higher strike. A higher risk-free rate REDUCES put value."},{type:"mcq",q:"A put option with a strike of $30 when the underlying trades at $26 is:",options:["Out-of-the-money","In-the-money by $4","At-the-money","Worthless"],correct:[1],explain:"A put is in-the-money when spot < strike. Intrinsic value = 30 − 26 = $4."}]},{code:"05",name:"Structured Warrants & DLCs",questions:[{type:"mcq",q:"A put warrant: underlying $15, strike $18, conversion ratio 5 (5 warrants per share). The intrinsic value per warrant is:",options:["$0.60","$3.00","$0.00","$0.36"],correct:[0],explain:"Put intrinsic value per warrant = (strike − spot) ÷ conversion ratio = (18 − 15)/5 = $0.60."},{type:"mcq",q:"Which statement comparing a DLC with a structured warrant is INCORRECT?",options:["A DLC provides a fixed leverage factor reset daily, while a warrant's effective gearing varies with delta","Both can lose their entire value","A DLC's multi-day return always equals the leverage factor times the index's cumulative return","Both are issued by financial institutions and carry issuer risk"],correct:[2],explain:"Because of daily compounding, a DLC's multi-day return does NOT simply equal leverage × the cumulative index move."},{type:"mcq",q:"A structured warrant has a gearing ratio of 5.0 and a delta of 0.20. Its effective gearing is:",options:["1.0 time","5.0 times","25 times","0.20 times"],correct:[0],explain:"Effective gearing = gearing ratio × delta = 5.0 × 0.20 = 1.0×. The raw gearing overstates leverage because it ignores delta."},{type:"mcq",q:"A 5× Daily Leverage Certificate (DLC) aims to deliver 5× the DAILY return of its index. Over a volatile multi-day period, an investor should expect:",options:["Exactly 5× the index's cumulative return","Returns that can diverge from 5× the cumulative move because of daily compounding / rebalancing","No tracking difference under any circumstances","A guaranteed profit"],correct:[1],explain:"A DLC resets daily, so over several days compounding/path-dependency causes returns to diverge from 5× the cumulative move (volatility decay in choppy markets)."},{type:"mcq",q:"Which is NOT true of a put warrant?",options:["It gains value as the underlying falls","It has an exercise price","It gives the holder the right to BUY the underlying","Its time value decays toward expiry"],correct:[2],explain:"A put warrant gives the right to SELL, not buy. The other statements are true of puts."},{type:"mrq",q:"Which are risks of holding a DLC over several days?",options:["Daily compounding can erode returns in choppy, sideways markets","Leverage magnifies losses as well as gains","An 'air-bag' mechanism may reset the certificate intraday after a large adverse move","It eliminates market risk"],correct:[0,1,2],explain:"Compounding erosion, magnified losses and an air-bag reset are all real. A DLC does not remove market risk."}]},{code:"06",name:"Barrier, Binary & Callable Contracts",questions:[{type:"mcq",q:"A knock-IN barrier option:",options:["Is already active and is cancelled if the barrier is hit","Only comes into existence (becomes active) if the underlying reaches the barrier level","Always pays a fixed amount regardless of the barrier","Has no barrier level"],correct:[1],explain:"A knock-in option activates only if the barrier is touched; by contrast a knock-out is cancelled if the barrier is hit."},{type:"mcq",q:"A knock-out product is terminated if the underlying trades 'at or below' $90. The underlying touches exactly $90 intraday. The product:",options:["Survives, because it must trade strictly below $90","Is knocked out, because 'at or below' includes the $90 level","Pays a bonus coupon","Converts into a call option"],correct:[1],explain:"'At or below' includes the $90 level, so touching exactly $90 triggers the knock-out. This wording precision is a classic exam trap."},{type:"mcq",q:"A Callable Bull Contract (CBBC) suffers a Mandatory Call Event when the underlying:",options:["Rises above the strike price","Falls to the call price / level","Expires in-the-money","Pays a dividend"],correct:[1],explain:"A Callable Bull Contract is knocked out when the underlying falls to the call level — the bullish holder is stopped out on the downside."},{type:"mcq",q:"A binary (digital) option pays:",options:["A payoff proportional to how far in-the-money it finishes","A fixed amount if a condition is met, and nothing otherwise","The underlying asset in all cases","Only the premium back"],correct:[1],explain:"A binary/digital option has an all-or-nothing payoff: a fixed amount if the condition is satisfied, nothing otherwise."}]},{code:"07",name:"Structured Deposits & Other Structured Products",questions:[{type:"mcq",q:"In a dual currency investment (DCI), the investor:",options:["Is guaranteed repayment in the base currency only","Earns an enhanced yield but may be repaid in the weaker (alternate) currency at a pre-set rate, bearing FX risk","Bears no currency risk","Receives a fixed return identical to a bank deposit"],correct:[1],explain:"A DCI pays a higher yield because the investor effectively sells an FX option; if the alternate currency weakens past the strike, repayment is made in that weaker currency."},{type:"mcq",q:"Which statement about a structured deposit is INCORRECT?",options:["Its return is linked to an underlying such as FX, equities or interest rates","It is typically principal-guaranteed by the issuing bank if held to maturity","It carries the credit risk of the issuing bank","It is covered by the Deposit Insurance Scheme like an ordinary deposit"],correct:[3],explain:"Structured deposits are generally NOT covered by the Deposit Insurance Scheme — that is the incorrect statement."},{type:"mcq",q:"The payoff of many CAPITAL-PROTECTED structured products is engineered by combining:",options:["A zero-coupon bond plus an option","Two ordinary shares","A futures and a forward only","Cash holdings only"],correct:[0],explain:"A bond floor (often a zero-coupon bond providing the principal) plus an option (providing upside) is the standard building block."},{type:"mrq",q:"Which are genuine risks of structured products?",options:["Issuer / credit risk","Liquidity risk — they may be hard to exit before maturity","Complexity and valuation opacity","They are always principal-guaranteed, whatever happens to the issuer"],correct:[0,1,2],explain:"Structured products carry issuer, liquidity and complexity risks. They are NOT always principal-guaranteed regardless of the issuer."}]},{code:"08",name:"Structured Notes",questions:[{type:"mcq",q:"A principal-protected note (PPN) that returns 100% of principal at maturity plus a participation in an index is typically constructed from:",options:["A zero-coupon bond (to return principal) plus a call option (for upside)","Two put options","A short forward only","Equities only"],correct:[0],explain:"The zero-coupon bond accretes to par (protecting principal); the call option funds the upside participation."},{type:"mcq",q:"Which is NOT a risk of a structured note?",options:["Issuer credit risk","Liquidity risk if sold before maturity","Complete immunity from market movements","Complexity or mis-pricing risk"],correct:[2],explain:"A structured note is exposed to market movements through its embedded derivative; it is not immune to them."},{type:"mcq",q:"An investor in an equity-linked note (ELN) is, in substance:",options:["Buying a bond and buying a put","Placing a deposit and WRITING (selling) a put on the underlying — earning enhanced yield but risking delivery of shares at the strike","Buying a call option only","Holding a risk-free instrument"],correct:[1],explain:"An ELN is economically a deposit plus a written (short) put: enhanced yield, but if the underlying falls below the strike the investor is delivered shares (or takes the loss)."},{type:"mcq",q:"A credit-linked note (CLN) exposes the investor to:",options:["Only interest-rate risk","The credit risk of a reference entity, in addition to the issuer's credit risk","No risk if held to maturity","Equity price risk only"],correct:[1],explain:"A CLN adds the credit risk of a reference entity on top of the issuer's; a credit event on the reference entity cuts the payout."}]},{code:"09",name:"Structured Funds",questions:[{type:"mcq",q:"A fund using Constant Proportion Portfolio Insurance (CPPI) maintains capital protection by:",options:["Dynamically shifting between a risky asset and a safe asset based on a cushion above a protective floor","Holding only equities at all times","Buying a single put option and nothing else","Guaranteeing returns regardless of the guarantor"],correct:[0],explain:"CPPI allocates more to the risky asset when the cushion (value above the floor) is large, and moves to safe assets as the cushion shrinks."},{type:"mcq",q:"A capital-guaranteed fund typically secures its guarantee by:",options:["Investing entirely in equities","Placing most assets in high-quality fixed income (to grow back to principal) with a smaller allocation to derivatives / risk assets","Holding only cash","Using unlimited leverage"],correct:[1],explain:"The guarantee is funded by allocating most assets to high-grade fixed income (which accretes to principal), with a small slice seeking upside via derivatives."},{type:"mrq",q:"Which statements about structured / guaranteed funds are correct?",options:["The guarantee usually depends on the guarantor's creditworthiness","Early redemption may fall outside the guarantee","They may impose a fixed investment term or lock-up period","The guarantee removes all risk, including issuer default"],correct:[0,1,2],explain:"The guarantee hinges on the guarantor, may exclude early redemption and may carry a lock-up. It does NOT remove issuer-default risk."}]},{code:"10",name:"Contracts for Differences (CFDs)",questions:[{type:"mcq",q:"A trader SHORTS a CFD on 2,000 shares at $12.00. The price falls to $11.20 and the trader closes. The gross profit is:",options:["$1,600","−$1,600","$800","$2,240"],correct:[0],explain:"A short position profits as the price falls: (12.00 − 11.20) × 2,000 = $1,600."},{type:"mcq",q:"A CFD position has a notional of $50,000 with $5,000 margin (10%). If it moves against the trader by 6% (a $3,000 loss), the remaining equity is:",options:["$2,000","$5,000","$8,000","$3,000"],correct:[0],explain:"Equity = margin − loss = 5,000 − 3,000 = $2,000; a further adverse move could trigger a margin call or close-out."},{type:"mcq",q:"Which is NOT typically true of CFDs versus trading the underlying shares directly?",options:["CFDs require less upfront capital because of margin","CFD holders can usually go long or short with ease","CFD holders receive the same voting rights as direct shareholders","CFD positions may incur daily financing charges"],correct:[2],explain:"CFD holders do not own the underlying shares and therefore have no voting rights."},{type:"mcq",q:"A trader opens a CFD on 10,000 shares priced at $5.00 with 10% margin. The initial margin required is:",options:["$5,000","$50,000","$500","$1,000"],correct:[0],explain:"Notional = 10,000 × $5.00 = $50,000; initial margin = 10% × 50,000 = $5,000."},{type:"mcq",q:"Continuing the previous trade, the share rises to $5.40 and the trader closes. Ignoring financing and commission, the gross profit is:",options:["$400","$4,000","$40,000","$800"],correct:[1],explain:"Profit = (5.40 − 5.00) × 10,000 = $4,000 — an 80% return on the $5,000 margin, illustrating CFD leverage."},{type:"mcq",q:"Which is NOT a feature or risk of CFDs?",options:["Leverage magnifies both gains and losses","Overnight financing costs accrue on positions held open","The holder receives legal ownership and voting rights in the underlying shares","Gap risk can cause losses exceeding the initial margin"],correct:[2],explain:"CFDs confer no legal ownership or voting rights — that is the false statement. Leverage, financing costs and gap risk are all genuine."},{type:"mrq",q:"Which statements about CFDs are correct?",options:["They are leveraged, marginable products","Prices may be quoted under a market-maker model, as opposed to direct market access","Losses can exceed the initial deposit","They guarantee a fixed return"],correct:[0,1,2],explain:"CFDs are leveraged/marginable, may be market-maker or DMA quoted, and can lose more than the deposit. They do not guarantee a fixed return."}]},{code:"11",name:"Key Product & Investment Risks",questions:[{type:"mcq",q:"An investor posts $2,000 of margin for a position with $20,000 of notional exposure. If the underlying moves adversely by 10%, the loss relative to the margin is:",options:["10%","100% (the entire margin)","1%","50%"],correct:[1],explain:"10× leverage: a 10% adverse move on $20,000 of exposure is a $2,000 loss — 100% of the $2,000 margin."},{type:"mcq",q:"Liquidity risk in a structured product refers to:",options:["The risk that the issuer defaults","The difficulty of selling the product before maturity at a fair price (often only the issuer makes a market)","The risk that the underlying rises","Currency risk"],correct:[1],explain:"Many structured products have thin secondary markets, so exiting before maturity can be difficult or costly."},{type:"mcq",q:"Among the following, which exposes an investor to potentially UNLIMITED loss?",options:["Buying a call option","Buying a put option","Writing a naked call option","Buying a capital-protected note"],correct:[2],explain:"A naked written call has unlimited loss potential; option buyers lose at most the premium, and a capital-protected note protects principal (subject to issuer credit)."},{type:"mcq",q:"The 'market risk' of a derivative refers to:",options:["The risk of the issuer failing","The risk of loss from adverse moves in the underlying's price, interest rates, or volatility","Only the risk of fraud","The risk of the exchange closing"],correct:[1],explain:"Market risk is the risk of loss from adverse movements in market variables such as price, rates, FX and volatility."},{type:"mcq",q:"The risk that an OTC derivative counterparty fails to meet its obligations is best described as:",options:["Market risk","Counterparty / credit risk","Liquidity risk","Operational risk"],correct:[1],explain:"Counterparty / credit risk — the failure of a counterparty to perform, most acute in OTC contracts without central clearing."},{type:"mcq",q:"Leverage in derivatives means that a small adverse move in the underlying can:",options:["Never materially affect the position","Wipe out a large proportion of — or exceed — the margin posted","Only slightly reduce returns","Increase the investor's principal protection"],correct:[1],explain:"Because of leverage, a small adverse move can erase a large share of — or more than — the margin posted. This is the core danger of geared products."},{type:"mcq",q:"Which is LEAST likely to be a risk of a structured product?",options:["Liquidity risk","Issuer credit risk","Guaranteed outperformance of the market","Complexity risk"],correct:[2],explain:"Guaranteed outperformance is not a risk and is never promised; liquidity, issuer-credit and complexity risks are all real."},{type:"mrq",q:"Which statements about derivatives risk are correct?",options:["Writers of naked options can face theoretically unlimited losses","A futures buyer's loss is limited to the premium paid","Daily marking-to-market can trigger margin calls","Gap risk can cause losses beyond a stop-loss level"],correct:[0,2,3],explain:"Naked option writers face unlimited loss, marking-to-market triggers margin calls, and gap risk breaches stop-losses. 'Limited to premium' applies to option buyers, not futures buyers — false."}]}],cases:[{title:"Hedging a portfolio with index futures",scenario:"A fund manager holds a S$8,000,000 equity portfolio with a beta of 1.25. She hedges using index futures; each contract is worth S$200,000. The index subsequently falls 5%.",questions:[{type:"mcq",q:"The approximate number of contracts to SHORT for a full hedge is:",options:["50","40","32","64"],correct:[0],explain:"Contracts = (portfolio value × beta) ÷ contract value = (8,000,000 × 1.25)/200,000 = 50."},{type:"mcq",q:"If the index falls 5%, the unhedged portfolio (beta 1.25) is expected to fall by approximately:",options:["S$500,000","S$400,000","S$250,000","S$640,000"],correct:[0],explain:"Expected fall ≈ beta × market move × value = 1.25 × 5% × 8,000,000 = S$500,000 — largely offset by gains on the short futures."},{type:"mrq",q:"Which statements are correct?",options:["Shorting futures offsets losses if the market falls","The hedge introduces basis risk","A beta of 1.25 means the portfolio is more volatile than the market","The hedge guarantees a profit"],correct:[0,1,2],explain:"Short futures offset a falling market, the hedge carries basis risk, and beta > 1 means above-market volatility. A hedge does not guarantee a profit."}]},{title:"A long straddle before earnings",scenario:"Expecting a large move but unsure of the direction ahead of an earnings release, a trader buys a call (strike $100, premium $4) and a put (strike $100, premium $3) on the same stock — a long straddle.",questions:[{type:"mcq",q:"The upper breakeven price at expiry is:",options:["$107","$103","$104","$100"],correct:[0],explain:"Upper breakeven = strike + total premium = 100 + (4 + 3) = $107."},{type:"mcq",q:"The lower breakeven price at expiry is:",options:["$96","$93","$97","$100"],correct:[1],explain:"Lower breakeven = strike − total premium = 100 − 7 = $93."},{type:"mrq",q:"Which statements are correct?",options:["The strategy profits from a large move in either direction","Maximum loss is the $7 total premium, occurring if the stock finishes at $100","The position benefits from a rise in implied volatility","Maximum loss is unlimited"],correct:[0,1,2],explain:"A long straddle profits from a big move either way, loses at most the $7 premium (if the stock pins the strike), and benefits from rising implied volatility. Its loss is capped, not unlimited."}]},{title:"An equity-linked note (ELN)",scenario:"An investor buys a 3-month equity-linked note on Stock Z with a strike of $20.00 (Z currently trades at $21.00). The ELN offers an 8% p.a. coupon. At maturity: if Z closes at or above $20.00 the investor receives principal plus coupon in cash; if Z closes below $20.00 the investor is delivered shares converted at $20.00.",questions:[{type:"mcq",q:"Economically, the ELN investor is equivalent to someone who is:",options:["Buying a put on Z","Placing a deposit and WRITING a put on Z at the $20 strike","Buying Z outright","Buying a call on Z"],correct:[1],explain:"An ELN equals a deposit plus a short put; the coupon is effectively the put premium the investor earns."},{type:"mcq",q:"The MOST significant risk to the ELN investor is that:",options:["Z rises sharply, so they miss upside beyond the coupon","Z falls well below $20, leaving them holding shares worth less than their principal","Interest rates fall","There is no real risk"],correct:[1],explain:"While the capped upside is a drawback, the key risk is a sharp fall in Z: the investor takes delivery at $20 of shares now worth far less, losing principal."},{type:"mrq",q:"Which statements are correct?",options:["The maximum return is capped at the coupon","The investor takes delivery of shares if Z closes below the strike","The investor bears the issuer's credit risk","The principal is fully protected regardless of Z's performance"],correct:[0,1,2],explain:"Upside is capped at the coupon, shares are delivered if Z closes below the strike, and the issuer's credit risk applies. The principal is NOT protected — it is at risk if Z falls."}]},{title:"An options collar on a shareholding",scenario:"An investor owns 1,000 shares bought at $50.00. To protect against a fall while reducing cost, she buys a put (strike $46.00, premium $1.50) and simultaneously writes a call (strike $56.00, premium $1.20), both on the 1,000 shares.",questions:[{type:"mcq",q:"The NET premium paid to establish the option positions is:",options:["A net cost of $300","A net receipt of $300","A net cost of $2,700","Zero"],correct:[0],explain:"Net premium = pay $1.50 (put) − receive $1.20 (call) = $0.30 per share net cost = $300 on 1,000 shares."},{type:"mcq",q:"The investor's MAXIMUM loss per share at expiry (including the net premium) is closest to:",options:["$4.00","$4.30","$6.00","Unlimited"],correct:[1],explain:"Below the $46 put strike the loss is capped. Max loss/share = (entry $50 − put strike $46) + net premium $0.30 = $4.30."},{type:"mrq",q:"Which statements about this strategy are correct?",options:["Upside is capped at the $56 call strike (the call she wrote)","Downside is protected below the $46 put strike (the put she bought)","This combination is known as a collar","The position carries unlimited downside loss"],correct:[0,1,2],explain:"The written call caps the upside; the bought put floors the downside; the combination is a collar. Downside is limited, not unlimited."}]},{title:"A structured (call) warrant",scenario:"A call warrant on Stock Y: underlying price $20.00, exercise price $18.00, warrant price $0.50, conversion ratio 5 (5 warrants per share), delta 0.40.",questions:[{type:"mcq",q:"The warrant's TIME value is closest to:",options:["$0.40","$0.10","$0.50","$2.00"],correct:[1],explain:"Intrinsic value per warrant = (20 − 18)/5 = $0.40; time value = warrant price − intrinsic = 0.50 − 0.40 = $0.10."},{type:"mcq",q:"The warrant's EFFECTIVE gearing is closest to:",options:["8.0 times","3.2 times","2.5 times","0.40 times"],correct:[1],explain:"Gearing ratio = underlying ÷ (warrant price × conversion ratio) = 20 ÷ (0.50 × 5) = 8.0; effective gearing = 8.0 × delta 0.40 = 3.2×."},{type:"mrq",q:"Which statements are correct?",options:["The warrant has about $0.10 of time value","Its effective gearing is roughly 3.2 times","Time value decays as expiry approaches","The warrant cannot expire worthless"],correct:[0,1,2],explain:"Time value is $0.10, effective gearing ≈ 3.2×, and time value decays toward expiry. The warrant CAN expire worthless if out-of-the-money — so that option is false."}]},{title:"A leveraged CFD trade",scenario:"A trader opens a long CFD on 5,000 shares at $8.00, posting 10% margin. The position is held for 30 days (financing applies) and closed at $8.50.",questions:[{type:"mcq",q:"The INITIAL margin required to open the position is:",options:["$4,000","$40,000","$400","$8,000"],correct:[0],explain:"Notional = 5,000 × $8.00 = $40,000; initial margin = 10% = $4,000."},{type:"mcq",q:"The GROSS profit on closing (ignoring financing and commission) is:",options:["$2,500","$250","$25,000","$500"],correct:[0],explain:"Gross profit = (8.50 − 8.00) × 5,000 = $2,500 (a 62.5% return on the $4,000 margin before costs)."},{type:"mrq",q:"Which statements are correct?",options:["The notional exposure is $40,000","The position is leveraged roughly 10×","Overnight financing costs reduce the net profit","The trader legally owns the shares and can vote them"],correct:[0,1,2],explain:"Notional exposure is $40,000, leverage is ~10× ($40,000 / $4,000), and financing reduces net profit. CFDs confer no ownership or voting rights."}]}]}};// --------------------------------------------------------------------------- helpers

const CH_DATA_M6A={"01":{"notes":[{"t":"h","text":"1.1 Introduction — What Is a Derivative?"},{"t":"def","term":"Derivative","def":"A financial instrument whose value is linked to the value or volatility of an underlying reference or asset. The underlying can be a particular security, an asset, an interest rate, a combination of securities, a basket, an index, or even other derivatives."},{"t":"p","text":"Derivatives and structured products let investors **implement investment views** and design a broader set of investment opportunities. They can be traded on **centralized, regulated exchanges** or between counterparties in the **less-regulated over-the-counter (OTC)** markets."},{"t":"diagram","kind":"flow","title":"How a derivative derives its value","steps":[{"label":"Underlying","sub":"asset / index / rate"},{"label":"Reference link","sub":"value or volatility"},{"label":"Derivative","sub":"value derived from underlying"}]},{"t":"sub","text":"Basic vs Exotic Derivatives"},{"t":"p","text":"**Futures, forwards, swaps, options (and warrants)** are the basic or \"plain-vanilla\" derivatives. By varying features (strike price, tenure, currency, conditions for execution) and combining derivatives, issuers create wider payoff outcomes and risk profiles to attract different investors."},{"t":"def","term":"Exotic / complex derivative","def":"A product created by combining different types of derivatives or adding features to a traditional derivative. Examples: barrier options, knock-in and knock-out products, swaptions, structured notes and structured funds."},{"t":"sub","text":"The Four Core Uses of Derivatives"},{"t":"key","title":"Why investors use derivatives","points":["Hedging — insuring against risk","Speculating — taking a view on the future direction of the market","Arbitraging — exploiting perceived price differentials between two or more markets/assets to make a profit","Repackaging — combining instruments to meet specific needs and create desired synthetic positions"]},{"t":"p","text":"Investors also trade and hedge based on **volatility** — their expectation of the degree of price movement (range-bound, wild swings, or a steady trend). This has driven the creation of **leveraged ETNs and leveraged ETFs**, which use futures and options to replicate (or inversely track) indices, making such funds and notes effectively \"derivative instruments\" even though ETFs/ETNs are not themselves derivatives."},{"t":"h","text":"1.2 The Five Underlying Asset Classes"},{"t":"p","text":"When reduced to building blocks, most derivatives are referenced from **five basic asset classes**: foreign exchange, money market instruments, fixed income, equities and commodities. Indices, baskets, funds or portfolio mixes are extensions of these building blocks."},{"t":"table","headers":["Underlying asset class","Typical derivatives / structured products"],"rows":[["Currency (FX)","Currency swaps, options, futures, forwards of major currencies; Non-deliverable forwards (NDFs); OTC currency options, structured deposits and notes"],["Money Market / Short-term","Treasury futures and options; interest-rate swaps (e.g., LIBOR swaps); OTC structured deposits and notes"],["Fixed Income (Debt)","Bond swaps, bond forwards, bond futures, bond options; warrants; credit default swaps; OTC structured notes"],["Equity","Index futures, options, equity warrants; ETFs and ETNs; OTC equity-linked notes and participation structures"],["Commodities","Futures, forwards, options; ETFs; OTC commodity-linked structured products"]]},{"t":"sub","text":"What derivatives & structured products let investors do (full list)"},{"t":"list","ordered":false,"items":["Hedge / insure against unfavourable price movements in assets held","Adopt a view on direction without investing directly in the underlying","Augment potential profits beyond direct exposure (e.g., options, warrants)","Change the payoff profile (cashflow sequence, size, tenure, currency, risk)","Profit from a fall in value by taking short positions (options, futures)","Secure the right without the obligation to buy/sell using a small outlay (long options, warrants)","Arbitrage price differentials between two or more markets","Change the nature of an asset or liability to meet specific needs","Create synthetic positions without the cost of buying/selling the underlying"]},{"t":"p","text":"Note: a **long** option/warrant secures a right without obligation, but a **short** call/put represents an **obligation** (not a right) if the buyer chooses to exercise."},{"t":"sub","text":"1.2.1 Money Market & Short-term Interest Rate Instruments"},{"t":"p","text":"Short-term debt instruments issued by governments, financial institutions and corporations — **highly liquid and less risky**. They make up **more than 95%** of futures and options traded on global exchanges and, per the BIS, **more than three-quarters** of OTC derivatives trades between 2015–2019."},{"t":"key","title":"Money market facts","points":["Minimum denominations are relatively large; transaction sizes can be substantial","Maturities range 1 day to 1 year (often under 90 days)","Instruments: Treasury bills, commercial papers, bankers' acceptances, negotiable certificates of deposit, repurchase agreements","Institutional investors dominate"]},{"t":"def","term":"LIBOR","def":"London Interbank Offer Rate — an average interbank lending rate calculated from banks' submitted actual borrowing rates. It can be manipulated through collusion (illegal). LIBOR was phased out and ceased in 2021, replaced by SOFR (Secured Overnight Finance Rate) for USD-denominated derivatives and loans."},{"t":"p","text":"Other interbank benchmarks include **SIBOR, HIBOR, TIBOR, EURIBOR**. The FCA announced in July 2017 it would stop asking panel banks to submit LIBOR quotes by end-2021."},{"t":"sub","text":"1.2.2 Foreign Exchange"},{"t":"p","text":"Cash in local/foreign currency is the lowest common denominator for all assets. FX derivatives are the **second-largest** category traded globally. **Currency forwards and futures** are the most basic FX derivatives; swaps and options change the currency/interest payoff given conditional triggers. Trading is dominated by **institutional investors**."},{"t":"def","term":"Non-deliverable forward (NDF)","def":"A forward contract used as a proxy for an emerging-market currency that is not freely convertible and is subject to strong capital controls. NDFs are traded OTC in offshore financial centres and are settled in a foreign currency other than the NDF currency."},{"t":"sub","text":"1.2.3 Fixed Income Securities"},{"t":"p","text":"Borrowings by governments, government-linked entities, financial institutions and large corporations. A debt holder lends the **principal** to the issuer and receives periodic interest, with principal returned at maturity. Fixed-income derivatives (futures, swaps, options) offer alternative cash flows, payoffs and modified risk exposures."},{"t":"p","text":"In the 1980s banks **repackaged debt for resale**: stripping coupon payments of long-term Treasury bonds to create zero-coupon bonds; using real-estate loans for mortgage-backed securities (MBS); and consumer/student loans for collateralised debt obligations (CDOs). Broadly interpreted, CDOs and stripped zero-coupon bonds are \"derived\" from other bonds."},{"t":"def","term":"Credit default swap (CDS)","def":"A credit derivative (and high-risk instrument) used to take on or insure against the risk of loan/bond default. By the late 1990s investment banks repackaged credit risk using CDS and credit insurance. CDS played a central role in the 2008 Global Financial Crisis."},{"t":"p","text":"The credit quality of the underlying asset and the credit-management process determine the risk and value of downstream repackaged products. In the **2008 GFC**, defaults on real-estate mortgages and CDOs triggered the collapse of **Fannie Mae and Freddie Mac**, bailouts, forced capital restructuring and a massive rise in regulatory control and cost."},{"t":"sub","text":"1.2.4 Equities"},{"t":"p","text":"Equities let investors participate in companies' profitability and are **more volatile** than other traditional asset classes. The ability of equity derivatives to **take short positions / grant a right to sell** is especially useful to hedge downside volatility."},{"t":"list","ordered":false,"items":["Equity futures: buy (long) or sell (short) shares for future delivery at an agreed price","Equity (long) call options and warrants: participate in upside with a smaller outlay, augmenting profit while limiting loss to the outlay","Equity (long) put options: allow investors to take short positions","Selling put options (when market is flat): collect premium for higher yield, but risk having to own underperforming shares at a trigger price"]},{"t":"p","text":"Caution from the text: while you can short derivatives generally, **shorting put options is NOT a hedge against downside risk** — it adds downside exposure."},{"t":"sub","text":"1.2.5 Commodities"},{"t":"p","text":"Commodities are the **original asset class** that spurred derivatives. Unlike financial derivatives, much commodity derivative trading comes from **real hedging needs** of agriculture, mining and manufacturing businesses."},{"t":"key","title":"Commodity drivers","points":["Demand/supply set the long-run direction; short term can be driven by USD moves","Supply shocks (e.g., OPEC oil decisions) make commodities volatile","Most commodity futures are denominated in USD — a stronger USD tends to push commodity prices the opposite way (and vice versa)","Safe-haven commodities (gold, silver, platinum) tend to rise during extreme currency/equity shocks"]},{"t":"sub","text":"1.2.6 Trading with Indices"},{"t":"p","text":"Index-linked products (futures, options, ETFs, ETNs) give an alternative, often indirect, exposure to an asset class, market or security. Uses: cost-effective passive exposure, hedging/protecting profits, short-term speculation, augmenting exposure through leverage (typically 2–3x), and speculating on volatility."},{"t":"def","term":"VIX (CBOE Volatility Index)","def":"Measures the market's perceived volatility of the S&P 500 in either direction using the price movement of call and put options. VIX rises when volatility rises and falls when volatility falls. VIX options and futures let investors trade volatility regardless of market direction."},{"t":"p","text":"Leveraged/volatility ETNs and ETFs (e.g., XIV, ZIV, TVIX; SVXY, UVXY) let investors buy or short volatility. These are **extremely risky**: on 5 Feb 2018 the VIX more than doubled in a day, and short-volatility products SVXY and XIV plunged more than 80% in a single day, wiping out billions. The XIV ETN was terminated after a trigger event; ProShares later halved leverage on SVXY/UVXY."},{"t":"h","text":"1.3 Exchange-Traded Derivatives"},{"t":"p","text":"Traded on centralized, regulated exchanges (e.g., **SGX-DT**, **ICE Futures Singapore (IFSG)**). Exchange-traded derivatives are **standardized** products (mainly futures and options) with set conventions: contract size, underlying asset, delivery/expiration dates and delivery arrangements."},{"t":"p","text":"After expiry each contract is settled by **physical delivery** (typically commodity underlyings) or **cash settlement** (typically financial underlyings). Once a trade is executed it is recorded with the exchange's clearing house."},{"t":"def","term":"Clearing house / novation","def":"After a trade, the contract is no longer between the original buyer and seller but between each holder and the clearing house, which acts as central counterparty and guarantor that the trade settles as intended, using pooled initial margins from both sides (this substitution of counterparty is novation)."},{"t":"diagram","kind":"cycle","title":"Exchange trade lifecycle with central clearing","stages":[{"label":"Trade","sub":"buyer & seller match on exchange"},{"label":"
