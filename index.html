Record","sub":"logged with clearing house"},{"label":"Novation","sub":"clearing house becomes counterparty to each side"},{"label":"Margin","sub":"pooled initial margins posted"},{"label":"Settle","sub":"physical delivery or cash"}]},{"t":"h","text":"1.4 Over-the-Counter (OTC) Derivatives"},{"t":"p","text":"OTC derivatives are traded **directly between two parties**, without an exchange. They are seldom terminated or assigned (transferred) before maturity unless both counterparties agree. Main participants: banks, large financial institutions, fund managers and corporations. Historically settled **bilaterally**; before the 2007 credit crisis OTC markets were largely **unregulated**."},{"t":"key","title":"OTC market facts","points":["In 2018, OTC trading was estimated at more than five times the value of exchange-traded derivatives (the chapter summary also cites figures up to eight times larger)","Currency and interest-rate forwards and swaps make up the bulk of OTC volume","CDS are the next-largest OTC product group; up to 2007 CDS grew as credit insurance to enhance bond ratings/pricing","When MBS collapsed, CDS sellers faced huge payout obligations"]},{"t":"diagram","kind":"compare","title":"Exchanges vs OTC Markets","colA":"Exchanges","colB":"OTC Markets","rows":[["Standardised contracts","Non-standardised, customisable contracts"],["Clearing house is central counterparty (matches trades, eliminates credit risk)","Bilateral agreements"],["Margin required as collateral","Master agreement (ISDA); ISDA CSA sometimes used to mitigate risk"],["Transparency","Credit risk between transacting parties"],["Regulated","Largely unregulated (before 2008)"]]},{"t":"sub","text":"1.4.1 Regulation of OTC Derivatives"},{"t":"p","text":"Reviews of the 2008 GFC blamed product proliferation and lack of monitoring/regulation of OTC derivatives — especially credit derivatives sold by investment banks to institutions and cascaded to retail clients. Warren Buffett (2002) famously called derivatives \"**financial weapons of mass destruction**.\""},{"t":"key","title":"G20 reforms (September 2009)","points":["Greater transparency in derivatives trading","Move standardized OTC contracts onto exchanges / electronic trading platforms","Clear through central counterparties (CCPs)","Report to trade repositories","Subject non-centrally cleared contracts to higher capital requirements"]},{"t":"table","headers":["Jurisdiction","Key regulation"],"rows":[["Europe","EMIR (2012) — measure, report, monitor and clear obligations; manage operational and counterparty credit risk for non-cleared OTC trades"],["United Kingdom","Financial Services (Banking Reform) Act (2013) — ring-fence retail/commercial banking from investment banking"],["United States","Dodd-Frank Act (2010) — enhanced CFTC role over swaps; Section 619 \"Volcker Rule\" bans short-term proprietary trading and limits hedge-fund/PE investments"],["Singapore","MAS aligned with G20: more standardization, central clearing, trade-repository reporting, higher capital for non-cleared contracts"]]},{"t":"sub","text":"Singapore (MAS) clearing regime"},{"t":"p","text":"In adopting a clearing regime, MAS considers: (a) level of systemic risk posed by the product; (b) depth and liquidity of the market; and (c) availability of OTC CCPs regulated by MAS as Approved Clearing Houses (ACHs) or Recognised Clearing Houses (RCHs)."},{"t":"key","title":"MAS mandatory clearing (from 1 Oct 2018)","points":["All SGD and USD fixed and floating rate swaps must be cleared through MAS-regulated CCPs","Applies to banks with gross notional outstanding OTC derivatives exceeding S$20 billion (these accounted for ~90% of Singapore OTC contracts by notional)","Banks below the S$20bn threshold for each of the last four calendar quarters are exempt","Intra-group transactions exempt (they do not transfer risk in/out of a group)","Public bodies exempt — central banks, governments, BIS, IMF, World Bank","Interest rate swaps (IRS) make up more than 90% of interest-rate derivative contracts booked in Singapore"]},{"t":"p","text":"Cross-border enforcement is harder when foreign regulators do not require central clearing. The US and Japan have commenced mandatory clearing; the EU has a regime in place but not yet commenced (as stated in the text)."},{"t":"sub","text":"1.4.2 MiFID II"},{"t":"p","text":"**Markets in Financial Instruments Directive II (MiFID II)** governs EU capital markets. It applies to EU-domiciled banks and their branches, and to banks dealing with EU investors. Singapore branches of EU institutions must meet MiFID II; local firms aren't bound but are often asked to support EU counterparties' reporting (e.g., T+1 / within-15-minutes transparency, client classification, KYC/KYP, suitability statements, conflict-of-interest disclosure)."},{"t":"h","text":"1.5 Structured Products"},{"t":"def","term":"Structured product","def":"A product made up of a combination of one or more derivatives and an underlying investment (single security, basket, or index). Sold as structured deposits, notes or funds to optimize yield or to participate in the movement of the underlying. They are often OTC products."},{"t":"p","text":"In exchange for better-than-market returns, investors bear the risk of having to convert to / own securities if the underlying reaches (or stays above/below) a trigger price. Structures often require the investor to **sell put options** to the counterparty, which can accumulate more of the underlying as it falls. Many also involve **leverage** that augments returns or losses."},{"t":"h","text":"1.6 The Singapore Derivatives Market"},{"t":"p","text":"Singapore has a vibrant, growing derivatives market and is a major Asian hub. **SGX-DT** is a Pan-Asian derivatives exchange — the **world's most liquid offshore market** for the benchmark equity indices of **China, India, Japan and Taiwan** — and the leading commodities exchange for **iron ore and rubber**. It offers Eurodollar, Euroyen, JGB and stock-index futures, interest-rate futures/swaps (SGD, USD, JPY), and intra/inter-commodity and inter-market arbitrage services."},{"t":"key","title":"Singapore market highlights","points":["Leading FX hub in Asia and 3rd largest in the world (after New York and London)","Strong FX derivatives business; lags other asset classes vs New York and London","New exchanges added breadth: ICE Futures Singapore and Asia Pacific Exchange","Oct 2020 SFEMC survey: average daily OTC FX derivatives turnover US$91 billion (FX swaps + options), down due to the COVID-19 downturn"]},{"t":"h","text":"1.7 Summary"},{"t":"list","ordered":true,"items":["A derivative's value is linked to the value/volatility of an underlying; traded on exchanges or OTC.","Money-market/short-term interest-rate instruments make up the bulk of global derivatives trading; FX is second largest.","NDFs are proxies for capital-controlled emerging-market currencies.","CDS are high-risk instruments used to take on loan-default risk.","Equity and commodity derivatives' ability to short is useful for hedging downside volatility.","Most commodity futures are USD-denominated; a stronger USD tends to push commodity prices down.","Exchange-traded derivatives are standardized and cleared; OTC are bilateral and were largely unregulated pre-2008.","G20 (2009) reforms pushed transparency, central clearing, trade reporting and higher capital for non-cleared trades.","Singapore is Asia's leading FX hub and a major OTC derivatives centre."]}],"newQuestions":[{"type":"mcq","q":"Which statement BEST defines a derivative as described in this chapter?","options":["A security that always pays a fixed coupon","A financial instrument whose value is linked to the value or volatility of an underlying reference or asset","An equity that grants ownership in a company","A deposit guaranteed by a central counterparty"],"correct":[1],"explain":"The chapter defines a derivative as an instrument whose value is linked to the value or volatility of an underlying reference or asset. The others describe bonds, equities and deposits."},{"type":"mcq","q":"Which of the following is NOT one of the four core uses of derivatives stated in the chapter?","options":["Hedging","Speculating","Arbitraging","Guaranteeing a risk-free return"],"correct":[3],"explain":"The four uses are hedging, speculating, arbitraging and repackaging. Derivatives do not guarantee a risk-free return."},{"type":"mcq","q":"The five basic underlying asset classes for derivatives are foreign exchange, money market instruments, fixed income, equities and:","options":["Real estate","Commodities","Cryptocurrencies","Insurance contracts"],"correct":[1],"explain":"The chapter lists commodities as the fifth class. Real estate, crypto and insurance are not among the five building-block asset classes."},{"type":"mcq","q":"According to the chapter, which asset class makes up the BULK of futures and options traded on global exchanges (more than 95%)?","options":["Equities","Commodities","Money market / short-term interest-rate instruments","Foreign exchange"],"correct":[2],"explain":"Money-market and short-term interest-rate instruments make up more than 95% of exchange-traded futures and options and over three-quarters of OTC trades (2015-2019). FX is only the second largest category."},{"type":"mcq","q":"What instrument is used as a proxy to hedge emerging-market currencies that are not freely convertible and subject to strong capital controls?","options":["Currency swap","Non-deliverable forward (NDF)","Bond future","Structured deposit"],"correct":[1],"explain":"NDFs are traded OTC offshore as proxies for capital-controlled currencies and are settled in a currency other than the NDF currency."},{"type":"mcq","q":"LIBOR ceased to be used in 2021 and was replaced for USD-denominated derivatives and loans by:","options":["EURIBOR","SIBOR","SOFR (Secured Overnight Finance Rate)","HIBOR"],"correct":[2],"explain":"The chapter states LIBOR was replaced by SOFR. SIBOR, HIBOR and EURIBOR are other interbank benchmarks, not the USD replacement."},{"type":"mcq","q":"In exchange-traded derivatives, after a trade is executed the resulting contract is ultimately between:","options":["The original buyer and the original seller","Two banks acting as brokers","The holders at expiry and the clearing house","The exchange and the regulator"],"correct":[2],"explain":"Through novation, the clearing house becomes the central counterparty, so contracts are between the holders at expiry and the clearing house, which guarantees settlement using pooled margins."},{"type":"mcq","q":"Which is a characteristic of OTC derivatives rather than exchange-traded derivatives?","options":["Standardised contract specifications","Daily margin posted to a clearing house","Customisable bilateral contracts governed by an ISDA master agreement","Mandatory exchange transparency"],"correct":[2],"explain":"OTC derivatives are non-standardised, customisable, bilateral contracts under an ISDA master agreement. Standardisation, margining and transparency describe exchanges."},{"type":"mcq","q":"By convention, most commodity futures are denominated in USD. When the USD APPRECIATES against other major currencies, commodity prices tend to:","options":["Rise in the same direction","Move in the opposite direction (fall)","Stay unchanged","Become risk-free"],"correct":[1],"explain":"The chapter states a stronger USD tends to push commodity prices in the opposite direction (and vice versa)."},{"type":"mcq","q":"The CBOE VIX measures the market's perceived volatility of which index, using the price movement of call and put options?","options":["The Nikkei 225","The S&P 500","The FTSE 100","The Hang Seng Index"],"correct":[1],"explain":"The VIX measures perceived volatility of the S&P 500 in either direction. VIX options and futures let investors trade volatility regardless of market direction."},{"type":"mcq","q":"Under MAS rules effective 1 October 2018, banks must clear SGD and USD fixed and floating rate swaps through MAS-regulated CCPs if their gross notional outstanding OTC derivatives exceed:","options":["S$5 billion","S$10 billion","S$20 billion","S$50 billion"],"correct":[2],"explain":"The threshold is S$20 billion gross notional outstanding; such banks accounted for about 90% of Singapore OTC contracts by notional. Banks below this for the last four quarters are exempt."},{"type":"mcq","q":"Which entities did MAS EXEMPT from the mandatory OTC clearing obligation?","options":["All local banks regardless of size","Intra-group transactions and public bodies such as central banks, the BIS, IMF and World Bank","Foreign hedge funds only","All interest rate swaps"],"correct":[1],"explain":"MAS exempted intra-group transactions (no risk transferred in/out of a group) and public bodies including central banks, governments, BIS, IMF and World Bank."},{"type":"mcq","q":"Section 619 of the US Dodd-Frank Act, which restricts short-term proprietary trading by banks, is commonly known as the:","options":["Glass-Steagall Rule","Volcker Rule","Basel Rule","Bailey Rule"],"correct":[1],"explain":"Section 619 is the Volcker Rule, prohibiting insured depository institutions from short-term proprietary trading (subject to exemptions) and limiting hedge-fund/PE investments."},{"type":"mcq","q":"For exchange-traded derivatives, cash settlement (rather than physical delivery) is TYPICALLY used for which type of underlying?","options":["Agricultural commodities","Precious metals","Financial underlying assets","Crude oil"],"correct":[2],"explain":"The summary states settlement is by physical delivery typically for commodity underlyings and by cash settlement typically for financial underlyings."},{"type":"mcq","q":"Singapore is described as the leading foreign-exchange hub for Asia and which rank globally?","options":["The largest in the world","Second largest after London","Third largest after New York and London","Fifth largest"],"correct":[2],"explain":"Singapore is the leading FX hub in Asia and the third largest in the world, after New York and London. It lags other asset classes versus those two centres."},{"type":"mcq","q":"Which statement about shorting put options is correct per the chapter's footnote/caution?","options":["Shorting put options is an effective hedge against downside risk","Shorting put options is NOT a hedge against downside risk","Shorting puts removes all market exposure","Shorting puts is identical to buying puts"],"correct":[1],"explain":"The chapter explicitly cautions that while you can short derivatives generally, shorting put options is NOT a hedge against downside risk; it actually adds downside exposure (and obligation to own shares at the trigger)."},{"type":"mrq","q":"Select all that apply: Which of the following are characteristics of EXCHANGE-TRADED derivatives?","options":["Standardised contracts","Bilateral, customisable contracts","Margin required as collateral with a clearing house","Largely unregulated before 2008"],"correct":[0,2],"explain":"Exchange-traded derivatives are standardised and require margin posted to a clearing house. Bilateral/customisable and largely unregulated describe OTC markets."},{"type":"mrq","q":"Select all that apply: Which were elements of the G20 (September 2009) reforms for OTC derivatives?","options":["Move standardized OTC contracts onto exchanges or electronic platforms","Clear through central counterparties","Report to trade repositories","Eliminate all capital requirements for non-cleared contracts"],"correct":[0,1,2],"explain":"The G20 reforms pushed exchange/platform trading, central clearing and trade-repository reporting. They imposed HIGHER (not eliminated) capital requirements on non-centrally cleared contracts."},{"type":"mrq","q":"Select all that apply: Which are examples of complex or 'exotic' derivatives mentioned in the chapter?","options":["Barrier options","Plain-vanilla currency forwards","Swaptions","Knock-in / knock-out products"],"correct":[0,2,3],"explain":"Exotics include barrier options, swaptions, knock-in/knock-out products, structured notes and structured funds. A plain-vanilla currency forward is a basic derivative, not exotic."},{"type":"mrq","q":"Select all that apply: Which statements about the Singapore derivatives market (SGX-DT) are correct?","options":["It is the world's most liquid offshore market for benchmark equity indices of China, India, Japan and Taiwan","It is the leading commodities exchange for iron ore and rubber","It is larger than New York and London across all asset classes","ICE Futures Singapore and Asia Pacific Exchange added breadth to the market"],"correct":[0,1,3],"explain":"SGX-DT leads in those offshore equity indices and in iron ore/rubber, and new exchanges added breadth. However, Singapore LAGS New York and London in other asset classes, so it is not larger across all classes."}]},"02":{"notes":[{"t":"h","text":"2.1 Introduction: Futures and Forwards"},{"t":"p","text":"**Futures** are standardised contracts for the purchase and sale of financial instruments or physical commodities on a regulated **futures exchange**, with the price determined now for delivery in the future. Futures evolved from private, non-homogeneous **forward contracts** transacted over-the-counter (OTC). As contracts of standard quality, size and delivery time became popular, terms were standardised; and to secure a creditworthy counterparty, **margin requirements** were introduced and the futures exchange was born."},{"t":"def","term":"Futures exchange","def":"A marketplace for standardised financial and commodity derivatives, where the buying and selling of underlying products are contracted for future delivery."},{"t":"p","text":"The world's largest and most diverse derivatives exchange is the **Chicago Mercantile Exchange (CME)** (formed from the merger of CME and CBOT), handling about 3 billion contracts (~USD 1 quadrillion) annually. The second largest is the **Intercontinental Exchange (ICE)**, which is the clearing house for credit default swaps and acquired the Singapore Mercantile Exchange to create **ICE Futures Singapore (IFSG)**. In Asia, **SGX** operates the largest derivatives market, benefitting from Singapore's position as Asia's largest FX centre. The largest European exchange is **Eurex** (Deutsche Borse)."},{"t":"sub","text":"2.1.1 Futures versus Forwards"},{"t":"p","text":"Forward contracts were the predecessor of futures. Forwards are **bilaterally negotiated** and **customised**, are not standardised, are typically **not marked-to-market**, have no interim partial settlement, are traded OTC with no guaranteed secondary market, and expose investors to **counterparty risk** (unless centrally cleared). Forwards suit players needing customised solutions (e.g. an exotic currency or a non-standard delivery period)."},{"t":"diagram","kind":"compare","title":"Futures vs Forwards","colA":"Futures","colB":"Forwards","rows":[["Exchange-traded","OTC / bilateral"],["Standardised (quality, quantity, delivery)","Customised / negotiated"],["Counterparty is the exchange (low counterparty risk)","Counterparty is the other party (higher risk unless cleared)"],["Daily mark-to-market with margin top-ups","Usually no mark-to-market; no interim settlement"],["Usually offset (closed out) before maturity","Settled at maturity (physical or cash)"],["Active secondary market","No guaranteed secondary market"]]},{"t":"sub","text":"2.1.2 Economic Importance of the Futures Market"},{"t":"key","title":"Three economic roles","points":["**Price discovery** – buyers and sellers continually set prices for future delivery as they absorb new information; the futures price signals market sentiment.","**Risk management** – transparent prices let consumers, producers and investors hedge and lock in costs/prices.","**Augmenting volatility** – leverage and shorting via futures can intensify downward pressure on spot markets in times of distress, sometimes prompting government intervention."]},{"t":"h","text":"2.2 General Features of Futures Contracts"},{"t":"list","ordered":false,"items":["Standardised contracts for purchase/sale of financial instruments or commodities on a regulated exchange for future delivery.","Price is driven directly by the price and value of the underlying, set by demand/supply and market expectations.","Finite lifespan ending on the **expiration date** — market direction and time horizon matter.","Carry a **notional value** (monetary value on conversion); unlike out-of-the-money options that expire worthless, futures have a notional value at expiry.","**Lower counterparty risk** — the counterparty is the exchange backed by margin.","**Leverage** — only an initial margin (a fraction of contract value) is needed, amplifying gains and losses.","**Marked-to-market** each trading day; any margin shortfall must be covered.","Usually **squared off (closed out)** with the exchange rather than taking delivery."]},{"t":"sub","text":"2.2.1 Notional Value"},{"t":"formula","name":"Notional value of a futures contract","expr":"Notional value = Futures contract price × Multiplier (contract size)","where":["Multiplier varies by contract","E-mini S&P 500 multiplier = 50x","E-mini NASDAQ 100 multiplier = 20x","FTSE China A50 multiplier = 1x"]},{"t":"p","text":"Example: E-mini S&P 500 bought at 2,361.25 with multiplier 50 → notional = USD 50 × 2,361.25 = **USD 118,062.50**. The EUR/USD futures unit is EUR 125,000."},{"t":"sub","text":"2.2.2 Leverage and Margining"},{"t":"def","term":"Initial margin","def":"The small up-front deposit required to initiate (open) a futures position — the investor does not pay the full contract value."},{"t":"def","term":"Maintenance margin","def":"The minimum balance that must be kept on deposit with the broker at all times. While net equity stays above it, no top-up is required even if the market moves against the position."},{"t":"def","term":"Additional margin (variation margin)","def":"Funds required when daily mark-to-market causes the account to fall below the maintenance level. The account must be restored to the initial margin level immediately or within a stipulated time (a margin call)."},{"t":"p","text":"Worked example (SGX Nikkei 225, JPY 500 per index point). At index 22,500 the contract is worth JPY 11,250,000. Initial margin at 6.5% = **JPY 731,250**; maintenance margin at 5% = **JPY 562,500**. If the index rallies 7% to 24,075, the contract is worth JPY 12,037,500 — a JPY 787,500 profit (over 100% on the margin posted). If the index falls 160 points to 22,340, the contract is worth JPY 11,170,000 — a JPY 80,000 loss; the margin balance falls to JPY 651,250, still above maintenance, so no margin call."},{"t":"diagram","kind":"cycle","title":"Daily mark-to-market / margin process","stages":[{"label":"Open position","sub":"post initial margin"},{"label":"Mark-to-market","sub":"end of day vs settlement price"},{"label":"Credit / debit","sub":"P/L to margin account"},{"label":"Check vs maintenance","sub":"balance ≥ minimum?"},{"label":"Margin call","sub":"top up to initial level if below"}]},{"t":"sub","text":"2.2.3 Contract Specifications and Term Sheets"},{"t":"def","term":"Contract specification","def":"A non-binding statement of the basic terms and conditions of a futures contract — underlying asset and size, contract value, tick size, trading hours, price limits, last trading day, settlement basis, final settlement price, mark-to-market and margin call procedures."},{"t":"table","headers":["Term","Meaning"],"rows":[["Contract standardisation","Fixed currency and size as a function of the underlying (e.g. E-mini S&P 500 = USD 50 × index)."],["Contract value","Contract size × current price (e.g. USD 50 × 1,850 = USD 92,500)."],["Tick size","Smallest price increment; varies by contract (E-mini S&P 500 tick = ¼ point = USD 12.50)."],["Price limits","Maximum daily move from prior settlement; may be widened after a limit move."],["Mark-to-market","Daily settlement price set; accounts credited/debited daily as a safety measure."],["Margin call","Demand to add funds or cut positions when the account no longer meets the margin requirement."]]},{"t":"h","text":"2.3 Types of Futures"},{"t":"list","ordered":false,"items":["**Commodity futures** — agriculture, energy and metals.","**Financial futures** — equity, interest rates and foreign exchange.","**Others / exotics** — e.g. weather, freight, real estate."]},{"t":"sub","text":"2.3.1 Interest Rate Futures"},{"t":"p","text":"Used to hedge or speculate on interest rate moves across the yield curve. **Short-term** examples include US Treasury bill, Eurodollar and Euroyen futures; **long-term** examples include US Treasury (2/5/10/30-year) and the SGX Mini-JGB futures."},{"t":"formula","name":"Price of a short-term interest rate futures contract","expr":"P = 100 × (1 − R)","where":["P = futures price (index)","R = annualised interest rate for the period","Example: R = 3.50% → P = 100 × (1 − 0.035) = 96.50"]},{"t":"p","text":"Bond futures move inversely to interest rates: when rates rise, futures prices fall, so a fixed-income manager **sells** bond futures to protect a portfolio. Mini-JGB example: each contract = JPY 100,000 × price. Selling 100 contracts at 150.57 and buying back at 150.15 gives 100 × JPY 100,000 × (150.57 − 150.15) = **JPY 4,200,000** profit."},{"t":"sub","text":"2.3.2 Currency Futures and Interest Rate Parity"},{"t":"p","text":"**Currency futures** are contracts to buy/sell a set amount of one currency against another at a fixed price and future date; first introduced on the CME in 1972. SGX offers Asian-currency-vs-USD and cross-pair contracts plus NDF-linked contracts (CNY, IDR, TWD, INR, KRW, MYR, PHP)."},{"t":"def","term":"Interest rate parity (IRP)","def":"The forward/futures premium or discount between two currencies should equal the difference in their domestic interest rates for the same maturity. If violated, arbitrageurs make risk-free profits and push spot/futures rates back into alignment."},{"t":"formula","name":"Interest rate parity (forward FX rate)","expr":"F = S × [1 + Rc(n/360)] ÷ [1 + Rb(n/360)]","where":["F = forward (futures) rate","S = spot rate","Rb = annualised rate of base currency","Rc = annualised rate of counter currency","n = number of days"]},{"t":"sub","text":"2.3.3 Equity Index Futures"},{"t":"p","text":"Equity index futures replicate the performance of an underlying index, letting investors gain or reduce broad market exposure cheaply without altering the underlying portfolio. They are cash-settled, marked-to-market daily, leveraged, need no share borrowing, have **no uptick rule** for shorting, and pay **no dividends**."},{"t":"formula","name":"Fair value of an equity index future (cost of carry with income)","expr":"F = S × [1 + r(t/360)] − D","where":["F = fair value of the future","S = spot / index price","r = annualised financing rate (e.g. LIBOR/SIBOR)","t = time to expiry in days","D = dividends paid before expiry"]},{"t":"p","text":"In general form, the cost-of-carry fair price is **F = S × (1 + (r − q) × t)**, where q is the income (dividend) yield. Fair value is normally **positive (F > S)** because financing costs usually exceed dividend yields — though loose post-2008 monetary policy has sometimes reversed this. Mispricing invites index arbitrage (buy the basket, sell the future, or vice versa)."},{"t":"formula","name":"Cost-of-carry futures price (general)","expr":"F = S × (1 + (r − q) × t)","where":["F = futures price","S = spot price","r = financing / risk-free rate","q = income (dividend) yield","t = time in years"]},{"t":"sub","text":"2.3.4 Single Stock Futures (SSF)"},{"t":"p","text":"An **SSF** tracks the price of one underlying stock; on SGX they are cash-settled with no physical delivery and no shareholder privileges. They are leveraged (amplifying gains and losses), cheaper than buying the stock, ease short selling and reduce currency exposure for offshore investors — but can fuel destabilising short selling."},{"t":"sub","text":"2.3.5 Commodity Futures"},{"t":"p","text":"Commodity futures give one of the purest forms of exposure to a commodity short of holding the physical (which raises storage, security and spoilage issues). **Gold and precious metals** are safe-haven assets that rise during financial/political uncertainty and fall when interest rates rise (they pay no yield). Other categories: base/ferrous metals, crude oil, energy (natural gas, coal, electricity) and agriculture. Gold on CME/ICE is quoted in 100-troy-ounce contracts."},{"t":"h","text":"2.4 Settlement, Clearing and Orders on SGX"},{"t":"sub","text":"2.4.1 Modes of Settlement"},{"t":"list","ordered":true,"items":["**Delivery / hold to expiry** — buyer takes delivery (physical for commodities, cash for most financials) at the agreed price.","**Offset position** — close out by taking the opposite trade in the same contract (most common for financial futures).","**Roll position** — close the expiring contract and open the next month to retain market exposure."]},{"t":"def","term":"Clearing","def":"The process where positions on Clearing Members' books are margined and marked to the latest market prices. At day's end all outstanding positions are marked to their daily closing prices."},{"t":"p","text":"**SGX-DC** (Singapore Exchange Derivatives Clearing) clears SGX-DT products plus OTC commodity and financial derivatives, and runs **three intra-day margin cycles** daily. The **Mutual Offset System (MOS)** with the CME (since 1984) lets participants open a position on one exchange for allocation to the other in real time (e.g. Nikkei 225, USD Nikkei 225, FTSE Emerging, FTSE China H50)."},{"t":"h","text":"2.5 Futures Pricing Model"},{"t":"def","term":"Spot price","def":"The current market price of the underlying asset or commodity."},{"t":"def","term":"Cost of carry","def":"All financial costs (financing/interest) and economic costs (opportunity costs, plus storage, insurance, transport for commodities) of holding the underlying, less returns received (e.g. dividends)."},{"t":"formula","name":"Cost of carry model","expr":"F(0,t) = S0 × (1 + C(0,t))","where":["F(0,t) = futures price","S0 = spot price","C(0,t) = percentage cost to carry/store to time t","Fair futures price = spot price + net cost of carry"]},{"t":"p","text":"Assumptions of the model: contract held to maturity; no transaction costs or margins; no short-selling restrictions; borrow and lend at the same rate; arbitrage removes mispricing."},{"t":"sub","text":"2.5.3 Cash-and-Carry Arbitrage"},{"t":"table","headers":["Market","Cash & Carry (Futures > fair value)","Reverse Cash & Carry (Futures < fair value)"],"rows":[["Debt","Borrow funds; repay with interest","Lend short-sale proceeds; pay any borrow cost"],["Physical","Buy and store the asset; deliver against future","Borrow and short-sell the asset; return it later"],["Futures","Sell futures","Buy futures and accept delivery"]]},{"t":"p","text":"Gold example: spot USD 1,275/oz, 1-year loan 2.25% → fair value = 1,275 × 1.0225 = **USD 1,303.69**. A 1-year future at USD 1,305 is above fair value, so the cash-and-carry trade (buy spot, sell futures) earns a tiny ~0.1% profit. Arbitrage windows now last only milliseconds due to computerised trading."},{"t":"sub","text":"2.5.4 Expectancy Model"},{"t":"p","text":"The **expectancy model** says the futures price equals the expected spot price at expiry; what matters is the relationship between the expected future spot and the futures price, not between current cash and futures prices."},{"t":"h","text":"2.6 Basis in Futures Contracts"},{"t":"def","term":"Basis","def":"The difference between the futures price and the spot price. In hedging it is often defined as: Basis = Spot price of asset to be hedged − Futures price of contract used."},{"t":"p","text":"As expiry approaches, the futures price and spot price **converge** (basis → 0), because the contract settles at the cash price on expiry. If the hedged asset and underlying are identical, basis is zero at expiry; before expiry it may be positive or negative. Mismatches between the hedged asset and the contract create **basis risk**."},{"t":"key","title":"Factors affecting basis","points":["Cost / return of carry (greater net carry → greater basis)","Time to maturity (basis narrows toward zero near expiry — convergence)","Yield curve changes","Relative liquidity of cash vs futures markets","Market rates vs administered rates","Expectations of market participants","Coupon differences between fixed-income instruments"]},{"t":"sub","text":"2.6.2 Contango and Backwardation"},{"t":"def","term":"Contango","def":"Futures price is higher than spot (upward-sloping curve), usually in stable/bullish conditions due to carrying costs; the futures delivery price falls over time to converge to spot at expiry. Basis is typically negative when defined as spot minus futures."},{"t":"def","term":"Backwardation","def":"Futures price is lower than spot (inverted curve), often during bearish/stressed conditions or near-term supply shortage; the futures delivery price rises over time to meet spot. Rolling positions then earns a positive roll yield."},{"t":"h","text":"2.7 Swaps"},{"t":"def","term":"Swap","def":"A customised OTC agreement between two counterparties (usually financial institutions) to exchange series of cash flows. Most swaps trade OTC; some standardised swaps trade on exchanges."},{"t":"list","ordered":false,"items":["Interest rate swaps (plain-vanilla)","Foreign exchange swaps","Currency swaps","Equity swaps","Credit default swaps (CDS)"]},{"t":"sub","text":"2.7.1 Interest Rate Swaps (IRS)"},{"t":"p","text":"An **IRS** is an agreement on a notional principal, term and payment frequency where one party pays a **fixed** rate and receives a **floating** rate (or vice versa) on the same notional. Only the net difference is settled — the principal is never exchanged. A **plain-vanilla swap** has no extra features. The fixed rate (the **swap rate**) is set so it equals the floating rate implied by the forward LIBOR curve; quoted over the equivalent government yield it is the **swap spread**."},{"t":"diagram","kind":"flow","title":"Plain-vanilla interest rate swap (Bank A's view)","steps":[{"label":"Bank A","sub":"pays fixed 5%"},{"label":"Swap","sub":"net settled each period"},{"label":"Bank B","sub":"pays 6m LIBOR floating"}]},{"t":"p","text":"Example: USD 100m notional, A pays 5% fixed, B pays 6-month LIBOR, semi-annual for 3 years. Fixed leg is always 0.5 × 5% × 100m = **USD 2.5m**. If the relevant 6-month LIBOR was 4.2%, the floating leg = 0.5 × 4.2% × 100m = **USD 2.1m**, so A pays B a net USD 0.4m that period. Floating payments use the LIBOR set 6 months before each payment date."},{"t":"sub","text":"2.7.2 Foreign Exchange Swaps"},{"t":"p","text":"A **foreign exchange swap** has two legs: buy/sell a currency pair at the **spot** rate today and reverse it (sell/buy the same amount) at a later date at an agreed **forward** rate. Example: hold EUR 5m, need USD in 6 months — sell EUR 5m spot and agree to buy it back in 6 months at the forward rate, locking in the rate."},{"t":"sub","text":"2.7.3 Currency Swaps"},{"t":"p","text":"A **currency swap** exchanges a series of payments in one currency for payments in another — essentially the **interest and principal** of a loan in one currency for an equal loan in another. Example: a Singapore bank servicing a US bank's SGD debt while the US bank services the Singapore bank's USD debt, on agreed rates, amounts and maturity."},{"t":"diagram","kind":"compare","title":"FX swap vs Currency swap","colA":"FX swap","colB":"Currency swap","rows":[["Two legs: spot now, reverse forward later","Series of periodic payments"],["Exchange of interest implicit in forward points","Exchanges interest and principal"],["Short-dated, no periodic interest legs","Longer-dated loan-like structure"]]},{"t":"sub","text":"2.7.4–2.7.5 Commodity and Equity Swaps"},{"t":"p","text":"A **commodity swap** exchanges the floating market price of a commodity for a fixed price over a period. An **equity swap** exchanges cash flows where at least one leg is an equity (or equity index) return, e.g. an index return leg vs (LIBOR + x%) or vs a fixed rate. They let a fund partially hedge index exposure without selling holdings."},{"t":"sub","text":"2.7.6 Credit Default Swaps (CDS)"},{"t":"def","term":"Credit default swap (CDS)","def":"Insurance against the credit risk of a reference entity. The protection seller compensates the buyer if the reference asset (bond/loan) defaults; in exchange the buyer pays a regular fee/spread. The total face value that can be sold is the notional principal."},{"t":"diagram","kind":"flow","title":"Credit default swap cash flows","steps":[{"label":"Protection buyer","sub":"pays spread (bps p.a.)"},{"label":"Protection seller (CDS issuer)","sub":"pays out on a credit event"},{"label":"Reference asset","sub":"bond/loan of reference entity"}]},{"t":"p","text":"Example: 3-year protection on a USD 20m bond at 160 bps → quarterly = 40 bps = (40/10,000) × 20m = **USD 80,000** per quarter (USD 320,000 p.a.). A CDS resembles a **put option** on a bond. **Naked CDS** (betting without owning the asset) are speculative; excessive issuance contributed to AIG's collapse in the GFC."},{"t":"def","term":"CDS spread","def":"The premium the buyer pays the issuer, quoted in basis points per annum of the notional and usually paid quarterly. It is a direct premium on the reference asset (no benchmark/risk-free reference) and widens as credit risk rises."},{"t":"list","ordered":false,"items":["**Credit events:** bankruptcy, failure to pay, debt restructuring (adverse), repudiation, moratorium, obligation acceleration, obligation default.","**Cash settlement:** seller pays buyer the difference between notional (face value) and the defaulted asset's final value.","**Physical settlement:** buyer sells the defaulted bonds to the seller at face value."]}],"newQuestions":[{"type":"mcq","q":"Which feature is characteristic of a FORWARD contract rather than a futures contract?","options":["Daily mark-to-market with margin top-ups","Standardised contract size and delivery terms","Bilaterally negotiated, customised terms traded OTC","Exchange acts as counterparty to both sides"],"correct":[2],"explain":"Forwards are customised, bilaterally negotiated and OTC. Daily MTM, standardisation and the exchange-as-counterparty are all features of futures."},{"type":"mcq","q":"An investor buys one E-mini S&P 500 futures contract at 2,361.25. The multiplier is 50. What is the notional value?","options":["USD 47,225.00","USD 118,062.50","USD 2,361.25","USD 108,585.00"],"correct":[1],"explain":"Notional = price × multiplier = 2,361.25 × 50 = USD 118,062.50. USD 108,585 is the NASDAQ example (20x)."},{"type":"mcq","q":"Using the cost-of-carry model F = S × (1 + (r − q) × t), find the 1-year fair futures price for an index at 2,000 with financing rate r = 5% and dividend yield q = 2%.","options":["2,140","2,060","2,100","2,000"],"correct":[1],"explain":"F = 2,000 × (1 + (0.05 − 0.02) × 1) = 2,000 × 1.03 = 2,060. Using r alone (2,100) ignores the dividend income; adding both (2,140) is the trap."},{"type":"mcq","q":"A short-term interest rate futures contract is priced as P = 100 × (1 − R). If the annualised rate R is 2.75%, the price is:","options":["102.75","97.25","2.75","72.50"],"correct":[1],"explain":"P = 100 × (1 − 0.0275) = 97.25. The price falls as the rate rises."},{"type":"mcq","q":"For the SGX Nikkei 225 contract (JPY 500 per point) at index 22,500, initial margin is 6.5%. The required initial margin is:","options":["JPY 562,500","JPY 731,250","JPY 11,250,000","JPY 1,125,000"],"correct":[1],"explain":"Contract value = 500 × 22,500 = JPY 11,250,000; 6.5% × 11,250,000 = JPY 731,250. JPY 562,500 is the 5% maintenance margin."},{"type":"mcq","q":"A trader sells 100 Mini-JGB futures (JPY 100,000 × price) at 150.57 and buys them back at 150.15. The profit is:","options":["JPY 420,000","JPY 4,200,000","JPY 42,000,000","JPY 4,200"],"correct":[1],"explain":"100 × JPY 100,000 × (150.57 − 150.15) = 100 × 100,000 × 0.42 = JPY 4,200,000. A short profits when price falls."},{"type":"mcq","q":"In a plain-vanilla interest rate swap on USD 100m, semi-annual, Party A pays 5% fixed and receives 6-month LIBOR. If the relevant LIBOR is 4.2%, what is A's NET cash flow that period?","options":["A receives USD 0.4m","A pays USD 0.4m","A pays USD 2.5m","No payment; principal is exchanged"],"correct":[1],"explain":"Fixed = 0.5 × 5% × 100m = 2.5m; floating = 0.5 × 4.2% × 100m = 2.1m. A pays net 2.5 − 2.1 = USD 0.4m. Principal is never exchanged."},{"type":"mcq","q":"Gold spot is USD 1,275/oz and the 1-year loan rate is 2.25%. The theoretical fair 1-year futures price (F = S(1 + C)) is approximately:","options":["USD 1,247.31","USD 1,303.69","USD 1,275.00","USD 1,305.00"],"correct":[1],"explain":"F = 1,275 × (1 + 0.0225) = USD 1,303.69. USD 1,305 is the market price used to test for arbitrage, not the fair value."},{"type":"mcq","q":"Following the gold example, if the actual 1-year futures price is USD 1,305 while fair value is USD 1,303.69, the correct arbitrage is:","options":["Reverse cash-and-carry: buy futures, short spot","Cash-and-carry: buy spot, sell futures","Do nothing; no mispricing exists","Buy both spot and futures"],"correct":[1],"explain":"Futures (1,305) exceed fair value (1,303.69), so cash-and-carry applies: borrow, buy and store spot, and sell the overpriced futures."},{"type":"mcq","q":"As a futures contract approaches expiry, the basis (futures minus spot) for an identical underlying:","options":["Widens steadily","Converges toward zero","Becomes increasingly negative","Stays constant"],"correct":[1],"explain":"Because the contract settles at the cash price on expiry, futures and spot converge and the basis approaches zero — known as convergence."},{"type":"mcq","q":"A market is in CONTANGO when:","options":["The futures price is below the spot price","The futures curve is inverted","The futures price is above the spot price (upward-sloping)","The basis is exactly zero before expiry"],"correct":[2],"explain":"Contango = futures above spot, upward-sloping curve, typically reflecting carrying costs in stable/bullish conditions."},{"type":"mcq","q":"In a FOREIGN EXCHANGE swap, the two parties:","options":["Exchange interest and principal of loans in two currencies over years","Buy/sell a currency pair at spot and reverse it later at an agreed forward rate","Exchange fixed for floating interest in one currency","Exchange an equity index return for a floating rate"],"correct":[1],"explain":"An FX swap has two legs — a spot deal now and a reversing forward deal later. Exchanging loan interest and principal across currencies describes a currency swap."},{"type":"mcq","q":"A 3-year CDS on a USD 20m bond is quoted at 160 bps p.a., paid quarterly. The quarterly premium is:","options":["USD 320,000","USD 80,000","USD 40,000","USD 20,000"],"correct":[1],"explain":"Annual = 160/10,000 × 20m = USD 320,000; quarterly = 320,000 / 4 = USD 80,000 (equivalently 40 bps × 20m)."},{"type":"mcq","q":"Interest rate parity theory states that the forward FX premium/discount between two currencies should equal:","options":["The difference in their inflation rates","The difference in their domestic interest rates for the same maturity","The ratio of their GDP growth rates","The spot bid-ask spread"],"correct":[1],"explain":"IRP links the forward premium/discount to the interest rate differential; violations create risk-free arbitrage that realigns rates."},{"type":"mcq","q":"Which statement about Single Stock Futures (SSF) on SGX is LEAST accurate?","options":["They are cash-settled with no physical delivery","Holders receive dividends and voting rights of the underlying stock","Leverage amplifies both gains and losses","They ease short selling of the underlying"],"correct":[1],"explain":"SSFs carry NO shareholder privileges (no dividends or voting). The other three statements are accurate."},{"type":"mcq","q":"The EXPECTANCY model of futures pricing holds that the futures price equals:","options":["Spot price plus storage cost","The expected spot price at expiry","The risk-free rate times the notional","The dividend yield of the underlying"],"correct":[1],"explain":"The expectancy model says futures prices reflect the expected spot price on the expiry date, not the current cash-futures relationship."},{"type":"mrq","q":"Select ALL features that apply to FUTURES contracts (not forwards):","options":["Daily mark-to-market","Customised bilateral terms","Standardised contract specifications","Exchange/clearing house as counterparty"],"correct":[0,2,3],"explain":"Futures are marked-to-market daily, standardised, and have the exchange as counterparty. Customised bilateral terms describe forwards."},{"type":"mrq","q":"Select ALL items normally found in a futures contract specification:","options":["Tick size","Last trading day","The investor's personal tax rate","Settlement basis and final settlement price"],"correct":[0,1,3],"explain":"Specifications cover tick size, last trading day, settlement basis/final settlement price (plus contract size, price limits, MTM and margin procedures). An investor's tax rate is not part of the contract spec."},{"type":"mrq","q":"Which of the following are recognised CREDIT EVENTS under a CDS?","options":["Bankruptcy","Failure to make payment","A rise in the company's share price","Debt restructuring that is adverse to holders"],"correct":[0,1,3],"explain":"Bankruptcy, failure to pay and adverse debt restructuring (plus repudiation, moratorium, acceleration, obligation default) are credit events. A rising share price is not."},{"type":"mrq","q":"Which statements about margining are correct? Select all that apply.","options":["Initial margin is the up-front deposit to open a position","Maintenance margin is the minimum balance that must be kept at all times","A margin call is issued when the balance falls below the maintenance level","Maintenance margin is always higher than initial margin"],"correct":[0,1,2],"explain":"Initial margin opens the position; maintenance is the floor; falling below it triggers a margin call to restore the initial level. Maintenance margin is LOWER than initial margin, so the last option is false."}]},"03":{"notes":[{"t":"h","text":"3.1 Market Participants"},{"t":"p","text":"As volatility rises, participants with different motivations turn to futures and other derivatives to **hedge** or to **maximise returns**. The same person can act as a speculator, hedger or arbitrageur at different times. Knowing which group is driving the market helps decide whether to trade with or against the trend, and whether a trade is risk-increasing or risk-reducing."},{"t":"key","title":"The eight main participants","points":["Hedgers","Speculators (individual traders)","Market Makers","Proprietary Trading Firms","Arbitrageurs","Portfolio Managers","Hedge Funds","Central Banks, Sovereign Funds and Regulators"]},{"t":"def","term":"Hedger","def":"A participant who already has a position in the underlying asset/commodity and uses futures to reduce or limit the risk of an adverse price change (e.g., farmers sell crop futures; food processors, airlines and jewellers buy futures to lock in input costs)."},{"t":"def","term":"Speculator","def":"Often an individual trading own funds to express a view on, or profit from, the price direction of a market. Electronic trading levelled the playing field by improving access to price and trade information."},{"t":"def","term":"Market Maker","def":"A trading firm contractually committed to provide liquidity by continually posting bids and offers, usually in exchange for reduced fees. Profits chiefly from capturing the bid-offer spread over many trades."},{"t":"def","term":"Proprietary Trading Firm (prop shop)","def":"A firm that profits directly from its own traders' activity, supplying them capital, leverage, education, research and strategies. Banks also run prop desks; poor controls caused major losses (e.g., the 1995 collapse of Barings from a single trader's excessive risk on Nikkei 225 futures, losing twice the bank's capital)."},{"t":"def","term":"Arbitrageur","def":"Seeks riskless profit from disequilibrium between cash and futures markets, exploiting the gap between implied value and market value. Takes no directional bet; relies on computers/models. Improves liquidity and keeps futures-underlying pricing consistent. Usually works for market makers or prop firms."},{"t":"def","term":"Portfolio Manager","def":"Invests/hedges the assets of a mutual fund, ETF or closed-end fund. Uses futures to increase or decrease overall market exposure without disrupting the underlying holdings."},{"t":"def","term":"Hedge Fund","def":"A managed portfolio using advanced strategies to maximise returns (absolute or vs a benchmark). Historically shorted the market to offset bear-market risk; today uses many strategies. Can use the liquid futures market to adjust exposure without changing security holdings."},{"t":"p","text":"**Sovereign funds, central banks and regulators** sometimes intervene in spot and futures markets to counter speculative selling and stabilise markets. In severe cases they tighten liquidity, capital flows and trading. In the 1997 Asian Currency Crisis, intervention plus capital/exchange controls locked speculators into short positions they could not unwind. Many governments also manage their currency within a trading band via the spot and futures markets."},{"t":"h","text":"3.2 Types of Orders (SGX)"},{"t":"table","headers":["Order Type","Key feature"],"rows":[["Limit Order","Specified price and quantity; states the price the trader will pay/receive for 1 contract."],["Market to Limit (MTL)","Matches at best price; any remainder stored. If no opposite-side price, stored 1 tick better than best same-side price, else rejected."],["Market Order","In continuous matching, fills at best possible price; in non-continuous states, takes the Equilibrium Price (EP)."],["Stop (Limit/MTL/Market)","Hidden until a trigger condition (Stop Series, Stop Price, Reference Type, Condition) is met, then converts to the specified order type."],["Market-if-Touched (MIT)","Held until trigger price is touched, then submitted as a market order. An MIT sell sits ABOVE the market; a stop sell sits BELOW."],["Session State Order (SSO)","Triggers order entry only when the market transitions into a chosen session state; hidden until triggered; may NOT be GTC."]]},{"t":"p","text":"Validity types include **Fill-and-Kill (FAK)**, **Fill-or-Kill (FOK)**, **Day** and **Good-Till-Cancelled (GTC)**."},{"t":"sub","text":"Packs & Bundles"},{"t":"p","text":"Introduced by CME for Eurodollar contracts (also LIFFE Euribor/Sterling STIR). They buy/sell a series of futures along the yield curve at a single price, removing **legging risk** and partial fills, and cutting cost."},{"t":"def","term":"Futures Pack","def":"Simultaneous, equally weighted purchase/sale of 4 consecutive delivery-month futures in one transaction."},{"t":"def","term":"Futures Bundle","def":"One of each consecutive quarterly contract over 2 or more years (standard 2, 3 or 5-year bundles; no 1-year bundle since that is effectively a pack). Quoted on the average net change of constituents vs prior settlement, in 1/4 of 1 basis point increments."},{"t":"h","text":"3.3 Types of Trades & Strategies"},{"t":"list","ordered":false,"items":["**Outright trades** - simply buy/sell a futures contract to bet on a rise/fall in the underlying.","**Hedging** - sell (or buy) futures to offset a cash-market position (e.g., sell S&P 500 futures against a U.S. stock portfolio you don't want to sell for tax reasons).","**Basis trades** - an arbitrage taking opposing long/short positions in two securities to profit from convergence of their values (very small basis-point changes), e.g., long 10-yr T-bond futures and short physical 10-yr T-bonds.","**Spread trades** - combine a long and a short in related contracts (see 3.4)."]},{"t":"h","text":"3.4 Spread Trades"},{"t":"def","term":"Spread","def":"A simultaneous long and short position in related futures contracts to mitigate the risk of holding only one side. Margins are typically lower; but spreads on different commodities/maturities are imperfect hedges and can lose if the legs move less inversely than expected."},{"t":"table","headers":["Spread type","Definition"],"rows":[["Intra-commodity","Same commodity"],["Inter-commodity","Different commodities"],["Intra-market","Same exchange"],["Inter-market","Different exchanges"],["Intra-delivery","Same delivery month"],["Inter-delivery","Different delivery months"]]},{"t":"p","text":"Example: long March gold / short June silver, both on CBOT = **inter-commodity** (gold vs silver), **intra-market** (same exchange), and **inter-delivery** (March vs June)."},{"t":"sub","text":"Calendar Spread (horizontal / time spread)"},{"t":"p","text":"Long and short on the **same underlying** but **different delivery months**. Profit comes from the relative movement of the near-term leg (Leg 1) vs the distant leg (Leg 2)."},{"t":"diagram","kind":"matrix","title":"Calendar spread set-up","cols":["Near-term (Leg 1)","Distant (Leg 2)"],"rows":[{"label":"Bullish","cells":["Long / Buy","Short / Sell"]},{"label":"Bearish","cells":["Short / Sell","Long / Buy"]}]},{"t":"key","title":"When a BULLISH calendar spread profits","points":["Near-term contract bought rises MORE than the distant contract sold; OR","Near-term contract bought falls LESS than the distant contract sold."]},{"t":"key","title":"When a BEARISH calendar spread profits","points":["Near-term contract sold falls MORE than the distant contract bought; OR","Near-term contract sold rises LESS than the distant contract bought."]},{"t":"p","text":"Worked example (bullish, 10 lots each leg, S&P 500 E-mini, value = 50 x price): even when BOTH legs rise you can lose if the long leg rises less than the short leg. Scenario 1 (Jun +6%, Dec +5%) gave net profit $11,500; Scenario 2 (Jun +3%, Dec +3.5%) gave net loss $6,000; in a sharp fall (Jun -7.5%, Dec -9%) the spread still profited $17,500 because the short leg fell more."},{"t":"sub","text":"Butterfly Spread"},{"t":"p","text":"A neutral strategy with **4 legs across 3 contracts**, combining a bull and a bear spread. The middle month is traded twice. **Buying** a butterfly = +1 : -2 : +1 (buy 1 near, sell 2 mid, buy 1 distant). **Selling** a butterfly = -1 : +2 : -1. Profit when the near-mid spread beats the mid-distant spread; the doubly-traded mid month is expected to under/over-perform."},{"t":"diagram","kind":"flow","title":"Buying a butterfly (+1 : -2 : +1)","steps":[{"label":"Buy 1","sub":"near-term"},{"label":"Sell 2","sub":"mid-term"},{"label":"Buy 1","sub":"distant"}]},{"t":"p","text":"Eurodollar tick value: 1 basis point = 0.01 price points = 1 tick = USD 25 per contract. A sell-butterfly netting 5.5 ticks earns 5.5 x USD 25 = USD 137.50 for the basic structure."},{"t":"p","text":"**Double butterfly**: one butterfly bought and another sold in staggered fashion; the 2nd and 3rd legs of the first butterfly equal the 1st and 2nd legs of the second. Overall structure: buy 1 near, sell 3 mid, buy 3 mid, sell 1 distant."},{"t":"sub","text":"Condor Spread"},{"t":"p","text":"Like a butterfly (combines a bull and bear spread) but with **no common middle month** - four contracts with equally distributed delivery months. Ratio is always **+1 : -1 : -1 : +1** (buy nearest, sell 2nd, sell 3rd, buy furthest)."},{"t":"sub","text":"Other spreads"},{"t":"def","term":"TED Spread","def":"Difference between the 3-month U.S. Treasury futures and 3-month Eurodollar futures of the same expiry; now commonly the gap between the 3-month T-bill rate and 3-month USD LIBOR. A credit-risk indicator: T-bills are risk-free while Eurodollar rates reflect corporate credit. A WIDENING TED spread signals rising default risk; a narrowing one signals falling risk."},{"t":"def","term":"Inter-product / Inter-commodity spread","def":"Profits from the value differential between two or more related products influenced by similar factors (e.g., T-bills vs Eurodollar on rate moves; gasoline vs heating oil on crude moves), exploiting one product's greater sensitivity."},{"t":"h","text":"3.5 Hedging and Portfolio Management"},{"t":"p","text":"The original purpose of forwards/futures was hedging the future delivery price of a commodity; the same idea hedges falls in portfolio value."},{"t":"key","title":"Core hedging principle","points":["Objective is to REDUCE risk: adverse moves are contained, profits protected.","But favourable moves are CAPPED.","Hedging does NOT eliminate price risk - it converts price risk into BASIS RISK and confines the final price to a determinable range."]},{"t":"p","text":"In portfolio management, hedging smooths cash flows, simplifies financial planning, reduces working-capital needs, allows more efficient pricing and helps manage inventory."},{"t":"sub","text":"3.5.1 Identifying & measuring risk"},{"t":"p","text":"Hedge when the risk's likelihood and impact are significant relative to a dependable hedge's cost. Key factors: probability of negative change, probable size, overall impact (incl. black-swan tail risk), transaction costs, percentage of value to hedge, and assumed basis risk. Decision rule: **hedge if Risk Value > Hedging Cost**."},{"t":"p","text":"Illustration: probability 45% x size 11.5% = **Risk Value 5.18%**. Hedging cost = basis risk 3% + transaction cost 0.009375% = **3.009375%**. Since 5.18% > 3.009%, the decision is to HEDGE."},{"t":"def","term":"Basis risk","def":"The risk that a hedge does not fully work because the underlying asset and the hedging instrument do not perfectly offset each other."},{"t":"sub","text":"3.5.2 Developing an effective hedge program"},{"t":"list","ordered":true,"items":["**Risk exposure** - evaluate assets/liabilities (by group, maturity or profit centre).","**Objective** - set the acceptable risk level/tolerance (e.g., beta, volatility, VaR).","**Hedgeability** - use price-correlation analysis (and cross-hedges if needed).","**Hedge vehicle** - choose an instrument highly correlated with the target security.","**Target** - decide the rate/price to lock in."]},{"t":"def","term":"Cross hedge","def":"Hedging a security with a different instrument that is positively correlated and has similar price movements."},{"t":"p","text":"Hedge-instrument selection examples: long-term govt bonds hedge better with 30-yr T-bond futures than 3-month Eurodollar futures; T-bills hedge better with T-bill futures than Eurodollar futures (in distress, T-bill futures rise faster, weakening a Eurodollar hedge); T-bond futures hedging corporate bonds leave credit/sector risk unhedged, and widening credit spreads increase basis risk."},{"t":"key","title":"Limitations of using futures/exchange options to hedge","points":["Round number of contracts only","Margin maintenance","Time horizon and expiry dates","No exact hedge instrument"]},{"t":"sub","text":"3.5.4 Target rate & basis"},{"t":"formula","name":"Target rate for a hedge","expr":"Target Rate = Futures Rate + Target Rate Basis","where":["Held to delivery (minimum-variance hedge) locks in the futures rate","Lifted before expiry only substitutes price risk for basis risk"]},{"t":"formula","name":"Value of hedged position","expr":"Vt = St + (F - Ft) = F + (St - Ft)","where":["Vt = value of hedged position at time t","F = initial futures price","St = spot/security price at t","Ft = futures price at t","(St - Ft) = ending basis"]},{"t":"sub","text":"3.5.5 Hedge categories"},{"t":"table","headers":["Hedge","What it does"],"rows":[["Weak-form cash (inventory) hedge","Minimises price variance of an existing portfolio held indefinitely; short nearby futures on similar securities to maximise covariance."],["Strong-form cash hedge (immunization)","Finite/known horizon; matches durations of assets and liabilities; replicates a zero-coupon bond's rate sensitivity - buy futures if cash portfolio is less sensitive, sell if more sensitive."],["Weak-form anticipated hedge","Minimises return variance for cashflows received at an UNKNOWN date; long futures matching the asset's rate sensitivity."],["Strong-form anticipated hedge","Known cash received at a CERTAIN date; minimises the acquisition-price variance; the hedge ratio is not an exact dollar match (margin must be financed)."]]},{"t":"def","term":"Immunization","def":"A hedging strategy that matches the durations of assets and liabilities to neutralise interest-rate impact on portfolio value."},{"t":"sub","text":"3.5.6 Hedge ratio"},{"t":"def","term":"Hedge ratio (h)","def":"The expected change in the cash instrument's value for a given change in the futures, i.e., the weighting of hedge vehicle to target security that minimises/eliminates risk. Equal dollar exposure does not necessarily give a delta-neutral hedge."},{"t":"formula","name":"Hedge ratio","expr":"h = (ΔV - ΔS) / ΔF ;  for a delta-neutral hedge (ΔV=0):  h = - ΔS / ΔF","where":["V = S + h x F = value of hedged position","ΔS = change in security price","ΔF = change in futures price"]},{"t":"formula","name":"Number of contracts (interest-rate hedge)","expr":"N = - h x (Loan Value / Contract Size)","where":["h = hedge ratio","negative sign = sell to hedge a long/asset"]},{"t":"p","text":"Worked example: hedge a 180-day USD 100m loan with 90-day Eurodollar futures (1:1 rate correlation). ΔS for 1% on USD 1m = 0.01 x 180/360 x 1m = USD 5,000. ΔF for 1% (100 bp x USD 25) = USD 2,500. h = -(5,000/2,500) = -2, so N = -2 x (100m/1m) = **sell 200 contracts**. The stack hedge carries basis risk from timing mismatch and must be rolled (the futures are 90-day vs the 180-day loan)."},{"t":"sub","text":"3.5.7 Types of hedges"},{"t":"list","ordered":false,"items":["**Strips** - successive contract months to match cash-loan rollover dates/tenor.","**Stacks** - use deferred contract months to match the rollover/tenor.","**Interpolative hedge** - time horizon straddles two expiry dates.","**Extrapolative hedge** - time horizon stretches beyond the last traded contract."]},{"t":"p","text":"Under normal conditions the nearby contract is preferred (liquidity, high correlation). A time-horizon/expiry mismatch creates basis risk regardless of whether you roll a nearby contract or start with a deferred one."},{"t":"sub","text":"3.5.8 Hedging long-term interest-rate risk"},{"t":"p","text":"Bond-futures hedging is harder than rate-futures hedging because (a) the conversion factor can give a non-round number of contracts (extra contracts must be closed before delivery), and (b) convergence is less perfect - sellers' embedded options (delivery timing, choice of deliverable bond) push futures prices below cash-and-carry implied values."},{"t":"formula","name":"Bond-futures hedge ratio","expr":"Hedge ratio = (PVBP of hedge security / PVBP of most deliverable bond) x Conversion factor","where":["PVBP = price change for a single basis-point change in yield","CTD = cheapest-to-deliver bond"]},{"t":"p","text":"Worked example (Alice Tan, USD 20m bond): h = (0.5954/0.6895) x 0.91 = 0.7858 ≈ 0.79. N = -0.7858 x (20,000,000/100,000) = -157.16, so **sell 157 contracts**."},{"t":"sub","text":"3.5.9 Hedging equity risk"},{"t":"p","text":"Equity portfolios carry **systematic/market risk** and **specific/non-market risk**. Index futures hedge only market risk: **sell** futures when long equities (short hedge); **buy** futures when short equities (long hedge). Decide contracts using **beta** (volatility vs the index, from regression) and the **Modified Portfolio Value** (portfolio value x weighted beta)."},{"t":"formula","name":"Number of index-futures contracts to hedge equity","expr":"N = (VP / (F x T)) x β","where":["N = number of contracts","VP = current portfolio value","F = current futures quote","T = value per point/tick (e.g., USD 250 for S&P 500; JPY 500 for Nikkei)","β = portfolio beta"]},{"t":"p","text":"Worked example (John Lim): VP = USD 5,050,000; F = 1,010; T = USD 250; β = 1.5. N = (5,050,000 / (250 x 1,010)) x 1.5 = 20 x 1.5 = **sell 30 contracts**. If the index falls 10% the levered (β=1.5) portfolio is expected to fall 15% (-USD 757,500 to USD 4,292,500), while the short futures (sold 1,010, bought back 902) gain (1,010-902) x 30 x 250 = **USD 810,000**, leaving overall fund value USD 5,102,500."},{"t":"diagram","kind":"payoff","title":"Short futures payoff (the hedge leg)","legs":[{"instrument":"forward","position":"short","strike":1010,"premium":0,"qty":1}],"spotRange":[850,1170]},{"t":"diagram","kind":"payoff","title":"Long futures payoff (outright bullish)","legs":[{"instrument":"forward","position":"long","strike":1010,"premium":0,"qty":1}],"spotRange":[850,1170]},{"t":"diagram","kind":"cycle","title":"Equity hedge lifecycle (short hedge)","stages":[{"label":"Measure","sub":"VP, beta"},{"label":"Compute N","sub":"VP/(F·T)·β"},{"label":"Sell futures","sub":"short hedge"},{"label":"Market falls","sub":"futures gain"},{"label":"Lift hedge","sub":"net result"}]},{"t":"sub","text":"3.5.10 - 3.5.11 Structuring & managing the hedge"},{"t":"p","text":"The hedge aims for equivalent dollar movement in cash and futures. Choose timing and delivery months, then make maturity and sensitivity adjustments. **Hedge effectiveness** = risk of the hedged vs unhedged position; a 90%-effective hedge leaves ~10% of the unhedged risk (standard deviation). With a normal distribution and a 10 bp standard deviation, the target rate is hit ±10 bp about 67% of the time (one standard deviation). Main error sources: the projected basis at lift date and cross-hedge parameter estimates."},{"t":"sub","text":"3.5.12 Worked hedging examples"},{"t":"p","text":"**Currency hedge** (Yankee Trading): locking in April futures 0.9235 yields CAD 1,082,837 vs CAD 1,054,296 unhedged at spot 0.9485 - a CAD 28,541 benefit. **Fixed-deposit hedge**: buy 25 ED at 97.75, sell at 98.16 (+0.41%), add to 1.80% deposit = locked yield 2.21%. **Floating-rate borrowing**: sell 10 ED at 98.15, buy back at 97.75 (+0.40% gain); effective borrowing cost falls from 3.25% to 2.85%. **Nikkei equity hedge**: N = 530,000,000 / (21,455 x 500) = 49.4 ≈ 50 contracts; an 8% fall gives a short-futures gain of (21,455-19,735) x 500 x 50 = JPY 43,000,000."},{"t":"p","text":"**130/30 long-short**: invest up to 130% of AUM in expected outperformers, funded by shorting up to 30% expected underperformers; index futures can capture core index returns and manage cash flows quickly."},{"t":"h","text":"3.6 Portfolio Management Techniques"},{"t":"p","text":"Portfolio management sets policy, matches investments to objectives, decides asset allocation and balances risk vs performance across asset classes, markets and strategies. Frequent rebalancing favours futures because:"},{"t":"key","title":"Why use futures to rebalance","points":["Cheaper brokerage","Smaller cash outlay (margin) tailored to cash-flow needs","Faster execution (trading against the exchange)","Less market impact (high liquidity)","Less disruptive to the overall portfolio"]},{"t":"p","text":"Futures also help **control losses** (hedge instead of dumping an illiquid cash position) and, where accounting permits, **delay loss realisation** during reporting periods. **Synthetic** strategies can be engineered. Options add hedging flexibility: equity index options hedge market risk; single-stock options hedge specific risk."},{"t":"p","text":"Applications: switch 50/50 to 40/60 by buying bond futures now and selling them as illiquid stocks are sold; convert long bonds to a synthetic money-market instrument by selling T-bond futures; Jessie Goh sells N = VP/(F x T) = 5,000,000 / (108.40625 x 1,000) = 46.12 ≈ **46 contracts** to convert 10% of holdings to synthetic short-term."},{"t":"h","text":"3.7 Arbitrage"},{"t":"def","term":"Arbitrage","def":"Profiting from price differences when the same or very similar security/currency/commodity trades on two or more markets, by simultaneously buying in one and selling in the other when prices are out of line - aiming for risk-free profit."},{"t":"diagram","kind":"flow","title":"Cash-and-futures (index) arbitrage","steps":[{"label":"Spot basket","sub":"buy/sell stocks"},{"label":"Index futures","sub":"sell/buy futures"},{"label":"Convergence","sub":"capture basis"}]},{"t":"p","text":"Index arbitrage: buy (sell) S&P 500 futures while selling (buying) the underlying basket, capturing the inflated basis. Bond-strip arbitrage compares computed strips with market prices; act when discrepancies exceed transaction costs (brokerage, financing, margins) and basis risk is manageable."},{"t":"p","text":"**Cash-vs-futures Eurodollar example**: theoretical Sep price 98.65 vs market 98.72 implies arbitrage. Lend 141 days @1.25%, borrow 50 days @1.0625%, sell Sep ED @98.72; profit = (9,872 - 9,865) x USD 25 = **USD 175** per contract."},{"t":"p","text":"**FRA arbitrage**: an FRA is the OTC equivalent of a future and can be customised. Arbitrage is risk-free only when value dates match (and still needs liquidity management for margin calls); interbank quotes carry a 1-3 bp spread vs ~1 bp for futures, creating opportunity. Mismatched dates leave residual basis/fixing risk - avoid calendar events or major data releases between dates."},{"t":"p","text":"**IRS arbitrage**: two parties exchange periodic payments on a notional (typically fixed vs floating LIBOR). Opportunities are now rare/slim, mostly on IMM dates with quarterly fixings; arbitrage when the market price differs from the strips. A speculative twist: a floating-rate payer expecting later rate rises may sell only the latter futures contracts rather than all four."},{"t":"p","text":"**Option arbitrage** exploits temporary discrepancies where option prices trade out of line with the underlying or with other options (detailed in Chapter 4)."},{"t":"diagram","kind":"compare","title":"Hedger vs Arbitrageur vs Speculator","colA":"Hedger / Arbitrageur","colB":"Speculator","rows":[["Hedger: reduces existing risk; caps both loss and gain","Takes on risk for directional profit"],["Arbitrageur: riskless profit from mispricing, no directional bet","Bets on price direction"],["Converts price risk to basis risk","Fully exposed to price moves"]]}],"newQuestions":[{"type":"mcq","q":"A farmer who grows corn and sells corn futures to protect against a price drop is acting as a:","options":["Speculator","Hedger","Arbitrageur","Market maker"],"correct":[1],"explain":"A hedger already has a position in the underlying (the crop) and uses futures to reduce the risk of an adverse price move. A speculator has no underlying position and bets on direction."},{"type":"mcq","q":"Which participant seeks RISKLESS profit from the disequilibrium between cash and futures markets without taking a directional bet?","options":["Hedge fund","Arbitrageur","Proprietary trader","Portfolio manager"],"correct":[1],"explain":"Arbitrageurs exploit the gap between implied and market value, buying in one market and selling in another simultaneously, and take no directional view."},{"type":"mcq","q":"On the SGX, how does a Market-if-Touched (MIT) sell order differ from a stop sell order?","options":["An MIT sell is placed BELOW the market; a stop sell ABOVE","An MIT sell is placed ABOVE the market; a stop sell BELOW","Both are placed above the market","Both are placed below the market"],"correct":[1],"explain":"An MIT sell sits above the current price and a stop sell sits below it. Both are hidden until triggered, after which they submit as market orders."},{"type":"mcq","q":"A trader is long March gold and short June silver, both on CBOT. This spread is best described as inter-commodity, intra-market, and:","options":["Intra-delivery","Inter-delivery","Inter-market","Intra-commodity"],"correct":[1],"explain":"The legs deliver in different months (March vs June), making it inter-delivery. It is intra-market (same exchange) and inter-commodity (gold vs silver)."},{"type":"mrq","q":"Select all conditions under which a BULLISH calendar spread (long near-term, short distant) makes a profit:","options":["Near-term bought rises more than distant sold","Near-term bought falls less than distant sold","Near-term bought rises less than distant sold","Near-term bought falls more than distant sold"],"correct":[0,1],"explain":"A bullish calendar spread profits when the long near-term leg outperforms the short distant leg - either rising more, or falling less. The other two describe losing outcomes."},{"type":"mcq","q":"The contract ratio for BUYING a butterfly spread is:","options":["+1 : -1 : -1 : +1","+1 : -2 : +1","-1 : +2 : -1","+1 : +1 : -2"],"correct":[1],"explain":"Buying a butterfly = buy 1 near, sell 2 mid, buy 1 distant (+1 : -2 : +1). +1:-1:-1:+1 is a condor; -1:+2:-1 is selling a butterfly."},{"type":"mcq","q":"How does a condor spread differ from a butterfly spread?","options":["A condor uses only 2 legs","A condor has no common middle month - four different equally distributed delivery months","A condor combines only bull spreads","A condor uses options, never futures"],"correct":[1],"explain":"Both combine a bull and bear spread, but the condor has four contracts with no shared middle month, ratio +1:-1:-1:+1, with equally distributed delivery months."},{"type":"mcq","q":"A WIDENING TED spread most directly signals:","options":["Falling default/credit risk","Rising default/credit risk","Falling currency volatility","A coming dividend cut"],"correct":[1],"explain":"The TED spread compares (risk-free) T-bill rates with Eurodollar rates that reflect corporate credit. A wider spread means investors see greater default risk; a narrower spread means less."},{"type":"mrq","q":"Select all TRUE statements about hedging's effect on risk and return:","options":["Hedging eliminates price risk entirely","Hedging converts price risk into basis risk","Adverse moves are contained but favourable moves are capped","Hedging confines the final price to a determinable range"],"correct":[1,2,3],"explain":"Hedging does NOT eliminate price risk; it converts it to basis risk, caps upside while limiting downside, and confines the final price to a range."},{"type":"mcq","q":"In the worked decision, Risk Value = 5.18% (45% x 11.5%) and Hedging Cost = 3.009375% (basis risk 3% + transaction cost 0.009375%). The correct decision is to:","options":["Not hedge, because cost exceeds risk value","Hedge, because Risk Value > Hedging Cost","Hedge only 50% of the position","Wait for more data; the numbers are inconclusive"],"correct":[1],"explain":"The rule is to hedge when Risk Value exceeds Hedging Cost. Here 5.18% > 3.009%, so the decision is to hedge."},{"type":"mcq","q":"Hedge a 180-day USD 100m loan with 90-day Eurodollar futures (1:1 rate correlation). For 1% rate change, ΔS = USD 5,000 and ΔF = USD 2,500 per USD 1m. The hedge ratio and number of contracts are:","options":["h = -2; sell 200 contracts","h = -0.5; sell 50 contracts","h = -2; sell 100 contracts","h = -1; sell 100 contracts"],"correct":[0],"explain":"h = -ΔS/ΔF = -(5,000/2,500) = -2. N = -h x (Loan/Contract) = -2 x (100m/1m) = sell 200 contracts. The -0.5 and -1 options invert or mis-scale the ratio."},{"type":"mcq","q":"A USD 20m bond is hedged with T-bond futures. CTD conversion factor = 0.91, PVBP of bond = 0.5954, PVBP of CTD = 0.6895. How many futures should be SOLD (par USD 100,000)?","options":["Sell about 130 contracts","Sell about 157 contracts","Sell about 200 contracts","Sell about 91 contracts"],"correct":[1],"explain":"Hedge ratio = (0.5954/0.6895) x 0.91 = 0.7858. N = -0.7858 x (20,000,000/100,000) = -157.16, so sell 157 contracts."},{"type":"mcq","q":"A fund holds USD 5,050,000 of equities with beta 1.5. The S&P futures = 1,010 and value per point = USD 250. Using N = (VP/(F x T)) x β, how many contracts must be SOLD for a full hedge?","options":["20 contracts","30 contracts","45 contracts","15 contracts"],"correct":[1],"explain":"N = (5,050,000 / (250 x 1,010)) x 1.5 = 20 x 1.5 = 30 contracts sold. Forgetting beta gives the trap answer of 20."},{"type":"mcq","q":"Continuing: the index falls 10%, the beta-1.5 portfolio falls to USD 4,292,500, and the 30 short futures are closed (sold 1,010, bought 902, USD 250/point). What is the futures gain and overall fund value?","options":["Gain USD 810,000; fund USD 5,102,500","Gain USD 750,000; fund USD 5,042,500","Gain USD 540,000; fund USD 4,832,500","Gain USD 810,000; fund USD 4,292,500"],"correct":[0],"explain":"Futures gain = (1,010 - 902) x 30 x 250 = USD 810,000. Adding to the depressed portfolio of USD 4,292,500 gives USD 5,102,500, roughly preserving the September value."},{"type":"mcq","q":"A Nikkei portfolio of JPY 530,000,000 (beta 1) is hedged with June futures at 21,455 (value JPY 500/point). The number of contracts for a full hedge is closest to:","options":["25 contracts","50 contracts","100 contracts","49 (round DOWN to 49)"],"correct":[1],"explain":"N = 530,000,000 / (21,455 x 500) = 49.4, rounded to 50 contracts for a full hedge. Beta of 1 leaves the figure unchanged."},{"type":"mrq","q":"Select the stated LIMITATIONS of using exchange-traded futures and options for hedging:","options":["Only round numbers of contracts can be traded","Margin maintenance is required","Time horizon and expiry dates may not match","Counterparties are unknown and unregulated"],"correct":[0,1,2],"explain":"The chapter lists round contract numbers, margin maintenance, time-horizon/expiry mismatch and no exact hedge instrument. Unknown/unregulated counterparties describe OTC, not exchange-traded products."},{"type":"mcq","q":"Which statement about a hedge held to the futures delivery date is correct?","options":["It substitutes price risk for basis risk","It is a minimum-variance hedge that locks in the futures rate","It always loses money to basis","It cannot be used for interest-rate exposures"],"correct":[1],"explain":"A minimum-variance hedge held to delivery locks in the futures rate (target basis concept). Lifting a hedge BEFORE expiry is what substitutes price risk for basis risk."},{"type":"mcq","q":"Eurodollar arbitrage: theoretical Sep price = 98.65 while the market price = 98.72. The arbitrage profit per contract (USD 25 per 0.01 point) is:","options":["USD 25","USD 175","USD 700","USD 70"],"correct":[1],"explain":"Profit = (9,872 - 9,865) x USD 25 = 7 ticks x USD 25 = USD 175 per contract, achieved by selling the overpriced futures and replicating via the cash legs."},{"type":"mrq","q":"Select all TRUE statements about strips and stacks in hedging:","options":["Strips use successive futures contract months to match cash-loan rollover dates","Stacks use deferred contract months to match the rollover/tenor","Neither has any basis risk at termination","An interpolative hedge is used when the horizon straddles two expiry dates"],"correct":[0,1,3],"explain":"Strips use successive months; stacks use deferred months; interpolative hedges cover a horizon straddling two expiries. Both strips and stacks DO carry basis risk at termination, so option 3 is false."},{"type":"mcq","q":"Equity index futures can hedge which risk in an equity portfolio?","options":["Specific (non-market) risk only","Systematic (market) risk only","Both market and specific risk fully","Neither - only single-stock options can hedge equities"],"correct":[1],"explain":"Index futures hedge only systematic/market risk. Specific (non-market) risk must be hedged with individual stock options; index futures cannot remove it."}]},"04":{"notes":[{"t":"h","text":"4.1 What is an Option?"},{"t":"p","text":"An **opt
