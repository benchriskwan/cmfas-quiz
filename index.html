arty by credit rating, settlement amount and tenor; a **Credit Support Annex (CSA)** governs collateral posting to mitigate credit risk","**Clearing broker risk** — credit risk from margins placed with the broker","**Exchange risk** — the exchange/clearing house is counterparty to exchange-traded contracts and must honour demands even if a member fails"]},{"t":"p","text":"**Settlement risk** is primarily a **back-office** responsibility — timely, accurate trade confirmations ensure prompt settlement. OTC option confirmations should include option style, expiry date/time, premium payment date, settlement date and strike; currency options also need the call/put currencies and amounts."},{"t":"diagram","kind":"cycle","title":"Risk-management process","stages":[{"label":"Identify","sub":"market, credit, settlement risks"},{"label":"Measure","sub":"DV01, VaR, Greeks"},{"label":"Set limits","sub":"open contracts, max loss, Greek limits"},{"label":"Mitigate","sub":"hedge, collateral/CSA, clearing"},{"label":"Monitor","sub":"front/middle/back office"}]},{"t":"diagram","kind":"compare","title":"Who bears the counterparty risk","colA":"Exchange-traded","colB":"OTC","rows":[["Clearing house is counterparty","Each party faces the other directly"],["Margined & novated","Bilateral; mitigated by CSA/collateral"],["Lower counterparty risk","Higher counterparty risk"]]}],"newQuestions":[{"type":"mcq","q":"The basis of a futures contract is defined as:","options":["Futures price minus cash/spot price","Cash/spot price minus futures price","Initial margin minus maintenance margin","Open interest minus trading volume"],"correct":[1],"explain":"Basis = Cash/Spot Price − Futures Price. It becomes zero at maturity when the hedged asset and the underlying are identical."},{"type":"mcq","q":"Which of the following is NOT a reason that basis risk arises when hedging with futures?","options":["The hedged asset may differ from the futures underlying","The exact buy/sell date may be uncertain","The hedge may be closed out before expiration","The futures contract is daily marked-to-market by the clearing house"],"correct":[3],"explain":"Daily mark-to-market is a settlement mechanic, not a source of basis risk. Basis risk stems from asset mismatch, timing uncertainty, early close-out, and contract-size mismatch (under/over-hedging)."},{"type":"mcq","q":"In a 'lock limit' futures market, an investor:","options":["Can always offset the position at the limit price","Cannot offset the existing position because no counterparties will transact","Is automatically cash-settled by the exchange","Receives a guaranteed profit equal to the daily limit"],"correct":[1],"explain":"When the price hits the maximum allowable daily limit and no counterparties are willing to transact, there are no trades, so the investor cannot offset the position."},{"type":"mcq","q":"Which two indicators are most useful for gauging the liquidity of a particular futures contract?","options":["Initial margin and maintenance margin","Trading volume and open interest","Delta and gamma","Credit spread and YTM"],"correct":[1],"explain":"Trading volume and open interest (open contracts not yet offset or delivered) gauge futures liquidity for a contract and delivery month."},{"type":"mcq","q":"Regarding leverage risk in futures, which statement is correct?","options":["The investor's loss is always limited to the initial margin","The percentage loss equals the percentage move in the underlying","The percentage loss can be greater than the percentage price move in the underlying, with exposure to the full downside","Margin calls only occur at contract maturity"],"correct":[2],"explain":"Due to leverage the percentage loss exceeds the underlying's percentage move, and exposure is to the full downside — loss is NOT limited to initial margin."},{"type":"mcq","q":"Which risk is borne by an option WRITER but generally NOT by an option holder?","options":["Loss of the entire premium","Unlimited loss on a naked position","Time decay reducing time value","Loss of voting rights"],"correct":[1],"explain":"Writers of naked calls/puts face unlimited/large losses if the underlying moves against them. A holder's loss is capped at the premium paid."},{"type":"mcq","q":"Why are European options described as more restrictive than American options in the chapter?","options":["They can be exercised at any time before expiry","Without a secondary market, they can only realise value upon expiration","They never lose time value","They are always cash-settled"],"correct":[1],"explain":"In the absence of a secondary market European options realise value only at expiration, so the holder must correctly predict both direction and timing."},{"type":"mcq","q":"A 'flight to safety' during economic and political uncertainty typically results in:","options":["US Treasury yields rising and risky-bond spreads narrowing","US Treasury yields falling while the riskiest bonds' credit spreads widen","Both Treasury yields and credit spreads falling equally","No change in either Treasury yields or credit spreads"],"correct":[1],"explain":"Investors park money in US Treasuries, pushing Treasury yields down, while the credit spreads of the riskiest bonds widen the most."},{"type":"mcq","q":"Which statement about company warrants is correct?","options":["Holders receive voting and dividend rights","They are issued by financial institutions, typically banks","If exercised in-the-money, existing shareholdings may be diluted","They carry issuer credit risk of a third-party bank"],"correct":[2],"explain":"A company warrant is a long-term option issued by the company; holders have no voting/dividend rights, and exercise can dilute shareholdings. Issuer (bank) credit risk applies to structured warrants, not company warrants."},{"type":"mcq","q":"An investor puts up 10% initial margin on a CFD with an underlying value of $10,000. The initial margin is:","options":["$100","$1,000","$9,000","$10,000"],"correct":[1],"explain":"10% × $10,000 = $1,000. The margin secures a much larger exposure to the underlying — the essence of CFD leverage."},{"type":"mcq","q":"Counterparty risk in CFDs is present in almost all CFDs EXCEPT:","options":["Market-maker CFDs","Direct Market Access CFDs","Exchange-traded CFDs","Currency CFDs"],"correct":[2],"explain":"The CFD provider is normally the counterparty, so provider default affects the investor — except for exchange-traded CFDs."},{"type":"mcq","q":"For a CFD, financing cost (interest) is generally charged on:","options":["The initial margin only","The full value of the CFD position, daily, at a spread over a benchmark","The realised profit only","A fixed annual fee regardless of position size"],"correct":[1],"explain":"Industry practice charges interest on the full position value, computed daily at a spread over LIBOR or another benchmark; rising rates raise the holding cost."},{"type":"mrq","q":"Select all risks specifically listed in the chapter as risks of trading CFDs.","options":["Leverage risk","Counterparty risk","Reinvestment risk","Currency risk"],"correct":[0,1,3],"explain":"CFD risks include leverage, market volatility, counterparty, liquidity, currency and financing cost. Reinvestment risk is a structured-product/bond risk, not a listed CFD risk."},{"type":"mcq","q":"In a structured product where the investor shorts an index call option to enhance yield, the investor is effectively:","options":["Buying protection against a price rise","Selling protection against a price rise, with theoretically unlimited loss if uncovered","Guaranteeing 100% principal preservation","Eliminating all market risk"],"correct":[1],"explain":"Shorting a call sells protection against a price increase; an uncovered short call has theoretically unlimited loss as the underlying can rise without bound."},{"type":"mcq","q":"Which structured-product risk is described as the likelihood of one event having a direct impact on another, e.g. a CDS basket of firms in the same industry?","options":["Reinvestment risk","Correlation risk","Legal risk","Transactional risk"],"correct":[1],"explain":"Correlation risk: correlated underlyings (same industry, credit relationships) mean one default makes others more likely."},{"type":"mrq","q":"Select all bond characteristics that the chapter says INCREASE reinvestment risk.","options":["Large coupons","Zero-coupon structure","Long maturities","Selling at a premium"],"correct":[0,2,3],"explain":"Reinvestment risk is greatest for large coupons, higher payment frequency, long maturities and premium bonds. Zero-coupon bonds have NO reinvestment risk."},{"type":"mcq","q":"A bond has a modified duration of 2. If its yield rises by 100 basis points, the price will approximately:","options":["Rise by 2%","Fall by 2%","Fall by 4%","Stay unchanged"],"correct":[1],"explain":"ΔP/P = −D × ΔYTM = −2 × 1% = −2%. Price falls about 2% (price and yield move inversely)."},{"type":"mcq","q":"Bond X is priced at $980 with a PVBP (DV01) of $1. If its yield rises by 5 bps, the new price is approximately:","options":["$985","$975","$980","$1,000"],"correct":[1],"explain":"Price change = 5 bps × $1 = $5 fall; $980 − $5 = $975, since price and yield move inversely."},{"type":"mcq","q":"A portfolio has a 1-day 95% VaR of SGD 1 million. This means:","options":["The portfolio will lose exactly SGD 1 million each day","There is a 5% probability of losing more than SGD 1 million in one day","There is a 95% probability of losing SGD 1 million daily","The maximum possible loss is SGD 1 million"],"correct":[1],"explain":"95% VaR of SGD 1m = a 5% chance of losing more than SGD 1m over one day — about 1 day in 20. VaR is a threshold, not a maximum or certain loss."},{"type":"mrq","q":"Select all that are types of limits used to manage MARKET risk for futures.","options":["Open contracts limit","Maximum loss limit","Credit Support Annex","Stress test limit"],"correct":[0,1,3],"explain":"Futures market-risk limits include open contracts, maximum loss, maturity and stress test limits. A CSA is a credit-risk (collateral) document for OTC derivatives, not a futures market-risk limit."}]}};const CH_DATA_M6={"01":{"notes":[{"t":"h","text":"1.1 Introduction"},{"t":"p","text":"The investment environment is being reshaped by **financial innovation**, evolving **regulatory infrastructure**, shifts in promoted product types, and **financial technology** that gives wider and faster access to investments. Representatives of financial institutions must continually expand their investment knowledge to stay relevant."},{"t":"p","text":"Representatives must identify suitable products and services that match the varying **needs, expectations, risk profiles, preferences and limitations** of clients, subject to regulatory requirements and ethical considerations. Understanding client needs is the basis for all good investment recommendations, but those needs must be matched to **the realities of what the markets offer**."},{"t":"h","text":"1.1.1 Types of Investors (SFA Section 4A)"},{"t":"p","text":"The **Securities and Futures Act 2001 (SFA), Section 4A** defines specific classes of investors: **Accredited Investors (AIs)**, **Expert Investors (EIs)**, **Institutional Investors (IIs)**; anyone excluded from these definitions is a **Retail Investor**. The first step before any advice is to understand the needs of each investor type."},{"t":"sub","text":"Institutional Investors (IIs)"},{"t":"p","text":"IIs are considered **\"super-investors\"** due to their size and impact on capital markets. With massive capital and resources, they have timely, wide access to market information and professional research. They have clearly defined goals, prescribed investment directives and explicit requirements (costs, execution efficiency, research/reporting support, volatility/return ranges, asset allocation, concentration limits). As sophisticated investors acting within an institution, they are less likely to make uneducated investments and are typically permitted access to a **wider range of products** than other investor types."},{"t":"p","text":"IIs are classified by the **purpose** for which money is invested: **pension funds** (retirement income), **insurance funds** (meeting expected claims), **endowment funds** (philanthropic spending), and **sovereign wealth funds** (stabilising the national economy / savings for future generations)."},{"t":"key","title":"Time horizons differ by II type","points":["Pension funds: precise knowledge of future liabilities, favour long-term objectives","Commercial insurers: lower predictability (e.g. climate/weather claims), inclined towards short-term opportunities","Regulation varies by industry: in Singapore, insurers are prohibited from taking uncovered (naked) positions in derivatives under MAS requirements (MAS Notice 125)"]},{"t":"p","text":"The SFA list of IIs includes: the Government, statutory boards, wholly government-owned fund-managing entities, foreign central banks/governments/agencies, prescribed multilateral/international agencies, banks, merchant banks, finance companies, licensed insurers, trust companies, capital markets services (CMS) licence holders for securities dealing, approved exchanges and clearing houses, recognised market operators, licensed trade repositories, approved holding companies, depositories under the SFA, pension funds and collective investment schemes."},{"t":"sub","text":"Accredited Investors (AIs)"},{"t":"p","text":"An AI is an individual or corporate that meets the prescribed **net-worth thresholds** under the SFA. Their wealth implies they are financially savvy, can understand financial instruments and can withstand higher monetary risk than retail investors. AIs may therefore access more complex, riskier products such as **unrated bonds** and products requiring **neither a prospectus nor a reasonable basis** for recommendation by a CMI representative."},{"t":"key","title":"AI individual thresholds (any one)","points":["Net personal assets > S$2 million (primary residence capped at S$1m net of secured credit)","Net financial assets > S$1 million","Income in preceding 12 months >= S$300,000","Corporate/entity: net assets > S$10 million (per latest audited / certified balance sheet within preceding 12 months)"]},{"t":"p","text":"To enhance safeguards, **MAS raised the qualifying benchmark for AIs** and introduced an **opt-in regime**: CMIs can no longer automatically treat anyone who qualifies as an AI as an AI unless the investor **opts in** to be treated as such. Representatives should identify factors influencing AI decisions and tailor solutions accordingly."},{"t":"table","headers":["Factors for Individual AIs","Factors for Corporate AIs"],"rows":[["Demographics (age, gender, education)","Management outlook (growth vs decline)"],["Lifestyle (confidence, dependants)","Size of firm"],["Risk tolerance (volatility, risk-return spectrum)","Corporate governance"],["Market trends / forecasts","Market trends / forecasts"],["Tax (prefer tax-exempt returns)","Tax (fiscal incentives/barriers)"],["Investment horizon","Investment horizon"],["Liquidity","Cash flow"],["Psychological influences","Corporate culture (aggressive vs passive)"],["Personal (social/religious) values","Corporate values"]]},{"t":"sub","text":"Expert Investors (EIs)"},{"t":"p","text":"An EI is a person who **trades capital markets products in the ordinary course of business**. Like AIs, EIs receive less regulatory protection than retail investors, but for a different reason: not greater wealth, but **greater understanding of product risks** by virtue of their occupation. EIs are basically a **sub-set of retail investors** meeting specific experience requirements; market rumours that sway retail investors may not influence EIs, and EIs tend to have clearer objectives and prefer greater involvement in the process."},{"t":"sub","text":"Retail Investors"},{"t":"p","text":"A retail investor is an individual buying securities for his own personal account (the average working masses), defined under the SFA as anyone excluded from the II, AI and EI classes. They are the **polar opposite of IIs**: trade in small amounts, trade less frequently, have little influence over corporate decisions or markets, and seldom have access to boardrooms or timely information. They are assumed to be **less financially savvy and more risk-averse**, and so are accorded a **higher level of protective regulation** as the most vulnerable group."},{"t":"key","title":"Recent regulatory updates affecting retail investors","points":["More stringent rules on non-conventional products (e.g. precious-metal buy-back arrangements) and regulating collectively managed schemes as Collective Investment Schemes (CIS)","Refining investor classifications under the SFA and Financial Advisers Act 2001 (FAA)","Option for AIs to benefit from the full range of retail-investor safeguards (opt-in)"]},{"t":"diagram","kind":"matrix","title":"Investor protection vs sophistication","cols":["Higher sophistication / lower protection","Lower sophistication / higher protection"],"rows":[{"label":"By wealth","cells":["Accredited Investor (net worth thresholds)","Retail Investor (default class)"]},{"label":"By role/scale","cells":["Institutional Investor (super-investor); Expert Investor (trades in ordinary course)","Retail Investor (small, infrequent trades)"]}]},{"t":"h","text":"1.1.2 Investment Products and Services"},{"t":"p","text":"A wide range of products exists: some actively traded and favoured by IIs, others designed for AIs, HNWIs or retail investors. Traditional asset classes (deposits, FX, fixed income, equity) seek **yield and/or capital gains**. With innovation, investors can also take **bearish positions** using put options, futures and **inverse ETFs** to potentially generate higher yields."},{"t":"key","title":"The wider product range allows investors to:","points":["Diversify their portfolios","Optimise the risk-return profile of their portfolios","Protect investments or profit from downward market movement","Selectively exploit opportunities through a leverage effect"]},{"t":"table","headers":["Product","Key purposes/benefits"],"rows":[["Deposits / Money Market","Defined interest yield; capital gains (foreign); regular payout"],["Bonds","Defined yield; capital gains; regular payout; (inverse floaters hedge)"],["Equities","Dividend; capital gains; regular payout"],["Futures","Capital gains; hedge (inverse change in payout); leverage"],["Options","Higher yield; capital gains; hedge; leverage"],["Warrants","Capital gains; leverage"],["Structured Products","Higher yield; capital gains; hedge; leverage"],["Investment / ETFs","Yield/gains; diversification (ETFs also leverage)"],["Hedge Funds","Capital gains; hedge; leverage; diversification"]]},{"t":"h","text":"1.1.3 Financial Assets vs Real Assets (Individual's Perspective)"},{"t":"p","text":"Individuals may also own **real physical assets** and **business assets**, whose values and cash flows can exceed those of their financial assets. The flows are interrelated: **business salaries and profits** provide income that can be invested in financial assets or ploughed back into the business; **real-estate purchases** require financing and can be funded with financial assets. Investment professionals should stay alert to business and physical-asset decisions that affect financial assets."},{"t":"diagram","kind":"flow","title":"Interrelated asset flows for an individual","steps":[{"label":"Business Assets","sub":"salaries & profits"},{"label":"Financial Assets","sub":"invest income / fund purchases"},{"label":"Real Physical Assets","sub":"e.g. real estate, financed"}]},{"t":"table","headers":["Financial Assets","Real / Physical & Business Assets"],"rows":[["Cash deposits, foreign currencies","Commodities (energy, metals, agriculture)"],["Short-term money market instruments","Real estate (commercial, residential, industrial, agriculture)"],["Bonds & other fixed income; equities; insurance","Businesses (plant, property, equipment, patents, networks)"],["Derivatives (ETD, futures, options, swaps, warrants, OTC structured products)","Precious stones & jewellery (diamonds, rubies, emeralds)"],["Investment funds (ETFs, private funds, capital-guaranteed); alternatives (hedge, commodity, REITs, PE)","Collectibles (art, antiques, wine, memorabilia)"]]},{"t":"h","text":"1.2 Financial Assets"},{"t":"def","term":"Financial asset","def":"A paper (or electronic) claim on the issuer. Issuers may be from the public sector (e.g. Singapore Government, HDB), a supranational (e.g. World Bank), or the private sector (a corporation, e.g. Keppel Corporation)."},{"t":"p","text":"Financial assets are broadly classified as **debt, equity and derivative** instruments/securities (and collective investment schemes/funds)."},{"t":"sub","text":"1.2.1 Local and Foreign Cash Deposits"},{"t":"p","text":"The most basic asset class is **cash**: SGD current, savings or fixed (time) deposits, plus foreign-currency deposits. In a low-rate environment there is a high **opportunity cost** of holding cash rather than investing for returns to offset **inflation** (loss of purchasing power). Foreign-currency deposits carry **currency exchange risk** and have proven relatively volatile."},{"t":"sub","text":"1.2.2 Fixed Income Securities"},{"t":"p","text":"Fixed income securities are **interest-bearing instruments providing a fixed return** (treasury bills, fixed-rate bonds, certificates of deposit, commercial papers, debentures)."},{"t":"def","term":"Money market instruments","def":"Relatively low-risk, highly liquid, short-term debt issued by governments, financial institutions and corporations. Denominations are large and transactions substantial. Maturities range from 1 day to 1 year, often less than 90 days."},{"t":"def","term":"Treasury bill","def":"Issued by central banks on behalf of governments to raise short-term funds; obligations of the government, so considered free of default and used as a proxy for the risk-free rate. Issued at a discount by tender, redeemable at face value at maturity."},{"t":"def","term":"Repurchase agreement (repo)","def":"A form of borrowing: sale of a security with a simultaneous commitment by the seller (borrower) to buy it back at a specified price and future date. The effective interest is the difference between purchase and sale price. A reverse repo is the converse (lending)."},{"t":"def","term":"Commercial paper","def":"Short-term, unsecured promissory notes issued by a corporation; like T-bills, they are discounted money market instruments."},{"t":"def","term":"Banker's acceptance","def":"A time draft drawn on a bank by a customer; the bank agrees to pay a specified amount on a future date. Created to facilitate (especially international) trade; negotiable and can be discounted in the money market."},{"t":"def","term":"Certificate of deposit (CD)","def":"A certificate issued by a bank in exchange for a deposit of funds; yields quoted on an interest-bearing basis."},{"t":"p","text":"**Debt securities (bonds)** are long-term fixed borrowings: the investor lends the **principal** to the issuer, who pays periodic interest and repays principal at maturity. Singapore has one of Asia's most developed bond markets (Government securities, statutory board securities, supranational and corporate bonds)."},{"t":"table","headers":["Bond type","Definition"],"rows":[["Eurobond","International bond denominated in a currency not native to the country of issue (e.g. Euroyen bond sold in London)"],["Eurodollar bond","Denominated in US dollars, sold outside the US to non-US investors"],["Yankee bond","Sold in the US, denominated in US dollars, issued by foreign corporations/governments"],["Domestic bond","Sold by an issuer within its own country in that country's currency"]]},{"t":"sub","text":"1.2.3 Equity Securities"},{"t":"p","text":"Equity securities represent an **ownership interest** in a company. Two forms exist:"},{"t":"list","ordered":false,"items":["**Ordinary shares** – holders elect directors and vote on company issues (usually one vote per share).","**Preference shares** – technically equity but a **hybrid** security with only limited voting rights; they resemble both equity and fixed income."]},{"t":"key","title":"Priority of claims over company assets","points":["1. Creditors (highest priority)","2. Preference shareholders","3. Ordinary shareholders (residual claim)"]},{"t":"sub","text":"1.2.4 Derivatives"},{"t":"def","term":"Derivative","def":"An instrument that derives its value from the price of an underlying asset (e.g. a stock, bond or market index). Includes options, warrants, futures and convertible securities."},{"t":"table","headers":["Derivative","Definition"],"rows":[["Structured product","Bundles a note/deposit with one or more derivatives; return linked to one or more underlyings"],["Option","Right (not obligation) to buy (call) or sell (put) a specified amount of an underlying within a period at a specified price"],["Company-issued warrant","Right to buy a given number of the company's shares at a specified price over a period (usually several years)"],["Structured warrant","Issued (usually by banks) to profit from upward (call) or downward (put) price moves of an underlying at a fraction of its price"],["Futures contract","Agreement for future delivery of an asset at a predetermined price; cash- or physically-settled; exchange-traded with standardised terms"],["Convertible security","Right to convert into a predetermined number of ordinary shares; usually pays interest at a yield lower than a comparable bond (the difference is the embedded option value)"]]},{"t":"sub","text":"1.2.5 Portfolio Management and Investment Funds"},{"t":"p","text":"Clients can invest **directly in single securities** or **entrust funds to portfolio managers** — beneficial for those lacking the time, information, expertise, discipline or emotional temperament to invest actively. Pooled securities may form **pure asset funds** or be **diversified** under asset-allocation strategies; **hedge fund managers** seek returns irrespective of market direction. Funds are offered on exchanges as **ETFs** and **OTC** by financial institutions."},{"t":"h","text":"1.3 Financial Markets"},{"t":"def","term":"Financial markets","def":"Where assets are bought/sold, borrowed/lent or transacted among participants such as issuers, investors, speculators, hedgers and intermediaries. Examples: equities, money, fixed income, commodities, options & futures, and foreign exchange markets."},{"t":"p","text":"Markets have seen **liberalisation and global consolidation**, the impact of IT (alternative platforms such as **Electronic Communications Networks**, e.g. Instinet), and online brokerage. **Algorithmic trading** uses a computer program following defined instructions to execute trades (and can slice large orders to minimise market impact); **high-frequency trading (HFT)** relies on speed to analyse vast information and self-execute trades in fractions of a second."},{"t":"diagram","kind":"flow","title":"Structure of the financial markets (by asset class)","steps":[{"label":"Debt Securities","sub":"money market, fixed income"},{"label":"Equity Securities","sub":"ordinary & preference shares"},{"label":"Derivatives","sub":"options, futures, swaps, structured products"},{"label":"Foreign Exchange","sub":"spots, forwards"}]},{"t":"key","title":"Participants in financial markets","points":["Investors – retail, private bank, institutional (incl. fund management companies)","Issuers – public and private sector companies","Intermediaries – broker/dealer firms and market makers","Regulators","Electronic exchanges – equities, debt, derivatives, commodities","Infrastructure providers – clearing houses, central depositories, communications networks, trade repositories","Financial institutions – distribution/underwriting of IPOs, secondary-market participation"]},{"t":"diagram","kind":"flow","title":"How financial markets sustain economic growth","steps":[{"label":"Capital Seekers","sub":"issuers of stocks/bonds"},{"label":"Arrangers & Intermediaries","sub":"investment banks, underwriters, distributors, brokerages"},{"label":"Wholesale Providers","sub":"banks, hedge/pension funds, insurers"},{"label":"Retail Providers","sub":"individuals, small firms"}]},{"t":"p","text":"Beyond regulated exchange-based markets there is growing activity in **private equity / mezzanine financing** markets, where capital seekers and providers negotiate funding for mergers, acquisitions or buy-outs. In these **pre-primary** sectors, funds are raised from **private** investors (not the public); in some forms this is called **\"shadow banking\"**."},{"t":"sub","text":"1.3.1 / 1.3.2 Primary vs Secondary Market"},{"t":"def","term":"Primary market","def":"Where new issues of securities are listed and sold to the public (e.g. via IPOs). Issuers receive cash from subscribers, who receive financial claims that previously did not exist."},{"t":"def","term":"Secondary market","def":"Where securities already issued in the primary market are subsequently traded. Proceeds go to the selling investor, NOT the original issuer. Secondary markets provide liquidity, essential to the proper functioning of capital markets."},{"t":"diagram","kind":"compare","title":"Primary vs Secondary Market","colA":"Primary market","colB":"Secondary market","rows":[["New securities created and sold","Existing securities traded"],["Cash goes to the ISSUER","Proceeds go to the SELLING INVESTOR"],["Buyers receive new financial claims","Ownership transferred between investors"],["Capital raising (e.g. IPO)","Provides liquidity & price discovery"]]},{"t":"sub","text":"1.3.3 Characteristics of a Good Financial Market"},{"t":"list","ordered":true,"items":["**Availability of information** – timely, accurate data on volumes, prices, and outstanding bids/offers, so a security can be priced and sold quickly.","**Liquidity** – ability to buy/sell quickly at prices close to previous transactions (absent new information). Requires **marketability** (likelihood of quick sale — necessary but not sufficient), **price continuity** (small price changes between trades), and **depth** (many buyers and sellers preventing drastic moves).","**Transaction costs** – low costs of reaching the market, brokerage, and transferring the security; this is **internal efficiency**.","**Bid-offer spread** – the gap between bid and offer; very small in efficient markets due to deep market-making and reliable two-way quotes.","**Information efficiency** – prices adjust quickly to new supply/demand information, reflecting all available information.","**Price discovery** – one of the most important market functions; if the above hold, prices become more transparent and responsive to market forces."]},{"t":"sub","text":"1.3.4 Bond Markets"},{"t":"p","text":"The **US bond market** is the largest domestic bond market; the **US Treasury Department** is the largest single global debt issuer, making the Treasury market the most active and liquid. T-bills/notes/bonds are issued via **auction** where dealers submit competitive bids. The **Eurobond market** is important for foreign-currency bonds, with dealing/settlement governed by the **Association of International Bond Dealers (AIBD)**. Most bond trading is done **OTC through bond dealers** (mostly banks and large investment-banking firms), even though some corporate bonds are listed on exchanges such as the NYSE."},{"t":"sub","text":"1.3.5 Equity Markets"},{"t":"p","text":"Ordinary shares, preference shares, warrants and ETFs trade actively. Equity markets differ by **size, liquidity, regulation, trading/settlement systems and foreign-ownership restrictions**. NYSE + NASDAQ together account for slightly more than half of world stock market capitalisation. **Singapore (SGX)** is not in the global top-20 by market cap but is the world's **most liquid offshore market** for benchmark equity indices of China, India, Japan and ASEAN, and offers commodity and currency derivatives."},{"t":"key","title":"Settlement & market structure points","points":["Move towards scripless settlement to remove paper inefficiencies","Settlement periods vary: China T+0 (must have funds on hand); US, Singapore and Hong Kong T+2","Japan has 8 stock exchanges, dominated by the Tokyo Stock Exchange (TSE)","Unlisted securities trade OTC — in the US a negotiated market of dealers/market makers","Dealers (unlike brokers) take a vested interest in transactions and earn the bid-offer spread"]},{"t":"diagram","kind":"compare","title":"Broker (agency) vs Dealer (principal)","colA":"Broker / Agency market","colB":"Dealer / Principal market","rows":[["Acts as agent for the client","Trades for its own account (principal)"],["No vested interest in the trade","Has a vested interest in the transaction"],["Earns commission","Earns the bid-offer spread"],["Matches buyers and sellers","Stands ready to buy/sell at quoted prices"]]},{"t":"sub","text":"1.3.6 Options and Futures Markets"},{"t":"def","term":"Futures exchange","def":"A marketplace where buying and selling of underlying products is contracted for future delivery. The CME Group is the largest futures exchange; ICE (Intercontinental Exchange) is the second largest."},{"t":"p","text":"Futures trade on electronic exchanges with trades **cleared through the clearing house each business day**. The clearing house tracks each participant's outstanding contracts, allowing positions to be **easily reversed before maturity**. SGX operates the **largest derivatives market in Asia** and is Asia's largest FX centre. In Hong Kong, HKEX also owns the **London Metal Exchange**."},{"t":"p","text":"US options trade on exchange floors (e.g. **CBOE**) using market makers who quote bid/ask, with floor brokers trading against them. The **Options Clearing Corporation (OCC)** acts as intermediary, becoming **buyer for every seller and seller for every buyer**, guaranteeing all contract obligations are met."},{"t":"diagram","kind":"cycle","title":"Role of the clearing house (futures)","stages":[{"label":"Trade","sub":"agree on exchange"},{"label":"Clear","sub":"clearing house each business day"},{"label":"Track","sub":"each participant's open contracts"},{"label":"Reverse / Settle","sub":"easily close before maturity"}]},{"t":"h","text":"1.4 Digital Disruption and Fintech"},{"t":"p","text":"The financial industry is undergoing **digital disruption** at many levels; with internet accessibility, the roles of financial institutions and capital markets are challenged by new entrants. Banks partner with **fintech** companies to keep pace."},{"t":"table","headers":["Digital development","Impact on financial sector"],"rows":[["Internet banking","Redefines consumer/branch banking; fewer brick-and-mortar branches; staff retraining"],["Non-bank internet lending","New entrants using big-data credit analysis compete with banks/finance companies/moneylenders"],["Internet business transactions","Greater efficiency reduces the daily cash float once provided by slower bank clearing"],["Non-bank digital wallets","Excess cash moves to wallets (e.g. Tencent, Alibaba) that recommend funds, bypassing retail banks"],["Digital currencies","Cryptocurrencies (not backed by reserves/central banks) authenticated via blockchain; not legal tender, ~1% of currency transactions; Bitcoin futures trade on CME and CBOE"]]},{"t":"h","text":"1.5 Chapter Summary"},{"t":"key","title":"Key takeaways","points":["Distinguish institutional, accredited, expert and retail investors and their needs","Financial assets = debt, equity, collective investment schemes/funds or derivatives","Money market instruments: highly liquid, short-term, maturities < 1 year","Fixed income: issuers pay periodic interest and return principal at maturity","Equity: ownership; ordinary and preference shares; creditors > pref > ordinary in claims","Primary market = issuer sells new securities; secondary market = subsequent trading","Good markets: information availability, liquidity, low cost, narrow spread, informational & price-discovery efficiency","Bonds trade mostly OTC through dealers; equity markets vary by country; the sector is undergoing a digital revolution"]}],"newQuestions":[{"type":"mcq","q":"Under SFA Section 4A, which class of investor is defined by EXCLUSION — i.e., anyone who is not an institutional, accredited or expert investor?","options":["Accredited Investor","Retail Investor","Expert Investor","Sovereign Investor"],"correct":[1],"explain":"Retail investors are defined as those excluded from the II, AI and EI classes; they receive the highest protection. The other classes have positive definitions."},{"type":"mcq","q":"An individual claims Accredited Investor status. Which ONE of the following thresholds, on its own, would qualify them?","options":["Annual income of S$250,000 in the preceding 12 months","Net financial assets of S$800,000","Net personal assets exceeding S$2 million","Net personal assets of S$1.5 million including a fully-paid home valued at S$2 million"],"correct":[2],"explain":"Net personal assets > S$2m qualifies. Income must be >= S$300,000 (not 250k); net financial assets must exceed S$1m (not 800k); the primary residence is capped at S$1m net, so a S$1.5m total may not reach S$2m."},{"type":"mcq","q":"What did MAS's opt-in regime change about Accredited Investors?","options":["AIs are now automatically given retail-level protection","CMIs may no longer automatically treat a qualifying person as an AI unless the investor opts in","The net-worth threshold was lowered to widen the AI pool","AIs can no longer buy unrated bonds"],"correct":[1],"explain":"The opt-in regime means a qualifying person is NOT treated as an AI by default; they must opt in, otherwise they retain retail safeguards."},{"type":"mcq","q":"Which statement BEST distinguishes an Expert Investor (EI) from an Accredited Investor (AI)?","options":["The EI qualifies by wealth while the AI qualifies by occupation","The EI receives more protection than a retail investor","The EI qualifies by trading capital markets products in the ordinary course of business, not by wealth","The EI is always an institution"],"correct":[2],"explain":"EIs qualify by occupation/knowledge (trading products in the ordinary course of business), whereas AIs qualify by wealth. Both receive less protection than retail investors."},{"type":"mcq","q":"A pension fund and a commercial insurer differ in time horizon mainly because:","options":["Pension funds are prohibited from holding equities","The pension fund has precise knowledge of future liabilities and favours long-term objectives, while the insurer has lower predictability","Insurers are not institutional investors","Pension funds must settle T+0"],"correct":[1],"explain":"Pension funds know future liabilities precisely and favour long-term objectives; commercial insurers face lower predictability (e.g. weather-driven claims) and may lean short-term."},{"type":"mcq","q":"Under MAS requirements, insurers in Singapore are specifically prohibited from:","options":["Investing in Singapore Government Securities","Taking uncovered (naked) positions in derivatives","Holding any equities","Buying foreign-currency bonds"],"correct":[1],"explain":"MAS Notice 125 prohibits insurers from taking uncovered positions in derivatives; the other activities are permitted."},{"type":"mcq","q":"In the primary market, the cash proceeds from a new securities issue go to:","options":["The selling investor","The clearing house","The issuer of the securities","The market maker"],"correct":[2],"explain":"In the primary market the issuer sells new securities and receives the cash. In the secondary market, proceeds go to the selling investor, not the issuer."},{"type":"mcq","q":"Which is the PRIMARY function attributed to the secondary market?","options":["Creating new financial claims","Providing liquidity essential to the functioning of capital markets","Raising fresh capital for issuers","Setting the IPO offer price"],"correct":[1],"explain":"Secondary markets provide liquidity by allowing investors to trade already-issued securities; capital raising and creating new claims occur in the primary market."},{"type":"mcq","q":"Money market instruments are characterised by maturities that:","options":["Always exceed five years","Range from 1 day to 1 year, often less than 90 days","Are perpetual","Are fixed at exactly 1 year"],"correct":[1],"explain":"Money market instruments are short-term, with maturities from 1 day to 1 year, often under 90 days."},{"type":"mcq","q":"Why are Treasury bill yields commonly used as a proxy for the risk-free rate?","options":["They offer the highest return in the market","They are obligations of the government and considered free of default","They are issued by private banks with guarantees","They have the longest maturities"],"correct":[1],"explain":"T-bills are government obligations considered free of default risk, so their return proxies the risk-free rate."},{"type":"mcq","q":"A Yankee bond is BEST described as a bond that is:","options":["Denominated in US dollars, sold in the US, but issued by a foreign corporation or government","Denominated in US dollars and sold outside the US to non-US investors","Sold by an issuer within its own country in that country's currency","Denominated in Euroyen and sold in London"],"correct":[0],"explain":"A Yankee bond is sold in the US in USD but issued by a foreign issuer. The second describes a Eurodollar bond, the third a domestic bond, the fourth a Euroyen bond."},{"type":"mcq","q":"In the priority of claims over a company's assets, the correct order from HIGHEST to LOWEST is:","options":["Ordinary shareholders, preference shareholders, creditors","Creditors, preference shareholders, ordinary shareholders","Preference shareholders, creditors, ordinary shareholders","Creditors, ordinary shareholders, preference shareholders"],"correct":[1],"explain":"Creditors rank highest, then preference shareholders, then ordinary shareholders (residual claim)."},{"type":"mcq","q":"Preference shares are often called a 'hybrid' security because they:","options":["Are pure debt instruments with no equity features","Carry full voting rights like ordinary shares","Have limited voting rights and resemble both equity and fixed income instruments","Cannot pay dividends"],"correct":[2],"explain":"Preference shares are technically equity but have only limited voting rights and resemble both equity and fixed income, hence 'hybrid'."},{"type":"mcq","q":"How does a dealer (market maker) differ from a broker in the OTC market?","options":["A broker takes a vested interest and earns the spread","A dealer has a vested interest in transactions and earns the bid-offer spread, unlike a broker","A dealer only acts as agent for clients","A broker stands ready to buy and sell from its own inventory"],"correct":[1],"explain":"Dealers trade as principals, take a vested interest and earn the bid-offer spread; brokers act as agents and earn commission."},{"type":"mcq","q":"What role does the Options Clearing Corporation (OCC) play?","options":["It sets the strike prices of all listed options","It becomes the buyer for every seller and the seller for every buyer, guaranteeing contract obligations","It acts purely as an agent earning commission","It issues the underlying shares"],"correct":[1],"explain":"The OCC interposes itself as counterparty (buyer to every seller, seller to every buyer), guaranteeing performance of option contracts."},{"type":"mcq","q":"Which settlement period applies to equity trades in Singapore (and also the US and Hong Kong)?","options":["T+0","T+1","T+2","T+3"],"correct":[2],"explain":"Singapore, the US and Hong Kong use T+2 settlement. China uses T+0, requiring funds on hand before purchase."},{"type":"mcq","q":"All of the following are characteristics of a good financial market EXCEPT:","options":["A wide bid-offer spread","Availability of timely and accurate information","High liquidity with depth and price continuity","Low transaction costs (internal efficiency)"],"correct":[0],"explain":"A good market has a NARROW bid-offer spread, reflecting deep market-making. A wide spread signals poor efficiency."},{"type":"mrq","q":"Select ALL that are components of liquidity as described for a good financial market:","options":["Marketability","Price continuity","Depth","Wide bid-offer spread"],"correct":[0,1,2],"explain":"Liquidity comprises marketability (likelihood of quick sale), price continuity (small price changes) and depth (many buyers/sellers). A wide spread is the opposite of efficiency."},{"type":"mrq","q":"Select ALL that are correctly identified as participants in financial markets:","options":["Intermediaries such as broker/dealer firms and market makers","Infrastructure providers such as clearing houses and central depositories","Regulators","Underlying commodities themselves"],"correct":[0,1,2],"explain":"Intermediaries, infrastructure providers and regulators are listed market participants (along with investors, issuers, exchanges and financial institutions). Commodities are traded assets, not participants."},{"type":"mrq","q":"Select ALL true statements about derivatives as described in this chapter:","options":["A futures contract is exchange-traded with standardised terms and can be cash- or physically-settled","A company-issued warrant gives the right to buy the company's shares at a specified price over a period","A structured warrant is typically issued by banks and can be a call or put on an underlying","An option obligates the buyer to exercise at maturity"],"correct":[0,1,2],"explain":"Futures are standardised exchange-traded and may be cash/physically settled; warrants and structured warrants are as described. An option gives a RIGHT, not an obligation, to the buyer."}]},"02":{"notes":[{"t":"h","text":"2.1 Risk and Return"},{"t":"p","text":"The **risk-return (risk-reward) principle** states that rational investors demand **higher potential returns when they take on more risk**. When risk is lower, investors accept a lower required rate of return. This positive relationship is the central idea of the chapter."},{"t":"p","text":"The choice of assets depends on the investor's **risk profile**. A **low-risk-appetite** investor fears losing capital and prefers relatively safe **money market instruments** that give steady interest income. A **higher-risk-appetite** investor is willing to lose some (or even all) of their capital and considers riskier securities such as **equities** in pursuit of higher returns."},{"t":"key","title":"General risk-return ordering of asset classes","points":["Cash is usually the least risky (medium of exchange, liquid) but can still be volatile against other currencies","Government bonds were once seen as 'riskless' but now carry counterparty risk (e.g. Portugal, Italy, Greece, Spain)","A CCC-rated (junk/speculative) bond can be riskier than the equity of a conservative AAA-rated blue chip","Equities are generally riskier than bonds as an asset class","Derivatives and structured products sit at the upper (high risk-high return) end, though some are capital-guaranteed"]},{"t":"diagram","kind":"bars","title":"General risk by asset class (relative)","unit":"risk","data":[{"label":"Cash / money market","value":1},{"label":"Government bonds","value":2},{"label":"Corporate bonds","value":3},{"label":"Equities","value":4},{"label":"Derivatives / structured","value":5,"note":"some capital-guaranteed"}]},{"t":"p","text":"Representatives must examine the **riskiness inherent in the security itself** by reviewing the **Product Highlights Sheet** and **prospectus**, understanding the product structure, underlying strategy and payoff scenarios, before recommending investments suited to the client's risk-return profile."},{"t":"sub","text":"The VIX - 'investor fear gauge'"},{"t":"p","text":"The **CBOE Volatility Index (VIX)** measures the market's expectation of **30-day S&P 500 volatility**. A higher VIX means more expected risk and volatility. Values **above 30** generally indicate **high volatility**; values **below 20** indicate **relative stability**. At the height of the 2008 Global Financial Crisis the VIX hit 89.5; during the European Debt Crisis it reached 48."},{"t":"p","text":"Overall market matters too: assets in **mature markets** (e.g. the US) are seen as less risky than those in **emerging markets** (e.g. China) or **frontier markets** (e.g. Sri Lanka)."},{"t":"h","text":"2.2 Calculating Returns"},{"t":"sub","text":"2.2.1 Total Return"},{"t":"p","text":"**Total return** (pre-tax) on an investment has two components: (a) **current income** - income received while holding the investment (e.g. dividends, interest); and (b) **capital gain or loss** - the change between the ending/sale price and the beginning/purchase price."},{"t":"formula","name":"Total return","expr":"Total Return = [CFt + (PE − PB)] / PB","where":["CFt = cash flows (income) during period t","PE = ending or sale price","PB = beginning or purchase price","Capital gain/loss = PE − PB"]},{"t":"key","title":"Worked example - Total Return","points":["Buy 1,000 XYZ shares at $5; dividend $0.20/share; sell at $6 after 1 year","Total Return = [0.20 + (6 − 5)] / 5 = 1.20 / 5 = 0.24 = 24%"]},{"t":"sub","text":"2.2.2 Expected Rate of Return"},{"t":"p","text":"The **expected rate of return** is the **future** return, which may or may not be realised. A single estimate (e.g. 15%) is a **point estimate**. Because the future is uncertain, several possible returns can occur under different economic outlooks, each with a probability."},{"t":"formula","name":"Expected return","expr":"E(R) = Σ ri × pi","where":["E(R) = expected return on the security","ri = the ith possible return","pi = probability of return ri","n = number of possible returns","E(R) is the probability-weighted average of possible returns"]},{"t":"key","title":"Worked example - Expected Return","points":["Boom: p=0.20, r=25%; Recession: p=0.20, r=−30%; Stable: p=0.60, r=15%","E(R) = (0.20×0.25) + (0.20×−0.30) + (0.60×0.15)","= 0.05 − 0.06 + 0.09 = 0.08 = 8%"]},{"t":"sub","text":"2.2.3 Annualised Rate of Return"},{"t":"p","text":"Returns are often quoted on an **annualised** basis by **compounding** the periodic return (earning interest on interest)."},{"t":"formula","name":"Annualised rate of return","expr":"Annualised = (1 + r_period)^(12/m) − 1","where":["r_period = return over the holding period","m = number of months in the holding period","Solve for a partial-period return r: (1 + r)^(12/m) − 1 = annualised target, so r = (1 + annualised)^(m/12) − 1"]},{"t":"key","title":"Worked examples - Annualisation","points":["2.5% over 3 months → (1.025)^(12/3) − 1 = (1.025)^4 − 1 = 10.38%","Annualised target 12% over 4 months → r4 = (1.12)^(4/12) − 1 = (1.12)^(1/3) − 1 = 3.85%"]},{"t":"sub","text":"2.2.4 Real Rate of Return (Inflation-Adjusted)"},{"t":"p","text":"The **real rate of return** strips out inflation. Part of a nominal return merely reflects general price inflation, so the real return shows true purchasing-power gain. Use the inflation rate (or negative for deflation) in the denominator."},{"t":"formula","name":"Real rate of return","expr":"Real Return = [(1 + nominal) / (1 + inflation)] − 1","where":["nominal = nominal (annualised) return","inflation = inflation rate (use a negative value for deflation)"]},{"t":"key","title":"Worked examples - Real Return","points":["Nominal 10.4%, inflation 2% → (1.104 / 1.02) − 1 = 8.24%","Nominal 10.4%, deflation 1% → (1.104 / 0.99) − 1 = 11.52%"]},{"t":"sub","text":"2.2.5 Currency-Adjusted Return"},{"t":"p","text":"Foreign-currency assets must be restated in the investor's **reference (base) currency**. Rule of thumb: **divide** (1 + portfolio return) by (1 + currency return) when the reference currency is the **first** listed currency of the pair; **multiply** when the reference currency is the **second** listed currency of the pair."},{"t":"key","title":"Worked example - Currency-Adjusted Return (SGD reference)","points":["JPY portfolio +121.88%, SGD/JPY +18.89% (SGD is first) → (1.2188/1.1889) − 1 ... i.e. (1+1.2188)/(1+0.1889) − 1 = 86.62% (SGD strengthened vs JPY → gains adjusted down)","US portfolio +87.06%, USD/SGD +8.12% (SGD is second) → (1+0.8706)×(1+0.0812) − 1 = 102.24% (SGD weakened vs USD → gains adjusted up)"]},{"t":"sub","text":"2.2.6 Internal Rate of Return (IRR)"},{"t":"p","text":"The **IRR** is the rate that equates all cash outflows (investments) with all cash inflows (proceeds) evaluated at the same point in time. It is used for projects/investments with **uneven cash flows** (e.g. private equity) and is solved by **trial-and-error** (or Excel =IRR)."},{"t":"p","text":"In portfolio terms, the IRR is the **money-weighted return** - the actual return given the size and timing of the client's cash flows. The **compounded annualised return** is the **time-weighted return** - unaffected by the timing/size of cash flows."},{"t":"diagram","kind":"compare","title":"Money-weighted vs Time-weighted return","colA":"Money-weighted (IRR)","colB":"Time-weighted (compounded)","rows":[["Sensitive to size/timing of cash flows","Unaffected by cash-flow timing"],["= actual client return","= fund/manager performance"],["Solved by trial-and-error","Chain-link periodic returns then annualise"]]},{"t":"key","title":"Worked example - Time-weighted annualised","points":["Yearly returns: 2017 +2%, 2018 +10%, 2019 −4%","Compounded over 3 yrs = (1.02 × 1.10 × 0.96) − 1 = 7.71%","Annualised = (1.0771)^(1/3) − 1 = 2.51%"]},{"t":"h","text":"2.3 Measures of Risk"},{"t":"p","text":"**Risk** is the **uncertainty of returns** - the degree of fluctuation in the value of an asset. Risk and return are inextricably linked."},{"t":"sub","text":"2.3.1 Variance and Standard Deviation"},{"t":"p","text":"**Variance** and **standard deviation** are the most widely used risk measures. They measure the **dispersion of returns around the expected return**. The smaller the dispersion, the lower the risk."},{"t":"formula","name":"Variance of returns","expr":"σ² = Σ pi × [ri − E(R)]²","where":["σ² = variance","pi = probability of return ri","ri = the ith possible return","E(R) = expected return"]},{"t":"formula","name":"Standard deviation of returns","expr":"σ = √( Σ pi × [ri − E(R)]² ) = √σ²","where":["σ = standard deviation (positive square root of variance)","Also called volatility"]},{"t":"key","title":"Worked example - Variance & SD","points":["Using E(R)=8%: outcomes 25%/−30%/15% with p 0.20/0.20/0.60","Probability-weighted squared deviations: 0.00578 + 0.02888 + 0.00294 = 0.03760","Variance σ² = 0.03760; Standard deviation σ = √0.03760 = 0.1939 = 19.39%"]},{"t":"p","text":"**Volatility** = the standard deviation of the security. **Historical volatility** is computed from past returns; **implied volatility** is derived (implied) from the price of an option on the security."},{"t":"sub","text":"2.3.2 Coefficient of Variation (CV)"},{"t":"p","text":"When investments have **different returns AND different standard deviations**, compare them with the **coefficient of variation**, a relative measure of **risk per unit of expected return**. A **lower CV is more attractive**."},{"t":"formula","name":"Coefficient of variation","expr":"CV = Standard Deviation of Returns / Expected Rate of Return","where":["Lower CV = less risk per unit of return = more attractive"]},{"t":"key","title":"Worked example - CV","points":["A: E(R)=0.05, σ=0.08 → CV = 0.08/0.05 = 1.60","B: E(R)=0.15, σ=0.20 → CV = 0.20/0.15 = 1.33","B has higher SD but LOWER CV, so B is more attractive per unit of return"]},{"t":"sub","text":"2.3.3 Shortfall Risk & the Normal Distribution"},{"t":"p","text":"Assuming returns are **normally distributed**, we can find the probability of a range of returns using the **Z-score** - the number of standard deviations a return is from the mean."},{"t":"formula","name":"Z-score","expr":"Z = (X − E(r)) / σ","where":["X = a given return","E(r) = expected (mean) return","σ = standard deviation"]},{"t":"key","title":"Normal distribution rules of thumb","points":["~68% of returns fall within ±1 SD of the mean","~95.4% within ±2 SD","Z=1.00 → 0.8413 cumulative; Z=−0.5 → ~31% chance of a negative return","Example: E(r)=6%, σ=12% → 1 SD band = −6% to +18%"]},{"t":"sub","text":"2.3.4 Value at Risk (VaR)"},{"t":"p","text":"**VaR** extends shortfall risk: it estimates the **minimum loss** expected with a given small probability (e.g. 2.5% or 0.5% of the time). Work back from X = Zσ + E(r) using the relevant left-tail Z (−1.96 for 2.5%, ≈ −2.58 for 0.5%)."},{"t":"key","title":"Worked example - VaR","points":["Balanced portfolio E(r)=6%, σ=12%: 2.5% chance of losing ≥18% (Z=−1.96); 0.5% chance of losing ≥25% (Z≈−2.58)","Defensive portfolio E(r)=4%, σ=4%: 2.5% chance of losing ≥4%; 0.5% chance of losing ≥7%","Limitation: past data may not reflect future conditions; Monte Carlo simulation is an alternative"]},{"t":"h","text":"2.4 Types of Risk and Risk Management"},{"t":"p","text":"Risk was defined as volatility (deviation, positive or negative, from the expected return), but the average investor mainly cares about **negative deviation - the risk of losses**. Risks are classified into six groups."},{"t":"table","headers":["Risk category","Key examples"],"rows":[["Issuer & Counterparty (business)","Business risk, credit risk, fraud risk"],["Product-Specific","Leverage structure, term/maturity, option triggers/strike/payoffs, currency"],["Market Risk (Systematic)","Market shocks; country/political/currency; unexpected economic changes; disasters; liquidity"],["Execution & Operational","Execution error, system failure, process errors, computer viruses, data breaches"],["Management","Risk-profile mismatch, concentration risk (lack of diversification)"],["Liquidity","Lack of market depth"]]},{"t":"def","term":"Issuer risk","def":"Risk of loss when an issuer of securities (shares, bonds, commercial paper, CDs, structured notes) defaults on its obligations. Example: Lehman Brothers minibonds (2008)."},{"t":"def","term":"Counterparty risk","def":"Risk that one or more parties to a contract fails to fulfil its contractual obligation. Common in OTC contracts. Sometimes the counterparty is also the issuer (e.g. a bank that designs and sells a structured product)."},{"t":"def","term":"Business risk","def":"Uncertainty about a company's ability to meet its financial goals - e.g. earnings missing expectations, slowing growth, unexpected losses, deteriorating prospects."},{"t":"def","term":"Market risk (systematic risk)","def":"Risk that affects most assets in the market and therefore cannot be fully diversified away (though it may be hedged). During crises, asset-class correlations tend toward 1."},{"t":"def","term":"Liquidity risk","def":"(a) Funding liquidity - availability of funds (crunch raises rates); and (b) market liquidity - ability to liquidate a position quickly at a fair price; thin volume widens the bid-offer spread and can cause prices to gap."},{"t":"p","text":"Notable examples: the **Lehman minibond saga** (issuer/counterparty), the **Madoff Ponzi scheme** (fraud), the **2010 and Feb-2018 flash crashes** (execution/HFT), and a **short squeeze** (liquidity for short positions)."},{"t":"sub","text":"Market disruption controls"},{"t":"p","text":"To limit excessive volatility, exchanges use **circuit breakers / shock absorbers**. On the **SGX**, a circuit breaker triggers if a stock's price would move **more than 10%** from the reference price (the traded price 5 minutes earlier), followed by a **5-minute cooling-off** period during which trading is confined to ±10% of the reference price."},{"t":"sub","text":"2.4.2 Risk Management"},{"t":"list","ordered":false,"items":["Due diligence checks (on securities and on fund managers)","Timely research and risk-management processes (enabling early underweighting)","Client profile and product suitability assessment","Risk diversification (avoiding concentration)","Process and system risk management (error-proofing, back-ups, compliance)"]},{"t":"p","text":"**Strategic asset allocation** = allocating the right proportion of assets to a client based on their risk-return profile. Poor profiling causes a **risk-profile mismatch**, with potential for **mis-selling, negligence or mismanagement**."},{"t":"h","text":"2.5 Time Value of Money"},{"t":"p","text":"**A dollar received in the future is worth LESS than a dollar received today**, because today's dollar can be invested immediately to earn a return. The time value of money depends on the date of receipt and prevailing interest rates. Discounted cash flow techniques account for this."},{"t":"sub","text":"2.5.1 Simple and Compound Interest"},{"t":"formula","name":"Simple interest","expr":"Simple Interest = (Principal × Rate% × Days) / 36,500","where":["Denominator 36,500 assumes a 365-day basis (SGD)","USD uses a 360-day basis (denominator 36,000)"]},{"t":"p","text":"**Compound interest** is the earning of 'interest on interest' - the principal plus accrued interest is reinvested each period."},{"t":"key","title":"Worked example - Simple interest","points":["SGD 1,000,000 at 8% for 91 days","= (1,000,000 × 8 × 91) / 36,500 = SGD 19,945.21"]},{"t":"sub","text":"2.5.2 Future Value"},{"t":"formula","name":"Future value (annual compounding)","expr":"FVn = PV × (1 + k)^n","where":["FVn = future value at end of n years","PV = present value (amount invested today)","k = annual interest rate","n = number of years"]},{"t":"formula","name":"Future value (m periods per year)","expr":"FVn = PV × (1 + k/m)^(m×n)","where":["m = number of compounding periods per year","More frequent compounding → higher FV"]},{"t":"key","title":"Worked examples - Future Value","points":["$1,000 at 5% annual for 10 yrs → 1,000 × (1.05)^10 = $1,628.89","$1,000 at 5% quarterly for 10 yrs → 1,000 × (1+0.05/4)^40 = 1,000 × (1.0125)^40 = $1,643.62"]},{"t":"sub","text":"2.5.3 Negative Interest Rate Environment"},{"t":"p","text":"Central banks have imposed **negative rates** (e.g. many European 2-year sovereigns in 2017), effectively charging banks to hold excess reserves to encourage lending. Even with positive nominal deposit rates, when **inflation exceeds the deposit rate**, depositors experience **negative real interest rates**. Negative rates **raise the present value** of fixed-income investments at the short end of the yield curve."},{"t":"sub","text":"2.5.4 Compounded Annual Growth Rate (CAGR)"},{"t":"formula","name":"CAGR","expr":"CAGR = (FV / PV)^(1/n) − 1","where":["FV = ending value","PV = beginning value","n = number of years","= effective annual rate earned on the initial cash flow"]},{"t":"key","title":"Worked example - CAGR","points":["PV $1,000, FV $1,628.89, n=10","CAGR = (1,628.89/1,000)^(1/10) − 1 = 0.05 = 5%"]},{"t":"sub","text":"2.5.5 Present Value of a Single Cash Flow"},{"t":"p","text":"**Discounting** (opposite of compounding) finds the **present value** of a future sum. The interest rate used is the **discount rate** - the return obtainable on similar alternative investments (an **opportunity cost**), often **risk-adjusted**; at minimum it is the risk-free government bond yield of matching maturity."},{"t":"formula","name":"Present value (single cash flow)","expr":"PV = FVn / (1 + k)^n","where":["PV = present value of the future sum","FVn = future value at end of n years","k = annual discount (interest) rate","n = years to receipt"]},{"t":"key","title":"Worked example - Present Value","points":["$1,000 received in 5 years, discount rate 6%","PV = 1,000 / (1.06)^5 = 1,000 / 1.3382 = $747.27"]},{"t":"diagram","kind":"compare","title":"Compounding vs Discounting","colA":"Compounding","colB":"Discounting","rows":[["Finds future value of a present sum","Finds present value of a future sum"],["FV = PV(1+k)^n","PV = FV/(1+k)^n"],["Uses interest rate k","Uses discount rate k"]]},{"t":"h","text":"Key Takeaways"},{"t":"list","ordered":true,"items":["Positive risk-return relationship: higher return requires higher risk.","Six measures of return: total, expected, compounded annualised, real, currency-adjusted, IRR.","Risk is measured by variance/standard deviation (volatility); CV gives risk per unit of return.","Shortfall risk and VaR estimate the probability and extent of losses via the normal distribution.","Investments face issuer/counterparty, product-specific, market (systematic), execution/operational, management and liquidity risks.","Money has time value: FV = PV(1+k)^n; PV = FV/(1+k)^n; CAGR = (FV/PV)^(1/n) − 1.","When inflation exceeds deposit rates, real interest rates are negative."]}],"newQuestions":[{"type":"mcq","q":"You buy a share at $40, receive a $2 dividend during the year, and sell it for $44 one year later. What is the total return?","options":["10%","15%","20%","12%"],"correct":[1],"explain":"Total Return = [income + (PE − PB)] / PB = [2 + (44 − 40)] / 40 = 6/40 = 15%. 10% ignores the dividend; 20% double-counts."},{"type":"mcq","q":"An investment has these scenarios: Boom p=0.30 r=20%; Normal p=0.50 r=10%; Recession p=0.20 r=−15%. What is the expected return?","options":["8.0%","11.0%","5.0%","9.5%"],"correct":[0],"explain":"E(R) = (0.30×0.20)+(0.50×0.10)+(0.20×−0.15) = 0.06+0.05−0.03 = 0.08 = 8%."},{"type":"mcq","q":"$2,000 is invested at 6% interest compounded annually for 5 years. What is the future value (nearest dollar)?","options":["$2,600","$2,676","$2,544","$3,200"],"correct":[1],"explain":"FV = 2,000 × (1.06)^5 = 2,000 × 1.33823 = $2,676. $2,600 wrongly uses simple interest (2,000 + 600)."},{"type":"mcq","q":"What is the present value of $5,000 to be received in 4 years, given a discount rate of 8% (nearest dollar)?","options":["$3,403","$3,675","$4,630","$3,150"],"correct":[1],"explain":"PV = 5,000 / (1.08)^4 = 5,000 / 1.36049 = $3,675. Discounting reduces a future sum to today's value."},{"type":"mcq","q":"A product returns 3% over a 6-month period. What is the annualised (compounded) rate of return?","options":["6.00%","6.09%","3.00%","12.36%"],"correct":[1],"explain":"Annualised = (1.03)^(12/6) − 1 = (1.03)^2 − 1 = 0.0609 = 6.09%. 6.00% is the simple (non-compounded) figure."},{"type":"mcq","q":"An investment earned a nominal return of 9% in a year when inflation was 3%. What is the real rate of return?","options":["6.00%","5.83%","12.27%","3.00%"],"correct":[1],"explain":"Real return = (1.09/1.03) − 1 = 0.0583 = 5.83%. Simply subtracting (9% − 3% = 6%) is an approximation, not the exact formula."},{"type":"mcq","q":"A portfolio has an expected return of 12% and a standard deviation of 18%. What is its coefficient of variation?","options":["0.67","1.50","2.16","0.30"],"correct":[1],"explain":"CV = σ / E(R) = 0.18 / 0.12 = 1.50. CV measures risk per unit of expected return; a lower CV is preferable."},{"type":"mcq","q":"Investment X: E(R)=6%, σ=9%. Investment Y: E(R)=10%, σ=14%. Which is more attractive on a risk-per-unit-of-return basis, and why?","options":["X, because it has a lower standard deviation","Y, because CV_Y (1.40) is lower than CV_X (1.50)","X, because CV_X (1.50) is lower than CV_Y (1.40)","Y, because it has the higher expected return"],"correct":[1],"explain":"CV_X = 9/6 = 1.50; CV_Y = 14/10 = 1.40. Y has the lower CV, so it carries less risk per unit of return despite its higher absolute SD."},{"type":"mcq","q":"$1,000 is invested at 8% compounded quarterly for 2 years. What is the future value (nearest dollar)?","options":["$1,160","$1,172","$1,166","$1,160.00 simple"],"correct":[1],"explain":"FV = 1,000 × (1 + 0.08/4)^(4×2) = 1,000 × (1.02)^8 = 1,000 × 1.17166 = $1,172. Quarterly compounding beats annual ($1,166)."},{"type":"mcq","q":"An investment of $1,000 grows to $1,762 after 8 years. What is its CAGR (nearest %)?","options":["5%","7%","9%","6%"],"correct":[1],"explain":"CAGR = (1,762/1,000)^(1/8) − 1 = (1.762)^(0.125) − 1 ≈ 0.073 ≈ 7%."},{"type":"mcq","q":"A balanced portfolio has E(r)=6% and σ=12%. Approximately what range captures about 68% of annual returns?","options":["−18% to +30%","−6% to +18%","0% to +12%","−12% to +24%"],"correct":[1],"explain":"About 68% of returns fall within ±1 SD of the mean: 6% ± 12% = −6% to +18%. The ±2 SD (95%) band would be −18% to +30%."},{"type":"mcq","q":"Which statement about the VIX is correct?","options":["A VIX below 20 signals high volatility","The VIX measures realised 30-day gold volatility","A VIX above 30 generally indicates high volatility and risk","A higher VIX means lower expected market risk"],"correct":[2],"explain":"The VIX (investor fear gauge) reflects expected 30-day S&P 500 volatility; values above 30 indicate high volatility, below 20 relative stability."},{"type":"mcq","q":"In a portfolio-management context, which return is the time-weighted return that is UNAFFECTED by the size and timing of client cash flows?","options":["Internal rate of return","Money-weighted return","Compounded annualised return","Total return"],"correct":[2],"explain":"The compounded annualised (time-weighted) return ignores cash-flow timing. The IRR/money-weighted return is sensitive to the size and timing of cash flows."},{"type":"mcq","q":"A fund returns +5% in Year 1, +8% in Year 2, and −3% in Year 3. What is the annualised compounded return over the three years (nearest 0.1%)?","options":["3.3%","10.0%","3.0%","6.7%"],"correct":[0],"explain":"Cumulative = (1.05 × 1.08 × 0.97) − 1 = 0.09998. Annualised = (1.09998)^(1/3) − 1 ≈ 3.3%."},{"type":"mcq","q":"Which of the following is LEAST accurately described as a market (systematic) risk?","options":["A sudden unexpected economic shock affecting all asset classes","An execution error where a trader enters the wrong trade size","A natural disaster or act of terrorism disrupting markets","An unexpected contractionary interest-rate hike"],"correct":[1],"explain":"An execution error is an execution/operational risk, not a market risk. Market/systematic risks affect most assets and cannot be fully diversified away."},{"type":"mcq","q":"Negative central-bank interest rates at the short end of the yield curve will MOST likely:","options":["Lower the present value of short-dated fixed-income investments","Raise the present value of short-dated fixed-income investments","Have no effect on present values","Always cause banks to charge depositors negative interest"],"correct":[1],"explain":"A lower (negative) discount rate raises PV. The chapter notes negative rates raise the present value of fixed-income investments at the short end; banks generally have NOT charged depositors negative rates."},{"type":"mrq","q":"Select ALL that are components of the total return on an investment.","options":["Current income (e.g. dividends, interest)","Capital gain or loss","The risk-free rate","The coefficient of variation"],"correct":[0,1],"explain":"Total return = current income + capital gain/loss. The risk-free rate and CV are not components of total return."},{"type":"mrq","q":"Select ALL TRUE statements about variance and standard deviation as risk measures.","options":["They measure the dispersion of returns around the expected return","Standard deviation is the positive square root of the variance","A smaller dispersion implies higher risk","Standard deviation is also referred to as volatility"],"correct":[0,1,3],"explain":"SD = √variance and equals volatility; both measure dispersion around E(R). A SMALLER dispersion means LOWER, not higher, risk."},{"type":"mrq","q":"Select ALL statements that are TRUE about the time value of money.","options":["A dollar received in the future is worth less than a dollar received today","Compounding finds the future value of a present sum","Discounting finds the present value of a future sum","The discount rate can be interpreted as an opportunity cost / required return"],"correct":[0,1,2,3],"explain":"All four are correct: future dollars are worth less today; compounding gives FV; discounting gives PV; the discount rate is an opportunity cost and the return required by investors."},{"type":"mrq","q":"Select ALL risks that are correctly matched to the Execution & Operational risk category.","options":["System failure during trading","Computer viruses and data breaches","Risk-profile mismatch with the client","Process errors and restrictions"],"correct":[0,1,3],"explain":"Execution/operational risks include system failure, viruses/data breaches, and process errors/restrictions. Risk-profile mismatch is a Management risk."}]},"03":{"notes":[{"t":"h","text":"3.1 Introduction: Intrinsic Value vs Market Price"},{"t":"p","text":"An analyst estimates an asset's **intrinsic (fair) value** using **fundamental analysis** based on assumptions and parameters, then compares it against the **market value**. Fair value estimates differ across analysts (different assumptions/projections) and across investors (different horizons and objectives)."},{"t":"p","text":"**Market price** is set by the **supply of and demand for** the security at a point in time. It is influenced by **fundamental factors** (economic, industry, company), **technical factors** (investor behaviour and sentiment), and **market-driven factors** (market structure, trading rules, type of participants, flow of funds and assets)."},{"t":"def","term":"Efficient Market Hypothesis (EMH)","def":"Eugene Fama's theory that markets are efficient and asset prices adjust rapidly to reflect all new publicly available information, so an asset's price is its fair value and no one can consistently outperform the market."},{"t":"p","text":"In practice, periods of **information inefficiency** appear, leading to under- or over-valuation over extended periods. Investors react irrationally due to **cognitive biases** (overconfidence, emotional over-reaction, information bias), creating opportunities for astute investors to exploit undervaluation and overvaluation."},{"t":"key","title":"3 primary factors driving asset values","points":["Fundamental factors — economic, industry and company factors (the rational/logical worth of the asset)","Market-driven factors — liquidity & funds flow, new securities/IPOs, derivatives influence, market structure","Investment behaviour — herd instinct (greed and fear), loss aversion, cognitive bias (emotion and sentiment)"]},{"t":"h","text":"3.2 Fundamental Factors & Economic Analysis"},{"t":"p","text":"**Fundamental analysis** estimates fair value by examining **macroeconomic factors** (fiscal and monetary policy), **industry factors** (industry life cycle, competitive structure) and **firm-specific factors** (business strategy, financial condition)."},{"t":"p","text":"Economic data reflects the composite performance of industries and companies. When investors expect **steady growth**, markets are typically **bullish**; expectations of a slowdown or **recession** trigger corrections and **bearish** conditions. The investment community tracks **leading economic indicators** to gauge policy impact and invests in securities likely to benefit most."},{"t":"def","term":"Top-down asset allocation","def":"An approach that allocates a larger proportion of funds to developed economies, then to growing sectors/industries, then to the leading corporate performers (strongest financials, best earnings-growth potential) within those industries."},{"t":"def","term":"Bottom-up approach","def":"Stock-picking that starts at the company level, selecting firms with specific competitive advantages that distinguish them from peers, rather than starting from the macro economy."},{"t":"sub","text":"Fiscal Policy"},{"t":"def","term":"Fiscal policy","def":"The use of government expenditure and taxation to influence aggregate demand and supply (e.g., infrastructure spending, tax cuts)."},{"t":"def","term":"Multiplier effect","def":"Money from fiscal expenditure ripples through the economy: e.g., infrastructure spending raises demand for materials, equipment, services and labour, lifting wages/profits and disposable income, which triggers further consumption and private capex across other industries."},{"t":"p","text":"Governments can also **cut taxes** to raise profits and disposable income. To fund stimulus they may run a **budget deficit**, drawing down prior surpluses or **issuing government bonds**. After the 2008 Global Financial Crisis most governments ran higher debt; US debt-to-GDP peaked in 2017 at post-WWII levels."},{"t":"sub","text":"GDP and the Impact of Fiscal Measures"},{"t":"def","term":"Gross Domestic Product (GDP)","def":"The most widely used measure of economic performance — the market value of goods and services produced in the domestic economy during a period (usually one year)."},{"t":"formula","name":"GDP (expenditure approach)","expr":"GDP = C + I + G + NE","where":["C = Consumption expenditures of individuals","I = Private investments in capital goods (replacement + expansion)","G = Government spending (investment + consumption)","NE = Net exports = total exports − total imports (can be positive or negative)"]},{"t":"table","headers":["US expansionary fiscal measure","GDP component raised"],"rows":[["More infrastructure development projects","G (government spending)"],["Tax incentives for firms to relocate factories to the US","I (private investment)"],["Lowering personal income tax rate","C (consumption)"],["Tariffs on selected foreign goods","NE (net exports — traditionally negative)"],["Job creation / higher employment","C (consumption)"]]},{"t":"p","text":"Expectations of follow-through fuelled a major US rally after the Nov 2016 election; the S&P 500 returned **21% in 2017**. But near-term stimulus can create future problems (inflation threat, larger budget deficits)."},{"t":"sub","text":"Monetary Policy"},{"t":"p","text":"**Monetary policy** stimulates or cools the economy by changing **liquidity** (money supply) and/or the **cost of funding** for short-term liquidity and bank reserves."},{"t":"def","term":"Expansionary monetary policy","def":"Expands money supply, lowers interest rates and increases aggregate demand. Lower rates make deposits less attractive so funds flow into equities and real estate (driving asset values up) and reduce borrowing costs (encouraging spending)."},{"t":"def","term":"Contractionary monetary policy","def":"Decreases money supply, raises interest rates and contains inflation. High rates discourage spending/borrowing, reduce asset demand (asset values fall), and can lower production, employment and disposable income."},{"t":"key","title":"Three Fed tools to influence money supply","points":["Open Market Operations (OMOs) — buying/selling government securities; the Fed's most-used tool (e.g., to pump liquidity in 2008)","Fed Funds Rate — the rate at which banks lend excess reserves to each other to meet reserve requirements","Discount window — a lending facility for eligible institutions to cover temporary credit shortfalls from short-term illiquidity"]},{"t":"p","text":"Declines in money-supply growth have **preceded contractions**; increases have **preceded expansions**. Liquidity changes affect **bond prices first, then common stocks, then the aggregate economy**. After 2008 the US, UK and European central banks ran **Quantitative Easing (QE)** programs, with very low rates (2009-2017). The Fed openly tied QE to **unemployment**; rates were held at 0.25% (Dec 2008-Dec 2016) then raised in 25bp steps, reaching 2.25% by Sep 2018 as unemployment hit 3.8% (May 2018) and core inflation reached the 2.0% target."},{"t":"sub","text":"Singapore's Exchange-Rate-Based Monetary Policy"},{"t":"p","text":"Because of its small open economy, **Singapore's monetary policy is centred on the exc
